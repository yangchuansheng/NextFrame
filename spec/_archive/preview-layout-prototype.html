<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Preview Layout Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #111; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: system-ui; }

.player {
  display: flex;
  flex-direction: column;
  max-width: 100vw;
  max-height: 100vh;
}

.stage {
  background: linear-gradient(135deg, #0a0520, #1a0a3e, #0a1530);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 24px;
}

.controls {
  background: rgba(0,0,0,0.92);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #aaa;
  font-size: 12px;
  flex-shrink: 0;
}
.controls button { background: #222; border: 1px solid #444; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
.controls input[type=range] { flex: 1; accent-color: #a78bfa; height: 4px; }
.controls .time { font-family: monospace; font-size: 11px; }

/* === 三种比例示例 === */
.demo { display: flex; gap: 40px; align-items: center; }

/* 16:9 */
.p1 .stage { width: 640px; height: 360px; }

/* 9:16 */
.p2 .stage { width: 270px; height: 480px; }

/* 4:3 */
.p3 .stage { width: 480px; height: 360px; }
</style>
</head>
<body>
<div class="demo">
  <!-- 16:9 -->
  <div class="player p1">
    <div class="stage">16:9<br>1920×1080</div>
    <div class="controls">
      <button>▶</button>
      <input type="range" min="0" max="100" value="30">
      <span class="time">00:06 / 00:20</span>
    </div>
  </div>

  <!-- 9:16 -->
  <div class="player p2">
    <div class="stage">9:16<br>1080×1920</div>
    <div class="controls">
      <button>▶</button>
      <input type="range" min="0" max="100" value="30">
      <span class="time">00:06</span>
    </div>
  </div>

  <!-- 4:3 -->
  <div class="player p3">
    <div class="stage">4:3<br>1440×1080</div>
    <div class="controls">
      <button>▶</button>
      <input type="range" min="0" max="100" value="30">
      <span class="time">00:06 / 00:20</span>
    </div>
  </div>
</div>
</body>
</html>
