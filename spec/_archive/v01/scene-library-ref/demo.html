<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NextFrame · Scene Library Reference</title>
<style>
  :root {
    --bg: #0b0b14;
    --bg-panel: #0f0f1a;
    --ink: #f4f0ff;
    --dim: #7a7590;
    --line: #1f1a2e;
    --accent: #ff6bb5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink);
    font-family: "SF Mono", Menlo, ui-monospace, monospace;
    min-height: 100vh; }
  header {
    padding: 28px 40px 18px 40px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; justify-content: space-between;
  }
  header .title {
    font-size: 18px; font-weight: 900; letter-spacing: 0.04em;
    background: linear-gradient(90deg, #fff, #ffc98a 45%, #ff6bb5);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header .sub {
    font-size: 11px; color: var(--dim); letter-spacing: 0.22em; text-transform: uppercase;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 28px;
    padding: 32px 40px 64px 40px;
  }
  .card {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .canvas-wrap {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #05050c;
    border-bottom: 1px solid var(--line);
  }
  canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    border-radius: 14px 14px 0 0;
  }
  .meta {
    padding: 14px 18px 16px 18px;
  }
  .meta .name {
    font-size: 13px; font-weight: 800; color: var(--ink);
    letter-spacing: 0.03em;
  }
  .meta .cat {
    display: inline-block;
    font-size: 9px; color: var(--accent); letter-spacing: 0.18em;
    text-transform: uppercase; font-weight: 700;
    margin-left: 8px;
    padding: 2px 6px;
    border: 1px solid rgba(255,107,181,0.35);
    border-radius: 4px;
    vertical-align: middle;
  }
  .meta .prompt {
    margin-top: 6px;
    font-size: 11px;
    color: var(--dim);
    line-height: 1.5;
  }
  .meta .t {
    margin-top: 6px;
    font-size: 10px;
    color: #5a556d;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="title">NEXTFRAME · SCENE LIBRARY REFERENCE</div>
    <div class="sub">5 high-aesthetic scenes · frame-pure · vanilla canvas 2d</div>
  </div>
  <div class="sub">f(t) → frame</div>
</header>

<div class="grid" id="grid"></div>

<script type="module">
  import { auroraGradient }    from './auroraGradient.js';
  import { kineticHeadline }   from './kineticHeadline.js';
  import { neonGrid }          from './neonGrid.js';
  import { barChartReveal }    from './barChartReveal.js';
  import { lowerThirdVelvet }  from './lowerThirdVelvet.js';

  // Each entry: scene fn, metadata, params, loop duration
  const scenes = [
    {
      fn: auroraGradient,
      name: 'auroraGradient',
      cat: 'Backgrounds',
      duration: 10,
      params: { hueA: 270, hueB: 200, hueC: 320, intensity: 1, grain: 0.05 },
      prompt: '"A slow aurora background, violet to cyan, cinematic"',
    },
    {
      fn: kineticHeadline,
      name: 'kineticHeadline',
      cat: 'Typography',
      duration: 4,
      params: { text: 'DESIGN IN MOTION', subtitle: 'NextFrame · frame-pure', hueStart: 30, hueEnd: 320, stagger: 0.18, size: 0.12 },
      prompt: '"做一个标题动画：DESIGN IN MOTION，金色到粉色渐变"',
    },
    {
      fn: neonGrid,
      name: 'neonGrid',
      cat: 'Shapes & Layout',
      duration: 8,
      params: { hueHorizon: 320, hueGrid: 280, scrollSpeed: 0.4, lineCount: 16, colCount: 22 },
      prompt: '"Synthwave perspective grid with a sunset"',
    },
    {
      fn: barChartReveal,
      name: 'barChartReveal',
      cat: 'Data Viz',
      duration: 3.5,
      params: {
        title: 'MONTHLY GROWTH', unit: '%',
        hueStart: 200, hueEnd: 320,
        stagger: 0.12, barDur: 0.85,
        data: [
          { label: 'JAN', value: 42 }, { label: 'FEB', value: 68 },
          { label: 'MAR', value: 55 }, { label: 'APR', value: 81 },
          { label: 'MAY', value: 73 }, { label: 'JUN', value: 96 },
          { label: 'JUL', value: 88 },
        ],
      },
      prompt: '"柱状图增长动画，七月的数据，蓝到紫渐变"',
    },
    {
      fn: lowerThirdVelvet,
      name: 'lowerThirdVelvet',
      cat: 'Overlays',
      duration: 5,
      params: { title: 'ZHANG SAN', subtitle: 'Founder · NextFrame', hueA: 20, hueB: 320, holdEnd: 4, fadeOut: 0.6 },
      prompt: '"下三分之一：张三，NextFrame 创始人，velvet 风格"',
    },
  ];

  // Build the DOM
  const grid = document.getElementById('grid');
  const instances = [];

  for (const s of scenes) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="canvas-wrap"><canvas></canvas></div>
      <div class="meta">
        <span class="name">${s.name}</span>
        <span class="cat">${s.cat}</span>
        <div class="prompt">${s.prompt}</div>
        <div class="t" data-t>t = 0.00 / ${s.duration.toFixed(2)}s</div>
      </div>
    `;
    grid.appendChild(card);
    const canvas = card.querySelector('canvas');
    const ctx = canvas.getContext('2d');

    // DPR-aware sizing
    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
    }
    resize();
    window.addEventListener('resize', resize);

    instances.push({ ...s, ctx, resize, tLabel: card.querySelector('[data-t]') });
  }

  // Frame-pure rAF loop: compute t from wall clock modulo duration,
  // then call scene.fn(t, params, ctx, globalT)
  const start = performance.now();
  function tick(now) {
    const wall = (now - start) / 1000;
    for (const inst of instances) {
      const t = wall % inst.duration;
      inst.fn(t, inst.params, inst.ctx, wall);
      inst.tLabel.textContent = `t = ${t.toFixed(2)} / ${inst.duration.toFixed(2)}s`;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>
</body>
</html>
