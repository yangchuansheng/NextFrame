<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame · Clips</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --accent: #7c6aef;
  --accent-15: rgba(124,106,239,0.15);
  --accent-06: rgba(124,106,239,0.06);
  --accent-03: rgba(124,106,239,0.03);
  --bg: #0a0a0c;
  --surface: #111114;
  --card: #161619;
  --ink: #e4e4e8;
  --ink-55: rgba(228,228,232,0.75);
  --ink-25: rgba(228,228,232,0.50);
  --ink-08: rgba(228,228,232,0.10);
  --ink-03: rgba(228,228,232,0.05);
  --border: 1px solid rgba(255,255,255,0.06);
  --mono: 'SF Mono', 'Cascadia Code', Menlo, monospace;
  --sans: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
  --green: #3eb370;
  --yellow: #e0a040;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.grain { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.03; z-index: 9999; mix-blend-mode: overlay; }

/* ─── Topbar ─── */
.topbar { height: 48px; display: flex; align-items: center; padding: 0 16px; border-bottom: var(--border); background: var(--bg); flex-shrink: 0; gap: 0; }
.topbar-brand { font-family: var(--serif); font-size: 15px; font-weight: 400; letter-spacing: 0.04em; margin-right: 6px; flex-shrink: 0; }
.topbar-sep { color: var(--ink-25); margin: 0 4px; font-size: 14px; flex-shrink: 0; }

/* Vercel-style dropdown selector */
.topbar-select {
  position: relative; cursor: pointer; flex-shrink: 0;
}
.topbar-select-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 6px;
  font-size: 13px; font-weight: 500; color: var(--ink);
  transition: background 0.15s var(--ease);
  border: 1px solid transparent;
}
.topbar-select-btn:hover { background: var(--ink-08); }
.topbar-select-btn .caret { font-size: 10px; color: var(--ink-55); transition: transform 0.2s var(--ease); }
.topbar-select.open .caret { transform: rotate(180deg); }
.topbar-dropdown {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  min-width: 200px; background: var(--surface); border: var(--border);
  border-radius: 8px; overflow: hidden; z-index: 100;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.topbar-select.open .topbar-dropdown { display: block; }
.dd-label { padding: 8px 12px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-25); }
.dd-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; font-size: 13px; color: var(--ink-55); cursor: pointer;
  transition: background 0.15s var(--ease), color 0.15s var(--ease);
}
.dd-item:hover { background: var(--ink-08); color: var(--ink); }
.dd-item.active { color: var(--ink); }
.dd-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dd-dot.on { background: var(--accent); }
.dd-dot.off { background: var(--ink-25); }
.dd-sep { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }

/* Divider */
.topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 12px; flex-shrink: 0; }

/* Pipeline tabs */
.topbar-tabs { display: flex; align-items: center; height: 100%; margin-left: 0; gap: 0; }
.topbar-tab {
  height: 100%; display: flex; align-items: center;
  padding: 0 14px; font-size: 13px; color: var(--ink-55);
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: color 0.15s var(--ease), border-color 0.15s var(--ease);
  white-space: nowrap;
}
.topbar-tab:hover { color: var(--ink); }
.topbar-tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }

/* Right section */
.topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
.topbar-icon-btn {
  width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer;
  background: transparent; color: var(--ink-55); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s var(--ease), color 0.15s var(--ease);
}
.topbar-icon-btn:hover { background: var(--ink-08); color: var(--ink); }
.topbar-lang {
  padding: 4px 10px; border-radius: 5px; border: var(--border); background: transparent;
  color: var(--ink-55); font-size: 12px; cursor: pointer;
  transition: all 0.15s var(--ease);
}
.topbar-lang:hover { border-color: rgba(255,255,255,0.12); color: var(--ink); }
.topbar-avatar {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--ink-25);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; color: var(--ink-55); cursor: pointer;
  transition: border-color 0.15s var(--ease);
}
.topbar-avatar:hover { border-color: var(--ink); }

/* ─── Layout ─── */
.layout { display: flex; height: calc(100vh - 44px); }
.sidebar { width: 280px; flex-shrink: 0; border-right: var(--border); display: flex; flex-direction: column; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ─── Sidebar ─── */
.side-header { padding: 14px 14px 10px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-55); border-bottom: var(--border); }
.source-list { flex: 1; overflow-y: auto; padding: 6px; }
.source-list::-webkit-scrollbar { width: 3px; }
.source-list::-webkit-scrollbar-thumb { background: var(--ink-08); border-radius: 2px; }

.src-item { border-radius: 6px; overflow: hidden; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.2s var(--ease); }
.src-item:hover { border-color: rgba(255,255,255,0.06); }
.src-item.active { border-color: rgba(124,106,239,0.25); background: var(--accent-03); }

.src-thumb { width: 100%; aspect-ratio: 16/9; background: var(--surface); position: relative; overflow: hidden; }
.src-grad { position: absolute; inset: 0; opacity: 0.35; }
.src-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(255,255,255,0.7); cursor: pointer; transition: background 0.2s var(--ease); }
.src-play:hover { background: rgba(124,106,239,0.3); }
.src-expand { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 3px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 9px; color: rgba(255,255,255,0.5); cursor: pointer; opacity: 0; transition: opacity 0.2s var(--ease); }
.src-thumb:hover .src-expand { opacity: 1; }
.src-expand:hover { background: rgba(124,106,239,0.4); color: #fff; }
.src-pill { position: absolute; bottom: 5px; font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 3px; background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.8); }
.src-pill.l { left: 5px; } .src-pill.r { right: 5px; }
.src-info { padding: 8px 10px; }
.src-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.src-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-55); margin-top: 2px; }
.src-badge { display: inline-block; margin-top: 4px; font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--accent-06); color: var(--accent); }

/* ─── Main: Header ─── */
.main-head { padding: 12px 20px; border-bottom: var(--border); }
.main-head-row { display: flex; align-items: baseline; gap: 10px; }
.main-name { font-size: 16px; font-weight: 500; }
.main-specs { display: flex; gap: 6px; flex-wrap: wrap; }
.spec-tag { font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.04); }
.spec-tag.res { background: rgba(124,106,239,0.1); color: var(--accent); border-color: rgba(124,106,239,0.15); }
.spec-tag.fps { background: rgba(62,179,112,0.1); color: var(--green); border-color: rgba(62,179,112,0.15); }
.spec-tag.codec { background: rgba(224,160,64,0.1); color: var(--yellow); border-color: rgba(224,160,64,0.15); }
.spec-tag.dur { background: var(--ink-08); color: var(--ink); }
.spec-tag.size { background: var(--ink-08); color: var(--ink-55); }
.main-path { font-family: var(--mono); font-size: 12px; color: var(--ink-55); margin-top: 3px; user-select: all; }

/* ─── Full timeline ─── */
.tl-full { padding: 12px 20px; border-bottom: var(--border); }
.tl-bar { height: 28px; background: var(--surface); border-radius: 3px; position: relative; overflow: hidden; }
.tl-block { position: absolute; top: 3px; bottom: 3px; background: var(--accent-15); border: 1px solid rgba(124,106,239,0.2); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--accent); cursor: pointer; transition: background 0.2s var(--ease); }
.tl-block:hover { background: rgba(124,106,239,0.25); }
.tl-block.selected { background: rgba(124,106,239,0.3); border-color: var(--accent); }
.tl-ticks { display: flex; justify-content: space-between; padding-top: 4px; font-family: var(--mono); font-size: 11px; color: var(--ink-25); }

/* ─── Clip detail (expanded) ─── */
.clip-detail { border-bottom: var(--border); display: none; }
.clip-detail.show { display: block; }

.cd-top { display: flex; gap: 0; }
.cd-preview { width: 320px; aspect-ratio: 16/9; background: #050508; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; border-right: var(--border); }
.cd-play-big { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 18px; color: rgba(255,255,255,0.6); cursor: pointer; transition: background 0.2s var(--ease); }
.cd-play-big:hover { background: rgba(124,106,239,0.2); }
.cd-transport { position: absolute; bottom: 0; left: 0; right: 0; display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); }
.cd-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 10px; transition: color 0.2s var(--ease); }
.cd-btn:hover { color: #fff; }
.cd-btn.play-sm { color: var(--accent); }
.cd-progress { flex: 1; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
.cd-progress-fill { height: 100%; width: 35%; background: var(--accent); }
.cd-tc { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.6); }

.cd-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Zoom timeline */
.cd-zoom { padding: 12px 16px; border-bottom: var(--border); }
.cd-zoom-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-25); margin-bottom: 6px; display: flex; justify-content: space-between; }
.cd-zoom-bar { height: 36px; background: var(--surface); border-radius: 3px; position: relative; overflow: hidden; cursor: crosshair; }
.cd-zoom-fill { position: absolute; inset: 0; background: var(--accent-06); }
.cd-zoom-handle { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 2; }
.cd-zoom-handle.in { left: 0; }
.cd-zoom-handle.out { right: 0; }
.cd-zoom-playhead { position: absolute; top: 0; bottom: 0; width: 1.5px; background: #e04050; z-index: 3; left: 35%; }
.cd-zoom-playhead::before { content: ''; position: absolute; top: -3px; left: -4px; border: 4px solid transparent; border-top: 5px solid #e04050; }
/* Hover frame preview tooltip */
.cd-frame-tip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); width: 120px; background: var(--card); border: var(--border); border-radius: 4px; overflow: hidden; display: none; pointer-events: none; z-index: 10; }
.cd-frame-tip.show { display: block; }
.cd-frame-img { width: 100%; aspect-ratio: 16/9; background: #0a0a0c; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--ink-25); }
.cd-frame-tc { text-align: center; font-family: var(--mono); font-size: 11px; color: var(--ink-55); padding: 3px; }

.cd-zoom-ticks { display: flex; justify-content: space-between; padding-top: 4px; font-family: var(--mono); font-size: 11px; color: var(--ink-25); }

/* Subtitle track — karaoke level */
.cd-subs { padding: 10px 16px; border-bottom: var(--border); }
.cd-subs-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-55); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.cd-subs-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; font-weight: 500; }
.cd-subs-tag.on { background: rgba(62,179,112,0.12); color: var(--green); }
.cd-subs-tag.off { background: var(--ink-08); color: var(--ink-25); }
.cd-sub-lines { display: flex; flex-direction: column; gap: 4px; }
.cd-sub-line { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(224,160,64,0.04); border: 1px solid rgba(224,160,64,0.08); border-radius: 4px; transition: background 0.15s var(--ease); }
.cd-sub-line:hover { background: rgba(224,160,64,0.08); }
.cd-sub-tc { font-family: var(--mono); font-size: 11px; color: var(--ink-55); white-space: nowrap; flex-shrink: 0; width: 110px; }
.cd-sub-text { font-size: 13px; color: var(--ink); }
.cd-sub-text .char { display: inline; }
.cd-sub-dur { font-family: var(--mono); font-size: 11px; color: var(--yellow); margin-left: auto; flex-shrink: 0; }
.cd-sub-none { font-size: 12px; color: var(--ink-25); font-style: italic; }

/* Path display */
.cd-path { font-family: var(--mono); font-size: 11px; color: var(--ink-55); padding: 6px 16px; border-bottom: var(--border); user-select: all; }
.src-path { font-family: var(--mono); font-size: 10px; color: var(--ink-55); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Clip info panel */
.cd-info { padding: 10px 16px; display: flex; gap: 20px; flex-wrap: wrap; }
.cd-info-item { }
.cd-info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-25); margin-bottom: 2px; }
.cd-info-value { font-family: var(--mono); font-size: 13px; color: var(--ink); }

/* ─── Clip list ─── */
.clip-list { flex: 1; overflow-y: auto; padding: 8px 20px; }
.clip-list::-webkit-scrollbar { width: 3px; }
.clip-list::-webkit-scrollbar-thumb { background: var(--ink-08); border-radius: 2px; }

.clip-row { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s var(--ease); }
.clip-row:hover { background: var(--ink-03); border-color: rgba(255,255,255,0.04); }
.clip-row.selected { background: var(--accent-03); border-color: rgba(124,106,239,0.2); }

.cr-thumb { width: 80px; aspect-ratio: 16/9; background: var(--surface); border-radius: 4px; flex-shrink: 0; position: relative; overflow: hidden; }
.cr-grad { position: absolute; inset: 0; opacity: 0.3; }
.cr-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 8px; color: rgba(255,255,255,0.7); opacity: 0; transition: opacity 0.2s var(--ease); }
.cr-thumb:hover .cr-play { opacity: 1; }
.cr-dur { position: absolute; bottom: 3px; right: 3px; font-family: var(--mono); font-size: 10px; padding: 1px 5px; border-radius: 2px; background: rgba(0,0,0,0.7); color: var(--accent); }

.cr-info { flex: 1; min-width: 0; }
.cr-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.cr-range { font-family: var(--mono); font-size: 12px; color: var(--ink-25); }
.cr-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.cr-tag { font-size: 11px; padding: 1px 8px; border-radius: 3px; background: var(--ink-03); color: var(--ink-25); }

.cr-status-tags { display: flex; gap: 5px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
.cr-status-tag {
  font-size: 11px; padding: 2px 10px; border-radius: 3px;
  font-weight: 500; letter-spacing: 0.02em;
}
.cr-status-tag.sub-yes { background: rgba(224,160,64,0.12); color: var(--yellow); }
.cr-status-tag.sub-no { background: var(--ink-03); color: var(--ink-25); }
.cr-status-tag.tl-yes { background: var(--accent-06); color: var(--accent); }
.cr-status-tag.tl-no { background: var(--ink-03); color: var(--ink-25); }
.cr-status-tag.seg { background: var(--accent-15); color: var(--accent); font-family: var(--mono); }

/* ─── Modal ─── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { width: 90%; max-width: 760px; border-radius: 10px; overflow: hidden; border: var(--border); background: var(--surface); }
.modal-video { width: 100%; aspect-ratio: 16/9; background: #050508; position: relative; display: flex; align-items: center; justify-content: center; }
.modal-big-play { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 20px; color: rgba(255,255,255,0.6); cursor: pointer; transition: background 0.2s var(--ease); }
.modal-big-play:hover { background: rgba(124,106,239,0.2); }
.modal-controls { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-top: var(--border); }
.modal-transport { display: flex; gap: 3px; }
.m-btn { width: 26px; height: 26px; border-radius: 4px; background: transparent; border: none; cursor: pointer; color: var(--ink-25); font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.2s var(--ease); }
.m-btn:hover { color: var(--ink); background: var(--ink-08); }
.m-btn.play { background: var(--accent); color: #fff; border-radius: 50%; }
.modal-progress { flex: 1; height: 3px; background: var(--ink-08); border-radius: 2px; overflow: hidden; }
.modal-progress-fill { height: 100%; width: 35%; background: var(--accent); }
.modal-tc { font-family: var(--mono); font-size: 12px; color: var(--ink-55); }
.modal-foot { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-top: var(--border); }
.modal-label { font-size: 13px; color: var(--ink-55); }
.modal-specs { font-family: var(--mono); font-size: 11px; color: var(--ink-25); }
.modal-close { font-size: 16px; color: var(--ink-25); cursor: pointer; background: none; border: none; transition: color 0.2s var(--ease); }
.modal-close:hover { color: var(--ink); }

/* Footer */
.footer { height: 32px; display: flex; align-items: center; padding: 0 20px; border-top: var(--border); font-family: var(--mono); font-size: 11px; color: var(--ink-55); flex-shrink: 0; justify-content: space-between; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s var(--ease) forwards; }
</style>
</head>
<body>

<svg class="grain"><filter id="g"><feTurbulence baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>

<div class="topbar">
  <span class="topbar-brand">NextFrame</span>
  <span class="topbar-sep">/</span>

  <!-- Project selector -->
  <div class="topbar-select" id="selProject" onclick="toggleDd('selProject')">
    <div class="topbar-select-btn">
      <span>Show</span>
      <span class="caret">&#x25BE;</span>
    </div>
    <div class="topbar-dropdown">
      <div class="dd-label">Projects</div>
      <div class="dd-item active"><span class="dd-dot on"></span>Show</div>
      <div class="dd-item"><span class="dd-dot off"></span>Demo Reel</div>
      <div class="dd-item"><span class="dd-dot off"></span>Onboarding</div>
      <div class="dd-sep"></div>
      <div class="dd-item" style="color:var(--ink-25)">+ New Project</div>
    </div>
  </div>

  <span class="topbar-sep">/</span>

  <!-- Episode selector -->
  <div class="topbar-select" id="selEpisode" onclick="toggleDd('selEpisode')">
    <div class="topbar-select-btn">
      <span>EP01</span>
      <span class="caret">&#x25BE;</span>
    </div>
    <div class="topbar-dropdown">
      <div class="dd-label">Episodes</div>
      <div class="dd-item active"><span class="dd-dot on"></span>EP01 &mdash; 产品介绍</div>
      <div class="dd-item"><span class="dd-dot off"></span>EP02 &mdash; 用户案例</div>
      <div class="dd-item"><span class="dd-dot off"></span>EP03 &mdash; 技术深度</div>
      <div class="dd-sep"></div>
      <div class="dd-item" style="color:var(--ink-25)">+ New Episode</div>
    </div>
  </div>

  <div class="topbar-divider"></div>

  <!-- Pipeline tabs -->
  <div class="topbar-tabs">
    <div class="topbar-tab">脚本</div>
    <div class="topbar-tab">音频</div>

</div>

<script>
var S = [
  { n:"interview-raw.mp4", path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/sources/interview-raw.mp4", dur:"03:24", ds:204, res:"1080p", w:1920, h:1080, fps:30, cod:"h264", sz:"245MB", hue:"220,60%,50%" },
  { n:"screen-recording.mp4", path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/sources/screen-recording.mp4", dur:"05:12", ds:312, res:"1080p", w:1920, h:1080, fps:30, cod:"h264", sz:"380MB", hue:"150,40%,40%" },
  { n:"office-broll.mp4", path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/sources/office-broll.mp4", dur:"01:48", ds:108, res:"4K", w:3840, h:2160, fps:24, cod:"h265", sz:"520MB", hue:"30,50%,45%" },
  { n:"founder-talk.mp4", path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/sources/founder-talk.mp4", dur:"08:30", ds:510, res:"1080p", w:1920, h:1080, fps:30, cod:"h264", sz:"610MB", hue:"260,30%,35%" }
];

var C = [
  { id:"C1", nm:"用户介绍自己", si:0, i:12.4, o:28.8, tags:["intro","talking-head"], seg:"段2",
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C1-用户介绍自己.mp4",
    subs:[{t:"大家好，我是一名内容创作者",s:12.4,e:16.2},{t:"每天要做三到四条短视频",s:16.2,e:20.5},{t:"剪辑是最花时间的环节",s:20.5,e:24.8},{t:"经常要花一整天",s:24.8,e:28.8}],
    hasTl:true },
  { id:"C2", nm:"使用痛点描述", si:0, i:45, o:75.2, tags:["pain-point"], seg:"段1",
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C2-使用痛点描述.mp4",
    subs:[{t:"传统的视频制作流程太长了",s:45,e:50},{t:"从写脚本到最终成片",s:50,e:55},{t:"中间要经过至少五六个工具",s:55,e:62},{t:"每个工具之间还不互通",s:62,e:68},{t:"效率实在太低",s:68,e:75.2}],
    hasTl:true },
  { id:"C3", nm:"使用感受", si:0, i:130, o:158.5, tags:["testimonial"], seg:null,
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C3-使用感受.mp4",
    subs:[{t:"用了 NextFrame 之后",s:130,e:135},{t:"整个流程缩短到了半小时以内",s:135,e:142},{t:"最关键的是质量没有下降",s:142,e:150},{t:"反而因为 AI 辅助还更好了",s:150,e:158.5}],
    hasTl:false },
  { id:"C4", nm:"创建项目流程", si:1, i:8, o:45, tags:["tutorial","screen"], seg:"段3",
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C4-创建项目流程.mp4", subs:[], hasTl:true },
  { id:"C5", nm:"导出成品", si:1, i:200, o:245, tags:["tutorial","export"], seg:"段4",
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C5-导出成品.mp4", subs:[], hasTl:true },
  { id:"C6", nm:"办公室全景", si:2, i:0, o:22, tags:["broll"], seg:null,
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C6-办公室全景.mp4", subs:[], hasTl:false },
  { id:"C7", nm:"团队协作", si:2, i:45, o:72, tags:["broll","team"], seg:"段3",
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C7-团队协作.mp4", subs:[], hasTl:false },
  { id:"C8", nm:"创业初心", si:3, i:80, o:165, tags:["interview","founder"], seg:"段5",
    path:"/Users/Zhuanz/NextFrame/projects/Show/EP01/clips/C8-创业初心.mp4",
    subs:[{t:"创业的初衷很简单",s:80,e:88},{t:"我们自己就是视频创作者",s:88,e:100},{t:"深知这个行业的痛",s:100,e:110},{t:"所以决定自己做一个工具",s:110,e:125},{t:"让每个创作者都能高效产出",s:125,e:140},{t:"这就是 NextFrame 的由来",s:140,e:165}],
    hasTl:true }
];

var aS = 0, aC = -1;

function tc(s) { var m=Math.floor(s/60),sec=(s%60).toFixed(1); return (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec; }

function renderSrc() {
  var h = "";
  S.forEach(function(s,i) {
    var cn = C.filter(function(c){return c.si===i;}).length;
    h += '<div class="src-item'+(i===aS?' active':'')+'" onclick="selSrc('+i+')">' +
      '<div class="src-thumb">' +
        '<div class="src-grad" style="background:linear-gradient(135deg,hsla('+s.hue+',0.3),transparent)"></div>' +
        '<div class="src-play" onclick="event.stopPropagation();toggleMiniPlay(\'src-mini-'+i+'\')">&#9654;</div>' +
        '<div class="src-expand" onclick="event.stopPropagation();openM(\''+s.n+'\',\'00:00 / '+s.dur+'\',\''+s.res+' · '+s.fps+'fps\')">&#x26F6;</div>' +
        '<span class="src-pill l">'+s.res+'</span><span class="src-pill r">'+s.dur+'</span>' +
        '<div class="mini-progress" style="position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0;z-index:4"><div class="mini-progress-fill" id="src-mini-'+i+'-fill"></div></div>' +
      '</div>' +
      '<div class="src-info"><div class="src-name">'+s.n+'</div><div class="src-meta">'+s.dur+' · '+s.res+' · '+s.sz+'</div><span class="src-badge">'+cn+' clips</span></div></div>';
  });
  document.getElementById("srcList").innerHTML = h;
}

function selSrc(i) { aS = i; aC = -1; renderSrc(); renderMain(); }

function selClip(idx) {
  aC = (aC === idx) ? -1 : idx;
  renderMain();
}

function renderMain() {
  var s = S[aS], clips = C.filter(function(c){return c.si===aS;});
  document.getElementById("mName").textContent = s.n;
  document.getElementById("mPath").textContent = s.path;
  document.getElementById("mSpecs").innerHTML =
    '<span class="spec-tag res">'+s.w+'&times;'+s.h+'</span>' +
    '<span class="spec-tag fps">'+s.fps+'fps</span>' +
    '<span class="spec-tag codec">'+s.cod+'</span>' +
    '<span class="spec-tag dur">'+s.dur+'</span>' +
    '<span class="spec-tag size">'+s.sz+'</span>';

  // Full timeline
  var bh = "";
  clips.forEach(function(c,idx) {
    var l = (c.i/s.ds*100).toFixed(1), w = ((c.o-c.i)/s.ds*100).toFixed(1);
    bh += '<div class="tl-block'+(aC===idx?' selected':'')+'" style="left:'+l+'%;width:'+w+'%" onclick="selClip('+idx+')">'+c.id+'</div>';
  });
  document.getElementById("tlBar").innerHTML = bh;

  var tks = [], step = s.ds<=120?15:(s.ds<=300?30:60);
  for(var t=0;t<=s.ds;t+=step) tks.push('<span>'+tc(t)+'</span>');
  if(s.ds%step!==0) tks.push('<span>'+tc(s.ds)+'</span>');
  document.getElementById("tlTicks").innerHTML = tks.join("");

  // Clip detail
  var det = document.getElementById("clipDetail");
  if (aC >= 0 && aC < clips.length) {
    var c = clips[aC], dur = (c.o - c.i).toFixed(1);
    var subHtml = "";
    if (c.subs && c.subs.length > 0) {
      subHtml = '<div class="cd-subs"><div class="cd-subs-label">SUBTITLES <span class="cd-subs-tag on">卡拉OK对齐 ✓</span> <span style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-55)">' + c.subs.length + ' 句</span></div><div class="cd-sub-lines">';
      c.subs.forEach(function(sub) {
        var charDur = (sub.e - sub.s) / sub.t.length;
        var charsHtml = sub.t.split("").map(function(ch, ci) {
          var ct = (sub.s + ci * charDur).toFixed(2);
          return '<span class="char" title="' + ct + 's">' + ch + '</span>';
        }).join("");
        subHtml += '<div class="cd-sub-line">' +
          '<span class="cd-sub-tc">' + tc(sub.s) + ' → ' + tc(sub.e) + '</span>' +
          '<span class="cd-sub-text">' + charsHtml + '</span>' +
          '<span class="cd-sub-dur">' + (sub.e - sub.s).toFixed(1) + 's</span>' +
        '</div>';
      });
      subHtml += '</div></div>';
    } else {
      subHtml = '<div class="cd-subs"><div class="cd-subs-label">SUBTITLES <span class="cd-subs-tag off">无字幕</span></div><div class="cd-sub-none">暂无字幕数据 — nextframe sub-import</div></div>';
    }

    // Zoom ticks
    var ztks = [];
    var zstep = dur <= 20 ? 2 : (dur <= 60 ? 5 : 10);
    for (var zt = c.i; zt <= c.o; zt += zstep) ztks.push('<span>'+tc(zt)+'</span>');
    if (Math.abs(c.o - (c.i + Math.floor((c.o-c.i)/zstep)*zstep)) > 0.5) ztks.push('<span>'+tc(c.o)+'</span>');

    det.innerHTML = '<div class="fade-in">' +
      '<div class="cd-top">' +
        '<div class="cd-preview" style="background:linear-gradient(135deg,hsla('+s.hue+',0.15) 0%,#050508 100%)" onclick="toggleMiniPlay(\'cd-mini\')">' +
          '<div class="cd-play-big" id="cdPlayBtn">&#9654;</div>' +
          '<div class="src-expand" onclick="event.stopPropagation();openM(\''+c.id+' '+c.nm+'\',\''+tc(c.i)+' / '+tc(c.o)+'\',\''+s.res+' · '+s.fps+'fps\')" style="opacity:1">&#x26F6;</div>' +
          '<div style="position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,0.5)">'+tc(c.i)+' → '+tc(c.o)+' · '+dur+'s</div>' +
          '<div class="mini-progress" style="position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0"><div class="mini-progress-fill" id="cdMiniFill"></div></div>' +
        '</div>' +
        '<div class="cd-right">' +
          '<div class="cd-zoom"><div class="cd-zoom-label"><span>TIMELINE</span><span>'+dur+'s · '+Math.round(dur*s.fps)+' frames</span></div>' +
            '<div class="cd-zoom-bar" id="zoomBar" onmousemove="showFrameTip(event)" onmouseleave="hideFrameTip()">' +
              '<div class="cd-zoom-fill"></div>' +
              '<div class="cd-zoom-handle in"></div><div class="cd-zoom-handle out"></div>' +
              '<div class="cd-zoom-playhead"></div>' +
              '<div class="cd-frame-tip" id="frameTip"><div class="cd-frame-img" id="frameTipImg">Frame</div><div class="cd-frame-tc" id="frameTipTc">00:00.0</div></div>' +
            '</div>' +
            '<div class="cd-zoom-ticks">'+ztks.join("")+'</div>' +
          '</div>' +
          subHtml +
          '<div class="cd-info">' +
            '<div class="cd-info-item"><div class="cd-info-label">IN</div><div class="cd-info-value">'+tc(c.i)+'</div></div>' +
            '<div class="cd-info-item"><div class="cd-info-label">OUT</div><div class="cd-info-value">'+tc(c.o)+'</div></div>' +
            '<div class="cd-info-item"><div class="cd-info-label">FRAMES</div><div class="cd-info-value">'+Math.round(dur*s.fps)+'</div></div>' +
            (c.hasTl ? '<div class="cd-info-item"><div class="cd-info-label">时间轴</div><div class="cd-info-value" style="color:var(--accent)">&#10003; 已对齐</div></div>' : '<div class="cd-info-item"><div class="cd-info-label">时间轴</div><div class="cd-info-value" style="color:var(--ink-25)">未对齐</div></div>') +
            (c.seg ? '<div class="cd-info-item"><div class="cd-info-label">段落</div><div class="cd-info-value" style="color:var(--accent)">'+c.seg+'</div></div>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="cd-path">' + c.path + '</div>' +
    '</div>';
    det.classList.add("show");
  } else {
    det.innerHTML = "";
    det.classList.remove("show");
  }

  // Clip rows
  var lh = "";
  clips.forEach(function(c,idx) {
    var dur = (c.o - c.i).toFixed(1);
    var tags = c.tags.map(function(t){return '<span class="cr-tag">'+t+'</span>';}).join("");
    var statusTags = '';
    statusTags += (c.subs && c.subs.length) ? '<span class="cr-status-tag sub-yes">字幕 ✓</span>' : '<span class="cr-status-tag sub-no">无字幕</span>';
    statusTags += c.hasTl ? '<span class="cr-status-tag tl-yes">时间轴 ✓</span>' : '<span class="cr-status-tag tl-no">无时间轴</span>';
    if (c.seg) statusTags += '<span class="cr-status-tag seg">' + c.seg + '</span>';

    lh += '<div class="clip-row'+(aC===idx?' selected':'')+'" onclick="selClip('+idx+')">' +
      '<div class="cr-thumb"><div class="cr-grad" style="background:linear-gradient(135deg,hsla('+s.hue+',0.25),transparent)"></div><span class="cr-dur">'+dur+'s</span></div>' +
      '<div class="cr-info"><div class="cr-name">'+c.nm+'</div><div class="cr-range">'+tc(c.i)+' → '+tc(c.o)+' · '+(c.o-c.i).toFixed(1)+'s</div><div class="cr-tags">'+tags+'</div></div>' +
      '<div class="cr-status-tags">'+statusTags+'</div>' +
    '</div>';
  });
  document.getElementById("clipList").innerHTML = lh;

  var total = clips.reduce(function(a,c){return a+(c.o-c.i);},0);
  document.getElementById("fLeft").textContent = clips.length + " clips \u00b7 " + total.toFixed(1) + "s";
}

function showFrameTip(e) {
  var bar = document.getElementById("zoomBar");
  var tip = document.getElementById("frameTip");
  if (!bar || !tip || aC < 0) return;
  var clips = C.filter(function(c){return c.si===aS;});
  var c = clips[aC]; if(!c) return;
  var rect = bar.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var pct = Math.max(0, Math.min(1, x / rect.width));
  var timeSec = c.i + (c.o - c.i) * pct;
  tip.style.left = x + "px";
  document.getElementById("frameTipTc").textContent = tc(timeSec);
  document.getElementById("frameTipImg").textContent = "F" + Math.round((timeSec - c.i) * S[aS].fps);
  tip.classList.add("show");
}
function hideFrameTip() { var t = document.getElementById("frameTip"); if(t) t.classList.remove("show"); }

// Mini play — click thumbnail to play in-place, progress bar at bottom syncs with timeline
var miniId = null, miniTimer = null;
function toggleMiniPlay(id) {
  if (miniTimer) { clearInterval(miniTimer); miniTimer = null; }
  var fill = document.getElementById(id + "-fill") || document.getElementById(id === "cd-mini" ? "cdMiniFill" : null);
  if (!fill) return;
  if (miniId === id) { // stop
    fill.style.width = "0"; miniId = null;
    var btn = document.getElementById("cdPlayBtn");
    if (btn) btn.innerHTML = "&#9654;";
    return;
  }
  // stop previous
  if (miniId) {
    var prev = document.getElementById(miniId + "-fill") || document.getElementById("cdMiniFill");
    if (prev) prev.style.width = "0";
  }
  miniId = id;
  var btn = document.getElementById("cdPlayBtn");
  if (btn && id === "cd-mini") btn.innerHTML = "&#9646;&#9646;";
  var p = 0;
  miniTimer = setInterval(function() {
    p += 1.5;
    if (p > 100) { p = 0; fill.style.width = "0"; clearInterval(miniTimer); miniTimer = null; miniId = null;
      if (btn && id === "cd-mini") btn.innerHTML = "&#9654;"; return; }
    fill.style.width = p + "%";
  }, 80);
}

function openM(label, timecode, specs) {
  document.getElementById("mLabel").textContent = label;
  document.getElementById("mTc").textContent = timecode;
  document.getElementById("mSpS").textContent = specs;
  document.getElementById("modal").classList.add("show");
}
function closeModal() { document.getElementById("modal").classList.remove("show"); }
document.addEventListener("keydown", function(e) { if(e.key==="Escape") closeModal(); });

// Dropdown toggle
function toggleDd(id) {
  var el = document.getElementById(id);
  var wasOpen = el.classList.contains("open");
  document.querySelectorAll(".topbar-select.open").forEach(function(s) { s.classList.remove("open"); });
  if (!wasOpen) el.classList.add("open");
}
document.addEventListener("click", function(e) {
  if (!e.target.closest(".topbar-select")) {
    document.querySelectorAll(".topbar-select.open").forEach(function(s) { s.classList.remove("open"); });
  }
});

renderSrc(); renderMain();
</script>
