<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXTFRAME — CLIPS</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070709;--surface:#0e0e12;--card:#141418;--elevated:#1a1a20;
  --border:#222228;--text:#c8c8cc;--muted:#5a5a64;--accent:#4a8fe7;
  --danger:#c84040;
  --mono:'SF Mono','Cascadia Code','Fira Code',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:11px;line-height:1.4;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}

/* === TOP BAR === */
.topbar{height:36px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.topbar .path{color:var(--muted)}
.topbar .path .seg{color:var(--text)}
.topbar .path .sep{color:var(--muted);margin:0 6px;font-size:9px}
.topbar .path .active{color:var(--accent)}
.topbar .stats{color:var(--muted);font-size:10px}
.topbar .stats span{margin-left:12px}

/* === THREE COLUMNS === */
.workspace{display:flex;height:calc(100% - 36px)}

/* COL 1: SOURCE BIN */
.source-bin{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.source-bin .panel-header{height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:1px solid var(--border)}
.source-bin .panel-header .count{font-size:10px}
.source-list{flex:1;overflow-y:auto}
.source-row{height:48px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid rgba(34,34,40,.5);cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.source-row:hover{background:var(--card)}
.source-row.active{background:var(--elevated);border-left-color:var(--accent)}
.source-dot{width:6px;height:6px;border-radius:0;margin-right:10px;flex-shrink:0}
.source-info{flex:1;min-width:0}
.source-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-meta{font-size:10px;color:var(--muted);margin-top:2px}
.source-badge{font-size:9px;color:var(--muted);background:var(--card);padding:1px 5px;margin-left:8px;border:1px solid var(--border)}

/* COL 2: MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.source-header{height:32px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.source-header .fname{font-size:12px;color:var(--text)}
.source-header .specs{font-size:10px;color:var(--muted)}

/* TIMELINE */
.timeline-area{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px 16px;flex-shrink:0}
.timeline-ruler{display:flex;justify-content:space-between;margin-bottom:6px;position:relative;height:14px}
.timeline-ruler .tick{font-size:9px;color:var(--muted);position:absolute;transform:translateX(-50%)}
.timeline-track{position:relative;height:6px;background:#1a1a20;margin-bottom:8px}
.timeline-clips{position:relative;height:28px}
.clip-block{position:absolute;height:28px;background:rgba(74,143,231,.12);border:1px solid rgba(74,143,231,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--accent);letter-spacing:.5px;transition:background .15s}
.clip-block:hover{background:rgba(74,143,231,.22)}
.clip-block.selected{background:rgba(74,143,231,.25);border-color:var(--accent)}
.clip-block .handle{position:absolute;top:50%;transform:translateY(-50%);width:4px;height:4px;background:#fff;opacity:.4}
.clip-block .handle.l{left:-1px}
.clip-block .handle.r{right:-1px}
.playhead{position:absolute;top:-22px;width:1px;height:58px;background:var(--danger);pointer-events:none;z-index:5}
.playhead::before{content:'';position:absolute;top:0;left:-3px;width:7px;height:5px;background:var(--danger)}

/* CLIP TABLE */
.clip-table-wrap{flex:1;overflow-y:auto;background:var(--bg)}
table.clip-table{width:100%;border-collapse:collapse;font-size:11px}
.clip-table thead{position:sticky;top:0;z-index:2}
.clip-table th{background:var(--surface);text-align:left;padding:6px 12px;font-size:10px;font-weight:400;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border-bottom:1px solid var(--border)}
.clip-table th:first-child{width:32px;text-align:center}
.clip-table td{padding:6px 12px;border-bottom:1px solid rgba(34,34,40,.4)}
.clip-table td:first-child{text-align:center;color:var(--muted);font-size:10px}
.clip-table tr{cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.clip-table tr:nth-child(even) td{background:rgba(14,14,18,.5)}
.clip-table tr:hover td{background:var(--card)}
.clip-table tr.selected{border-left-color:var(--accent)}
.clip-table tr.selected td{background:var(--elevated)}
.clip-table .tc{color:var(--muted);font-size:10px}
.clip-table .dur{color:var(--text)}
.clip-table .used{color:var(--accent);font-size:10px}
.clip-table .unused{color:var(--muted);font-size:10px}
.clip-table .tag{font-size:9px;color:var(--muted);background:var(--card);padding:1px 4px;margin-right:3px;border:1px solid var(--border);display:inline-block}

/* COL 3: PROPERTIES */
.properties{width:280px;min-width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column}
.properties .panel-header{height:28px;display:flex;align-items:center;padding:0 12px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:1px solid var(--border)}
.props-body{flex:1;padding:12px;overflow-y:auto}
.prop-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(34,34,40,.3)}
.prop-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.prop-value{font-size:11px;color:var(--text);text-align:right;max-width:160px;word-break:break-all}
.prop-value.accent{color:var(--accent)}
.prop-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.prop-tags .tag{font-size:9px;color:var(--muted);background:var(--card);padding:1px 5px;border:1px solid var(--border)}
.empty-state{color:var(--muted);font-size:10px;padding:24px 12px;text-align:center;text-transform:uppercase;letter-spacing:.5px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="path">
    <span class="seg">NEXTFRAME</span><span class="sep">&#x203A;</span>
    <span class="seg">SHOW</span><span class="sep">&#x203A;</span>
    <span class="seg">EP01</span><span class="sep">&#x203A;</span>
    <span class="active">CLIPS</span>
  </div>
  <div class="stats">
    <span id="stat-sources">4 sources</span>
    <span id="stat-clips">8 clips</span>
    <span id="stat-total">2:18 total</span>
  </div>
</div>

<div class="workspace">
  <!-- COL 1: SOURCE BIN -->
  <div class="source-bin">
    <div class="panel-header"><span>SOURCES</span><span class="count" id="source-count">4</span></div>
    <div class="source-list" id="source-list"></div>
  </div>

  <!-- COL 2: MAIN -->
  <div class="main-area">
    <div class="source-header">
      <span class="fname" id="sh-name">—</span>
      <span class="specs" id="sh-specs"></span>
    </div>
    <div class="timeline-area">
      <div class="timeline-ruler" id="ruler"></div>
      <div class="timeline-track"></div>
      <div class="timeline-clips" id="timeline-clips"></div>
    </div>
    <div class="clip-table-wrap">
      <table class="clip-table">
        <thead><tr><th>#</th><th>NAME</th><th>IN</th><th>OUT</th><th>DUR</th><th>USED</th><th>TAGS</th></tr></thead>
        <tbody id="clip-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- COL 3: PROPERTIES -->
  <div class="properties">
    <div class="panel-header">CLIP PROPERTIES</div>
    <div class="props-body" id="props-body">
      <div class="empty-state">No clip selected</div>
    </div>
  </div>
</div>

<script>
const DATA = {
  sources: [
    { id:'s1', name:'interview-raw.mp4', color:'#4a8fe7', dur:204, w:1920, h:1080, fps:30, codec:'h264', size:'245MB',
      clips:[
        { id:'c1', name:'片段 1 — 用户介绍', inT:12.4, outT:28.8, used:'段 2', tags:['intro','talking-head'] },
        { id:'c2', name:'片段 2 — 需求描述', inT:45.0, outT:68.2, used:'段 3', tags:['requirements'] },
        { id:'c3', name:'片段 3 — 问答', inT:120.5, outT:155.0, used:null, tags:['qa','talking-head'] }
      ]},
    { id:'s2', name:'screen-capture.mov', color:'#e7a84a', dur:186, w:2560, h:1440, fps:60, codec:'prores', size:'1.8GB',
      clips:[
        { id:'c4', name:'片段 1 — 功能演示', inT:5.0, outT:32.6, used:'段 2', tags:['demo','screen'] },
        { id:'c5', name:'片段 2 — 错误复现', inT:88.0, outT:104.5, used:null, tags:['bug','screen'] }
      ]},
    { id:'s3', name:'b-roll-office.mp4', color:'#4ae77a', dur:92, w:3840, h:2160, fps:24, codec:'h265', size:'520MB',
      clips:[
        { id:'c6', name:'片段 1 — 办公室全景', inT:2.0, outT:14.8, used:'段 1', tags:['b-roll','wide'] }
      ]},
    { id:'s4', name:'voiceover-final.wav', color:'#e74a7a', dur:138, w:0, h:0, fps:0, codec:'pcm_s24', size:'78MB',
      clips:[
        { id:'c7', name:'片段 1 — 开场白', inT:0, outT:18.6, used:'段 1', tags:['vo','intro'] },
        { id:'c8', name:'片段 2 — 结尾', inT:105.2, outT:138.0, used:'段 5', tags:['vo','outro'] }
      ]}
  ]
};

let activeSource = 0;
let activeClip = null;

function fmtTC(s){ const m=Math.floor(s/60); const sec=(s%60).toFixed(3); return String(m).padStart(2,'0')+':'+sec.padStart(6,'0'); }
function fmtDur(s){ const m=Math.floor(s/60); const sec=Math.floor(s%60); return m+':'+String(sec).padStart(2,'0'); }

function renderSources(){
  const el=document.getElementById('source-list');
  el.innerHTML='';
  DATA.sources.forEach((src,i)=>{
    const row=document.createElement('div');
    row.className='source-row'+(i===activeSource?' active':'');
    row.innerHTML=`<div class="source-dot" style="background:${src.color}"></div><div class="source-info"><div class="source-name">${src.name}</div><div class="source-meta">${fmtDur(src.dur)}</div></div><span class="source-badge">${src.clips.length}</span>`;
    row.onclick=()=>{ activeSource=i; activeClip=null; render(); };
    el.appendChild(row);
  });
}

function renderMain(){
  const src=DATA.sources[activeSource];
  document.getElementById('sh-name').textContent=src.name;
  const specs=src.w?`${src.w}×${src.h} · ${src.fps}fps · ${src.codec} · ${src.size}`:`${src.codec} · ${src.size}`;
  document.getElementById('sh-specs').textContent=specs;

  // Ruler
  const ruler=document.getElementById('ruler');
  ruler.innerHTML='';
  const step=10; const ticks=Math.ceil(src.dur/step)+1;
  for(let t=0;t<ticks;t++){
    const s=t*step; if(s>src.dur+5) break;
    const pct=(s/src.dur*100).toFixed(2);
    const tk=document.createElement('span');
    tk.className='tick'; tk.style.left=pct+'%';
    tk.textContent=fmtDur(s);
    ruler.appendChild(tk);
  }

  // Playhead
  const ph=document.createElement('div');
  ph.className='playhead';
  ph.style.left='18%';
  ruler.appendChild(ph);

  // Clip blocks
  const tl=document.getElementById('timeline-clips');
  tl.innerHTML='';
  src.clips.forEach((clip,ci)=>{
    const left=(clip.inT/src.dur*100).toFixed(2);
    const width=((clip.outT-clip.inT)/src.dur*100).toFixed(2);
    const block=document.createElement('div');
    block.className='clip-block'+(activeClip===ci?' selected':'');
    block.style.left=left+'%'; block.style.width=width+'%';
    block.innerHTML=`<span class="handle l"></span>C${ci+1}<span class="handle r"></span>`;
    block.onclick=()=>{ activeClip=ci; render(); };
    tl.appendChild(block);
  });

  // Table
  const tbody=document.getElementById('clip-tbody');
  tbody.innerHTML='';
  src.clips.forEach((clip,ci)=>{
    const tr=document.createElement('tr');
    tr.className=activeClip===ci?'selected':'';
    const dur=(clip.outT-clip.inT).toFixed(1);
    const usedHtml=clip.used?`<span class="used">${clip.used}</span>`:`<span class="unused">—</span>`;
    const tagsHtml=clip.tags.map(t=>`<span class="tag">${t}</span>`).join('');
    tr.innerHTML=`<td>${ci+1}</td><td>${clip.name}</td><td class="tc">${fmtTC(clip.inT)}</td><td class="tc">${fmtTC(clip.outT)}</td><td class="dur">${dur}s</td><td>${usedHtml}</td><td>${tagsHtml}</td>`;
    tr.onclick=()=>{ activeClip=ci; render(); };
    tbody.appendChild(tr);
  });
}

function renderProps(){
  const body=document.getElementById('props-body');
  if(activeClip===null){ body.innerHTML='<div class="empty-state">No clip selected</div>'; return; }
  const src=DATA.sources[activeSource];
  const clip=src.clips[activeClip];
  const dur=(clip.outT-clip.inT).toFixed(3);
  const rows=[
    ['Name', clip.name],
    ['Source', src.name],
    ['In', fmtTC(clip.inT)],
    ['Out', fmtTC(clip.outT)],
    ['Duration', dur+'s'],
  ];
  if(src.w){ rows.push(['Resolution', src.w+'×'+src.h]); }
  if(src.fps){ rows.push(['FPS', src.fps]); }
  rows.push(['Codec', src.codec]);
  rows.push(['Used in', clip.used||'—']);

  let html=rows.map(([l,v])=>{
    const cls=l==='Used in'&&clip.used?' accent':'';
    return `<div class="prop-row"><span class="prop-label">${l}</span><span class="prop-value${cls}">${v}</span></div>`;
  }).join('');

  html+=`<div class="prop-row"><span class="prop-label">Tags</span><div class="prop-value"><div class="prop-tags">${clip.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div></div>`;
  body.innerHTML=html;
}

function updateStats(){
  let totalClips=0, totalDur=0;
  DATA.sources.forEach(s=>{ totalClips+=s.clips.length; s.clips.forEach(c=>{ totalDur+=(c.outT-c.inT); }); });
  document.getElementById('stat-sources').textContent=DATA.sources.length+' sources';
  document.getElementById('stat-clips').textContent=totalClips+' clips';
  document.getElementById('stat-total').textContent=fmtDur(totalDur)+' total';
}

function render(){ renderSources(); renderMain(); renderProps(); updateStats(); }
render();
</script>
</body>
</html>
