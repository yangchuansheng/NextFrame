<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nextframe > clips</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #050508;
    --surface: #0a0a0f;
    --row-alt: #0d0d12;
    --border: #1a1a22;
    --text: #b8c0b8;
    --bright: #d8e0d8;
    --muted: #4a5248;
    --accent: #6adf8a;
    --highlight: #2a4a30;
    --error: #df6a6a;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Menlo', monospace;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 13px; line-height: 1.4;
    overflow: hidden; user-select: text; cursor: default;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ── topbar ── */
  .topbar {
    height: 32px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border);
    font-size: 12px; flex-shrink: 0;
  }
  .topbar .path { color: var(--muted); }
  .topbar .path .seg { color: var(--text); }
  .topbar .path .cur { color: var(--accent); }
  .topbar .stats { color: var(--muted); }
  .topbar .stats .num { color: var(--text); }
  .topbar .dot-ok { color: var(--accent); margin-left: 10px; }

  /* ── table area ── */
  .table-wrap {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: #1a1a22 #050508;
  }
  .table-wrap::-webkit-scrollbar { width: 6px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--surface); color: var(--muted); font-weight: 400;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    text-align: left; padding: 6px 12px; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child { padding-left: 16px; }

  /* column widths */
  .col-src { width: 22%; }
  .col-clip { width: auto; }
  .col-in { width: 100px; }
  .col-out { width: 100px; }
  .col-dur { width: 72px; }
  .col-seg { width: 56px; }

  /* ── source header row ── */
  tr.source-row {
    background: var(--surface); cursor: pointer; border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  tr.source-row:first-of-type { border-top: none; }
  tr.source-row:hover { background: #0e0e14; }
  tr.source-row td { padding: 7px 12px; white-space: nowrap; }
  tr.source-row td:first-child { padding-left: 16px; }
  .src-name { color: var(--bright); }
  .src-dot { color: var(--accent); margin-right: 8px; font-size: 8px; vertical-align: middle; }
  .src-dot.warn { color: var(--error); }
  .src-specs { color: var(--muted); font-size: 12px; float: right; }
  .src-specs .v { color: var(--text); }
  .src-chevron { color: var(--muted); margin-right: 6px; display: inline-block; transition: transform 0.15s; font-size: 10px; }
  tr.source-row.expanded .src-chevron { transform: rotate(90deg); }

  /* ── clip rows ── */
  tr.clip-row { cursor: pointer; border-bottom: 1px solid #12121a; }
  tr.clip-row:nth-child(even) { background: var(--row-alt); }
  tr.clip-row:nth-child(odd) { background: var(--bg); }
  tr.clip-row:hover { background: #141420; }
  tr.clip-row.selected { background: var(--highlight) !important; }
  tr.clip-row.selected td { color: var(--bright); }
  tr.clip-row td { padding: 5px 12px; font-size: 13px; }
  tr.clip-row td:first-child { padding-left: 16px; }
  tr.clip-row .clip-name { color: var(--text); padding-left: 20px; }
  tr.clip-row .tc { color: var(--muted); font-variant-numeric: tabular-nums; }
  tr.clip-row.selected .tc { color: var(--accent); }
  tr.clip-row .dur { color: var(--text); }
  tr.clip-row .seg-ref { color: var(--accent); font-size: 12px; }
  tr.clip-row .seg-none { color: #2a2a32; }
  tr.clip-row.hidden { display: none; }

  /* ── status bar ── */
  .statusbar {
    height: 24px; display: flex; align-items: center;
    padding: 0 16px; background: var(--surface);
    border-top: 1px solid var(--border); font-size: 11px;
    color: var(--muted); flex-shrink: 0; overflow: hidden;
    white-space: nowrap;
  }
  .statusbar .sel-label { color: var(--accent); margin-right: 4px; }
  .statusbar .sel-name { color: var(--bright); }
  .statusbar .sel-tc { color: var(--text); }
  .statusbar .pipe { color: #2a2a32; margin: 0 8px; }

  /* ── mini timeline ── */
  .timeline-bar {
    height: 48px; background: var(--surface); border-top: 1px solid var(--border);
    padding: 6px 16px; flex-shrink: 0; display: flex; flex-direction: column;
    justify-content: center; position: relative;
  }
  .timeline-bar.empty { }
  .tl-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .tl-track {
    height: 14px; background: #0d0d12; border: 1px solid var(--border);
    position: relative; border-radius: 1px; overflow: hidden;
  }
  .tl-clip-block {
    position: absolute; top: 1px; bottom: 1px;
    background: var(--accent); opacity: 0.35; border-radius: 1px;
    min-width: 3px;
  }
  .tl-clip-block.active { opacity: 0.8; }
  .tl-markers {
    display: flex; justify-content: space-between;
    font-size: 9px; color: var(--muted); margin-top: 2px;
  }
</style>
</head>
<body>
<div class="app">
  <!-- topbar -->
  <div class="topbar">
    <div class="path">
      nextframe <span class="seg">&gt;</span> show <span class="seg">&gt;</span> ep01 <span class="seg">&gt;</span> <span class="cur">clips</span>
    </div>
    <div class="stats">
      <span class="num" id="src-count">0</span> sources <span style="color:#2a2a32">|</span>
      <span class="num" id="clip-count">0</span> clips <span style="color:#2a2a32">|</span>
      <span class="num" id="total-dur">0:00</span> total
      <span class="dot-ok">&#9679;</span>
    </div>
  </div>

  <!-- table -->
  <div class="table-wrap">
    <table id="clips-table">
      <thead>
        <tr>
          <th class="col-src">source</th>
          <th class="col-clip">clip</th>
          <th class="col-in">in</th>
          <th class="col-out">out</th>
          <th class="col-dur">dur</th>
          <th class="col-seg">seg</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- statusbar -->
  <div class="statusbar" id="statusbar">no selection</div>

  <!-- mini timeline -->
  <div class="timeline-bar" id="timeline-bar">
    <div class="tl-label" id="tl-label">no source selected</div>
    <div class="tl-track" id="tl-track"></div>
    <div class="tl-markers" id="tl-markers"></div>
  </div>
</div>

<script>
const DATA = [
  {
    file: "interview-raw.mp4", dur: "03:24", durSec: 204, res: "1080p", size: "245MB", status: "ok",
    clips: [
      { name: "用户介绍自己", inTc: "00:12.400", outTc: "00:28.800", inSec: 12.4, outSec: 28.8, dur: "16.4s", seg: "s02" },
      { name: "使用痛点描述", inTc: "00:45.000", outTc: "01:15.200", inSec: 45, outSec: 75.2, dur: "30.2s", seg: "s01" },
      { name: "使用感受", inTc: "02:10.000", outTc: "02:38.500", inSec: 130, outSec: 158.5, dur: "28.5s", seg: null },
    ]
  },
  {
    file: "screen-recording.mp4", dur: "05:12", durSec: 312, res: "1080p", size: "380MB", status: "ok",
    clips: [
      { name: "创建项目流程", inTc: "00:08.000", outTc: "00:45.000", inSec: 8, outSec: 45, dur: "37.0s", seg: "s03" },
      { name: "导出成品", inTc: "03:20.000", outTc: "04:05.000", inSec: 200, outSec: 245, dur: "45.0s", seg: "s04" },
    ]
  },
  {
    file: "b-roll-office.mp4", dur: "01:48", durSec: 108, res: "4K", size: "520MB", status: "ok",
    clips: [
      { name: "办公室全景", inTc: "00:02.000", outTc: "00:10.500", inSec: 2, outSec: 10.5, dur: "8.5s", seg: "s01" },
      { name: "键盘特写", inTc: "00:35.000", outTc: "00:42.000", inSec: 35, outSec: 42, dur: "7.0s", seg: null },
      { name: "团队协作", inTc: "01:05.000", outTc: "01:30.000", inSec: 65, outSec: 90, dur: "25.0s", seg: "s05" },
    ]
  },
  {
    file: "voiceover-final.wav", dur: "02:05", durSec: 125, res: "48kHz", size: "32MB", status: "warn",
    clips: [
      { name: "开场白", inTc: "00:00.000", outTc: "00:18.000", inSec: 0, outSec: 18, dur: "18.0s", seg: "s01" },
      { name: "功能讲解段落", inTc: "00:22.500", outTc: "01:08.000", inSec: 22.5, outSec: 68, dur: "45.5s", seg: "s03" },
      { name: "结尾总结", inTc: "01:40.000", outTc: "02:02.000", inSec: 100, outSec: 122, dur: "22.0s", seg: "s06" },
    ]
  }
];

const tbody = document.getElementById("tbody");
const statusbar = document.getElementById("statusbar");
let expandedSources = new Set([0, 1, 2, 3]); // all expanded by default
let selectedClip = null; // {srcIdx, clipIdx}

function render() {
  tbody.innerHTML = "";
  let totalClips = 0;
  let totalSec = 0;

  DATA.forEach((src, si) => {
    const expanded = expandedSources.has(si);
    // source row
    const sr = document.createElement("tr");
    sr.className = "source-row" + (expanded ? " expanded" : "");
    sr.innerHTML = `
      <td colspan="6">
        <span class="src-chevron">&#9654;</span>
        <span class="src-dot ${src.status === 'warn' ? 'warn' : ''}">&#9679;</span>
        <span class="src-name">${src.file}</span>
        <span class="src-specs">
          <span class="v">${src.dur}</span>&nbsp;&nbsp;${src.res}&nbsp;&nbsp;${src.size}&nbsp;&nbsp;<span class="v">${src.clips.length}</span> clips
        </span>
      </td>`;
    sr.addEventListener("click", () => {
      if (expandedSources.has(si)) expandedSources.delete(si);
      else expandedSources.add(si);
      render();
    });
    tbody.appendChild(sr);

    src.clips.forEach((clip, ci) => {
      totalClips++;
      const durNum = parseFloat(clip.dur);
      if (!isNaN(durNum)) totalSec += durNum;

      const cr = document.createElement("tr");
      const isSelected = selectedClip && selectedClip.srcIdx === si && selectedClip.clipIdx === ci;
      cr.className = "clip-row" + (isSelected ? " selected" : "") + (!expanded ? " hidden" : "");
      cr.innerHTML = `
        <td></td>
        <td><span class="clip-name">${clip.name}</span></td>
        <td class="tc">${clip.inTc}</td>
        <td class="tc">${clip.outTc}</td>
        <td class="dur">${clip.dur}</td>
        <td>${clip.seg ? '<span class="seg-ref">' + clip.seg + '</span>' : '<span class="seg-none">\u2014</span>'}</td>`;
      cr.addEventListener("click", (e) => {
        e.stopPropagation();
        selectedClip = { srcIdx: si, clipIdx: ci };
        render();
      });
      tbody.appendChild(cr);
    });
  });

  // update topbar stats
  document.getElementById("src-count").textContent = DATA.length;
  document.getElementById("clip-count").textContent = totalClips;
  const mins = Math.floor(totalSec / 60);
  const secs = Math.floor(totalSec % 60);
  document.getElementById("total-dur").textContent = mins + ":" + String(secs).padStart(2, "0") + " total";

  // update statusbar
  if (selectedClip) {
    const src = DATA[selectedClip.srcIdx];
    const clip = src.clips[selectedClip.clipIdx];
    statusbar.innerHTML = `<span class="sel-label">selected:</span> <span class="sel-name">${clip.name}</span>` +
      `<span class="pipe">|</span>${src.file}` +
      `<span class="pipe">|</span><span class="sel-tc">${clip.inTc} \u2192 ${clip.outTc}</span>` +
      `<span class="pipe">|</span><span class="sel-tc">${clip.dur}</span>` +
      `<span class="pipe">|</span>${clip.seg ? '<span class="seg-ref" style="color:var(--accent)">' + clip.seg + '</span>' : '\u2014'}`;
  } else {
    statusbar.textContent = "no selection";
  }

  // update timeline
  renderTimeline();
}

function renderTimeline() {
  const tlLabel = document.getElementById("tl-label");
  const tlTrack = document.getElementById("tl-track");
  const tlMarkers = document.getElementById("tl-markers");

  // show timeline for the source of selected clip, or first expanded source
  let srcIdx = selectedClip ? selectedClip.srcIdx : (expandedSources.size > 0 ? [...expandedSources][0] : -1);
  if (srcIdx < 0 || srcIdx >= DATA.length) {
    tlLabel.textContent = "no source selected";
    tlTrack.innerHTML = "";
    tlMarkers.innerHTML = "";
    return;
  }

  const src = DATA[srcIdx];
  tlLabel.textContent = src.file + "  \u2502  " + src.dur;
  tlTrack.innerHTML = "";

  src.clips.forEach((clip, ci) => {
    const left = (clip.inSec / src.durSec) * 100;
    const width = ((clip.outSec - clip.inSec) / src.durSec) * 100;
    const isActive = selectedClip && selectedClip.srcIdx === srcIdx && selectedClip.clipIdx === ci;
    const block = document.createElement("div");
    block.className = "tl-clip-block" + (isActive ? " active" : "");
    block.style.left = left + "%";
    block.style.width = Math.max(width, 0.5) + "%";
    tlTrack.appendChild(block);
  });

  // markers: 0, 25%, 50%, 75%, end
  const points = [0, 0.25, 0.5, 0.75, 1];
  tlMarkers.innerHTML = points.map(p => {
    const sec = Math.round(src.durSec * p);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `<span>${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span>`;
  }).join("");
}

// initial selection
selectedClip = { srcIdx: 0, clipIdx: 0 };
render();
</script>
</body>
</html>
