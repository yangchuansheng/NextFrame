<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame · 原子</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   NEXTFRAME ATOMS v2 — 3D Glass Card Grid
   Spec: DESIGN.md · Min font 12px · Min opacity 0.50
   Fonts: Inter (UI) · JetBrains Mono (data)
   ══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Background */
  --bg: #050507;

  /* Accent — single purple, 4 densities */
  --accent: #a78bfa;
  --accent-20: rgba(167,139,250,0.20);
  --accent-12: rgba(167,139,250,0.12);
  --accent-06: rgba(167,139,250,0.06);

  /* Semantic */
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --green-border: rgba(52,211,153,0.20);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.12);
  --yellow-border: rgba(251,191,36,0.20);

  /* Text — 4 levels, hard floor 0.50 */
  --t100: rgba(255,255,255,0.95);
  --t80: rgba(255,255,255,0.80);
  --t65: rgba(255,255,255,0.65);
  --t50: rgba(255,255,255,0.50);

  /* Borders */
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.14);
  --border-light: rgba(255,255,255,0.05);

  /* Typography */
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --serif: 'Noto Serif SC', Georgia, serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

  /* Spacing (8-point grid) */
  --sp-4: 4px;
  --sp-6: 6px;
  --sp-8: 8px;
  --sp-12: 12px;
  --sp-16: 16px;
  --sp-20: 20px;
  --sp-24: 24px;
  --sp-32: 32px;

  /* Radius */
  --r: 14px;
  --r-sm: 10px;
  --r-xs: 6px;

  /* Motion */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --dur: 0.35s;
  --stagger: 60ms;

  /* Glass */
  --glass-bg: rgba(0,0,0,0.50);
  --glass-blur: blur(16px) saturate(1.4);
  --glass-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.09),
    inset 0 -1px 0 0 rgba(0,0,0,0.15),
    0 2px 8px rgba(0,0,0,0.20);
  --glass-shadow-hover:
    inset 0 1px 0 0 rgba(255,255,255,0.09),
    inset 0 -1px 0 0 rgba(0,0,0,0.15),
    0 6px 20px rgba(0,0,0,0.30);
  --glass-highlight:
    linear-gradient(178deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 3%, transparent 12%),
    linear-gradient(92deg, rgba(255,255,255,0.025) 0%, transparent 3%, transparent 97%, rgba(255,255,255,0.015) 100%);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--t80);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Aurora Background ── */
.aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 12% at 50% 2%, rgba(139,92,246,0.10) 0%, transparent 100%),
    radial-gradient(ellipse 60% 12% at 50% 98%, rgba(124,58,237,0.06) 0%, transparent 100%);
}

/* ── 3D Glass Panel ── */
.glass {
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg);
  border: 1px solid var(--border);
  box-shadow: var(--glass-shadow);
}
.glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 1;
  background: var(--glass-highlight);
}

/* ══════════════════════════════════════
   APP SHELL
   ══════════════════════════════════════ */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ══════════════════════════════════════
   TOPBAR — 48px fixed
   ══════════════════════════════════════ */
.topbar {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 var(--sp-16);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: rgba(0,0,0,0.55);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 -1px 0 rgba(0,0,0,0.20), 0 1px 4px rgba(0,0,0,0.15);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.tb-brand {
  font-family: var(--serif);
  font-size: 15px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.88);
  margin-right: var(--sp-6);
  flex-shrink: 0;
}
.tb-sep {
  color: var(--t50);
  margin: 0 var(--sp-4);
  font-size: 14px;
  flex-shrink: 0;
}

/* Dropdown selector */
.tb-sel {
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.tb-sel-btn {
  display: flex;
  align-items: center;
  gap: var(--sp-6);
  padding: 5px 10px;
  border-radius: var(--r-xs);
  font-size: 13px;
  font-weight: 500;
  color: var(--t80);
  border: 1px solid transparent;
  transition: background 0.2s var(--ease);
}
.tb-sel-btn:hover {
  background: rgba(255,255,255,0.06);
}
.tb-sel-btn .caret {
  font-size: 12px;
  color: var(--t50);
  transition: transform 0.2s var(--ease);
}
.tb-sel.open .caret {
  transform: rotate(180deg);
}

/* Dropdown panel — OPAQUE #141416 */
.tb-dd {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 220px;
  padding: var(--sp-6) 0;
  z-index: 100;
  background: #141416;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--r-sm);
  box-shadow: 0 8px 30px rgba(0,0,0,0.60), inset 0 1px 0 rgba(255,255,255,0.06);
}
.tb-sel.open .tb-dd {
  display: block;
  animation: fadeDown 0.25s var(--ease) both;
}
.dd-label {
  padding: var(--sp-8) var(--sp-12) var(--sp-4);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--t50);
}
.dd-item {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
  padding: var(--sp-8) var(--sp-12);
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
  cursor: pointer;
  transition: all 0.15s var(--ease);
  position: relative;
  z-index: 2;
}
.dd-item:hover {
  background: rgba(255,255,255,0.06);
  color: var(--t100);
}
.dd-item.active {
  color: var(--t100);
}
.dd-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dd-dot.on { background: var(--accent); }
.dd-dot.off { background: rgba(255,255,255,0.18); }

/* Divider */
.tb-div {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 var(--sp-12);
  flex-shrink: 0;
}

/* Tabs */
.tb-tabs {
  display: flex;
  align-items: center;
  height: 100%;
}
.tb-tab {
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.2s var(--ease);
  white-space: nowrap;
}
.tb-tab:hover { color: var(--t80); }
.tb-tab.active {
  color: var(--t100);
  border-bottom-color: var(--accent);
}

/* Right actions */
.tb-right {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
  margin-left: auto;
  flex-shrink: 0;
}
.tb-lang {
  padding: 4px 10px;
  border-radius: var(--r-xs);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--t50);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.tb-lang:hover {
  border-color: var(--border-hover);
  color: var(--t80);
  background: rgba(255,255,255,0.04);
}
.tb-icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--r-xs);
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--t50);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--ease);
}
.tb-icon-btn:hover {
  background: rgba(255,255,255,0.06);
  color: var(--t80);
}
.tb-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--t65);
  cursor: pointer;
  transition: border-color 0.2s var(--ease);
}
.tb-avatar:hover { border-color: rgba(255,255,255,0.35); }

/* ══════════════════════════════════════
   BODY — sidebar + main
   ══════════════════════════════════════ */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
  padding: var(--sp-8);
  gap: var(--sp-8);
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: var(--sp-6);
}
.sidebar > .glass {
  animation: fadeUp 0.4s var(--ease) both;
}
.sidebar > .glass:nth-child(1) { animation-delay: 0ms; }
.sidebar > .glass:nth-child(2) { animation-delay: 80ms; }

/* Sidebar sections */
.sb-section {
  padding: var(--sp-16);
  position: relative;
  z-index: 2;
}
.sb-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: var(--sp-16);
}

/* Stats grid */
.stats-grid {
  display: flex;
  flex-direction: column;
  gap: var(--sp-8);
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-4) 0;
}
.stat-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
}
.stat-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t80);
}

/* Hero stat */
.stat-hero {
  text-align: center;
  padding-bottom: var(--sp-12);
  margin-bottom: var(--sp-12);
  border-bottom: 1px solid var(--border-light);
}
.stat-hero-num {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 700;
  color: var(--t100);
  line-height: 1.2;
}
.stat-hero-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--t50);
  margin-top: var(--sp-4);
}

/* Filter pills */
.filter-section {
  padding: var(--sp-16);
  position: relative;
  z-index: 2;
}
.filter-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: var(--sp-12);
}
.filter-pills {
  display: flex;
  flex-direction: column;
  gap: var(--sp-6);
}
.filter-pill {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-8) var(--sp-12);
  border-radius: var(--r-xs);
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  transition: all 0.2s var(--ease);
  width: 100%;
  text-align: left;
  font-family: var(--sans);
}
.filter-pill:hover {
  background: rgba(255,255,255,0.04);
  color: var(--t80);
}
.filter-pill.active {
  background: var(--accent-12);
  color: var(--accent);
  border-color: var(--accent-20);
}
.filter-pill .pill-count {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
}
.filter-pill .pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.filter-pill .pill-left {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
}

/* ── Main content ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--sp-8);
  overflow: hidden;
}

/* Main header */
.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-12) var(--sp-16);
  position: relative;
  z-index: 2;
  animation: fadeUp 0.4s var(--ease) 0.1s both;
}
.main-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--t100);
}
.main-count {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
}

/* Card grid */
.card-grid-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0 var(--sp-4) var(--sp-8);
}
.card-grid-wrap::-webkit-scrollbar { width: 4px; }
.card-grid-wrap::-webkit-scrollbar-track { background: transparent; }
.card-grid-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.card-grid-wrap::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--sp-12);
  padding: var(--sp-4);
}

/* ── Atom Card ── */
.atom-card {
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg);
  border: 1px solid var(--border);
  box-shadow: var(--glass-shadow);
  padding: var(--sp-20);
  display: flex;
  flex-direction: column;
  gap: var(--sp-12);
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease);
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.45s var(--ease) both;
}
.atom-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 1;
  background: var(--glass-highlight);
}
.atom-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--glass-shadow-hover);
  border-color: var(--border-hover);
}

.atom-card > * {
  position: relative;
  z-index: 2;
}

/* Card header */
.atom-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-8);
}
.atom-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--t100);
  line-height: 1.3;
}

/* Type tags — semantic colors */
.atom-type {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.atom-type.component {
  background: var(--accent-12);
  color: var(--accent);
  border: 1px solid var(--accent-20);
}
.atom-type.video {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid var(--green-border);
}
.atom-type.image {
  background: var(--yellow-bg);
  color: var(--yellow);
  border: 1px solid var(--yellow-border);
}

/* Info line */
.atom-info {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
  line-height: 1.5;
}

/* Segment tags */
.atom-tags {
  display: flex;
  gap: var(--sp-6);
  flex-wrap: wrap;
}
.atom-seg {
  font-size: 12px;
  font-weight: 600;
  font-family: var(--mono);
  padding: 3px var(--sp-12);
  border-radius: var(--r-xs);
  background: var(--accent-12);
  color: var(--accent);
  letter-spacing: 0.02em;
}

/* File path */
.atom-path {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
  word-break: break-all;
  line-height: 1.5;
}

/* ── Footer ── */
.footer {
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp-16);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: rgba(0,0,0,0.40);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  animation: fadeUp 0.4s var(--ease) 0.3s both;
}
.footer-text {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
}

/* ══════════════════════════════════════
   ANIMATIONS
   ══════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="aurora"></div>

<div class="app">
  <!-- ══ TOPBAR ══ -->
  <div class="topbar">
    <span class="tb-brand">NextFrame</span>
    <span class="tb-sep">/</span>
    <div class="tb-sel" id="selProject" onclick="toggleDd('selProject')">
      <div class="tb-sel-btn"><span>Show</span><span class="caret">&#x25BE;</span></div>
      <div class="tb-dd">
        <div class="dd-label">Projects</div>
        <div class="dd-item active"><span class="dd-dot on"></span>Show</div>
        <div class="dd-item"><span class="dd-dot off"></span>Demo Reel</div>
        <div class="dd-item"><span class="dd-dot off"></span>Onboarding</div>
      </div>
    </div>
    <span class="tb-sep">/</span>
    <div class="tb-sel" id="selEpisode" onclick="toggleDd('selEpisode')">
      <div class="tb-sel-btn"><span>EP01</span><span class="caret">&#x25BE;</span></div>
      <div class="tb-dd">
        <div class="dd-label">Episodes</div>
        <div class="dd-item active"><span class="dd-dot on"></span>EP01 &mdash; 产品介绍</div>
        <div class="dd-item"><span class="dd-dot off"></span>EP02 &mdash; 用户案例</div>
      </div>
    </div>
    <div class="tb-div"></div>
    <div class="tb-tabs">
      <div class="tb-tab">脚本</div>
      <div class="tb-tab">音频</div>
      <div class="tb-tab">素材</div>
      <div class="tb-tab active">原子</div>
      <div class="tb-tab">拼装</div>
      <div class="tb-tab">产出</div>
    </div>
    <div class="tb-right">
      <button class="tb-lang">EN</button>
      <button class="tb-icon-btn" title="Settings">&#x2699;</button>
      <div class="tb-avatar">Z</div>
    </div>
  </div>

  <!-- ══ BODY ══ -->
  <div class="body">
    <!-- ── Sidebar ── -->
    <div class="sidebar">
      <!-- Stats panel -->
      <div class="glass">
        <div class="sb-section">
          <div class="sb-title">原子总览</div>
          <div class="stat-hero">
            <div class="stat-hero-num" id="heroCount">8</div>
            <div class="stat-hero-label">TOTAL ATOMS</div>
          </div>
          <div class="stats-grid">
            <div class="stat-row">
              <span class="stat-label">组件</span>
              <span class="stat-value">5</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">视频</span>
              <span class="stat-value">2</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">图片</span>
              <span class="stat-value">1</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Filter panel -->
      <div class="glass">
        <div class="filter-section">
          <div class="filter-title">类型筛选</div>
          <div class="filter-pills">
            <button class="filter-pill active" onclick="filterType('all', this)">
              <span class="pill-left"><span>全部</span></span>
              <span class="pill-count">8</span>
            </button>
            <button class="filter-pill" onclick="filterType('component', this)">
              <span class="pill-left"><span class="pill-dot" style="background:var(--accent)"></span><span>组件</span></span>
              <span class="pill-count">5</span>
            </button>
            <button class="filter-pill" onclick="filterType('video', this)">
              <span class="pill-left"><span class="pill-dot" style="background:var(--green)"></span><span>视频</span></span>
              <span class="pill-count">2</span>
            </button>
            <button class="filter-pill" onclick="filterType('image', this)">
              <span class="pill-left"><span class="pill-dot" style="background:var(--yellow)"></span><span>图片</span></span>
              <span class="pill-count">1</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Main ── -->
    <div class="main">
      <div class="glass" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div class="main-header">
          <span class="main-title">原子列表</span>
          <span class="main-count" id="visibleCount">8 atoms</span>
        </div>
        <div class="card-grid-wrap">
          <div class="card-grid" id="grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ FOOTER ══ -->
  <div class="footer">
    <span class="footer-text">8 atoms &middot; 5 components &middot; 2 videos &middot; 1 image</span>
    <span class="footer-text">NextFrame v0.4</span>
  </div>
</div>

<script>
var ATOMS = [
  { name: "numberCounter", type: "component", info: "scene \u00b7 numberCounter.js", seg: "\u6bb5 1" },
  { name: "logoReveal", type: "component", info: "scene \u00b7 logoReveal.js", seg: "\u6bb5 2" },
  { name: "flowChart", type: "component", info: "scene \u00b7 flowChart.js", seg: "\u6bb5 3" },
  { name: "barChart", type: "component", info: "scene \u00b7 barChart.js", seg: "\u6bb5 4" },
  { name: "slideFrame", type: "component", info: "scene \u00b7 slideFrame.js", seg: "\u6bb5 5" },
  { name: "screen-recording.mp4", type: "video", info: "15.2s \u00b7 1080p \u00b7 H.264", seg: "\u6bb5 3", path: "/Users/project/assets/video/screen-recording.mp4" },
  { name: "interview-clip.mp4", type: "video", info: "8.4s \u00b7 1080p \u00b7 H.264", seg: null, path: "/Users/project/assets/video/interview-clip.mp4" },
  { name: "logo-hd.png", type: "image", info: "2400\u00d72400 \u00b7 1.2 MB \u00b7 PNG", seg: null, path: "/Users/project/assets/image/logo-hd.png" }
];

function renderGrid(filter) {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var visible = 0;
  var stagger = 60;

  ATOMS.forEach(function(a) {
    if (filter !== "all" && a.type !== filter) return;
    visible++;

    var card = document.createElement("div");
    card.className = "atom-card";
    card.dataset.type = a.type;
    card.style.animationDelay = ((visible - 1) * stagger) + "ms";

    var typeLabel = a.type === "component" ? "\u7ec4\u4ef6" : a.type === "video" ? "\u89c6\u9891" : "\u56fe\u7247";

    var html = '<div class="atom-header">' +
      '<span class="atom-name">' + a.name + '</span>' +
      '<span class="atom-type ' + a.type + '">' + typeLabel + '</span>' +
      '</div>' +
      '<div class="atom-info">' + a.info + '</div>';

    if (a.seg) {
      html += '<div class="atom-tags"><span class="atom-seg">' + a.seg + '</span></div>';
    }
    if (a.path) {
      html += '<div class="atom-path">' + a.path + '</div>';
    }

    card.innerHTML = html;
    grid.appendChild(card);
  });

  document.getElementById("visibleCount").textContent = visible + " atoms";
  document.getElementById("heroCount").textContent = visible;
}

function filterType(type, el) {
  document.querySelectorAll(".filter-pill").forEach(function(p) {
    p.classList.remove("active");
  });
  el.classList.add("active");
  renderGrid(type);
}

/* Dropdown toggle */
function toggleDd(id) {
  var el = document.getElementById(id);
  var wasOpen = el.classList.contains("open");
  document.querySelectorAll(".tb-sel.open").forEach(function(s) { s.classList.remove("open"); });
  if (!wasOpen) el.classList.add("open");
}
document.addEventListener("click", function(e) {
  if (!e.target.closest(".tb-sel")) {
    document.querySelectorAll(".tb-sel.open").forEach(function(s) { s.classList.remove("open"); });
  }
});

renderGrid("all");
</script>
</body>
</html>
