<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame · Media</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   NEXTFRAME MEDIA v1 — Clips / Assets Grid
   Spec: DESIGN.md · Min font 12px · Min opacity 0.50
   Fonts: Inter (UI) · JetBrains Mono (data)
   ══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Background */
  --bg: #050507;

  /* Accent — single purple, 4 densities */
  --accent: #a78bfa;
  --accent-20: rgba(167,139,250,0.20);
  --accent-12: rgba(167,139,250,0.12);
  --accent-06: rgba(167,139,250,0.06);

  /* Semantic */
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --green-border: rgba(52,211,153,0.20);
  --blue: #38bdf8;
  --blue-bg: rgba(56,189,248,0.12);
  --blue-border: rgba(56,189,248,0.20);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.12);
  --yellow-border: rgba(251,191,36,0.20);

  /* Text — 4 levels, hard floor 0.50 */
  --t100: rgba(255,255,255,0.95);
  --t80: rgba(255,255,255,0.80);
  --t65: rgba(255,255,255,0.65);
  --t50: rgba(255,255,255,0.50);

  /* Borders */
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.14);
  --border-light: rgba(255,255,255,0.05);

  /* Typography */
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --serif: 'Noto Serif SC', Georgia, serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

  /* Spacing (8-point grid) */
  --sp-4: 4px;
  --sp-6: 6px;
  --sp-8: 8px;
  --sp-12: 12px;
  --sp-16: 16px;
  --sp-20: 20px;
  --sp-24: 24px;
  --sp-32: 32px;

  /* Radius */
  --r: 14px;
  --r-sm: 10px;
  --r-xs: 6px;

  /* Motion */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --dur: 0.35s;
  --stagger: 60ms;

  /* Glass */
  --glass-bg: rgba(0,0,0,0.50);
  --glass-blur: blur(16px) saturate(1.4);
  --glass-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.09),
    inset 0 -1px 0 0 rgba(0,0,0,0.15),
    0 2px 8px rgba(0,0,0,0.20);
  --glass-shadow-hover:
    inset 0 1px 0 0 rgba(255,255,255,0.09),
    inset 0 -1px 0 0 rgba(0,0,0,0.15),
    0 6px 20px rgba(0,0,0,0.30);
  --glass-highlight:
    linear-gradient(178deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 3%, transparent 12%),
    linear-gradient(92deg, rgba(255,255,255,0.025) 0%, transparent 3%, transparent 97%, rgba(255,255,255,0.015) 100%);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--t80);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Aurora Background ── */
.aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 12% at 50% 2%, rgba(139,92,246,0.10) 0%, transparent 100%),
    radial-gradient(ellipse 60% 12% at 50% 98%, rgba(124,58,237,0.06) 0%, transparent 100%);
}

/* ── 3D Glass Panel ── */
.glass {
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg);
  border: 1px solid var(--border);
  box-shadow: var(--glass-shadow);
}
.glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 1;
  background: var(--glass-highlight);
}

/* ══════════════════════════════════════
   APP SHELL
   ══════════════════════════════════════ */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ══════════════════════════════════════
   TOPBAR — 48px fixed
   ══════════════════════════════════════ */
.topbar {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 var(--sp-16);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: rgba(0,0,0,0.55);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 -1px 0 rgba(0,0,0,0.20), 0 1px 4px rgba(0,0,0,0.15);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.tb-brand {
  font-family: var(--serif);
  font-size: 15px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.88);
  margin-right: var(--sp-6);
  flex-shrink: 0;
}
.tb-sep {
  color: var(--t50);
  margin: 0 var(--sp-4);
  font-size: 14px;
  flex-shrink: 0;
}

/* Dropdown selector */
.tb-sel {
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.tb-sel-btn {
  display: flex;
  align-items: center;
  gap: var(--sp-6);
  padding: 5px 10px;
  border-radius: var(--r-xs);
  font-size: 13px;
  font-weight: 500;
  color: var(--t80);
  border: 1px solid transparent;
  transition: background 0.2s var(--ease);
}
.tb-sel-btn:hover {
  background: rgba(255,255,255,0.06);
}
.tb-sel-btn .caret {
  font-size: 12px;
  color: var(--t50);
  transition: transform 0.2s var(--ease);
}
.tb-sel.open .caret {
  transform: rotate(180deg);
}

/* Dropdown panel — OPAQUE #141416 */
.tb-dd {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 220px;
  padding: var(--sp-6) 0;
  z-index: 100;
  background: #141416;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--r-sm);
  box-shadow: 0 8px 30px rgba(0,0,0,0.60), inset 0 1px 0 rgba(255,255,255,0.06);
}
.tb-sel.open .tb-dd {
  display: block;
  animation: fadeDown 0.25s var(--ease) both;
}
.dd-label {
  padding: var(--sp-8) var(--sp-12) var(--sp-4);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--t50);
}
.dd-item {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
  padding: var(--sp-8) var(--sp-12);
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
  cursor: pointer;
  transition: all 0.15s var(--ease);
  position: relative;
  z-index: 2;
}
.dd-item:hover {
  background: rgba(255,255,255,0.06);
  color: var(--t100);
}
.dd-item.active {
  color: var(--t100);
}
.dd-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dd-dot.on { background: var(--accent); }
.dd-dot.off { background: rgba(255,255,255,0.18); }

/* Divider */
.tb-div {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 var(--sp-12);
  flex-shrink: 0;
}

/* Tabs */
.tb-tabs {
  display: flex;
  align-items: center;
  height: 100%;
}
.tb-tab {
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.2s var(--ease);
  white-space: nowrap;
}
.tb-tab:hover { color: var(--t80); }
.tb-tab.active {
  color: var(--t100);
  border-bottom-color: var(--accent);
}

/* Right actions */
.tb-right {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
  margin-left: auto;
  flex-shrink: 0;
}
.tb-lang {
  padding: 4px 10px;
  border-radius: var(--r-xs);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--t50);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.tb-lang:hover {
  border-color: var(--border-hover);
  color: var(--t80);
  background: rgba(255,255,255,0.04);
}
.tb-icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--r-xs);
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--t50);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--ease);
}
.tb-icon-btn:hover {
  background: rgba(255,255,255,0.06);
  color: var(--t80);
}
.tb-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--t65);
  cursor: pointer;
  transition: border-color 0.2s var(--ease);
}
.tb-avatar:hover { border-color: rgba(255,255,255,0.35); }

/* ══════════════════════════════════════
   BODY — sidebar + main
   ══════════════════════════════════════ */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
  padding: var(--sp-8);
  gap: var(--sp-8);
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: var(--sp-6);
}
.sidebar > .glass {
  animation: fadeUp 0.4s var(--ease) both;
}
.sidebar > .glass:nth-child(1) { animation-delay: 0ms; }
.sidebar > .glass:nth-child(2) { animation-delay: 80ms; }
.sidebar > .glass:nth-child(3) { animation-delay: 160ms; }

/* Sidebar sections */
.sb-section {
  padding: var(--sp-16);
  position: relative;
  z-index: 2;
}
.sb-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: var(--sp-16);
}

/* Upload area */
.upload-zone {
  position: relative;
  z-index: 2;
  padding: var(--sp-16);
}
.upload-box {
  border: 1.5px dashed rgba(255,255,255,0.14);
  border-radius: var(--r-sm);
  padding: var(--sp-24) var(--sp-16);
  text-align: center;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  background: rgba(255,255,255,0.02);
}
.upload-box:hover {
  border-color: var(--accent);
  background: var(--accent-06);
}
.upload-icon {
  font-size: 24px;
  color: var(--t50);
  margin-bottom: var(--sp-8);
  transition: color 0.25s var(--ease);
}
.upload-box:hover .upload-icon {
  color: var(--accent);
}
.upload-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
  line-height: 1.5;
}
.upload-box:hover .upload-text {
  color: var(--t80);
}

/* Stats grid */
.stats-grid {
  display: flex;
  flex-direction: column;
  gap: var(--sp-8);
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-4) 0;
}
.stat-label {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
}
.stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.stat-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t80);
}

/* Hero stat */
.stat-hero {
  text-align: center;
  padding-bottom: var(--sp-12);
  margin-bottom: var(--sp-12);
  border-bottom: 1px solid var(--border-light);
}
.stat-hero-num {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 700;
  color: var(--t100);
  line-height: 1.2;
}
.stat-hero-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--t50);
  margin-top: var(--sp-4);
}

/* Filter pills */
.filter-section {
  padding: var(--sp-16);
  position: relative;
  z-index: 2;
}
.filter-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: var(--sp-12);
}
.filter-pills {
  display: flex;
  flex-direction: column;
  gap: var(--sp-6);
}
.filter-pill {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-8) var(--sp-12);
  border-radius: var(--r-xs);
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
  transition: all 0.2s var(--ease);
  width: 100%;
  text-align: left;
  font-family: var(--sans);
}
.filter-pill:hover {
  background: rgba(255,255,255,0.04);
  color: var(--t80);
}
.filter-pill.active {
  background: var(--accent-12);
  color: var(--accent);
  border-color: var(--accent-20);
}
.filter-pill .pill-count {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
}
.filter-pill .pill-left {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
}
.filter-pill .pill-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Main content ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--sp-8);
  overflow: hidden;
}

/* Main header */
.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-12) var(--sp-16);
  position: relative;
  z-index: 2;
  animation: fadeUp 0.4s var(--ease) 0.1s both;
}
.main-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--t100);
}
.main-count {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
}

/* Card grid */
.card-grid-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0 var(--sp-4) var(--sp-8);
}
.card-grid-wrap::-webkit-scrollbar { width: 4px; }
.card-grid-wrap::-webkit-scrollbar-track { background: transparent; }
.card-grid-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.card-grid-wrap::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--sp-12);
  padding: var(--sp-4);
}

/* ══════════════════════════════════════
   MEDIA CARD
   ══════════════════════════════════════ */
.media-card {
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg);
  border: 1px solid var(--border);
  box-shadow: var(--glass-shadow);
  display: flex;
  flex-direction: column;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease);
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.45s var(--ease) both;
}
.media-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 1;
  background: var(--glass-highlight);
}
.media-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--glass-shadow-hover);
  border-color: var(--border-hover);
}

/* Thumbnail area */
.media-thumb {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.media-thumb.video {
  aspect-ratio: 16 / 9;
}
.media-thumb.audio {
  aspect-ratio: 16 / 9;
}
.media-thumb.image {
  aspect-ratio: 16 / 9;
}

/* Video thumbnail placeholder */
.thumb-video-inner {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(135deg, rgba(52,211,153,0.06) 0%, rgba(52,211,153,0.02) 100%);
  position: relative;
}
.thumb-play {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(0,0,0,0.50);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--t80);
  font-size: 14px;
  transition: all 0.25s var(--ease);
}
.media-card:hover .thumb-play {
  background: rgba(52,211,153,0.25);
  border-color: var(--green-border);
  color: var(--green);
}
.thumb-duration {
  position: absolute;
  bottom: 8px;
  right: 8px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--t100);
  background: rgba(0,0,0,0.65);
  padding: 2px 8px;
  border-radius: 4px;
}

/* Audio thumbnail placeholder */
.thumb-audio-inner {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background:
    linear-gradient(135deg, rgba(56,189,248,0.06) 0%, rgba(56,189,248,0.02) 100%);
  padding: 0 24px;
}
.wave-bar {
  width: 3px;
  border-radius: 2px;
  background: var(--blue);
  opacity: 0.35;
}
.thumb-audio-duration {
  position: absolute;
  bottom: 8px;
  right: 8px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--t100);
  background: rgba(0,0,0,0.65);
  padding: 2px 8px;
  border-radius: 4px;
}

/* Image thumbnail placeholder */
.thumb-image-inner {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(135deg, rgba(251,191,36,0.06) 0%, rgba(251,191,36,0.02) 100%);
}
.thumb-image-icon {
  font-size: 28px;
  color: var(--yellow);
  opacity: 0.4;
}

/* Card body */
.media-body {
  padding: var(--sp-12) var(--sp-16) var(--sp-16);
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: var(--sp-8);
}

/* Type badge row */
.media-meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-8);
}

.media-type {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.media-type.video {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid var(--green-border);
}
.media-type.audio {
  background: var(--blue-bg);
  color: var(--blue);
  border: 1px solid var(--blue-border);
}
.media-type.image {
  background: var(--yellow-bg);
  color: var(--yellow);
  border: 1px solid var(--yellow-border);
}

.media-used {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--accent-12);
  color: var(--accent);
  border: 1px solid var(--accent-20);
  letter-spacing: 0.02em;
}

/* Filename */
.media-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--t100);
  line-height: 1.3;
  word-break: break-all;
}

/* Specs line */
.media-specs {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
  line-height: 1.5;
}

/* ── Footer ── */
.footer {
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp-16);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: rgba(0,0,0,0.40);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  animation: fadeUp 0.4s var(--ease) 0.3s both;
}
.footer-text {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
}

/* ══════════════════════════════════════
   ANIMATIONS
   ══════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="aurora"></div>

<div class="app">
  <!-- ══ TOPBAR ══ -->
  <div class="topbar">
    <span class="tb-brand">NextFrame</span>
    <span class="tb-sep">/</span>
    <div class="tb-sel" id="selProject" onclick="toggleDd('selProject')">
      <div class="tb-sel-btn"><span>Show</span><span class="caret">&#x25BE;</span></div>
      <div class="tb-dd">
        <div class="dd-label">Projects</div>
        <div class="dd-item active"><span class="dd-dot on"></span>Show</div>
        <div class="dd-item"><span class="dd-dot off"></span>Demo Reel</div>
        <div class="dd-item"><span class="dd-dot off"></span>Onboarding</div>
      </div>
    </div>
    <span class="tb-sep">/</span>
    <div class="tb-sel" id="selEpisode" onclick="toggleDd('selEpisode')">
      <div class="tb-sel-btn"><span>EP01</span><span class="caret">&#x25BE;</span></div>
      <div class="tb-dd">
        <div class="dd-label">Episodes</div>
        <div class="dd-item active"><span class="dd-dot on"></span>EP01 &mdash; 产品介绍</div>
        <div class="dd-item"><span class="dd-dot off"></span>EP02 &mdash; 用户案例</div>
      </div>
    </div>
    <div class="tb-div"></div>
    <div class="tb-tabs">
      <div class="tb-tab">脚本</div>
      <div class="tb-tab">音频</div>
      <div class="tb-tab active">素材</div>
      <div class="tb-tab">原子</div>
      <div class="tb-tab">拼装</div>
      <div class="tb-tab">产出</div>
    </div>
    <div class="tb-right">
      <button class="tb-lang">EN</button>
      <button class="tb-icon-btn" title="Settings">&#x2699;</button>
      <div class="tb-avatar">Z</div>
    </div>
  </div>

  <!-- ══ BODY ══ -->
  <div class="body">
    <!-- ── Sidebar ── -->
    <div class="sidebar">
      <!-- Upload panel -->
      <div class="glass">
        <div class="upload-zone">
          <div class="upload-box">
            <div class="upload-icon">&#x2B06;</div>
            <div class="upload-text">拖入素材或点击上传</div>
          </div>
        </div>
      </div>

      <!-- Stats panel -->
      <div class="glass">
        <div class="sb-section">
          <div class="sb-title">素材总览</div>
          <div class="stat-hero">
            <div class="stat-hero-num" id="heroCount">12</div>
            <div class="stat-hero-label">TOTAL FILES</div>
          </div>
          <div class="stats-grid">
            <div class="stat-row">
              <span class="stat-label"><span class="stat-dot" style="background:var(--green)"></span>视频</span>
              <span class="stat-value">5</span>
            </div>
            <div class="stat-row">
              <span class="stat-label"><span class="stat-dot" style="background:var(--blue)"></span>音频</span>
              <span class="stat-value">4</span>
            </div>
            <div class="stat-row">
              <span class="stat-label"><span class="stat-dot" style="background:var(--yellow)"></span>图片</span>
              <span class="stat-value">3</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Filter panel -->
      <div class="glass">
        <div class="filter-section">
          <div class="filter-title">类型筛选</div>
          <div class="filter-pills">
            <button class="filter-pill active" onclick="filterType('all', this)">
              <span class="pill-left"><span>全部</span></span>
              <span class="pill-count">12</span>
            </button>
            <button class="filter-pill" onclick="filterType('video', this)">
              <span class="pill-left"><span class="pill-dot" style="background:var(--green)"></span><span>视频</span></span>
              <span class="pill-count">5</span>
            </button>
            <button class="filter-pill" onclick="filterType('audio', this)">
              <span class="pill-left"><span class="pill-dot" style="background:var(--blue)"></span><span>音频</span></span>
              <span class="pill-count">4</span>
            </button>
            <button class="filter-pill" onclick="filterType('image', this)">
              <span class="pill-left"><span class="pill-dot" style="background:var(--yellow)"></span><span>图片</span></span>
              <span class="pill-count">3</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Main ── -->
    <div class="main">
      <div class="glass" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div class="main-header">
          <span class="main-title">素材库</span>
          <span class="main-count" id="visibleCount">12 files</span>
        </div>
        <div class="card-grid-wrap">
          <div class="card-grid" id="grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ FOOTER ══ -->
  <div class="footer">
    <span class="footer-text">12 files &middot; 193.9 MB total</span>
    <span class="footer-text">NextFrame v0.4</span>
  </div>
</div>

<script>
var MEDIA = [
  // Videos (5)
  { name: "screen-recording.mp4", type: "video", res: "1920\u00d71080", duration: "00:15.2", size: "24.8 MB", used: true },
  { name: "interview-clip.mp4", type: "video", res: "1920\u00d71080", duration: "00:32.5", size: "48.2 MB", used: true },
  { name: "b-roll-city.mp4", type: "video", res: "3840\u00d72160", duration: "00:08.6", size: "32.1 MB", used: false },
  { name: "product-demo.mp4", type: "video", res: "1920\u00d71080", duration: "00:22.0", size: "35.6 MB", used: true },
  { name: "testimonial.mp4", type: "video", res: "1920\u00d71080", duration: "00:18.3", size: "28.4 MB", used: false },
  // Audio (4)
  { name: "voiceover-ep01.wav", type: "audio", sample: "48 kHz", duration: "00:42.6", size: "8.2 MB", used: true },
  { name: "bgm-upbeat.mp3", type: "audio", sample: "44.1 kHz", duration: "03:24.0", size: "5.1 MB", used: true },
  { name: "sfx-transition.wav", type: "audio", sample: "48 kHz", duration: "00:01.2", size: "0.3 MB", used: true },
  { name: "voiceover-ep02.wav", type: "audio", sample: "48 kHz", duration: "00:38.4", size: "7.4 MB", used: false },
  // Images (3)
  { name: "logo-hd.png", type: "image", res: "2048\u00d72048", size: "1.2 MB", used: true },
  { name: "thumbnail-ep01.jpg", type: "image", res: "1920\u00d71080", size: "0.4 MB", used: true },
  { name: "background-gradient.png", type: "image", res: "3840\u00d72160", size: "2.8 MB", used: false }
];

function generateWaveBars() {
  var bars = '';
  var count = 32;
  for (var i = 0; i < count; i++) {
    var h = 12 + Math.floor(Math.random() * 40);
    bars += '<div class="wave-bar" style="height:' + h + 'px"></div>';
  }
  return bars;
}

function renderGrid(filter) {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var visible = 0;
  var stagger = 60;

  MEDIA.forEach(function(m) {
    if (filter !== "all" && m.type !== filter) return;
    visible++;

    var card = document.createElement("div");
    card.className = "media-card";
    card.dataset.type = m.type;
    card.style.animationDelay = ((visible - 1) * stagger) + "ms";

    var thumbHtml = '';

    if (m.type === "video") {
      thumbHtml = '<div class="media-thumb video">' +
        '<div class="thumb-video-inner">' +
        '<div class="thumb-play">&#x25B6;</div>' +
        '<span class="thumb-duration">' + m.duration + '</span>' +
        '</div></div>';
    } else if (m.type === "audio") {
      thumbHtml = '<div class="media-thumb audio">' +
        '<div class="thumb-audio-inner">' +
        generateWaveBars() +
        '<span class="thumb-audio-duration">' + m.duration + '</span>' +
        '</div></div>';
    } else {
      thumbHtml = '<div class="media-thumb image">' +
        '<div class="thumb-image-inner">' +
        '<span class="thumb-image-icon">&#x1F5BC;</span>' +
        '</div></div>';
    }

    var typeLabel = m.type === "video" ? "\u89c6\u9891" : m.type === "audio" ? "\u97f3\u9891" : "\u56fe\u7247";

    var usedBadge = m.used ? '<span class="media-used">\u5df2\u4f7f\u7528</span>' : '';

    var specsLine = '';
    if (m.type === "video") {
      specsLine = m.res + ' \u00b7 ' + m.duration + ' \u00b7 ' + m.size;
    } else if (m.type === "audio") {
      specsLine = m.sample + ' \u00b7 ' + m.duration + ' \u00b7 ' + m.size;
    } else {
      specsLine = m.res + ' \u00b7 ' + m.size;
    }

    var html = thumbHtml +
      '<div class="media-body">' +
      '<div class="media-meta-row">' +
      '<span class="media-type ' + m.type + '">' + typeLabel + '</span>' +
      usedBadge +
      '</div>' +
      '<div class="media-name">' + m.name + '</div>' +
      '<div class="media-specs">' + specsLine + '</div>' +
      '</div>';

    card.innerHTML = html;
    grid.appendChild(card);
  });

  document.getElementById("visibleCount").textContent = visible + " files";
  document.getElementById("heroCount").textContent = visible;
}

function filterType(type, el) {
  document.querySelectorAll(".filter-pill").forEach(function(p) {
    p.classList.remove("active");
  });
  el.classList.add("active");
  renderGrid(type);
}

/* Dropdown toggle */
function toggleDd(id) {
  var el = document.getElementById(id);
  var wasOpen = el.classList.contains("open");
  document.querySelectorAll(".tb-sel.open").forEach(function(s) { s.classList.remove("open"); });
  if (!wasOpen) el.classList.add("open");
}
document.addEventListener("click", function(e) {
  if (!e.target.closest(".tb-sel")) {
    document.querySelectorAll(".tb-sel.open").forEach(function(s) { s.classList.remove("open"); });
  }
});

renderGrid("all");
</script>
</body>
</html>
