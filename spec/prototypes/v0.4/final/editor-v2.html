<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame · Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   NEXTFRAME EDITOR v2 — Three-panel Glass Layout
   Spec: DESIGN.md · Min font 12px · Min opacity 0.50
   Fonts: Inter (UI) · JetBrains Mono (data)
   ══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Background */
  --bg: #050507;

  /* Accent — single purple, 4 densities */
  --accent: #a78bfa;
  --accent-20: rgba(167,139,250,0.20);
  --accent-12: rgba(167,139,250,0.12);
  --accent-06: rgba(167,139,250,0.06);

  /* Text — 4 levels, hard floor 0.50 */
  --t100: rgba(255,255,255,0.95);
  --t80: rgba(255,255,255,0.80);
  --t65: rgba(255,255,255,0.65);
  --t50: rgba(255,255,255,0.50);

  /* Borders */
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.14);
  --border-light: rgba(255,255,255,0.05);

  /* Semantic */
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --green-border: rgba(52,211,153,0.20);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.12);
  --yellow-border: rgba(251,191,36,0.20);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.12);
  --purple-border: rgba(167,139,250,0.20);

  /* Typography */
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

  /* Spacing */
  --sp-4: 4px;
  --sp-6: 6px;
  --sp-8: 8px;
  --sp-12: 12px;
  --sp-16: 16px;
  --sp-20: 20px;
  --sp-24: 24px;
  --sp-32: 32px;

  /* Radius */
  --r: 14px;
  --r-sm: 10px;
  --r-xs: 6px;

  /* Motion */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --stagger: 60ms;

  /* Glass */
  --glass-bg: rgba(0,0,0,0.50);
  --glass-blur: blur(16px) saturate(1.4);
  --glass-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.09),
    inset 0 -1px 0 0 rgba(0,0,0,0.15),
    0 2px 8px rgba(0,0,0,0.20);
  --glass-highlight:
    linear-gradient(178deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 3%, transparent 12%),
    linear-gradient(92deg, rgba(255,255,255,0.025) 0%, transparent 3%, transparent 97%, rgba(255,255,255,0.015) 100%);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--t80);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Aurora */
.aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 12% at 50% 2%, rgba(139,92,246,0.10) 0%, transparent 100%),
    radial-gradient(ellipse 60% 12% at 50% 98%, rgba(124,58,237,0.06) 0%, transparent 100%);
}

/* Glass panel */
.glass {
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: var(--glass-bg);
  border: 1px solid var(--border);
  box-shadow: var(--glass-shadow);
}
.glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 1;
  background: var(--glass-highlight);
}

/* Glass inset */
.glass-inset {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--r-xs);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}

/* Animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* App shell */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ══════════════════════════════════════
   TOPBAR — 48px
   ══════════════════════════════════════ */
.topbar {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 var(--sp-16);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  background: rgba(0,0,0,0.55);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 -1px 0 rgba(0,0,0,0.20), 0 1px 4px rgba(0,0,0,0.15);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.tb-brand {
  font-size: 15px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.88);
  margin-right: var(--sp-6);
  flex-shrink: 0;
  font-weight: 600;
}
.tb-sep {
  color: var(--t50);
  margin: 0 var(--sp-4);
  font-size: 14px;
  flex-shrink: 0;
}

/* Dropdown selector */
.tb-sel {
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.tb-sel-btn {
  display: flex;
  align-items: center;
  gap: var(--sp-6);
  padding: 5px 10px;
  border-radius: var(--r-xs);
  font-size: 13px;
  font-weight: 500;
  color: var(--t80);
  border: 1px solid transparent;
  transition: background 0.2s var(--ease);
}
.tb-sel-btn:hover { background: rgba(255,255,255,0.06); }
.tb-sel-btn .caret {
  font-size: 12px;
  color: var(--t50);
  transition: transform 0.2s var(--ease);
}
.tb-sel.open .caret { transform: rotate(180deg); }

/* Dropdown */
.tb-dd {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 220px;
  padding: var(--sp-6) 0;
  z-index: 100;
  background: #141416;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--r-sm);
  box-shadow: 0 8px 30px rgba(0,0,0,0.60), inset 0 1px 0 rgba(255,255,255,0.06);
}
.tb-sel.open .tb-dd {
  display: block;
  animation: fadeUp 0.25s var(--ease) both;
}
.dd-label {
  padding: var(--sp-8) var(--sp-12) var(--sp-4);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--t50);
}
.dd-item {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
  padding: var(--sp-8) var(--sp-12);
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.dd-item:hover { background: rgba(255,255,255,0.06); color: var(--t100); }
.dd-item.active { color: var(--t100); }
.dd-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dd-dot.on { background: var(--accent); }
.dd-dot.off { background: rgba(255,255,255,0.18); }

.tb-div {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 var(--sp-12);
  flex-shrink: 0;
}

/* Tabs */
.tb-tabs { display: flex; align-items: center; height: 100%; }
.tb-tab {
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.2s var(--ease);
  white-space: nowrap;
}
.tb-tab:hover { color: var(--t80); }
.tb-tab.active { color: var(--t100); border-bottom-color: var(--accent); }

.tb-right {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
  margin-left: auto;
  flex-shrink: 0;
}
.tb-lang {
  padding: 4px 10px;
  border-radius: var(--r-xs);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--t50);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.tb-lang:hover { border-color: var(--border-hover); color: var(--t80); }
.tb-icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--r-xs);
  border: none;
  cursor: pointer;
  background: transparent;
  color: var(--t50);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--ease);
}
.tb-icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--t80); }
.tb-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--t65);
  cursor: pointer;
  transition: border-color 0.2s var(--ease);
}
.tb-avatar:hover { border-color: rgba(255,255,255,0.35); }

/* ══════════════════════════════════════
   THREE-PANEL LAYOUT
   ══════════════════════════════════════ */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
  padding: var(--sp-8);
  gap: var(--sp-8);
}

/* ── Left Sidebar: Clip List ── */
.panel-left {
  width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.4s var(--ease) both;
}
.clip-header {
  padding: var(--sp-16);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-light);
  position: relative;
  z-index: 2;
}
.clip-header-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--t50);
}
.clip-count {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-12);
  padding: 2px 8px;
  border-radius: 20px;
}
.clip-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-8);
  position: relative;
  z-index: 2;
}
.clip-list::-webkit-scrollbar { width: 3px; }
.clip-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.clip-item {
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
  padding: var(--sp-12) var(--sp-12);
  border-radius: var(--r-sm);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.2s var(--ease), border-color 0.2s var(--ease);
  margin-bottom: var(--sp-4);
  animation: fadeUp 0.4s var(--ease) both;
}
.clip-item:nth-child(1) { animation-delay: calc(var(--stagger) * 0); }
.clip-item:nth-child(2) { animation-delay: calc(var(--stagger) * 1); }
.clip-item:nth-child(3) { animation-delay: calc(var(--stagger) * 2); }
.clip-item:nth-child(4) { animation-delay: calc(var(--stagger) * 3); }
.clip-item:nth-child(5) { animation-delay: calc(var(--stagger) * 4); }
.clip-item:hover { background: rgba(255,255,255,0.025); }
.clip-item.active {
  background: var(--accent-06);
  border-left-color: var(--accent);
}
.clip-top {
  display: flex;
  align-items: center;
  gap: var(--sp-8);
}
.clip-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--t65);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.2s var(--ease);
}
.clip-item.active .clip-name { color: var(--t100); font-weight: 600; }
.clip-tc {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
  white-space: nowrap;
}
.clip-tags {
  display: flex;
  gap: var(--sp-4);
  flex-wrap: wrap;
}
.clip-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.02em;
}
.clip-tag.seg { background: var(--accent-12); color: var(--accent); }
.clip-tag.dur {
  font-family: var(--mono);
  background: rgba(255,255,255,0.04);
  color: var(--t65);
}

/* ══════════════════════════════════════
   CENTER: Preview + Transport + Timeline
   ══════════════════════════════════════ */
.panel-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--sp-8);
  min-width: 0;
}

/* Preview Zone */
.preview-panel {
  animation: fadeUp 0.4s var(--ease) calc(var(--stagger) * 1) both;
}
.preview-inner {
  position: relative;
  z-index: 2;
}
.preview-canvas {
  width: 100%;
  aspect-ratio: 16/9;
  background: #0a0a0e;
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.preview-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(167,139,250,0.06) 0%, transparent 50%);
  pointer-events: none;
}
.play-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: rgba(255,255,255,0.70);
  cursor: pointer;
  transition: background 0.2s var(--ease), transform 0.2s var(--ease);
  position: relative;
  z-index: 2;
}
.play-btn:hover {
  background: var(--accent-20);
  transform: scale(1.05);
}
.preview-tc {
  position: absolute;
  bottom: 12px;
  right: 16px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t50);
  z-index: 2;
}

/* Transport bar */
.transport {
  display: flex;
  align-items: center;
  gap: var(--sp-12);
  padding: var(--sp-8) var(--sp-16);
  border-top: 1px solid var(--border-light);
  position: relative;
  z-index: 2;
}
.transport-btns {
  display: flex;
  gap: var(--sp-4);
  align-items: center;
}
.t-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--r-xs);
  border: none;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--ease);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  color: var(--t65);
}
.t-btn:hover { background: rgba(255,255,255,0.06); color: var(--t100); }
.t-btn.play-main {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: rgba(0,0,0,0.90);
  border: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  font-size: 14px;
}
.t-btn.play-main:hover { filter: brightness(1.12); }
.transport-tc {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t80);
  min-width: 80px;
}
.transport-progress {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  position: relative;
  cursor: pointer;
}
.transport-fill {
  height: 100%;
  width: 32%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.08s linear;
}

/* ── Timeline Panel ── */
.timeline-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  animation: fadeUp 0.4s var(--ease) calc(var(--stagger) * 2) both;
}
.tl-header {
  display: flex;
  align-items: center;
  gap: var(--sp-12);
  padding: var(--sp-12) var(--sp-16);
  border-bottom: 1px solid var(--border-light);
  position: relative;
  z-index: 2;
}
.tl-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--t50);
}
.tl-meta {
  display: flex;
  gap: var(--sp-8);
}
.tl-meta-tag {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.04);
  color: var(--t65);
}

/* Ruler */
.tl-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  z-index: 2;
  padding: 0 var(--sp-16) var(--sp-12);
}
.tl-body::-webkit-scrollbar { width: 3px; }
.tl-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.tl-ruler {
  position: relative;
  height: 28px;
  margin-top: var(--sp-8);
  margin-left: 64px;
}
.tl-ruler-bg {
  position: absolute;
  inset: 0;
  border-bottom: 1px solid var(--border-light);
}
.tl-tick {
  position: absolute;
  bottom: 0;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
  transform: translateX(-50%);
}
.tl-tick::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  width: 1px;
  height: 6px;
  background: rgba(255,255,255,0.15);
}

/* Playhead */
.tl-playhead {
  position: absolute;
  top: 0;
  width: 2px;
  background: var(--accent);
  z-index: 5;
  pointer-events: none;
}
.tl-playhead::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -5px;
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 7px solid var(--accent);
}

/* Tracks */
.tl-track {
  display: flex;
  align-items: center;
  height: 36px;
  position: relative;
}
.tl-track-label {
  width: 64px;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--t50);
  padding-right: var(--sp-8);
  text-align: right;
}
.tl-track-lane {
  flex: 1;
  height: 28px;
  position: relative;
  background: rgba(255,255,255,0.02);
  border-radius: 4px;
  overflow: hidden;
}
.tl-clip {
  position: absolute;
  top: 3px;
  bottom: 3px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: filter 0.2s var(--ease);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding: 0 6px;
}
.tl-clip:hover { filter: brightness(1.2); }

/* Track colors */
.tl-clip.audio {
  background: rgba(52,211,153,0.18);
  border: 1px solid var(--green-border);
  color: var(--green);
}
.tl-clip.visual {
  background: rgba(167,139,250,0.18);
  border: 1px solid var(--purple-border);
  color: var(--accent);
}
.tl-clip.video {
  background: rgba(52,211,153,0.18);
  border: 1px solid var(--green-border);
  color: var(--green);
}
.tl-clip.subtitle {
  background: rgba(251,191,36,0.18);
  border: 1px solid var(--yellow-border);
  color: var(--yellow);
}

/* ══════════════════════════════════════
   RIGHT: Inspector
   ══════════════════════════════════════ */
.panel-right {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.4s var(--ease) calc(var(--stagger) * 3) both;
}
.insp-inner {
  flex: 1;
  overflow-y: auto;
  position: relative;
  z-index: 2;
}
.insp-inner::-webkit-scrollbar { width: 3px; }
.insp-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.insp-header {
  padding: var(--sp-16);
  border-bottom: 1px solid var(--border-light);
}
.insp-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--t100);
  margin-bottom: var(--sp-4);
}
.insp-id {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
}

.insp-section {
  padding: var(--sp-16);
  border-bottom: 1px solid var(--border-light);
}
.insp-section-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--t50);
  margin-bottom: var(--sp-12);
}
.insp-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-4) 0;
}
.insp-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--t65);
}
.insp-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--t80);
}
.insp-value.accent { color: var(--accent); }
.insp-input {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--r-xs);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--t80);
  width: 100px;
  text-align: right;
  transition: border-color 0.2s var(--ease);
}
.insp-input:focus {
  outline: none;
  border-color: rgba(167,139,250,0.35);
}
.insp-path {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
  word-break: break-all;
  line-height: 1.6;
}

/* ══════════════════════════════════════
   FOOTER
   ══════════════════════════════════════ */
.footer {
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp-16);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--t50);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

/* ══════════════════════════════════════
   SCROLLBAR GLOBAL
   ══════════════════════════════════════ */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
</style>
</head>
<body>

<div class="aurora"></div>

<div class="app">
  <!-- ════ TOPBAR ════ -->
  <div class="topbar">
    <span class="tb-brand">NextFrame</span>
    <span class="tb-sep">/</span>
    <div class="tb-sel" id="selProject" onclick="toggleDd('selProject')">
      <div class="tb-sel-btn"><span>AI短视频课</span><span class="caret">&#x25BE;</span></div>
      <div class="tb-dd">
        <div class="dd-label">Projects</div>
        <div class="dd-item active"><span class="dd-dot on"></span>AI短视频课</div>
        <div class="dd-item"><span class="dd-dot off"></span>产品介绍</div>
      </div>
    </div>
    <span class="tb-sep">/</span>
    <div class="tb-sel" id="selEpisode" onclick="toggleDd('selEpisode')">
      <div class="tb-sel-btn"><span>第一课</span><span class="caret">&#x25BE;</span></div>
      <div class="tb-dd">
        <div class="dd-label">Episodes</div>
        <div class="dd-item active"><span class="dd-dot on"></span>第一课 &mdash; AI剪辑入门</div>
        <div class="dd-item"><span class="dd-dot off"></span>第二课 &mdash; 脚本写作</div>
        <div class="dd-item"><span class="dd-dot off"></span>第三课 &mdash; 画面合成</div>
      </div>
    </div>
    <div class="tb-div"></div>
    <div class="tb-tabs">
      <div class="tb-tab">脚本</div>
      <div class="tb-tab">音频</div>
      <div class="tb-tab">素材</div>
      <div class="tb-tab active">编辑</div>
      <div class="tb-tab">拼装</div>
      <div class="tb-tab">产出</div>
    </div>
    <div class="tb-right">
      <button class="tb-lang">EN</button>
      <button class="tb-icon-btn" title="Settings">&#x2699;</button>
      <div class="tb-avatar">Z</div>
    </div>
  </div>

  <!-- ════ THREE-PANEL BODY ════ -->
  <div class="body">
    <!-- ── Left: Clip Sidebar ── -->
    <div class="panel-left glass">
      <div class="clip-header">
        <span class="clip-header-label">CLIPS</span>
        <span class="clip-count">5</span>
      </div>
      <div class="clip-list" id="clipList"></div>
    </div>

    <!-- ── Center: Preview + Timeline ── -->
    <div class="panel-center">
      <!-- Preview -->
      <div class="preview-panel glass">
        <div class="preview-inner">
          <div class="preview-canvas">
            <div class="preview-gradient"></div>
            <div class="play-btn">&#9654;</div>
            <span class="preview-tc" id="previewTc">00:00.0 / 00:45.2</span>
          </div>
          <div class="transport">
            <div class="transport-btns">
              <button class="t-btn">&#x23EE;</button>
              <button class="t-btn">&#x23EA;</button>
              <button class="t-btn play-main">&#9654;</button>
              <button class="t-btn">&#x23E9;</button>
              <button class="t-btn">&#x23ED;</button>
            </div>
            <span class="transport-tc">00:14.4</span>
            <div class="transport-progress">
              <div class="transport-fill"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="timeline-panel glass">
        <div class="tl-header">
          <span class="tl-title">TIMELINE</span>
          <div class="tl-meta">
            <span class="tl-meta-tag">45.2s</span>
            <span class="tl-meta-tag">5 layers</span>
            <span class="tl-meta-tag">30fps</span>
          </div>
        </div>
        <div class="tl-body" id="tlBody"></div>
      </div>
    </div>

    <!-- ── Right: Inspector ── -->
    <div class="panel-right glass">
      <div class="insp-inner" id="inspInner"></div>
    </div>
  </div>

  <!-- ════ FOOTER ════ -->
  <div class="footer">
    <span>5 clips &middot; 45.2s &middot; 1356 frames</span>
    <span>NextFrame v0.4</span>
  </div>
</div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════

var CLIPS = [
  { id: 'clip-1', name: '痛点', tcIn: '00:00.0', tcOut: '00:08.5', seg: '段1', dur: '8.5s',
    scene: 'barChart', sceneLabel: 'barChart', layer: 2 },
  { id: 'clip-2', name: '方案', tcIn: '00:08.5', tcOut: '00:18.0', seg: '段2', dur: '9.5s',
    scene: 'splitCompare', sceneLabel: 'splitCompare', layer: 2 },
  { id: 'clip-3', name: '案例', tcIn: '00:18.0', tcOut: '00:28.2', seg: '段3', dur: '10.2s',
    scene: 'caseStudy', sceneLabel: 'caseStudy', layer: 2 },
  { id: 'clip-4', name: '数据', tcIn: '00:28.2', tcOut: '00:38.0', seg: '段4', dur: '9.8s',
    scene: 'statsGrid', sceneLabel: 'statsGrid', layer: 2 },
  { id: 'clip-5', name: 'CTA', tcIn: '00:38.0', tcOut: '00:45.2', seg: '段5', dur: '7.2s',
    scene: 'ctaCard', sceneLabel: 'ctaCard', layer: 2 }
];

var TRACKS = [
  { name: 'Audio', clips: [
    { name: '痛点', left: 0, width: 18.8, color: 'audio' },
    { name: '方案', left: 18.8, width: 21.0, color: 'audio' },
    { name: '案例', left: 39.8, width: 22.6, color: 'audio' },
    { name: '数据', left: 62.4, width: 21.7, color: 'audio' },
    { name: 'CTA', left: 84.1, width: 15.9, color: 'audio' }
  ]},
  { name: '画面', clips: [
    { name: '痛点', left: 0, width: 18.8, color: 'visual' },
    { name: '方案', left: 18.8, width: 21.0, color: 'visual' },
    { name: '案例', left: 39.8, width: 22.6, color: 'visual' },
    { name: '数据', left: 62.4, width: 21.7, color: 'visual' },
    { name: 'CTA', left: 84.1, width: 15.9, color: 'visual' }
  ]},
  { name: 'Video', clips: [
    { name: 'bg-loop', left: 0, width: 100, color: 'video' }
  ]},
  { name: '字幕', clips: [
    { name: '痛点', left: 0, width: 18.8, color: 'subtitle' },
    { name: '方案', left: 18.8, width: 21.0, color: 'subtitle' },
    { name: '案例', left: 39.8, width: 22.6, color: 'subtitle' },
    { name: '数据', left: 62.4, width: 21.7, color: 'subtitle' },
    { name: 'CTA', left: 84.1, width: 15.9, color: 'subtitle' }
  ]}
];

var INSPECTOR_DATA = {
  'clip-1': {
    name: 'barChart', id: 'clip-pain-01',
    clip: { scene: 'barChart', start: '00:00.0', duration: '8.5s', layer: 2 },
    params: { title: '"剪辑耗时对比"', bars: 3, animStyle: '"stagger"', colorScheme: '"warm"' },
    position: { x: 0, y: 0, width: 1080, height: 1920 },
    file: '/projects/ai-course/ep01/scenes/barChart.json'
  },
  'clip-2': {
    name: 'splitCompare', id: 'clip-solution-02',
    clip: { scene: 'splitCompare', start: '00:08.5', duration: '9.5s', layer: 2 },
    params: { leftLabel: '"传统流程"', rightLabel: '"AI流程"', splitRatio: 0.5, animDuration: '1.2s' },
    position: { x: 0, y: 0, width: 1080, height: 1920 },
    file: '/projects/ai-course/ep01/scenes/splitCompare.json'
  },
  'clip-3': {
    name: 'caseStudy', id: 'clip-case-03',
    clip: { scene: 'caseStudy', start: '00:18.0', duration: '10.2s', layer: 2 },
    params: { avatar: '"user-a.png"', quote: '"效率提升300%"', metric: '"3x"', layout: '"centered"' },
    position: { x: 0, y: 0, width: 1080, height: 1920 },
    file: '/projects/ai-course/ep01/scenes/caseStudy.json'
  },
  'clip-4': {
    name: 'statsGrid', id: 'clip-data-04',
    clip: { scene: 'statsGrid', start: '00:28.2', duration: '9.8s', layer: 2 },
    params: { columns: 2, rows: 2, animStyle: '"countUp"', suffix: '"%"' },
    position: { x: 0, y: 0, width: 1080, height: 1920 },
    file: '/projects/ai-course/ep01/scenes/statsGrid.json'
  },
  'clip-5': {
    name: 'ctaCard', id: 'clip-cta-05',
    clip: { scene: 'ctaCard', start: '00:38.0', duration: '7.2s', layer: 2 },
    params: { headline: '"立即体验"', subtext: '"免费试用7天"', btnLabel: '"开始使用"', pulse: true },
    position: { x: 0, y: 0, width: 1080, height: 1920 },
    file: '/projects/ai-course/ep01/scenes/ctaCard.json'
  }
};

var activeClip = 'clip-1';

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════

function renderClipList() {
  var html = '';
  CLIPS.forEach(function(c) {
    var isActive = c.id === activeClip;
    html += '<div class="clip-item' + (isActive ? ' active' : '') + '" onclick="selectClip(\'' + c.id + '\')">' +
      '<div class="clip-top">' +
        '<span class="clip-name">' + c.name + '</span>' +
        '<span class="clip-tc">' + c.tcIn + ' - ' + c.tcOut + '</span>' +
      '</div>' +
      '<div class="clip-tags">' +
        '<span class="clip-tag seg">' + c.seg + '</span>' +
        '<span class="clip-tag dur">' + c.dur + '</span>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('clipList').innerHTML = html;
}

function renderTimeline() {
  var totalDur = 45.2;
  var html = '';

  // Ruler
  html += '<div class="tl-ruler">';
  html += '<div class="tl-ruler-bg"></div>';
  for (var t = 0; t <= 45; t += 5) {
    var pct = (t / totalDur * 100).toFixed(1);
    html += '<span class="tl-tick" style="left:' + pct + '%">' + t + 's</span>';
  }
  // Playhead at 14.4s (~31.8%)
  html += '<div class="tl-playhead" style="left:31.8%;top:0;bottom:-' + (TRACKS.length * 36 + 8) + 'px"></div>';
  html += '</div>';

  // Tracks
  TRACKS.forEach(function(track) {
    html += '<div class="tl-track">';
    html += '<span class="tl-track-label">' + track.name + '</span>';
    html += '<div class="tl-track-lane">';
    track.clips.forEach(function(clip) {
      html += '<div class="tl-clip ' + clip.color + '" style="left:' + clip.left + '%;width:' + clip.width + '%">' + clip.name + '</div>';
    });
    html += '</div></div>';
  });

  document.getElementById('tlBody').innerHTML = html;
}

function renderInspector() {
  var data = INSPECTOR_DATA[activeClip];
  if (!data) return;

  var html = '';

  // Header
  html += '<div class="insp-header">' +
    '<div class="insp-name">' + data.name + '</div>' +
    '<div class="insp-id">' + data.id + '</div>' +
  '</div>';

  // CLIP section
  html += '<div class="insp-section">' +
    '<div class="insp-section-title">CLIP</div>' +
    '<div class="insp-row"><span class="insp-label">Scene</span><span class="insp-value accent">' + data.clip.scene + '</span></div>' +
    '<div class="insp-row"><span class="insp-label">Start</span><span class="insp-value">' + data.clip.start + '</span></div>' +
    '<div class="insp-row"><span class="insp-label">Duration</span><span class="insp-value">' + data.clip.duration + '</span></div>' +
    '<div class="insp-row"><span class="insp-label">Layer</span><span class="insp-value">' + data.clip.layer + '</span></div>' +
  '</div>';

  // PARAMS section
  html += '<div class="insp-section"><div class="insp-section-title">PARAMS</div>';
  var params = data.params;
  for (var key in params) {
    html += '<div class="insp-row"><span class="insp-label">' + key + '</span><span class="insp-value">' + params[key] + '</span></div>';
  }
  html += '</div>';

  // POSITION section
  html += '<div class="insp-section"><div class="insp-section-title">POSITION</div>' +
    '<div class="insp-row"><span class="insp-label">x</span><input class="insp-input" value="' + data.position.x + '"></div>' +
    '<div class="insp-row"><span class="insp-label">y</span><input class="insp-input" value="' + data.position.y + '"></div>' +
    '<div class="insp-row"><span class="insp-label">width</span><input class="insp-input" value="' + data.position.width + '"></div>' +
    '<div class="insp-row"><span class="insp-label">height</span><input class="insp-input" value="' + data.position.height + '"></div>' +
  '</div>';

  // FILE section
  html += '<div class="insp-section">' +
    '<div class="insp-section-title">FILE</div>' +
    '<div class="insp-path">' + data.file + '</div>' +
  '</div>';

  document.getElementById('inspInner').innerHTML = html;
}

function selectClip(id) {
  activeClip = id;
  renderClipList();
  renderInspector();
}

// ══════════════════════════════════════
// DROPDOWN TOGGLE
// ══════════════════════════════════════

function toggleDd(id) {
  var el = document.getElementById(id);
  var wasOpen = el.classList.contains('open');
  // Close all
  document.querySelectorAll('.tb-sel').forEach(function(s) { s.classList.remove('open'); });
  if (!wasOpen) el.classList.add('open');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.tb-sel')) {
    document.querySelectorAll('.tb-sel').forEach(function(s) { s.classList.remove('open'); });
  }
});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════

renderClipList();
renderTimeline();
renderInspector();
</script>

</body>
</html>
