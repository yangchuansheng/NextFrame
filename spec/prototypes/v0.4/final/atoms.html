<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame · 原子</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --accent: #7c6aef;
  --accent-15: rgba(124,106,239,0.15);
  --accent-06: rgba(124,106,239,0.06);
  --accent-03: rgba(124,106,239,0.03);
  --bg: #0a0a0c;
  --surface: #111114;
  --card: #161619;
  --ink: #e4e4e8;
  --ink-55: rgba(228,228,232,0.75);
  --ink-25: rgba(228,228,232,0.50);
  --ink-08: rgba(228,228,232,0.10);
  --ink-03: rgba(228,228,232,0.05);
  --border: 1px solid rgba(255,255,255,0.06);
  --mono: 'SF Mono', 'Cascadia Code', Menlo, monospace;
  --sans: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
  --serif: Georgia, 'Times New Roman', serif;
  --green: #3eb370;
  --yellow: #e0a040;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.grain { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.03; z-index: 9999; mix-blend-mode: overlay; }

/* ─── Topbar ─── */
.topbar { height: 48px; display: flex; align-items: center; padding: 0 16px; border-bottom: var(--border); background: var(--bg); flex-shrink: 0; }
.topbar-brand { font-family: var(--serif); font-size: 15px; letter-spacing: 0.04em; margin-right: 6px; flex-shrink: 0; }
.topbar-sep { color: var(--ink-25); margin: 0 4px; font-size: 14px; flex-shrink: 0; }
.topbar-select { position: relative; cursor: pointer; flex-shrink: 0; }
.topbar-select-btn { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--ink); transition: background 0.15s var(--ease); border: 1px solid transparent; }
.topbar-select-btn:hover { background: var(--ink-08); }
.topbar-select-btn .caret { font-size: 10px; color: var(--ink-55); transition: transform 0.2s var(--ease); }
.topbar-select.open .caret { transform: rotate(180deg); }
.topbar-dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; min-width: 200px; background: var(--surface); border: var(--border); border-radius: 8px; overflow: hidden; z-index: 100; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
.topbar-select.open .topbar-dropdown { display: block; }
.dd-label { padding: 8px 12px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-25); }
.dd-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 13px; color: var(--ink-55); cursor: pointer; transition: background 0.15s var(--ease), color 0.15s var(--ease); }
.dd-item:hover { background: var(--ink-08); color: var(--ink); }
.dd-item.active { color: var(--ink); }
.dd-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dd-dot.on { background: var(--accent); }
.dd-dot.off { background: var(--ink-25); }
.dd-sep { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }
.topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 12px; flex-shrink: 0; }
.topbar-tabs { display: flex; align-items: center; height: 100%; gap: 0; }
.topbar-tab { height: 100%; display: flex; align-items: center; padding: 0 14px; font-size: 13px; color: var(--ink-55); border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.15s var(--ease), border-color 0.15s var(--ease); white-space: nowrap; }
.topbar-tab:hover { color: var(--ink); }
.topbar-tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
.topbar-lang { padding: 4px 10px; border-radius: 5px; border: var(--border); background: transparent; color: var(--ink-55); font-size: 12px; cursor: pointer; transition: all 0.15s var(--ease); }
.topbar-lang:hover { border-color: rgba(255,255,255,0.12); color: var(--ink); }
.topbar-icon-btn { width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer; background: transparent; color: var(--ink-55); font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.15s var(--ease), color 0.15s var(--ease); }
.topbar-icon-btn:hover { background: var(--ink-08); color: var(--ink); }
.topbar-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--ink-25); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--ink-55); cursor: pointer; transition: border-color 0.15s var(--ease); }
.topbar-avatar:hover { border-color: var(--ink); }

/* ─── Principles bar + filter ─── */
.principles { padding: 10px 20px; border-bottom: var(--border); display: flex; gap: 20px; align-items: center; }
.p-item { display: flex; align-items: center; gap: 6px; }
.p-key { font-size: 11px; color: var(--ink-25); }
.p-val { font-size: 12px; color: var(--ink-55); font-weight: 500; }

/* ─── Type filter ─── */
.seg-filter { padding: 8px 20px; border-bottom: var(--border); display: flex; gap: 6px; align-items: center; }
.seg-filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-25); margin-right: 8px; }
.seg-pill { font-size: 12px; padding: 4px 14px; border-radius: 5px; border: 1px solid transparent; background: transparent; color: var(--ink-55); cursor: pointer; transition: all 0.15s var(--ease); }
.seg-pill:hover { background: var(--ink-08); color: var(--ink); }
.seg-pill.active { background: var(--accent-15); color: var(--accent); border-color: rgba(124,106,239,0.2); }

/* ─── Grid ─── */
.atoms-grid {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  overflow-y: auto;
  height: calc(100vh - 48px - 40px - 36px - 32px);
}
.atoms-grid::-webkit-scrollbar { width: 3px; }
.atoms-grid::-webkit-scrollbar-thumb { background: var(--ink-08); border-radius: 2px; }

.atom-card {
  background: var(--card);
  border: var(--border);
  border-radius: 6px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.2s var(--ease);
}
.atom-card:hover { border-color: rgba(255,255,255,0.12); }

.atom-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.atom-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.atom-type-tag {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 3px;
  font-weight: 500;
  flex-shrink: 0;
}
.atom-type-tag.component { background: rgba(124,106,239,0.1); color: var(--accent); border: 1px solid rgba(124,106,239,0.15); }
.atom-type-tag.video { background: rgba(62,179,112,0.1); color: var(--green); border: 1px solid rgba(62,179,112,0.15); }
.atom-type-tag.image { background: rgba(224,160,64,0.1); color: var(--yellow); border: 1px solid rgba(224,160,64,0.15); }

.atom-info { font-size: 13px; font-family: var(--mono); color: var(--ink-55); }

.atom-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.atom-seg {
  font-size: 11px;
  font-family: var(--mono);
  padding: 2px 10px;
  border-radius: 3px;
  background: var(--accent-15);
  color: var(--accent);
}

.atom-path {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--ink-25);
  word-break: break-all;
  line-height: 1.4;
}

/* ─── Footer ─── */
.footer { height: 32px; display: flex; align-items: center; padding: 0 20px; border-top: var(--border); font-family: var(--mono); font-size: 11px; color: var(--ink-55); flex-shrink: 0; justify-content: space-between; }
</style>
</head>
<body>

<svg class="grain"><filter id="g"><feTurbulence baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg>

<div class="topbar">
  <span class="topbar-brand">NextFrame</span>
  <span class="topbar-sep">/</span>
  <div class="topbar-select" id="selProject" onclick="toggleDd('selProject')">
    <div class="topbar-select-btn"><span>Show</span><span class="caret">&#x25BE;</span></div>
    <div class="topbar-dropdown">
      <div class="dd-label">Projects</div>
      <div class="dd-item active"><span class="dd-dot on"></span>Show</div>
      <div class="dd-item"><span class="dd-dot off"></span>Demo Reel</div>
      <div class="dd-item"><span class="dd-dot off"></span>Onboarding</div>
    </div>
  </div>
  <span class="topbar-sep">/</span>
  <div class="topbar-select" id="selEpisode" onclick="toggleDd('selEpisode')">
    <div class="topbar-select-btn"><span>EP01</span><span class="caret">&#x25BE;</span></div>
    <div class="topbar-dropdown">
      <div class="dd-label">Episodes</div>
      <div class="dd-item active"><span class="dd-dot on"></span>EP01 &mdash; 产品介绍</div>
      <div class="dd-item"><span class="dd-dot off"></span>EP02 &mdash; 用户案例</div>
    </div>
  </div>
  <div class="topbar-divider"></div>
  <div class="topbar-tabs">
    <div class="topbar-tab">脚本</div>
    <div class="topbar-tab">音频</div>
    <div class="topbar-tab">素材</div>
    <div class="topbar-tab active">原子</div>
    <div class="topbar-tab">拼装</div>
    <div class="topbar-tab">产出</div>
  </div>
  <div class="topbar-right">
    <button class="topbar-lang">EN</button>
    <button class="topbar-icon-btn" title="Settings">&#x2699;</button>
    <div class="topbar-avatar">Z</div>
  </div>
</div>

<div class="principles">
  <div class="p-item"><span class="p-key">总计</span><span class="p-val" id="atomCount">8 个原子</span></div>
  <div class="p-item"><span class="p-key">组件</span><span class="p-val">5</span></div>
  <div class="p-item"><span class="p-key">视频</span><span class="p-val">2</span></div>
  <div class="p-item"><span class="p-key">图片</span><span class="p-val">1</span></div>
</div>

<div class="seg-filter">
  <span class="seg-filter-label">类型</span>
  <span class="seg-pill active" onclick="filterType('all')">全部</span>
  <span class="seg-pill" onclick="filterType('component')">组件</span>
  <span class="seg-pill" onclick="filterType('video')">视频</span>
  <span class="seg-pill" onclick="filterType('image')">图片</span>
</div>

<div class="atoms-grid" id="grid"></div>

<div class="footer">
  <span>8 个原子 · 5 组件 · 2 视频 · 1 图片</span>
  <span>NextFrame v0.4</span>
</div>

<script>
var ATOMS = [
  { name: "numberCounter", type: "component", info: "scene · numberCounter.js", seg: "段 1" },
  { name: "logoReveal", type: "component", info: "scene · logoReveal.js", seg: "段 2" },
  { name: "flowChart", type: "component", info: "scene · flowChart.js", seg: "段 3" },
  { name: "barChart", type: "component", info: "scene · barChart.js", seg: "段 4" },
  { name: "slideFrame", type: "component", info: "scene · slideFrame.js", seg: "段 5" },
  { name: "screen-recording.mp4", type: "video", info: "15.2s · 1080p · H.264", seg: "段 3", path: "/Users/project/assets/video/screen-recording.mp4" },
  { name: "interview-clip.mp4", type: "video", info: "8.4s · 1080p · H.264", seg: null, path: "/Users/project/assets/video/interview-clip.mp4" },
  { name: "logo-hd.png", type: "image", info: "2400x2400 · 1.2 MB · PNG", seg: null, path: "/Users/project/assets/image/logo-hd.png" }
];

function renderGrid(filter) {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var visible = 0;
  ATOMS.forEach(function(a) {
    if (filter !== "all" && a.type !== filter) return;
    visible++;
    var card = document.createElement("div");
    card.className = "atom-card";
    card.dataset.type = a.type;

    var typeLabel = a.type === "component" ? "组件" : a.type === "video" ? "视频" : "图片";

    var html = '<div class="atom-header">' +
      '<span class="atom-name">' + a.name + '</span>' +
      '<span class="atom-type-tag ' + a.type + '">' + typeLabel + '</span>' +
      '</div>' +
      '<div class="atom-info">' + a.info + '</div>' +
      '<div class="atom-tags">';
    if (a.seg) html += '<span class="atom-seg">' + a.seg + '</span>';
    html += '</div>';
    if (a.path) html += '<div class="atom-path">' + a.path + '</div>';

    card.innerHTML = html;
    grid.appendChild(card);
  });
  document.getElementById("atomCount").textContent = visible + " 个原子";
}

function filterType(type) {
  document.querySelectorAll(".seg-pill").forEach(function(p) {
    p.classList.remove("active");
  });
  event.target.classList.add("active");
  renderGrid(type);
}

// Dropdown toggle
function toggleDd(id) {
  var el = document.getElementById(id);
  var wasOpen = el.classList.contains("open");
  document.querySelectorAll(".topbar-select.open").forEach(function(s) { s.classList.remove("open"); });
  if (!wasOpen) el.classList.add("open");
}
document.addEventListener("click", function(e) {
  if (!e.target.closest(".topbar-select")) {
    document.querySelectorAll(".topbar-select.open").forEach(function(s) { s.classList.remove("open"); });
  }
});

renderGrid("all");
</script>
</body>
</html>
