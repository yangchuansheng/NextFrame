<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame — Background Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;height:100vh;overflow:hidden;background:#050507;color:rgba(255,255,255,0.9);transition:none}

.bg-layer{position:fixed;inset:0;z-index:0;transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1)}

/* ── 12 backgrounds: black + purple aurora, different positions ── */

/* Row 1: Top positions */
.b1 .bg-layer{background:
  radial-gradient(ellipse 40% 20% at 50% 0%, rgba(139,92,246,0.16) 0%, transparent 100%),
  radial-gradient(ellipse 25% 12% at 45% 5%, rgba(168,85,247,0.08) 0%, transparent 100%)}

.b2 .bg-layer{background:
  radial-gradient(ellipse 30% 18% at 15% 5%, rgba(139,92,246,0.15) 0%, transparent 100%),
  radial-gradient(ellipse 18% 10% at 25% 10%, rgba(124,58,237,0.06) 0%, transparent 100%)}

.b3 .bg-layer{background:
  radial-gradient(ellipse 30% 18% at 85% 5%, rgba(167,139,250,0.14) 0%, transparent 100%),
  radial-gradient(ellipse 18% 12% at 75% 10%, rgba(139,92,246,0.06) 0%, transparent 100%)}

/* Row 2: Corner & diagonal */
.b4 .bg-layer{background:
  radial-gradient(ellipse 35% 35% at 0% 0%, rgba(139,92,246,0.14) 0%, transparent 100%),
  radial-gradient(ellipse 20% 20% at 8% 8%, rgba(168,85,247,0.06) 0%, transparent 100%)}

.b5 .bg-layer{background:
  radial-gradient(ellipse 35% 35% at 100% 0%, rgba(139,92,246,0.14) 0%, transparent 100%),
  radial-gradient(ellipse 20% 20% at 92% 8%, rgba(124,58,237,0.06) 0%, transparent 100%)}

.b6 .bg-layer{background:
  radial-gradient(ellipse 25% 20% at 0% 0%, rgba(139,92,246,0.12) 0%, transparent 100%),
  radial-gradient(ellipse 25% 20% at 100% 100%, rgba(168,85,247,0.10) 0%, transparent 100%)}

/* Row 3: Bottom & side positions */
.b7 .bg-layer{background:
  radial-gradient(ellipse 40% 20% at 50% 100%, rgba(139,92,246,0.14) 0%, transparent 100%),
  radial-gradient(ellipse 25% 12% at 55% 95%, rgba(167,139,250,0.06) 0%, transparent 100%)}

.b8 .bg-layer{background:
  radial-gradient(ellipse 18% 50% at 0% 50%, rgba(139,92,246,0.12) 0%, transparent 100%),
  radial-gradient(ellipse 10% 30% at 3% 45%, rgba(168,85,247,0.05) 0%, transparent 100%)}

.b9 .bg-layer{background:
  radial-gradient(ellipse 18% 50% at 100% 50%, rgba(139,92,246,0.12) 0%, transparent 100%),
  radial-gradient(ellipse 10% 30% at 97% 55%, rgba(124,58,237,0.05) 0%, transparent 100%)}

/* Row 4: Multi-spot & wide spread */
.b10 .bg-layer{background:
  radial-gradient(ellipse 22% 14% at 15% 5%, rgba(139,92,246,0.10) 0%, transparent 100%),
  radial-gradient(ellipse 18% 10% at 50% 3%, rgba(168,85,247,0.08) 0%, transparent 100%),
  radial-gradient(ellipse 22% 14% at 85% 5%, rgba(124,58,237,0.10) 0%, transparent 100%)}

.b11 .bg-layer{background:
  radial-gradient(ellipse 60% 10% at 50% 3%, rgba(139,92,246,0.10) 0%, transparent 100%),
  radial-gradient(ellipse 60% 10% at 50% 97%, rgba(124,58,237,0.06) 0%, transparent 100%)}

.b12 .bg-layer{background:
  radial-gradient(ellipse 30% 25% at 50% 50%, rgba(139,92,246,0.08) 0%, transparent 100%),
  radial-gradient(ellipse 50% 8% at 50% 3%, rgba(168,85,247,0.06) 0%, transparent 100%),
  radial-gradient(ellipse 20% 15% at 80% 80%, rgba(124,58,237,0.05) 0%, transparent 100%)}

/* ── Picker grid ── */
.picker{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;flex-direction:column;gap:6px;padding:10px 12px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
}
.picker-row{display:flex;gap:6px;align-items:center}
.picker-label{font-size:8px;color:rgba(255,255,255,0.30);width:52px;text-align:right;padding-right:6px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.picker button{
  width:48px;height:32px;border-radius:6px;border:2px solid transparent;
  cursor:pointer;transition:all .3s cubic-bezier(0.16,1,0.3,1);
  position:relative;overflow:hidden;background:#08080c;
}
.picker button::after{content:'';position:absolute;inset:0;border-radius:inherit}
.picker button.active{border-color:rgba(167,139,250,0.6)}
.picker button:hover{border-color:rgba(255,255,255,0.20)}

/* Mini previews */
.picker .p1::after{background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(139,92,246,0.35),transparent 70%)}
.picker .p2::after{background:radial-gradient(ellipse 60% 40% at 15% 5%,rgba(139,92,246,0.35),transparent 70%)}
.picker .p3::after{background:radial-gradient(ellipse 60% 40% at 85% 5%,rgba(167,139,250,0.35),transparent 70%)}

.picker .p4::after{background:radial-gradient(ellipse at 0% 0%,rgba(139,92,246,0.35),transparent 60%)}
.picker .p5::after{background:radial-gradient(ellipse at 100% 0%,rgba(139,92,246,0.35),transparent 60%)}
.picker .p6::after{background:radial-gradient(ellipse at 0% 0%,rgba(139,92,246,0.25),transparent 50%),radial-gradient(ellipse at 100% 100%,rgba(168,85,247,0.25),transparent 50%)}

.picker .p7::after{background:radial-gradient(ellipse 80% 40% at 50% 100%,rgba(139,92,246,0.35),transparent 70%)}
.picker .p8::after{background:radial-gradient(ellipse 40% 80% at 0% 50%,rgba(139,92,246,0.35),transparent 70%)}
.picker .p9::after{background:radial-gradient(ellipse 40% 80% at 100% 50%,rgba(139,92,246,0.35),transparent 70%)}

.picker .p10::after{background:radial-gradient(ellipse at 15% 5%,rgba(139,92,246,0.25),transparent 40%),radial-gradient(ellipse at 50% 3%,rgba(168,85,247,0.2),transparent 40%),radial-gradient(ellipse at 85% 5%,rgba(124,58,237,0.25),transparent 40%)}
.picker .p11::after{background:linear-gradient(180deg,rgba(139,92,246,0.25) 0%,transparent 20%,transparent 80%,rgba(124,58,237,0.15) 100%)}
.picker .p12::after{background:radial-gradient(ellipse at 50% 50%,rgba(139,92,246,0.2),transparent 50%),radial-gradient(ellipse 80% 15% at 50% 3%,rgba(168,85,247,0.15),transparent 70%)}

/* ── Position label overlay ── */
.pos-label{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
  font-size:14px;font-weight:500;color:rgba(255,255,255,0.70);
  padding:6px 18px;border-radius:10px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  transition:opacity 0.3s;pointer-events:none;
}

/* Simulated editor panels — just outlines to show context */
.mock{position:fixed;z-index:1;pointer-events:none}
.mock-outline{
  border:1px solid rgba(255,255,255,0.05);border-radius:14px;
  backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);
  background:rgba(255,255,255,0.018);
}
.mock-outline::before{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(174deg,rgba(255,255,255,0.04) 0%,transparent 14%);
}
.m-tools{left:4px;top:42px;bottom:4px;width:46px}
.m-preview{left:54px;top:42px;right:248px;bottom:196px}
.m-timeline{left:54px;bottom:4px;right:248px;height:188px}
.m-props{right:4px;top:42px;bottom:4px;width:240px}
.m-titlebar{left:4px;right:4px;top:4px;height:34px;border-radius:10px}

/* Labels inside mock panels */
.mock-label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:11px;color:rgba(255,255,255,0.18);font-weight:500;
}
</style>
</head>
<body class="b1">
<div class="bg-layer"></div>

<!-- Mock editor panels as context -->
<div class="mock mock-outline m-titlebar"></div>
<div class="mock mock-outline m-tools"><span class="mock-label">Tools</span></div>
<div class="mock mock-outline m-preview"><span class="mock-label">Preview</span></div>
<div class="mock mock-outline m-timeline"><span class="mock-label">Timeline</span></div>
<div class="mock mock-outline m-props"><span class="mock-label">Properties</span></div>

<div class="pos-label" id="label">Top Center</div>

<div class="picker">
  <div class="picker-row">
    <span class="picker-label">Top</span>
    <button class="p1 active" onclick="pick(1,'Top Center')"></button>
    <button class="p2" onclick="pick(2,'Top Left')"></button>
    <button class="p3" onclick="pick(3,'Top Right')"></button>
  </div>
  <div class="picker-row">
    <span class="picker-label">Corner</span>
    <button class="p4" onclick="pick(4,'Corner Top-Left')"></button>
    <button class="p5" onclick="pick(5,'Corner Top-Right')"></button>
    <button class="p6" onclick="pick(6,'Diagonal TL + BR')"></button>
  </div>
  <div class="picker-row">
    <span class="picker-label">Edge</span>
    <button class="p7" onclick="pick(7,'Bottom Center')"></button>
    <button class="p8" onclick="pick(8,'Left Edge')"></button>
    <button class="p9" onclick="pick(9,'Right Edge')"></button>
  </div>
  <div class="picker-row">
    <span class="picker-label">Spread</span>
    <button class="p10" onclick="pick(10,'Three Spots Top')"></button>
    <button class="p11" onclick="pick(11,'Top + Bottom Band')"></button>
    <button class="p12" onclick="pick(12,'Center + Top Glow')"></button>
  </div>
</div>

<script>
function pick(n, name){
  document.body.className='b'+n;
  document.querySelectorAll('.picker button').forEach(function(b){b.classList.remove('active')});
  document.querySelector('.p'+n).classList.add('active');
  document.getElementById('label').textContent=name;
}
</script>
</body>
</html>
