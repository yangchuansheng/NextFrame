<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame Demo — 16:9 横屏 30s</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#viewport { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
.layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
#controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
#progress { width: 480px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #14b8a6; border-radius: 2px; }
#time { font-size: 12px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; width: 90px; }
#play-btn { background: rgba(20,184,166,0.2); border: 1px solid rgba(20,184,166,0.3); color: #14b8a6; border-radius: 6px; padding: 4px 14px; cursor: pointer; font-size: 12px; }
#title { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div id="viewport"></div>
<div id="controls">
  <button id="play-btn">⏸</button>
  <div id="progress"><div id="progress-fill"></div></div>
  <span id="time">0.00 / 30.00</span>
</div>
<div id="title">NEXTFRAME ENGINE DEMO · 16:9 · 30s · OCEAN-TEAL</div>

<script>
// ─── Config ───
const DURATION = 30;

// Recording detection — recorder WebView matches exactly 16:9
const ratio = window.innerWidth / window.innerHeight;
const isRecording = Math.abs(ratio - 16 / 9) < 0.01 && window.innerWidth >= 1000;

let W, H;
if (isRecording) {
  W = window.innerWidth;
  H = window.innerHeight;
} else {
  const maxW = Math.min(window.innerWidth - 40, 960);
  W = maxW;
  H = Math.round(W * 9 / 16);
}

const vp = document.getElementById('viewport');
vp.style.width = W + 'px';
vp.style.height = H + 'px';

if (isRecording) {
  document.body.style.margin = '0';
  document.body.style.padding = '0';
  document.body.style.overflow = 'hidden';
  document.body.style.display = 'block';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('title').style.display = 'none';
  vp.style.borderRadius = '0';
  vp.style.border = 'none';
  vp.style.position = 'fixed';
  vp.style.top = '0';
  vp.style.left = '0';
}

// ─── Timeline ───
const timeline = [
  // Background aurora — full 30s, ocean-teal theme
  { id: 'bg', scene: 'auroraGradient', start: 0, dur: 30, z: 0, x: 0, y: 0, w: 1, h: 1,
    params: { hueA: 185, hueB: 160, hueC: 200, intensity: 1.1, grain: 0.02, speed: 0.25 } },

  // Segment 1 (1-8s): English headline
  { id: 'title1', scene: 'kineticHeadline', start: 1, dur: 7, z: 2, x: 0.05, y: 0.2, w: 0.9, h: 0.45,
    params: { text: 'NEXTFRAME', subtitle: 'AI Video Engine', hueStart: 170, hueEnd: 220, stagger: 0.12, size: 0.11 } },

  // Segment 2 (9-16s): Chinese headline
  { id: 'title2', scene: 'kineticHeadline', start: 9, dur: 7, z: 2, x: 0.05, y: 0.2, w: 0.9, h: 0.45,
    params: { text: '让信息变成视频', subtitle: '像写 JSON 一样简单', hueStart: 150, hueEnd: 200, stagger: 0.1, size: 0.085 } },

  // Segment 3 (17-28s): Bar chart — video tools market
  { id: 'chart', scene: 'barChartReveal', start: 17, dur: 11, z: 2, x: 0.08, y: 0.1, w: 0.84, h: 0.75,
    params: {
      title: '视频工具市场 2025（亿美元）',
      unit: 'B',
      data: [4.2, 6.8, 9.1, 12.5, 17.3, 23.6],
      labels: ['2020', '2021', '2022', '2023', '2024', '2025E'],
      hueStart: 160, hueEnd: 200, stagger: 0.18, barDur: 1.1
    }
  },

  // Lower third bar — 2-30s
  { id: 'lower', scene: 'lowerThird', start: 2, dur: 28, z: 3, x: 0, y: 0, w: 1, h: 1,
    params: { title: 'NEXTFRAME', subtitle: 'JSON → Video · AI-Native · Open Source', hueA: 180, hueB: 160, holdEnd: 26, fadeOut: 2 } },
];

// ─── Renderers ───

function renderAurora(t, p, W, H) {
  const T = t * p.speed;
  return `<canvas width="${W}" height="${H}" style="width:100%;height:100%;display:block" id="sc_bg${Math.round(t*100)}"></canvas>
<script>(function(){var c=document.getElementById("sc_bg${Math.round(t*100)}"),x=c.getContext("2d"),W=${W},H=${H};
x.fillStyle="#050e12";x.fillRect(0,0,W,H);x.globalCompositeOperation="lighter";
function b(cx,cy,r,h,a){var g=x.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,"hsla("+h+",${Math.round(65*p.intensity)}%,48%,"+a+")");g.addColorStop(1,"hsla("+h+",${Math.round(65*p.intensity)}%,48%,0)");x.fillStyle=g;x.fillRect(0,0,W,H)}
b(W*(0.25+0.2*Math.sin(${T}*0.6)),H*(0.3+0.15*Math.cos(${T}*0.5)),W*0.75,${p.hueA},0.55);
b(W*(0.7+0.18*Math.cos(${T}*0.5)),H*(0.5+0.2*Math.sin(${T}*0.4)),W*0.65,${p.hueB},0.5);
b(W*(0.45+0.15*Math.sin(${T}*0.7)),H*(0.75+0.12*Math.cos(${T}*0.8)),W*0.7,${p.hueC},0.45);
x.globalCompositeOperation="source-over"})()</` + `script>`;
}

function renderHeadline(t, p, W, H) {
  const fontSize = Math.round(W * p.size);
  const letters = p.text.split('');
  const totalDur = letters.length * p.stagger + 0.4;
  let spans = '';
  for (let i = 0; i < letters.length; i++) {
    const delay = i * p.stagger;
    const raw = Math.max(0, Math.min(1, (t - delay) / 0.4));
    const prog = raw * (2 - raw); // easeOut
    const hue = p.hueStart + (p.hueEnd - p.hueStart) * (i / Math.max(1, letters.length - 1));
    const ch = letters[i] === ' ' ? '&nbsp;' : letters[i];
    spans += `<span style="display:inline-block;opacity:${prog};transform:translateY(${30*(1-prog)}px) scale(${0.4+prog*0.6});color:hsl(${hue},75%,68%)">${ch}</span>`;
  }
  const subDelay = totalDur;
  const subRaw = Math.max(0, Math.min(1, (t - subDelay) / 0.5));
  const subOp = subRaw * (2 - subRaw);
  const subSlide = 20 * (1 - subOp);
  // exit: fade out last 1s of the 7s clip
  const exitT = Math.max(0, (t - (p.dur || 7) + 1) / 1);
  const exitOp = 1 - Math.min(1, exitT);
  return `<div style="width:${W}px;height:${H}px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:Inter,-apple-system,sans-serif;opacity:${exitOp}">
    <div style="font-size:${fontSize}px;font-weight:800;letter-spacing:-0.01em;text-align:center;line-height:1.1;overflow:visible">${spans}</div>
    <div style="font-size:${Math.round(fontSize*0.3)}px;color:rgba(255,255,255,0.55);margin-top:${H*0.04}px;opacity:${subOp};transform:translateY(${subSlide}px);letter-spacing:0.12em">${p.subtitle}</div>
  </div>`;
}

function renderBarChart(t, p, W, H) {
  const n = p.data.length, maxVal = Math.max(...p.data, 1);
  const cX = W * 0.08, cW = W * 0.84, cY = H * 0.22, cH = H * 0.58;
  const bW = cW / n * 0.55, gap = cW / n;
  let bars = '', vals = '', labs = '';
  for (let i = 0; i < n; i++) {
    const raw = Math.max(0, Math.min(1, (t - i * p.stagger) / p.barDur));
    const prog = raw * (2 - raw);
    const bH = (p.data[i] / maxVal) * cH * prog;
    const bx = cX + i * gap + (gap - bW) / 2, by = cY + cH - bH;
    const hue = p.hueStart + (p.hueEnd - p.hueStart) * (i / Math.max(1, n - 1));
    bars += `<rect x="${bx}" y="${by}" width="${bW}" height="${bH}" rx="5" fill="hsl(${hue},68%,55%)" opacity="${0.25+prog*0.75}"/>`;
    bars += `<rect x="${bx}" y="${by}" width="${bW}" height="3" rx="2" fill="hsl(${hue},90%,80%)" opacity="${prog}"/>`;
    if (prog > 0.75) {
      const a = Math.min(1, (prog - 0.75) / 0.25);
      vals += `<text x="${bx+bW/2}" y="${by-W*0.01}" text-anchor="middle" fill="rgba(255,255,255,${a})" font-size="${W*0.022}" font-weight="700" font-family="Inter,-apple-system,sans-serif">${p.data[i]}${p.unit}</text>`;
    }
    labs += `<text x="${bx+bW/2}" y="${cY+cH+H*0.08}" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="${W*0.018}" font-family="Inter,-apple-system,sans-serif">${p.labels[i]||''}</text>`;
  }
  const tOp = Math.min(1, t / 0.6);
  // grid lines
  let grid = '';
  for (let g = 1; g <= 4; g++) {
    const gy = cY + cH - (g / 4) * cH;
    grid += `<line x1="${cX}" y1="${gy}" x2="${cX+cW}" y2="${gy}" stroke="rgba(255,255,255,0.06)" stroke-dasharray="4,4"/>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;display:block" xmlns="http://www.w3.org/2000/svg">
    ${grid}
    <text x="${W/2}" y="${H*0.13}" text-anchor="middle" fill="rgba(255,255,255,${tOp})" font-size="${W*0.032}" font-weight="700" font-family="Inter,-apple-system,sans-serif">${p.title}</text>
    <line x1="${cX}" y1="${cY}" x2="${cX}" y2="${cY+cH}" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="${cX}" y1="${cY+cH}" x2="${cX+cW}" y2="${cY+cH}" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    ${bars}${vals}${labs}</svg>`;
}

// Inline lower third (replaces lowerThirdVelvet — avoids scene dependency)
function renderLowerThird(t, p, W, H) {
  const wipeIn = Math.min(1, t / 0.5);
  const wipeOut = t > p.holdEnd ? Math.min(1, (t - p.holdEnd) / p.fadeOut) : 0;
  const vis = wipeIn * (1 - wipeOut);
  const typeProg = Math.max(0, Math.min(1, (t - 0.2) / (p.title.length * 0.07)));
  const chars = Math.round(typeProg * p.title.length);
  const subOp = Math.max(0, Math.min(1, (t - 0.6) / 0.4)) * (1 - wipeOut);
  const dot = 0.4 + 0.6 * Math.abs(Math.sin(t * 3));
  const barH = H * 0.1, fs = W * 0.025, clip = vis * 100;
  const barY = H * 0.84;
  return `<div style="width:${W}px;height:${H}px;position:relative;font-family:Inter,-apple-system,sans-serif">
    <div style="position:absolute;left:${W*0.04}px;top:${barY}px;width:${W*0.55}px;height:${barH}px;clip-path:inset(0 ${100-clip}% 0 0 round 8px);background:rgba(5,14,18,0.82);backdrop-filter:blur(20px);border-radius:8px;border:1px solid rgba(20,184,166,0.2);display:flex;flex-direction:column;justify-content:center;padding:0 ${W*0.025}px">
      <div style="display:flex;align-items:center;gap:${W*0.01}px">
        <div style="width:${W*0.008}px;height:${W*0.008}px;border-radius:50%;background:hsl(${p.hueA},80%,60%);opacity:${dot};box-shadow:0 0 ${W*0.006}px hsl(${p.hueA},80%,60%)"></div>
        <span style="font-size:${fs}px;font-weight:700;color:rgba(255,255,255,0.92);letter-spacing:0.06em">${p.title.substring(0, chars)}<span style="opacity:${(t*4)%1>0.5?0:0.7};color:hsl(${p.hueB},75%,65%)">|</span></span>
      </div>
      <span style="font-size:${fs*0.58}px;color:rgba(255,255,255,${subOp*0.55});margin-top:${H*0.004}px;margin-left:${W*0.02}px;letter-spacing:0.07em">${p.subtitle}</span>
    </div>
  </div>`;
}

const RENDERERS = {
  auroraGradient: renderAurora,
  kineticHeadline: renderHeadline,
  barChartReveal: renderBarChart,
  lowerThird: renderLowerThird,
};

// ─── Create layer containers ───
const layers = {};
timeline.sort((a, b) => a.z - b.z).forEach(layer => {
  const div = document.createElement('div');
  div.className = 'layer';
  div.id = 'layer_' + layer.id;
  div.style.zIndex = layer.z;
  div.style.left = (layer.x * 100) + '%';
  div.style.top = (layer.y * 100) + '%';
  div.style.width = (layer.w * 100) + '%';
  div.style.height = (layer.h * 100) + '%';
  if (layer.opacity !== undefined) div.style.opacity = layer.opacity;
  vp.appendChild(div);
  layers[layer.id] = div;
});

// ─── Smooth enter/exit ───
function enterExit(localT, dur) {
  const fadeIn = Math.min(1, localT / 0.6);
  const fadeOut = Math.max(0, 1 - (dur - localT) / 0.6);
  const eIn = fadeIn * (2 - fadeIn);
  const eOut = fadeOut * (2 - fadeOut);
  return Math.min(eIn, 1 - eOut);
}

// ─── Recorder protocol ───
window.__duration = DURATION;
window.__onFrame = function(data) {
  currentT = data.time;
  renderFrame();
};

// ─── Playback ───
let playing = true, startTime = performance.now(), currentT = 0;
const progressFill = document.getElementById('progress-fill');
const timeEl = document.getElementById('time');
const playBtn = document.getElementById('play-btn');

playBtn.onclick = () => {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸'; }
  else playBtn.textContent = '▶';
};
document.getElementById('progress').onclick = (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  currentT = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * DURATION;
  startTime = performance.now() - currentT * 1000;
};

function renderFrame() {
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  timeEl.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2);

  timeline.forEach(layer => {
    const div = layers[layer.id];
    const localT = currentT - layer.start;
    if (localT < 0 || localT > layer.dur) { div.style.display = 'none'; return; }
    div.style.display = 'block';

    const baseOpacity = layer.opacity !== undefined ? layer.opacity : 1;
    div.style.opacity = baseOpacity * enterExit(localT, layer.dur);

    const renderer = RENDERERS[layer.scene];
    if (renderer) {
      const layerW = Math.round(W * layer.w);
      const layerH = Math.round(H * layer.h);
      const html = renderer(localT, layer.params, layerW, layerH);
      if (div._lastHtml !== html) {
        div.innerHTML = html;
        div._lastHtml = html;
        div.querySelectorAll('script').forEach(s => {
          const fn = new Function(s.textContent);
          try { fn(); } catch(e) {}
        });
      }
    }
  });
}

function loop() {
  if (playing) currentT = ((performance.now() - startTime) / 1000) % DURATION;
  renderFrame();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
