<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame Test — pieChart 16:9</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#viewport { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
.layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
#controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
#progress { width: 400px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; }
#time { font-size: 12px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; width: 90px; }
#play-btn { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; padding: 4px 14px; cursor: pointer; font-size: 12px; }
#title { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div id="viewport"></div>
<div id="controls">
  <button id="play-btn">⏸</button>
  <div id="progress"><div id="progress-fill"></div></div>
  <span id="time">0.00 / 10.00</span>
</div>
<div id="title">NEXTFRAME TEST · 16:9 · auroraGradient + pieChart + kineticHeadline · 10s</div>

<script>
// ─── Config ───
const DURATION = 10;

// Recording detection — recorder WebView matches exactly 16:9
const ratio = window.innerWidth / window.innerHeight;
const isRecording = Math.abs(ratio - 16 / 9) < 0.01 && window.innerWidth >= 1000;

let W, H;
if (isRecording) {
  W = window.innerWidth;
  H = window.innerHeight;
} else {
  const maxW = Math.min(window.innerWidth - 40, 960);
  W = maxW;
  H = Math.round(W * 9 / 16);
}

const vp = document.getElementById('viewport');
vp.style.width = W + 'px';
vp.style.height = H + 'px';

if (isRecording) {
  document.body.style.margin = '0';
  document.body.style.padding = '0';
  document.body.style.overflow = 'hidden';
  document.body.style.display = 'block';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('title').style.display = 'none';
  vp.style.borderRadius = '0';
  vp.style.border = 'none';
  vp.style.position = 'fixed';
  vp.style.top = '0';
  vp.style.left = '0';
}

// ─── Timeline ───
const timeline = [
  // Background: auroraGradient full 10s
  { id: 'bg', scene: 'auroraGradient', start: 0, dur: 10, z: 0, x: 0, y: 0, w: 1, h: 1,
    params: { hueA: 270, hueB: 200, hueC: 320, intensity: 1.2, grain: 0.03, speed: 0.3 } },

  // Headline: kineticHeadline "数据驱动" (0.5s–5s)
  { id: 'headline', scene: 'kineticHeadline', start: 0.5, dur: 4.5, z: 2, x: 0.05, y: 0.0, w: 0.9, h: 0.28,
    params: { text: '数据驱动', subtitle: 'Data-Driven Insights', hueStart: 260, hueEnd: 340, stagger: 0.18, size: 0.08 } },

  // Pie chart (2.5s–10s)
  { id: 'chart', scene: 'pieChart', start: 2.5, dur: 7.5, z: 1, x: 0, y: 0.12, w: 1, h: 0.88,
    params: { title: '市场占比', unit: '%', data: [35, 25, 20, 12, 8], labels: ['产品A', '产品B', '产品C', '产品D', '产品E'], hueStart: 250, hueSpan: 200, saturation: 70, lightness: 60, innerRadius: 0, animDur: 1.0, stagger: 0.15 } },
];

// ─── Scene Renderers ───

function renderAurora(t, p, lW, lH) {
  const T = t * p.speed;
  return `<canvas width="${lW}" height="${lH}" style="width:100%;height:100%;display:block" id="sc_bg"></canvas>
<script>(function(){var c=document.getElementById("sc_bg"),x=c.getContext("2d"),W=${lW},H=${lH};
var hA=${p.hueA},hB=${p.hueB},hC=${p.hueC},I=${p.intensity},G=${p.grain},T=${T};
function blob(cx,cy,r,h,a){var g=x.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,"hsla("+h+","+Math.round(70*I)+"%,55%,"+a+")");g.addColorStop(1,"hsla("+h+","+Math.round(70*I)+"%,55%,0)");x.fillStyle=g;x.fillRect(0,0,W,H)}
x.fillStyle="#0a0a12";x.fillRect(0,0,W,H);x.globalCompositeOperation="lighter";
blob(W*(0.3+0.2*Math.sin(T*0.7)),H*(0.2+0.12*Math.cos(T*0.5)),W*0.8,hA,0.6);
blob(W*(0.7+0.15*Math.cos(T*0.6)),H*(0.45+0.15*Math.sin(T*0.4)),W*0.7,hB,0.5);
blob(W*(0.5+0.2*Math.sin(T*0.8)),H*(0.7+0.1*Math.cos(T*0.9)),W*0.75,hC,0.45);
blob(W*(0.4+0.1*Math.cos(T*1.1)),H*(0.9+0.05*Math.sin(T*0.6)),W*0.5,hA+40,0.3);
x.globalCompositeOperation="source-over";
if(G>0.001){var d=x.getImageData(0,0,W,H),px=d.data,g2=255*G;for(var i=0;i<px.length;i+=16){var n=(Math.random()-0.5)*g2;px[i]+=n;px[i+1]+=n;px[i+2]+=n}x.putImageData(d,0,0)}
})()</` + `script>`;
}

function renderHeadline(t, p, lW, lH) {
  const fontSize = Math.round(lW * p.size);
  const letters = p.text.split('');
  const stagger = p.stagger;
  let lettersHtml = '';
  for (let i = 0; i < letters.length; i++) {
    const delay = i * stagger;
    const progress = Math.max(0, Math.min(1, (t - delay) / 0.4));
    const ease = progress * (2 - progress);
    const opacity = ease;
    const scale = 0.3 + ease * 0.7;
    const hue = p.hueStart + (p.hueEnd - p.hueStart) * (i / Math.max(1, letters.length - 1));
    lettersHtml += `<span style="display:inline-block;opacity:${opacity};transform:scale(${scale});color:hsl(${hue},80%,65%);transition:none">${letters[i]}</span>`;
  }
  const totalLetterDur = letters.length * stagger + 0.4;
  const subProgress = Math.max(0, Math.min(1, (t - totalLetterDur) / 0.6));
  const subOpacity = subProgress * (2 - subProgress);
  const fs = fontSize;
  return `<div style="width:${lW}px;height:${lH}px;background:transparent;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:Inter,-apple-system,sans-serif;overflow:hidden">
  <div style="font-size:${fs}px;font-weight:800;letter-spacing:-0.02em;text-align:center;line-height:1.1;padding:0 ${lW * 0.05}px">${lettersHtml}</div>
  <div style="font-size:${Math.round(fs * 0.28)}px;color:rgba(255,255,255,0.5);margin-top:${Math.round(lH * 0.04)}px;opacity:${subOpacity};letter-spacing:0.15em;text-transform:uppercase">${p.subtitle}</div>
</div>`;
}

function renderPieChart(t, p, lW, lH) {
  const { title, unit, data, labels, hueStart, hueSpan, saturation, lightness, innerRadius, animDur, stagger } = p;
  const n = data.length;
  const total = data.reduce((s, v) => s + v, 0) || 1;
  const pct = data.map((v) => v / total);

  const cx = lW * 0.42;
  const cy = lH * 0.54;
  const outerR = Math.min(lW * 0.28, lH * 0.4);
  const innerR = outerR * innerRadius;

  const ease = (x) => x < 0.5 ? 2 * x * x : -1 + (4 - 2 * x) * x;

  let slices = '';
  let valueLabels = '';
  let legendItems = '';
  let angleStart = -Math.PI / 2;

  for (let i = 0; i < n; i++) {
    const delay = i * stagger;
    const progress = Math.max(0, Math.min(1, (t - delay) / animDur));
    const eased = ease(progress);
    const fullAngle = pct[i] * Math.PI * 2;
    const sweepAngle = fullAngle * eased;
    const angleEnd = angleStart + sweepAngle;
    const hue = (hueStart + (hueSpan * i) / Math.max(1, n - 1)) % 360;
    const color = `hsl(${hue},${saturation}%,${lightness}%)`;
    const opacity = 0.3 + eased * 0.7;

    if (sweepAngle > 0.001) {
      const x1 = cx + Math.cos(angleStart) * outerR;
      const y1 = cy + Math.sin(angleStart) * outerR;
      const x2 = cx + Math.cos(angleEnd) * outerR;
      const y2 = cy + Math.sin(angleEnd) * outerR;
      const largeArc = sweepAngle > Math.PI ? 1 : 0;

      let d;
      if (innerR > 0) {
        const ix1 = cx + Math.cos(angleStart) * innerR;
        const iy1 = cy + Math.sin(angleStart) * innerR;
        const ix2 = cx + Math.cos(angleEnd) * innerR;
        const iy2 = cy + Math.sin(angleEnd) * innerR;
        d = `M ${x1} ${y1} A ${outerR} ${outerR} 0 ${largeArc} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${innerR} ${innerR} 0 ${largeArc} 0 ${ix1} ${iy1} Z`;
      } else {
        d = `M ${cx} ${cy} L ${x1} ${y1} A ${outerR} ${outerR} 0 ${largeArc} 1 ${x2} ${y2} Z`;
      }

      slices += `<path d="${d}" fill="${color}" opacity="${opacity}" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>`;

      if (progress > 0.85 && pct[i] > 0.04) {
        const labelAlpha = Math.min(1, (progress - 0.85) / 0.15);
        const midAngle = angleStart + fullAngle / 2;
        const labelR = innerR > 0 ? (innerR + outerR) / 2 : outerR * 0.65;
        const lx = cx + Math.cos(midAngle) * labelR;
        const ly = cy + Math.sin(midAngle) * labelR;
        const displayVal = Math.round(pct[i] * 100);
        valueLabels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,${labelAlpha})" font-size="${lH * 0.028}" font-weight="700" font-family="Inter,-apple-system,sans-serif">${displayVal}${unit}</text>`;
      }
    }

    const legendX = lW * 0.72;
    const legendY = lH * 0.28 + i * lH * 0.1;
    const legendAlpha = Math.min(1, Math.max(0, (t - delay - animDur * 0.6) / 0.3));
    if (legendAlpha > 0) {
      legendItems += `<rect x="${legendX}" y="${legendY - lH * 0.018}" width="${lH * 0.03}" height="${lH * 0.03}" rx="3" fill="${color}" opacity="${legendAlpha * opacity}"/>`;
      legendItems += `<text x="${legendX + lH * 0.045}" y="${legendY}" dominant-baseline="middle" fill="rgba(255,255,255,${legendAlpha * 0.85})" font-size="${lH * 0.026}" font-family="Inter,-apple-system,sans-serif">${labels[i] || ''}</text>`;
      const valPct = Math.round(pct[i] * 100);
      legendItems += `<text x="${lW * 0.95}" y="${legendY}" text-anchor="end" dominant-baseline="middle" fill="rgba(255,255,255,${legendAlpha * 0.55})" font-size="${lH * 0.024}" font-family="Inter,-apple-system,sans-serif" font-variant-numeric="tabular-nums">${valPct}${unit}</text>`;
    }

    angleStart += fullAngle;
  }

  const titleOpacity = Math.min(1, t / 0.5);
  return `<svg viewBox="0 0 ${lW} ${lH}" style="width:100%;height:100%;display:block;background:transparent" xmlns="http://www.w3.org/2000/svg">
  <text x="${lW * 0.42}" y="${lH * 0.1}" text-anchor="middle" fill="rgba(255,255,255,${titleOpacity})" font-size="${lH * 0.055}" font-weight="700" font-family="Inter,-apple-system,sans-serif">${title}</text>
  ${slices}${valueLabels}${legendItems}
</svg>`;
}

const RENDERERS = {
  auroraGradient:  renderAurora,
  kineticHeadline: renderHeadline,
  pieChart:        renderPieChart,
};

// ─── Create layer containers ───
const layers = {};
timeline.slice().sort((a, b) => a.z - b.z).forEach(layer => {
  const div = document.createElement('div');
  div.className = 'layer';
  div.id = 'layer_' + layer.id;
  div.style.zIndex = layer.z;
  div.style.left = (layer.x * 100) + '%';
  div.style.top = (layer.y * 100) + '%';
  div.style.width = (layer.w * 100) + '%';
  div.style.height = (layer.h * 100) + '%';
  if (layer.opacity !== undefined) div.style.opacity = layer.opacity;
  vp.appendChild(div);
  layers[layer.id] = div;
});

// ─── Smooth enter/exit ───
function enterExit(localT, dur) {
  const fadeIn = Math.min(1, localT / 0.6);
  const fadeOut = Math.max(0, 1 - (dur - localT) / 0.6);
  const eIn = fadeIn * (2 - fadeIn);
  const eOut = fadeOut * (2 - fadeOut);
  return Math.min(eIn, 1 - eOut);
}

// ─── Recorder protocol ───
window.__duration = DURATION;
window.__onFrame = function(data) {
  currentT = data.time;
  renderFrame();
};

// ─── Playback ───
let playing = true, startTime = performance.now(), currentT = 0;
const progressFill = document.getElementById('progress-fill');
const timeEl = document.getElementById('time');
const playBtn = document.getElementById('play-btn');

playBtn.onclick = () => {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸'; }
  else playBtn.textContent = '▶';
};
document.getElementById('progress').onclick = (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  currentT = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * DURATION;
  startTime = performance.now() - currentT * 1000;
};

function renderFrame() {
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  timeEl.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2);

  timeline.forEach(layer => {
    const div = layers[layer.id];
    const localT = currentT - layer.start;
    if (localT < 0 || localT > layer.dur) { div.style.display = 'none'; return; }
    div.style.display = 'block';

    const baseOpacity = layer.opacity !== undefined ? layer.opacity : 1;
    div.style.opacity = baseOpacity * enterExit(localT, layer.dur);

    const renderer = RENDERERS[layer.scene];
    if (!renderer) return;

    const lW = Math.round(W * layer.w);
    const lH = Math.round(H * layer.h);
    div.innerHTML = renderer(localT, layer.params, lW, lH);
  });
}

function loop() {
  if (playing) { currentT = ((performance.now() - startTime) / 1000) % DURATION; }
  renderFrame();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
