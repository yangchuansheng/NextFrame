<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame Test — Particle Field 4:3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#viewport { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
.layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
#controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
#progress { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; }
#time { font-size: 12px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; width: 80px; }
#play-btn { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; padding: 4px 14px; cursor: pointer; font-size: 12px; }
#title { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div id="viewport"></div>
<div id="controls">
  <button id="play-btn">⏸</button>
  <div id="progress"><div id="progress-fill"></div></div>
  <span id="time">0.00 / 10.00</span>
</div>
<div id="title">NEXTFRAME TEST · PARTICLE FIELD · 4:3 · 10s</div>

<script>
// ─── Config ───
const DURATION = 10;

// Detect recording mode: recorder WebView has exact 4:3 ratio
const ratio = window.innerWidth / window.innerHeight;
const isRecording = Math.abs(ratio - 4 / 3) < 0.01 && window.innerWidth >= 500;

let W, H;
if (isRecording) {
  W = window.innerWidth;
  H = window.innerHeight;
} else {
  const maxH = Math.min(window.innerHeight - 80, 700);
  H = maxH;
  W = Math.round(H * 4 / 3);
}

const vp = document.getElementById('viewport');
vp.style.width = W + 'px';
vp.style.height = H + 'px';

if (isRecording) {
  document.body.style.margin = '0';
  document.body.style.padding = '0';
  document.body.style.overflow = 'hidden';
  document.body.style.display = 'block';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('title').style.display = 'none';
  vp.style.borderRadius = '0';
  vp.style.border = 'none';
  vp.style.position = 'fixed';
  vp.style.top = '0';
  vp.style.left = '0';
}

// ─── Timeline ───
const timeline = [
  {
    id: 'bg', scene: 'particleField',
    start: 0, dur: 10, z: 0, x: 0, y: 0, w: 1, h: 1,
    params: { hue: 220, saturation: 70, count: 80, speed: 0.4, connectDist: 0.18, particleSize: 1.5, lineOpacity: 0.3 }
  },
  {
    id: 'headline', scene: 'kineticHeadline',
    start: 0.5, dur: 9, z: 1, x: 0, y: 0, w: 1, h: 1,
    params: { text: 'AI NATIVE', subtitle: 'Particle Field · 4:3', hueStart: 180, hueEnd: 260, stagger: 0.18, size: 0.09 }
  },
];

// ─── Scene Renderers ───

function seedParticle(i, W, H, T, speed) {
  const sx = Math.sin(i * 127.1) * 0.5 + 0.5;
  const sy = Math.sin(i * 311.7) * 0.5 + 0.5;
  const vx = (Math.sin(i * 43.3) * 2 - 1) * speed * 0.02;
  const vy = (Math.sin(i * 79.6) * 2 - 1) * speed * 0.02;
  const px = ((sx + vx * T) % 1 + 1) % 1;
  const py = ((sy + vy * T) % 1 + 1) % 1;
  return { x: px * W, y: py * H };
}

function renderParticleField(t, p, W, H) {
  const T = t * p.speed;
  const maxDist = p.connectDist * W;
  const n = Math.round(p.count);
  const particles = [];
  for (let i = 0; i < n; i++) {
    particles.push(seedParticle(i, W, H, T, p.speed));
  }
  const particlesJson = JSON.stringify(particles);
  return `<canvas width="${W}" height="${H}" style="width:100%;height:100%;display:block" id="sc_pf"></canvas>
<script>(function(){
  const c=document.getElementById("sc_pf"),x=c.getContext("2d");
  const W=${W},H=${H},maxD=${maxDist},ps=${p.particleSize},lo=${p.lineOpacity};
  const sat=${p.saturation},hue=${p.hue};
  const pts=${particlesJson};
  x.fillStyle="#0a0a12";x.fillRect(0,0,W,H);
  if(lo>0){for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<maxD){const a=lo*(1-d/maxD);x.strokeStyle="hsla("+hue+","+sat+"%,65%,"+a+")";x.lineWidth=0.6;x.beginPath();x.moveTo(pts[i].x,pts[i].y);x.lineTo(pts[j].x,pts[j].y);x.stroke();}}}}
  for(let i=0;i<pts.length;i++){const bright=55+Math.sin(i*1.7)*15;x.beginPath();x.arc(pts[i].x,pts[i].y,ps,0,Math.PI*2);x.fillStyle="hsla("+hue+","+sat+"%,"+bright+"%,0.85)";x.fill();}
})()</` + `script>`;
}

function renderKineticHeadline(t, p, W, H) {
  const fontSize = Math.round(W * p.size);
  const letters = p.text.split('');
  const totalDur = letters.length * p.stagger + 0.4;
  let spans = '';
  for (let i = 0; i < letters.length; i++) {
    const delay = i * p.stagger;
    const prog = Math.max(0, Math.min(1, (t - delay) / 0.4));
    const ease = prog * (2 - prog);
    const hue = p.hueStart + (p.hueEnd - p.hueStart) * (i / Math.max(1, letters.length - 1));
    spans += `<span style="display:inline-block;opacity:${ease};transform:scale(${0.3 + ease * 0.7});color:hsl(${hue},80%,65%)">${letters[i]}</span>`;
  }
  const subOp = Math.max(0, Math.min(1, (t - totalDur) / 0.6)) * (2 - Math.max(0, Math.min(1, (t - totalDur) / 0.6)));
  return `<div style="width:${W}px;height:${H}px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:Inter,-apple-system,sans-serif">
    <div style="font-size:${fontSize}px;font-weight:800;letter-spacing:-0.02em;text-align:center;line-height:1.1">${spans}</div>
    <div style="font-size:${Math.round(fontSize * 0.28)}px;color:rgba(255,255,255,0.5);margin-top:${H * 0.015}px;opacity:${subOp};letter-spacing:0.15em">${p.subtitle}</div>
  </div>`;
}

const RENDERERS = {
  particleField: renderParticleField,
  kineticHeadline: renderKineticHeadline,
};

// ─── Create layer containers ───
const layers = {};
timeline.sort((a, b) => a.z - b.z).forEach(layer => {
  const div = document.createElement('div');
  div.className = 'layer';
  div.id = 'layer_' + layer.id;
  div.style.zIndex = layer.z;
  div.style.left = (layer.x * 100) + '%';
  div.style.top = (layer.y * 100) + '%';
  div.style.width = (layer.w * 100) + '%';
  div.style.height = (layer.h * 100) + '%';
  if (layer.opacity !== undefined) div.style.opacity = layer.opacity;
  vp.appendChild(div);
  layers[layer.id] = div;
});

function enterExit(localT, dur) {
  const fadeIn = Math.min(1, localT / 0.5);
  const fadeOut = Math.max(0, 1 - (dur - localT) / 0.5);
  return Math.min(fadeIn, 1 - fadeOut);
}

// ─── Recorder protocol ───
window.__duration = DURATION;
window.__onFrame = function(data) {
  currentT = data.time;
  renderFrame();
};

// ─── Playback ───
let playing = true, startTime = performance.now(), currentT = 0;
const progressFill = document.getElementById('progress-fill');
const timeEl = document.getElementById('time');
const playBtn = document.getElementById('play-btn');

playBtn.onclick = () => {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸'; }
  else { playBtn.textContent = '▶'; }
};
document.getElementById('progress').onclick = (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  currentT = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * DURATION;
  startTime = performance.now() - currentT * 1000;
};

function renderFrame() {
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  timeEl.textContent = currentT.toFixed(2) + ' / ' + DURATION.toFixed(2);

  timeline.forEach(layer => {
    const div = layers[layer.id];
    const localT = currentT - layer.start;
    if (localT < 0 || localT > layer.dur) { div.style.display = 'none'; return; }
    div.style.display = 'block';

    const baseOpacity = layer.opacity !== undefined ? layer.opacity : 1;
    div.style.opacity = baseOpacity * enterExit(localT, layer.dur);

    const renderer = RENDERERS[layer.scene];
    if (renderer) {
      const layerW = Math.round(W * layer.w);
      const layerH = Math.round(H * layer.h);
      const html = renderer(localT, layer.params, layerW, layerH);

      if (div._lastHtml !== html) {
        div.innerHTML = html;
        div._lastHtml = html;
        div.querySelectorAll('script').forEach(s => {
          const fn = new Function(s.textContent);
          try { fn(); } catch(e) {}
        });
      }
    }
  });
}

function loop() {
  if (playing) currentT = ((performance.now() - startTime) / 1000) % DURATION;
  renderFrame();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
