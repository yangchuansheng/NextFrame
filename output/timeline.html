      { label: "Audio", value: 20, color: "#f472b6" },
      { label: "Docs", value: 15, color: "#fb923c" },
      { label: "Code", value: 12, color: "#4ade80" },
      { label: "Other", value: 8, color: "#fbbf24" },
    ],
    gap: 6,
    borderRadius: 6,
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const raw = normalizeArray(params.data, []);
    const items = raw.map((d, i) => ({
      label: d.label || `Item ${i + 1}`,
      value: toNumber(d.value, 10),
      color: d.color || PALETTE[i % PALETTE.length],
    }));
    const gap = toNumber(params.gap, 6);
    const br = toNumber(params.borderRadius, 6);

    const pad = 100;
    const layout = layoutTreemap(items, pad, pad, 1920 - pad * 2, 1080 - pad * 2, gap);

    // shadow filter
    const defs = svgEl("defs");
    const filter = svgEl("filter", { id: "tmShadow", x: "-10%", y: "-10%", width: "120%", height: "120%" });
    filter.appendChild(svgEl("feDropShadow", { dx: "0", dy: "2", stdDeviation: "4", "flood-color": "rgba(0,0,0,0.3)" }));
    defs.appendChild(filter);
    svg.appendChild(defs);

    const blocks = layout.map((r) => {
      const g = svgEl("g", { transform: `translate(${r.x + r.w / 2}, ${r.y + r.h / 2}) scale(0)` });

      const rect = svgEl("rect", {
        x: String(-r.w / 2), y: String(-r.h / 2),
        width: String(r.w), height: String(r.h),
        rx: String(br), fill: r.color, opacity: "0.85",
        filter: "url(#tmShadow)",
      });
      g.appendChild(rect);

      // label if block is big enough
      if (r.w > 70 && r.h > 40) {
        const fontSize = Math.min(24, r.w / (r.label.length * 0.7), r.h / 2.5);
        const txt = svgEl("text", {
          x: "0", y: String(fontSize * 0.15),
          fill: "rgba(0,0,0,0.7)", "font-size": String(Math.max(12, fontSize)),

        g.appendChild(txt);
      }

      svg.appendChild(g);
      return { g, cx: r.x + r.w / 2, cy: r.y + r.h / 2, idx: r.idx };
    });

    return { svg, blocks };
  },

  update(els, localT) {
    const stagger = 0.12;
    const dur = 0.6;

    els.blocks.forEach((b) => {
      const start = b.idx * stagger;

  destroy(els) { els.svg.remove(); },
};

return {

  },

  create(container, params) {
    const root = createRoot(container, "display:flex;align-items:center;justify-content:center;padding:40px");
    const fontSize = toNumber(params.fontSize, 32);
    const cursorColor = params.cursorColor || "#6ee7ff";

    const wrap = createNode("div", [
      "display:inline-flex;align-items:baseline",
      `font-family:${MONO_FONT_STACK}`,
      `font-size:${fontSize}px`,
      "color:#fff;line-height:1.5",
      "will-change:opacity",
    ].join(";"));

    const textSpan = createNode("span", "white-space:pre-wrap;word-break:break-word");
    const cursorSpan = createNode("span", [
      `color:${cursorColor}`,
      "font-weight:400;margin-left:1px",
      "will-change:opacity",
    ].join(";"), "\u2588");

    wrap.appendChild(textSpan);
    if (params.cursor !== false) wrap.appendChild(cursorSpan);
    root.appendChild(wrap);

    return { root, textSpan, cursorSpan, fullText: String(params.text || "Hello, World!") };
  },

  update(els, localT, params) {
    const fadeIn = smoothstep(0, 0.05, localT);
    const fadeOut = 1 - smoothstep(0.85, 1, localT);
    els.root.style.opacity = fadeIn * fadeOut;

    const speed = toNumber(params.speed, 20);
    const totalChars = els.fullText.length;
    // Map localT (0~1) to typing progress
    const typeDuration = totalChars / speed; // seconds at this speed
    const normalizedSpeed = typeDuration > 0 ? 1 / typeDuration : 10;
    // Typing happens between 0.05 and 0.8
    const typeT = smoothstep(0.05, 0.05 + 0.75 * (totalChars / (speed * 4 + totalChars)), localT);
    const charCount = Math.min(totalChars, Math.floor(typeT * (totalChars + 1)));

    els.textSpan.textContent = els.fullText.slice(0, charCount);

    // Cursor blink (using localT as a proxy for time)
    if (els.cursorSpan) {
      const blink = Math.sin(localT * 80) > 0 ? 1 : 0.15;
      const showCursor = charCount < totalChars ? 1 : blink;
      els.cursorSpan.style.opacity = showCursor;
    }
  },

  destroy(els) { els.root.remove(); },
};

SCENE_REGISTRY["vignette"] = (function() {
  
return {
  id: "vignette",
  type: "canvas",
  name: "Vignette",
  category: "Effects",
  defaultParams: {
    intensity: 0.7,
    color: "#000000",
    radius: 0.5,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    const intensity = clamp(toNumber(params.intensity, 0.7), 0, 1);
    const color = params.color || "#000000";
    const radiusFrac = clamp(toNumber(params.radius, 0.5), 0.1, 1);

    ctx.clearRect(0, 0, W, H);

    // Elliptical vignette: use the diagonal as the outer radius
    const diag = Math.hypot(cx, cy);
    const innerRadius = diag * radiusFrac;
    const outerRadius = diag * 1.1;

    const grad = ctx.createRadialGradient(cx, cy, innerRadius, cx, cy, outerRadius);
    grad.addColorStop(0, "transparent");
    grad.addColorStop(0.5, color + alphaHex(intensity * 0.4));
    grad.addColorStop(1, color + alphaHex(intensity));

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  },

  destroy(canvas) {
    canvas.remove();
  },
};

/** Convert 0..1 alpha to 2-char hex suffix */
function alphaHex(alpha) {
  const val = Math.round(clamp(alpha, 0, 1) * 255);
  return val.toString(16).padStart(2, "0");
}

// --- waveform ---
SCENE_REGISTRY["waveform"] = (function() {
  
return {
  id: "waveform",
  type: "canvas",
  name: "Waveform",
  category: "Effects",
  defaultParams: {
    bars: 64,
    color: "#6ee7ff",
    mirrorY: true,
    beatSpeed: 2,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);

    const barCount = clamp(toNumber(params.bars, 64), 8, 256) | 0;
    const offsets = new Float64Array(barCount);
    let seed = 197;
    for (let i = 0; i < barCount; i++) {
      seed = (seed * 1103515245 + 12345) & 0x7fffffff;
      offsets[i] = (seed / 0x7fffffff) * Math.PI * 2;
    }
    canvas._data = { offsets };
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) { canvas.width = cw; canvas.height = ch; }
    const W = canvas.width;
    const H = canvas.height;

    const barCount = clamp(toNumber(params.bars, 64), 8, 256) | 0;
    const color = params.color || "#6ee7ff";
    const mirror = params.mirrorY !== false;
    const beatSpeed = toNumber(params.beatSpeed, 2);
    const { offsets } = canvas._data;
    const t = localT * beatSpeed;

    ctx.clearRect(0, 0, W, H);

    const gap = 2;
    const totalGap = gap * (barCount - 1);
    const barW = Math.max(1, (W * 0.7 - totalGap) / barCount);
    const startX = W * 0.15;
    const centerY = H / 2;
    const maxBarH = H * 0.35;

    for (let i = 0; i < barCount; i++) {
      const off = i < offsets.length ? offsets[i] : i;
      const w1 = Math.sin(t * 3.2 + off) * 0.35;
      const w2 = Math.sin(t * 1.8 + off * 1.4) * 0.3;
      const w3 = Math.sin(t * 5.5 + off * 0.6) * 0.2;
      const beat = Math.pow(Math.abs(Math.sin(t * Math.PI * 0.5)), 4) * 0.15;
      const raw = clamp(0.5 + w1 + w2 + w3 + beat, 0, 1);
      const barH = lerp(maxBarH * 0.05, maxBarH, raw);
      const x = startX + i * (barW + gap);

      // Glow: draw a wider transparent version behind
      const glowGrad = ctx.createLinearGradient(x, centerY - barH, x, centerY + (mirror ? barH : 0));
      glowGrad.addColorStop(0, color + "44");
      glowGrad.addColorStop(1, "transparent");
      ctx.fillStyle = glowGrad;
      const glowW = barW + 4;
      ctx.fillRect(x - 2, centerY - barH, glowW, barH + (mirror ? barH : 0));

      // Main bar
      const grad = ctx.createLinearGradient(x, centerY - barH, x, centerY);
      grad.addColorStop(0, color);
      grad.addColorStop(1, color + "88");
      ctx.fillStyle = grad;

      const rx = Math.min(barW / 2, 3);
      ctx.beginPath();
      ctx.roundRect(x, centerY - barH, barW, barH, [rx, rx, 0, 0]);
      ctx.fill();

      if (mirror) {
        const mGrad = ctx.createLinearGradient(x, centerY, x, centerY + barH);
        mGrad.addColorStop(0, color + "66");
        mGrad.addColorStop(1, color + "11");
        ctx.fillStyle = mGrad;
        ctx.beginPath();
        ctx.roundRect(x, centerY, barW, barH, [0, 0, rx, rx]);
        ctx.fill();
      }
    }
  },

  destroy(canvas) { canvas._data = null; canvas.remove(); },
};

})();


// ===== Engine =====
/**
 * NextFrame Engine v2 — Runtime for timeline → HTML playback
 *
 * Manages layer lifecycle, renderFrame(t), enter/exit effects,
 * filter/blend CSS mapping. Supports DOM/Canvas/SVG scene types.
 *
 * Usage:
 *   const engine = createEngine(stageEl, timeline, sceneRegistry);
 *   engine.renderFrame(2.5);   // render at t=2.5s
 *   engine.destroy();          // cleanup
 */

// ─── Easing (uses shared utils when available, standalone fallbacks) ───
// In bundled mode, easeOutCubic/easeInCubic/clamp come from scenes-v2-shared.js
// In ESM mode, we import them

function clamp01(v) { return clamp(v, 0, 1); }

// ─── Enter/Exit Effect Calculator ──────────────────────────────
// Format: "fadeIn 0.8s" or "slideUp 0.6s" or "scaleIn 0.5s" or "none"
function parseEffect(str) {
  if (!str || str === 'none') return null;
  const parts = str.trim().split(/\s+/);
  const type = parts[0];
  const dur = parseFloat(parts[1]) || 0.5;
  return { type, dur };
}

function calcEnterEffect(effect, localT) {
  if (!effect) return { opacity: 1, transform: '' };
  if (localT >= effect.dur) return { opacity: 1, transform: '' };
  const p = easeOutCubic(clamp01(localT / effect.dur));
  switch (effect.type) {
    case 'fadeIn':
      return { opacity: p, transform: '' };
    case 'slideUp':
      return { opacity: p, transform: `translateY(${(1 - p) * 40}px)` };
    case 'slideDown':
      return { opacity: p, transform: `translateY(${(p - 1) * 40}px)` };
    case 'slideLeft':
      return { opacity: p, transform: `translateX(${(1 - p) * 60}px)` };
    case 'slideRight':
      return { opacity: p, transform: `translateX(${(p - 1) * 60}px)` };
    case 'scaleIn':
      return { opacity: p, transform: `scale(${0.85 + 0.15 * p})` };
    default:
      return { opacity: p, transform: '' };
  }
}

function calcExitEffect(effect, localT, dur) {
  if (!effect) return { opacity: 1, transform: '' };
  const exitStart = dur - effect.dur;
  if (localT < exitStart) return { opacity: 1, transform: '' };
  const p = easeInCubic(clamp01((localT - exitStart) / effect.dur));
  switch (effect.type) {
    case 'fadeOut':
      return { opacity: 1 - p, transform: '' };
    case 'slideDown':
      return { opacity: 1 - p, transform: `translateY(${p * 40}px)` };
    case 'scaleOut':
      return { opacity: 1 - p, transform: `scale(${1 - 0.15 * p})` };
    default:
      return { opacity: 1 - p, transform: '' };
  }
}

// ─── Transition Calculator ─────────────────────────────────────
// Format: "dissolve 0.5s" or "wipeLeft 0.8s" or "wipeUp 0.6s" or "none"
function parseTransition(str) {
  if (!str || str === 'none') return null;
  const parts = str.trim().split(/\s+/);
  const type = parts[0];
  const dur = parseFloat(parts[1]) || 0.5;
  return { type, dur };
}

function calcTransitionStyle(transition, progress) {
  if (!transition) return {};
  const p = easeOutCubic(clamp01(progress));
  switch (transition.type) {
    case 'dissolve':
      return { opacity: p };
    case 'wipeLeft':
      return { clipPath: `inset(0 ${(1 - p) * 100}% 0 0)` };
    case 'wipeRight':
      return { clipPath: `inset(0 0 0 ${(1 - p) * 100}%)` };
    case 'wipeUp':
      return { clipPath: `inset(0 0 ${(1 - p) * 100}% 0)` };
    case 'wipeDown':
      return { clipPath: `inset(${(1 - p) * 100}% 0 0 0)` };
    case 'slideLeft':
      return { transform: `translateX(${(1 - p) * 100}%)` };
    case 'slideRight':
      return { transform: `translateX(${(p - 1) * 100}%)` };
    case 'slideUp':
      return { transform: `translateY(${(1 - p) * 100}%)` };
    case 'slideDown':
      return { transform: `translateY(${(p - 1) * 100}%)` };
    case 'zoomIn':
      return { opacity: p, transform: `scale(${0.5 + 0.5 * p})` };
    default:
      return { opacity: p };
  }
}

// ─── Layer Style Resolver ──────────────────────────────────────
// Converts layer properties to CSS on the container div
function applyLayerStyle(el, layer) {
  const s = el.style;
  // Position & size (defaults to full-screen)
  if (layer.x || layer.y || layer.w || layer.h) {
    s.position = 'absolute';
    s.left = layer.x || '0';
    s.top = layer.y || '0';
    s.width = layer.w || '100%';
    s.height = layer.h || '100%';
    if (layer.anchor === 'center') {
      s.transform = 'translate(-50%, -50%)';
    }
  } else {
    s.position = 'absolute';
    s.inset = '0';
  }
  if (layer.borderRadius) s.borderRadius = layer.borderRadius;
  if (layer.shadow && layer.shadow !== 'none') s.boxShadow = layer.shadow;
  if (layer.clipPath && layer.clipPath !== 'none') s.clipPath = layer.clipPath;
}

// ─── Engine ────────────────────────────────────────────────────
function createEngine(stageEl, timeline, sceneRegistry) {
  const { width = 1920, height = 1080, fps = 30, duration = 10, background = '#05050c' } = timeline;
  const layers = timeline.layers || [];

  // Setup stage
  stageEl.style.cssText = `position:relative;width:${width}px;height:${height}px;overflow:hidden;background:${background}`;

  // State for each layer
  const layerStates = [];

  // Create DOM structure for each layer
  for (let i = 0; i < layers.length; i++) {
    const layer = layers[i];
    const scene = sceneRegistry[layer.scene];

    // Container div (the "track")
    const container = document.createElement('div');
    container.className = 'nf-layer';
    container.dataset.layerId = layer.id;
    container.style.cssText = `position:absolute;inset:0;z-index:${i};pointer-events:none;display:none;overflow:hidden`;
    applyLayerStyle(container, layer);
    stageEl.appendChild(container);

    // Scene content container
    const sceneContainer = document.createElement('div');
    sceneContainer.style.cssText = 'position:absolute;inset:0';
    container.appendChild(sceneContainer);

    const state = {
      layer,
      scene,
      container,
      sceneContainer,
      sceneEls: null,        // returned by scene.create()
      created: false,
      wasActive: false,
      enterEffect: parseEffect(layer.enter),
      exitEffect: parseEffect(layer.exit),
      transition: parseTransition(layer.transition),
    };
    layerStates.push(state);
  }

  // ─── renderFrame(t) ───
  function renderFrame(t) {
    for (const state of layerStates) {
      const { layer, scene, container, sceneContainer } = state;
      const start = layer.start || 0;
      const dur = layer.dur || duration;
      const localT = t - start;
      const active = t >= start && t < start + dur;

      if (active) {
        // Lazy create scene on first activation
        if (!state.created && scene) {
          state.sceneEls = scene.create(sceneContainer, layer.params || {});
          state.created = true;
        }

        container.style.display = 'block';

        // Update scene content
        // DOM scenes use normalized time (0~1), Canvas/SVG scenes use seconds
        if (scene && state.sceneEls != null) {
          const sceneT = scene.type === 'dom' ? (localT / dur) : localT;
          scene.update(state.sceneEls, sceneT, layer.params || {});
        }

        // Calculate effects
        const enter = calcEnterEffect(state.enterEffect, localT);
        const exit = calcExitEffect(state.exitEffect, localT, dur);

        // Calculate transition (applied at layer start)
        let transOpacity = 1;
        let transTransform = '';
        let transClipPath = '';
        if (state.transition && localT < state.transition.dur) {
          const tp = clamp01(localT / state.transition.dur);
          const ts = calcTransitionStyle(state.transition, tp);
          if (ts.opacity != null) transOpacity = ts.opacity;
          if (ts.transform) transTransform = ts.transform;
          if (ts.clipPath) transClipPath = ts.clipPath;
        }

        const opacity = enter.opacity * exit.opacity * transOpacity * (layer.opacity != null ? layer.opacity : 1);
        const transforms = [enter.transform, exit.transform, transTransform].filter(Boolean).join(' ');

        // Apply visual properties
        container.style.opacity = opacity;
        if (transClipPath) {
          container.style.clipPath = transClipPath;
        } else if (layer.clipPath && layer.clipPath !== 'none') {
          container.style.clipPath = layer.clipPath;
        } else {
          container.style.clipPath = '';
        }
        if (transforms) {
          container.style.transform = transforms;
        } else if (!layer.x && !layer.y) {
          container.style.transform = '';
        }

        // Blend mode
        if (layer.blend && layer.blend !== 'normal') {
          container.style.mixBlendMode = layer.blend;
        }

        // CSS filter
        if (layer.filter && layer.filter !== 'none') {
          container.style.filter = layer.filter;
        }

        // Rotation (if not handled by enter/exit transforms)
        if (layer.rotation) {
          container.style.transform += ` rotate(${layer.rotation}deg)`;
        }

        state.wasActive = true;
      } else {
        // Hide inactive layers
        if (state.wasActive) {
          container.style.display = 'none';
          container.style.opacity = '';
          container.style.transform = '';
          container.style.filter = '';
          state.wasActive = false;
        }
      }
    }
  }

  // ─── Destroy ───
  function destroy() {
    for (const state of layerStates) {
      if (state.created && state.scene) {
        try { state.scene.destroy(state.sceneEls); } catch (_) {}
      }
      state.container.remove();
    }
    layerStates.length = 0;
  }

  // ─── Recorder protocol ───
  window.__onFrame = function (frame) {
    renderFrame(Number(frame.time) || 0);
    return true;
  };

  return {
    renderFrame,
    destroy,
    get width() { return width; },
    get height() { return height; },
    get fps() { return fps; },
    get duration() { return duration; },
    get layerCount() { return layers.length; },
  };
}

// ─── Player Controls (browser preview) ────────────────────────
function createPlayer(engine, stageEl) {
  const { duration, fps, width, height } = engine;
  let playing = false;
  let startWall = 0;
  let startTime = 0;
  let currentTime = 0;

  const bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:10px 20px;background:rgba(0,0,0,0.92);display:flex;align-items:center;gap:12px;font:13px -apple-system,sans-serif;color:#aaa;z-index:9999';

  const playBtn = document.createElement('button');
  playBtn.textContent = '\u25B6';
  playBtn.style.cssText = 'background:#222;border:1px solid #444;color:#fff;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:13px';

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.min = '0';
  slider.max = String(duration * 1000);
  slider.value = '0';
  slider.style.cssText = 'flex:1;accent-color:#a78bfa';

  const timeLabel = document.createElement('span');
  timeLabel.style.cssText = 'min-width:90px;text-align:right;font-family:"SF Mono",monospace;font-size:12px';

  const info = document.createElement('span');
  info.style.cssText = 'font-size:11px;color:#666';
  info.textContent = `| ${duration}s @ ${fps}fps | ${width}\u00d7${height} | layers:${engine.layerCount}`;

  bar.append(playBtn, slider, timeLabel, info);
  document.body.appendChild(bar);

  function seek(t) {
    t = Math.max(0, Math.min(duration, t));
    currentTime = t;
    slider.value = String(t * 1000);
    timeLabel.textContent = t.toFixed(3) + 's';
    engine.renderFrame(t);
  }

  slider.addEventListener('input', () => {
    playing = false;
    playBtn.textContent = '\u25B6';
    seek(Number(slider.value) / 1000);
  });

  playBtn.addEventListener('click', togglePlay);

  function togglePlay() {
    if (playing) {
      playing = false;
      playBtn.textContent = '\u25B6';
      return;
    }
    playing = true;
    playBtn.textContent = '\u23F8';
    startWall = performance.now();
    startTime = currentTime >= duration ? 0 : currentTime;
    tick();
  }

  function tick() {
    if (!playing) return;
    const t = startTime + (performance.now() - startWall) / 1000;
    if (t >= duration) {
      seek(duration);
      playing = false;
      playBtn.textContent = '\u25B6';
      return;
    }
    seek(t);
    requestAnimationFrame(tick);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { e.preventDefault(); seek(currentTime - 1); }
    if (e.code === 'ArrowRight') { e.preventDefault(); seek(currentTime + 1); }
    if (e.code === 'Home') { e.preventDefault(); seek(0); }
    if (e.code === 'End') { e.preventDefault(); seek(duration); }
  });

  seek(0);

  return {
    seek,
    play: togglePlay,
    get currentTime() { return currentTime; },
    destroy() { bar.remove(); },
  };
}
