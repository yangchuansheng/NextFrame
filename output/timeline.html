<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NextFrame — Generated Video</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #111; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
  #stage { box-shadow: 0 0 80px rgba(100,80,200,0.15); }
  .nf-layer { will-change: opacity, transform; }
</style>
</head>
<body>
<div id="stage"></div>
<script>
// ===== Shared Utilities =====
const SANS_FONT_STACK = '-apple-system, "SF Pro Display", "PingFang SC", sans-serif';
const MONO_FONT_STACK = '"SF Mono", "Fira Code", Menlo, monospace';
const SERIF_FONT_STACK = '"Iowan Old Style", "Times New Roman", "Songti SC", serif';

function clamp(value, min = 0, max = 1) {
  return Math.min(max, Math.max(min, value));
}

function lerp(start, end, progress) {
  return start + ((end - start) * progress);
}

function smoothstep(edge0, edge1, value) {
  if (edge0 === edge1) {
    return value >= edge1 ? 1 : 0;
  }

  const progress = clamp((value - edge0) / (edge1 - edge0));
  return progress * progress * (3 - (2 * progress));
}

function easeOutCubic(value) {
  return 1 - ((1 - value) ** 3);
}

function easeInCubic(value) {
  return value ** 3;
}

function easeOutBack(value) {
  const overshoot = 1.70158;
  const shifted = value - 1;
  return 1 + ((overshoot + 1) * (shifted ** 3)) + (overshoot * (shifted ** 2));
}

function toNumber(value, fallback) {
  const numeric = Number(value);
  return Number.isFinite(numeric) ? numeric : fallback;
}

function toBoolean(value, fallback = false) {
  if (value === true || value === false) {
    return value;
  }

  if (value === "true") {
    return true;
  }

  if (value === "false") {
    return false;
  }

  return fallback;
}

function normalizeLines(value) {
  return String(value ?? "").replace(/\r\n/g, "\n").split("\n");
}

function normalizeArray(value, fallback = []) {
  return Array.isArray(value) ? value : fallback;
}

function createRoot(container, extraStyles = "") {
  const root = document.createElement("div");
  root.style.cssText = [
    "position:absolute",
    "inset:0",
    "overflow:hidden",
    "pointer-events:none",
    extraStyles,
  ].filter(Boolean).join(";");
  container.appendChild(root);
  return root;
}

function setStyle(element, styles) {
  element.style.cssText = styles;
  return element;
}

function createNode(tagName, styles = "", text = "") {
  const element = document.createElement(tagName);
  if (styles) {
    element.style.cssText = styles;
  }
  if (text) {
    element.textContent = text;
  }
  return element;
}

function setVisible(element, visible) {
  element.style.display = visible ? "" : "none";
}

function hashString(value) {
  let result = 2166136261;
  const text = String(value ?? "");

  for (let index = 0; index < text.length; index += 1) {
    result ^= text.charCodeAt(index);
    result = Math.imul(result, 16777619);
  }

  return result >>> 0;
}

function hashFloat(seed, salt = "") {
  let value = (Math.imul((seed | 0) ^ 0x9e3779b9, 1597334677) ^ hashString(salt)) >>> 0;
  value ^= value >>> 15;
  value = Math.imul(value, 2246822519) >>> 0;
  value ^= value >>> 13;
  value = Math.imul(value, 3266489917) >>> 0;
  value ^= value >>> 16;
  return value / 4294967295;
}

function makeLinearGradient(colors, fallback = ["#ffffff"]) {
  const palette = normalizeArray(colors, fallback).filter(Boolean);
  return `linear-gradient(135deg, ${(palette.length > 0 ? palette : fallback).join(", ")})`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function sanitizeUrl(url) {
  const value = String(url ?? "").trim();
  if (!value) {
    return "";
  }

  if (/^(https?:|mailto:|#|\/)/i.test(value)) {
    return value;
  }

  return "";
}

function sanitizeHtml(value) {
  const template = document.createElement("template");
  template.innerHTML = String(value ?? "");

  const blockedTags = new Set(["SCRIPT", "STYLE", "IFRAME", "OBJECT", "EMBED", "LINK", "META"]);
  const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT);
  const blocked = [];

  while (walker.nextNode()) {
    const element = walker.currentNode;
    if (!(element instanceof HTMLElement)) {
      continue;
    }

    if (blockedTags.has(element.tagName)) {
      blocked.push(element);
      continue;
    }

    [...element.attributes].forEach((attribute) => {
      const name = attribute.name.toLowerCase();
      if (name.startsWith("on")) {
        element.removeAttribute(attribute.name);
        return;
      }

      if ((name === "href" || name === "src") && sanitizeUrl(attribute.value) !== attribute.value) {
        element.removeAttribute(attribute.name);
      }
    });
  }

  blocked.forEach((element) => element.remove());
  return template.innerHTML;
}

function formatInlineMarkdown(value) {
  const codeTokens = [];
  let text = escapeHtml(value);

  text = text.replace(/`([^`]+)`/g, (_, code) => {
    const token = `__CODE_${codeTokens.length}__`;
    codeTokens.push(`<code>${escapeHtml(code)}</code>`);
    return token;
  });

  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
    const safeUrl = sanitizeUrl(url);
    if (!safeUrl) {
      return escapeHtml(label);
    }

    return `<a href="${escapeHtml(safeUrl)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
  });

  text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");

  codeTokens.forEach((token, index) => {
    text = text.replace(`__CODE_${index}__`, token);
  });

  return text;
}

function markdownToHtml(markdown) {
  const lines = String(markdown ?? "").replace(/\r\n/g, "\n").split("\n");
  const html = [];
  const paragraph = [];
  let listItems = [];
  let inCode = false;
  let codeFence = "";
  let codeLines = [];

  const flushParagraph = () => {
    if (paragraph.length === 0) {
      return;
    }

    html.push(`<p>${formatInlineMarkdown(paragraph.join(" "))}</p>`);
    paragraph.length = 0;
  };

  const flushList = () => {
    if (listItems.length === 0) {
      return;
    }

    html.push(`<ul>${listItems.join("")}</ul>`);
    listItems = [];
  };

  const flushCode = () => {
    if (!inCode) {
      return;
    }

    const languageClass = codeFence ? ` class="language-${escapeHtml(codeFence)}"` : "";
    html.push(`<pre><code${languageClass}>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
    inCode = false;
    codeFence = "";
    codeLines = [];
  };

  for (const rawLine of lines) {
    const line = rawLine.trimEnd();
    const fenceMatch = line.match(/^```([\w-]+)?$/);
    if (fenceMatch) {
      if (inCode) {
        flushCode();
      } else {
        flushParagraph();
        flushList();
        inCode = true;
        codeFence = fenceMatch[1] || "";
        codeLines = [];
      }
      continue;
    }

    if (inCode) {
      codeLines.push(rawLine);
      continue;
    }

    if (!line.trim()) {
      flushParagraph();
      flushList();
      continue;
    }

    const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
    if (headingMatch) {
      flushParagraph();
      flushList();
      const level = headingMatch[1].length;
      html.push(`<h${level}>${formatInlineMarkdown(headingMatch[2])}</h${level}>`);
      continue;
    }

    if (/^---+$/.test(line)) {
      flushParagraph();
      flushList();
      html.push("<hr />");
      continue;
    }

    const quoteMatch = line.match(/^>\s?(.*)$/);
    if (quoteMatch) {
      flushParagraph();
      flushList();
      html.push(`<blockquote><p>${formatInlineMarkdown(quoteMatch[1])}</p></blockquote>`);
      continue;
    }

    const listMatch = line.match(/^[-*]\s+(.*)$/);
    if (listMatch) {
      flushParagraph();
      listItems.push(`<li>${formatInlineMarkdown(listMatch[1])}</li>`);
      continue;
    }

    paragraph.push(line.trim());
  }

  flushParagraph();
  flushList();
  flushCode();

  return html.join("");
}


// ===== Scene Components =====
const SCENE_REGISTRY = {};


// --- auroraGradient ---
SCENE_REGISTRY["auroraGradient"] = (function() {
  
return {
  id: "auroraGradient",
  type: "canvas",
  name: "Aurora Gradient",
  category: "Backgrounds",
  defaultParams: {
    hueA: 220,
    hueB: 280,
    hueC: 180,
    intensity: 0.7,
    grain: 0.03,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;

    const hueA = toNumber(params.hueA, 220);
    const hueB = toNumber(params.hueB, 280);
    const hueC = toNumber(params.hueC, 180);
    const intensity = clamp(toNumber(params.intensity, 0.7), 0, 1);
    const grain = clamp(toNumber(params.grain, 0.03), 0, 0.2);

    // Dark background
    ctx.fillStyle = "#0a0a14";
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = "lighter";

    const t = localT * 0.15;
    const orbs = [
      { hue: hueA, cx: 0.3 + 0.2 * Math.sin(t * 0.7), cy: 0.4 + 0.15 * Math.cos(t * 0.5), r: 0.45 },
      { hue: hueB, cx: 0.7 + 0.15 * Math.cos(t * 0.6), cy: 0.3 + 0.2 * Math.sin(t * 0.8), r: 0.5 },
      { hue: hueC, cx: 0.5 + 0.25 * Math.sin(t * 0.4 + 1), cy: 0.7 + 0.1 * Math.cos(t * 0.9), r: 0.4 },
      { hue: (hueA + hueB) / 2, cx: 0.4 + 0.1 * Math.cos(t * 1.1), cy: 0.5 + 0.15 * Math.sin(t * 0.3), r: 0.35 },
    ];

    for (const orb of orbs) {
      const cx = orb.cx * W;
      const cy = orb.cy * H;
      const radius = orb.r * Math.max(W, H);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      const alpha = intensity * 0.35;
      grad.addColorStop(0, `hsla(${orb.hue}, 80%, 55%, ${alpha})`);
      grad.addColorStop(0.4, `hsla(${orb.hue}, 70%, 40%, ${alpha * 0.5})`);
      grad.addColorStop(1, `hsla(${orb.hue}, 60%, 20%, 0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.globalCompositeOperation = "source-over";

    // Film grain
    if (grain > 0) {
      const imageData = ctx.getImageData(0, 0, W, H);
      const data = imageData.data;
      const strength = grain * 40;
      // Simple pseudo-random grain based on position + time
      let seed = (localT * 1000) | 0;
      for (let i = 0; i < data.length; i += 4) {
        seed = (seed * 1103515245 + 12345) & 0x7fffffff;
        const noise = ((seed >> 16) / 32767 - 0.5) * strength;
        data[i] = clamp(data[i] + noise, 0, 255);
        data[i + 1] = clamp(data[i + 1] + noise, 0, 255);
        data[i + 2] = clamp(data[i + 2] + noise, 0, 255);
      }
      ctx.putImageData(imageData, 0, 0);
    }
  },

  destroy(canvas) {
    canvas.remove();
  },
};

})();


// --- barChart ---
SCENE_REGISTRY["barChart"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const FONT = '-apple-system, "SF Pro Display", sans-serif';
const PALETTE = ["#6ee7ff", "#a78bfa", "#f472b6", "#fb923c", "#4ade80", "#fbbf24"];

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

return {
  id: "barChart",
  type: "svg",
  name: "Bar Chart",
  category: "Data Viz",
  defaultParams: {
    data: [85, 45, 70, 55, 90, 35],
    labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
    colors: PALETTE,
    barWidth: 80,
    gap: 30,
    showLabels: true,
    showValues: true,
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const data = normalizeArray(params.data, [85, 45, 70, 55, 90, 35]);
    const labels = normalizeArray(params.labels, []);
    const colors = normalizeArray(params.colors, PALETTE);
    const barW = toNumber(params.barWidth, 80);
    const gap = toNumber(params.gap, 30);
    const showLabels = params.showLabels !== false;
    const showValues = params.showValues !== false;
    const maxVal = Math.max(...data, 1);

    const padL = 160, padR = 160, padT = 120, padB = 140;
    const chartW = 1920 - padL - padR;
    const chartH = 1080 - padT - padB;
    const totalBarW = data.length * barW + (data.length - 1) * gap;
    const offsetX = padL + (chartW - totalBarW) / 2;

    // grid lines
    for (let i = 0; i <= 4; i++) {
      const y = padT + (chartH / 4) * i;
      svg.appendChild(svgEl("line", {
        x1: padL, y1: y, x2: 1920 - padR, y2: y,
        stroke: "rgba(255,255,255,0.08)", "stroke-width": "1",
      }));
    }

    // baseline
    svg.appendChild(svgEl("line", {
      x1: padL, y1: padT + chartH, x2: 1920 - padR, y2: padT + chartH,
      stroke: "rgba(255,255,255,0.2)", "stroke-width": "2",
    }));

    const bars = [];
    const valueTxts = [];
    const labelTxts = [];

    data.forEach((val, i) => {
      const x = offsetX + i * (barW + gap);
      const fullH = (val / maxVal) * chartH;
      const color = colors[i % colors.length];

      const rect = svgEl("rect", {
        x: String(x), y: String(padT + chartH),
        width: String(barW), height: "0",
        rx: "4", fill: color, opacity: "0.9",
      });
      svg.appendChild(rect);
      bars.push({ rect, fullH, val });

      if (showValues) {
        const txt = svgEl("text", {
          x: String(x + barW / 2), y: String(padT + chartH),
          fill: "rgba(255,255,255,0.85)", "font-size": "22",
          "font-family": FONT, "font-weight": "600",
          "text-anchor": "middle", opacity: "0",
        });
        txt.textContent = String(val);
        svg.appendChild(txt);
        valueTxts.push(txt);
      }

      if (showLabels && labels[i]) {
        const lbl = svgEl("text", {
          x: String(x + barW / 2), y: String(padT + chartH + 40),
          fill: "rgba(255,255,255,0.6)", "font-size": "20",
          "font-family": FONT, "text-anchor": "middle",
        });
        lbl.textContent = labels[i];
        svg.appendChild(lbl);
        labelTxts.push(lbl);
      }
    });

    return { svg, bars, valueTxts, labelTxts, chartH, padT };
  },

  update(els, localT, params) {
    const stagger = 0.12;
    const dur = 0.8;

    els.bars.forEach((b, i) => {
      const start = i * stagger;
      const raw = clamp((localT - start) / dur, 0, 1);
      const t = raw > 0 ? easeOutBack(raw) : 0;
      const h = b.fullH * clamp(t, 0, 1.15);
      const y = els.padT + els.chartH - h;
      b.rect.setAttribute("y", String(y));
      b.rect.setAttribute("height", String(Math.max(0, h)));

      if (els.valueTxts[i]) {
        els.valueTxts[i].setAttribute("y", String(y - 12));
        els.valueTxts[i].setAttribute("opacity", String(clamp(raw * 3, 0, 1)));
      }
    });
  },

  destroy(els) { els.svg.remove(); },
};

})();


// --- bulletList ---
SCENE_REGISTRY["bulletList"] = (function() {
  
return {
  id: "bulletList",
  type: "dom",
  name: "Bullet List",
  category: "Typography",
  defaultParams: {
    items: ["First point", "Second point", "Third point"],
    fontSize: 28,
    bulletColor: "#a78bfa",
    stagger: 0.08,
  },

  create(container, params) {
    const root = createRoot(container, "display:flex;flex-direction:column;justify-content:center;padding:8% 12%");
    const items = normalizeArray(params.items, ["Item"]);
    const fontSize = toNumber(params.fontSize, 28);
    const bulletColor = params.bulletColor || "#a78bfa";
    const rows = items.map((text) => {
      const row = createNode("div", [
        "display:flex",
        "align-items:flex-start",
        "gap:0.6em",
        "margin-bottom:0.7em",
        "will-change:transform,opacity",
        "opacity:0",
        "transform:translateX(-30px)",
      ].join(";"));
      const dot = createNode("span", [
        `width:10px`,
        `height:10px`,
        `min-width:10px`,
        `border-radius:50%`,
        `background:${bulletColor}`,
        `margin-top:${fontSize * 0.35}px`,
        `box-shadow:0 0 12px ${bulletColor}66`,
      ].join(";"));
      const label = createNode("span", [
        `font-family:${SANS_FONT_STACK}`,
        `font-size:${fontSize}px`,
        "font-weight:500",
        "color:rgba(255,255,255,0.92)",
        "line-height:1.5",
        "letter-spacing:0.01em",
      ].join(";"), text);
      row.appendChild(dot);
      row.appendChild(label);
      root.appendChild(row);
      return row;
    });
    return { root, rows };
  },

  update(els, localT, params) {
    const stagger = toNumber(params.stagger, 0.08);
    const exitAlpha = 1 - smoothstep(0.85, 1, localT);
    els.rows.forEach((row, i) => {
      const enterT = smoothstep(0.02 + i * stagger, 0.12 + i * stagger, localT);
      const progress = easeOutCubic(enterT);
      const x = (1 - progress) * -30;
      const alpha = progress * exitAlpha;
      row.style.opacity = alpha;
      row.style.transform = `translateX(${x}px)`;
    });
  },

  destroy(els) { els.root.remove(); },
};

})();


// --- calloutCard ---
SCENE_REGISTRY["calloutCard"] = (function() {
  
return {
  id: "calloutCard",
  type: "dom",
  name: "Callout Card",
  category: "Overlay",
  defaultParams: {
    icon: "\uD83D\uDE80",
    title: "Launch Ready",
    description: "Everything is set up and ready to go. Just hit publish.",
    bgColor: "rgba(30,30,50,0.85)",
    borderColor: "#a78bfa",
  },

  create(container, params) {
    const root = createRoot(container, "display:flex;align-items:center;justify-content:center");
    const border = params.borderColor || "#a78bfa";
    const card = createNode("div", [
      `background:${params.bgColor || "rgba(30,30,50,0.85)"}`,
      `border:1px solid ${border}33`,
      "border-radius:16px",
      "padding:32px 36px",
      "max-width:420px",
      "width:85%",
      `box-shadow:0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px ${border}11`,
      "backdrop-filter:blur(12px)",
      "-webkit-backdrop-filter:blur(12px)",
      "will-change:transform,opacity",
      "opacity:0",
      "transform:scale(0.8)",
    ].join(";"));
    const iconEl = createNode("div", [
      "font-size:40px",
      "margin-bottom:14px",
      "line-height:1",
    ].join(";"), params.icon || "\uD83D\uDE80");
    const titleEl = createNode("div", [
      `font-family:${SANS_FONT_STACK}`,
      "font-size:22px",
      "font-weight:700",
      "color:rgba(255,255,255,0.95)",
      "margin-bottom:8px",
      "letter-spacing:0.01em",
    ].join(";"), params.title || "");
    const descEl = createNode("div", [
      `font-family:${SANS_FONT_STACK}`,
      "font-size:15px",
      "font-weight:400",
      "color:rgba(255,255,255,0.6)",
      "line-height:1.6",
    ].join(";"), params.description || "");
    card.appendChild(iconEl);
    card.appendChild(titleEl);
    card.appendChild(descEl);
    root.appendChild(card);
    return { root, card };
  },

  update(els, localT) {
    const exitAlpha = 1 - smoothstep(0.85, 1, localT);
    const enterT = smoothstep(0, 0.12, localT);
    const scale = 0.8 + 0.2 * easeOutBack(enterT);
    els.card.style.opacity = enterT * exitAlpha;
    els.card.style.transform = `scale(${scale})`;
  },

  destroy(els) { els.root.remove(); },
};

})();


// --- card3d ---
SCENE_REGISTRY["card3d"] = (function() {
  
return {
  id: "card3d",
  type: "dom",
  name: "3D Card Flip",
  category: "Motion Graphics",
  defaultParams: {
    frontTitle: "Front",
    frontSubtitle: "",
    backContent: "Back side",
    bgColor: "rgba(30,30,50,0.9)",
    rotateAxis: "Y",
  },

  create(container, params) {
    const root = createRoot(container, "display:flex;align-items:center;justify-content:center;perspective:1200px");
    const bgColor = params.bgColor || "rgba(30,30,50,0.9)";
    const axis = (params.rotateAxis || "Y").toUpperCase() === "X" ? "X" : "Y";

    const card = createNode("div", [
      "position:relative;width:360px;height:240px",
      "transform-style:preserve-3d",
      "will-change:transform;opacity:0",
    ].join(";"));

    const faceBase = [
      "position:absolute;inset:0;display:flex;flex-direction:column",
      "align-items:center;justify-content:center;backface-visibility:hidden",
      `background:${bgColor};border-radius:16px`,
      `border:1px solid rgba(255,255,255,0.1)`,
      `box-shadow:0 8px 32px rgba(0,0,0,0.4)`,
      `font-family:${SANS_FONT_STACK}`,
    ].join(";");

    const front = createNode("div", faceBase);
    const title = createNode("div", [
      "font-size:28px;font-weight:700;color:#fff",
      "letter-spacing:-0.01em",
    ].join(";"), params.frontTitle || "Front");
    front.appendChild(title);
    if (params.frontSubtitle) {
      const sub = createNode("div", "font-size:14px;color:rgba(255,255,255,0.5);margin-top:8px", params.frontSubtitle);
      front.appendChild(sub);
    }

    const back = createNode("div", [
      faceBase,
      `transform:rotate${axis}(180deg)`,
    ].join(";"));
    const backText = createNode("div", "font-size:18px;color:rgba(255,255,255,0.8);padding:24px;text-align:center;line-height:1.5", params.backContent || "Back side");
    back.appendChild(backText);

    card.appendChild(front);
    card.appendChild(back);
    root.appendChild(card);
    return { root, card, axis };
  },

  update(els, localT) {
    const fadeIn = smoothstep(0, 0.1, localT);
    const fadeOut = 1 - smoothstep(0.85, 1, localT);
    els.card.style.opacity = fadeIn * fadeOut;

    // 0~0.15: flip from 180 to 0 (back→front), 0.15~0.85: show front (0), 0.85~1: flip to 180
    let deg;
    if (localT < 0.15) {
      const t = easeOutCubic(smoothstep(0, 0.15, localT));
      deg = 180 - t * 180;
    } else if (localT > 0.85) {
      const t = easeOutCubic(smoothstep(0.85, 1, localT));
      deg = t * 180;
    } else {
      deg = 0;
    }
    els.card.style.transform = `rotate${els.axis}(${deg}deg)`;
  },

  destroy(els) { els.root.remove(); },
};

})();

SCENE_REGISTRY["circleRipple"] = (function() {
  
return {
  id: "circleRipple",
  type: "canvas",
  name: "Circle Ripple",
  category: "Effects",
  defaultParams: {
    count: 5,
    speed: 1,
    color: "#7c6ef0",
    strokeWidth: 2,
    maxRadius: 0.8,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    const count = clamp(toNumber(params.count, 5), 1, 20) | 0;
    const speed = toNumber(params.speed, 1);
    const color = params.color || "#7c6ef0";
    const strokeWidth = clamp(toNumber(params.strokeWidth, 2), 0.5, 10);
    const maxRadiusFrac = clamp(toNumber(params.maxRadius, 0.8), 0.2, 1.5);
    const maxRadius = maxRadiusFrac * Math.min(W, H) / 2;

    ctx.clearRect(0, 0, W, H);

    // Each ring has a staggered phase; cycle period = count spacing

    ctx.strokeStyle = color;
    ctx.lineWidth = strokeWidth;

    for (let i = 0; i < count; i++) {
      // Progress 0..1 for this ring, looping
      const phase = ((localT * speed * 0.3) - i * (1 / count)) % 1;
      const p = phase < 0 ? phase + 1 : phase;

      const radius = p * maxRadius;
      // Fade in quickly, fade out at the edge
      const alpha = smoothstep(0, 0.1, p) * smoothstep(1, 0.7, p);

      if (alpha < 0.01) continue;

      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
  },

  destroy(canvas) {
    canvas.remove();
  },
};

})();

SCENE_REGISTRY["confetti"] = (function() {
  
const DEFAULT_COLORS = ["#6ee7ff", "#a78bfa", "#f472b6", "#fb923c", "#4ade80", "#fbbf24"];

return {
  id: "confetti",
  type: "canvas",
  name: "Confetti",
  category: "Effects",
  defaultParams: {
    count: 100,
    colors: DEFAULT_COLORS,
    gravity: 0.5,
    spread: 60,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);

    const count = clamp(toNumber(params.count, 100), 10, 500) | 0;
    const colors = normalizeArray(params.colors, DEFAULT_COLORS);
    const spread = toNumber(params.spread, 60);

    let seed = 42;
    const rng = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };

    const particles = [];
    for (let i = 0; i < count; i++) {
      const angle = ((rng() - 0.5) * spread * Math.PI) / 180 - Math.PI / 2;
      const velocity = 300 + rng() * 400;
      particles.push({
        x: 0.5, y: 0.7,
        vx: Math.cos(angle) * velocity * (rng() * 0.5 + 0.75),
        vy: Math.sin(angle) * velocity * (rng() * 0.5 + 0.75),
        w: 6 + rng() * 8, h: 4 + rng() * 6,
        rot: rng() * Math.PI * 2,
        rotSpeed: (rng() - 0.5) * 12,
        color: colors[i % colors.length] || "#fff",
        shape: rng() > 0.5 ? "rect" : "circle",
      });
    }
    canvas._data = { particles };
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) { canvas.width = cw; canvas.height = ch; }
    const W = canvas.width;
    const H = canvas.height;
    const gravity = toNumber(params.gravity, 0.5) * 800;
    const t = localT;

    ctx.clearRect(0, 0, W, H);
    const { particles } = canvas._data;

    for (const p of particles) {
      const px = (p.x + p.vx * t / W) * W;
      const py = (p.y + p.vy * t / H + 0.5 * gravity * t * t / H) * H;
      if (py > H + 20) continue;

      const rot = p.rot + p.rotSpeed * t;
      const alpha = clamp(1 - t * 0.3, 0.2, 1);

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;

      if (p.shape === "circle") {
        ctx.beginPath();
        ctx.arc(0, 0, p.w * 0.5, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w * 0.5, -p.h * 0.5, p.w, p.h);
      }
      ctx.restore();
    }
  },

  destroy(canvas) { canvas._data = null; canvas.remove(); },
};

})();

// --- flowChart ---
SCENE_REGISTRY["flowChart"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const DEFAULT_STEPS = [
  { label: "Input" }, { label: "Process" }, { label: "Validate" }, { label: "Output" },
];

function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  if (attrs) { for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v); }
  return el;
}

return {
  id: "flowChart",
  type: "svg",
  name: "Flow Chart",
  category: "Data Viz",
  defaultParams: {
    steps: DEFAULT_STEPS,
    color: "#6ee7ff",
    arrowColor: "#a78bfa",
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const steps = normalizeArray(params.steps, DEFAULT_STEPS);
    const color = params.color || "#6ee7ff";
    const arrowColor = params.arrowColor || "#a78bfa";
    const count = clamp(steps.length, 2, 6);
    const boxW = 200, boxH = 80, cy = 540;
    const totalW = count * boxW + (count - 1) * 100;
    const startX = (1920 - totalW) / 2;

    // Defs: arrow marker + glow
    const defs = svgEl("defs");
    const marker = svgEl("marker", {
      id: "fcArrow", viewBox: "0 0 10 10", refX: "10", refY: "5",
      markerWidth: "8", markerHeight: "8", orient: "auto-start-reverse",
    });
    const path = svgEl("path", { d: "M 0 0 L 10 5 L 0 10 z", fill: arrowColor });
    marker.appendChild(path);
    defs.appendChild(marker);
    svg.appendChild(defs);

    const boxes = [];
    const arrows = [];

    for (let i = 0; i < count; i++) {
      const x = startX + i * (boxW + 100);
      const g = svgEl("g", { opacity: "0" });

      const rect = svgEl("rect", {
        x: String(x), y: String(cy - boxH / 2),
        width: String(boxW), height: String(boxH),
        rx: "12", fill: "rgba(255,255,255,0.06)",
        stroke: color, "stroke-width": "1.5",
      });
      g.appendChild(rect);

      const text = svgEl("text", {
        x: String(x + boxW / 2), y: String(cy + 6),
        fill: "#fff", "font-size": "17", "text-anchor": "middle",
        "font-family": "-apple-system, sans-serif", "font-weight": "600",
      });
      text.textContent = (steps[i] && steps[i].label) || `Step ${i + 1}`;
      g.appendChild(text);

      svg.appendChild(g);
      boxes.push(g);

      // Arrow between boxes
      if (i < count - 1) {
        const ax1 = x + boxW + 8;
        const ax2 = x + boxW + 100 - 8;
        const arrow = svgEl("line", {
          x1: String(ax1), y1: String(cy),
          x2: String(ax2), y2: String(cy),
          stroke: arrowColor, "stroke-width": "2",
          "marker-end": "url(#fcArrow)", opacity: "0",
        });
        svg.appendChild(arrow);
        arrows.push(arrow);
      }
    }

    return { svg, boxes, arrows };
  },

  update(els, localT) {
    const total = els.boxes.length + els.arrows.length;
    const progress = Math.min(1, localT / Math.max(total * 0.5, 2));

    let idx = 0;
    for (let i = 0; i < els.boxes.length; i++) {
      const threshold = (idx + 1) / (total + 1);
      els.boxes[i].setAttribute("opacity", progress >= threshold ? "1" : "0");
      idx++;
      if (i < els.arrows.length) {
        const aThreshold = (idx + 1) / (total + 1);
        els.arrows[i].setAttribute("opacity", progress >= aThreshold ? "1" : "0");
        idx++;
      }
    }
  },

  destroy(els) { els.svg.remove(); },
};

})();

SCENE_REGISTRY["fluidBackground"] = (function() {
  
return {
  id: "fluidBackground",
  type: "canvas",
  name: "Fluid Background",
  category: "Backgrounds",
  defaultParams: {
    colors: ["#4a00e0", "#8e2de2", "#00d2ff", "#ff6b6b"],
    speed: 1,
    blur: 80,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);

    // Pre-compute blob motion parameters
    const colors = Array.isArray(params.colors) && params.colors.length > 0
      ? params.colors
      : ["#4a00e0", "#8e2de2", "#00d2ff", "#ff6b6b"];
    const blobCount = colors.length;
    const blobs = [];
    let seed = 311;
    const rng = () => {
      seed = (seed * 1103515245 + 12345) & 0x7fffffff;
      return seed / 0x7fffffff;
    };
    for (let i = 0; i < blobCount; i++) {
      blobs.push({
        cx: 0.2 + rng() * 0.6,
        cy: 0.2 + rng() * 0.6,
        freqX: 0.2 + rng() * 0.3,
        freqY: 0.15 + rng() * 0.25,
        phaseX: rng() * Math.PI * 2,
        phaseY: rng() * Math.PI * 2,
        ampX: 0.15 + rng() * 0.15,
        ampY: 0.15 + rng() * 0.15,
        radius: 0.25 + rng() * 0.15,
        color: colors[i],
      });
    }
    canvas._data = { blobs };
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;

    const speed = toNumber(params.speed, 1);
    const blur = clamp(toNumber(params.blur, 80), 0, 200);
    const { blobs } = canvas._data;
    const t = localT * speed;

    // Dark base
    ctx.fillStyle = "#0a0a18";
    ctx.fillRect(0, 0, W, H);

    // Apply blur filter for fluid look
    ctx.filter = blur > 0 ? `blur(${blur}px)` : "none";
    ctx.globalCompositeOperation = "lighter";

    for (const blob of blobs) {
      const cx = (blob.cx + Math.sin(t * blob.freqX + blob.phaseX) * blob.ampX) * W;
      const cy = (blob.cy + Math.cos(t * blob.freqY + blob.phaseY) * blob.ampY) * H;
      const radius = blob.radius * Math.max(W, H);

      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grad.addColorStop(0, blob.color + "aa");
      grad.addColorStop(0.5, blob.color + "55");
      grad.addColorStop(1, "transparent");

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.filter = "none";
    ctx.globalCompositeOperation = "source-over";
  },

  destroy(canvas) {
    canvas._data = null;
    canvas.remove();
  },
};

})();

const FONT = '-apple-system, "SF Pro Display", sans-serif';
const PALETTE = ["#6ee7ff", "#a78bfa", "#f472b6", "#fb923c", "#4ade80", "#fbbf24"];

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

return {
  id: "horizontalBars",
  type: "svg",
  name: "Horizontal Bar Chart",
  category: "Data Viz",
  defaultParams: {
    data: [90, 72, 65, 50, 38, 25],
    labels: ["React", "Python", "Rust", "Go", "Swift", "Kotlin"],
    colors: PALETTE,
    height: 44,
    gap: 20,
    showValues: true,
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const data = normalizeArray(params.data, [90, 72, 65, 50, 38, 25]);
    const labels = normalizeArray(params.labels, []);
    const colors = normalizeArray(params.colors, PALETTE);
    const barH = toNumber(params.height, 44);
    const gap = toNumber(params.gap, 20);
    const showValues = params.showValues !== false;
    const maxVal = Math.max(...data, 1);

    const labelW = 200;
    const padL = 200, padR = 200, padT = 100;
    const chartW = 1920 - padL - labelW - padR;
    const totalH = data.length * barH + (data.length - 1) * gap;
    const offsetY = padT + (880 - totalH) / 2;

    const bars = [];
    const valTxts = [];

    data.forEach((val, i) => {
      const y = offsetY + i * (barH + gap);
      const fullW = (val / maxVal) * chartW;
      const color = colors[i % colors.length];

      // label
      if (labels[i]) {
        const lbl = svgEl("text", {
          x: String(padL - 16), y: String(y + barH / 2 + 6),
          fill: "rgba(255,255,255,0.7)", "font-size": "22",
          "font-family": FONT, "text-anchor": "end",
        });
        lbl.textContent = labels[i];
        svg.appendChild(lbl);
      }

      // bg track
      svg.appendChild(svgEl("rect", {
        x: String(padL), y: String(y),
        width: String(chartW), height: String(barH),
        rx: "4", fill: "rgba(255,255,255,0.04)",
      }));

      // bar
      const rect = svgEl("rect", {
        x: String(padL), y: String(y),
        width: "0", height: String(barH),
        rx: "4", fill: color, opacity: "0.9",
      });
      svg.appendChild(rect);
      bars.push({ rect, fullW, val });

      // value text
      if (showValues) {
        const txt = svgEl("text", {
          x: String(padL + 8), y: String(y + barH / 2 + 6),
          fill: "rgba(255,255,255,0.85)", "font-size": "18",
          "font-family": FONT, "font-weight": "600", opacity: "0",
        });
        txt.textContent = String(val);
        svg.appendChild(txt);
        valTxts.push(txt);
      }
    });

    return { svg, bars, valTxts, padL };
  },

  update(els, localT) {
    const stagger = 0.1;
    const dur = 0.7;

    els.bars.forEach((b, i) => {
      const start = i * stagger;
      const raw = clamp((localT - start) / dur, 0, 1);
      const t = easeOutCubic(raw);
      const w = b.fullW * t;
      b.rect.setAttribute("width", String(Math.max(0, w)));

      if (els.valTxts[i]) {
        els.valTxts[i].setAttribute("x", String(els.padL + w + 12));
        els.valTxts[i].setAttribute("opacity", String(clamp((raw - 0.3) * 3, 0, 1)));
      }
    });
  },

  destroy(els) { els.svg.remove(); },
};

})();

SCENE_REGISTRY["imageHero"] = (function() {
  
return {
  id: "imageHero",
  type: "media",
  name: "Image Hero",
  category: "Media",
  defaultParams: {
    src: "",
    alt: "",
    objectFit: "cover",
    zoomStart: 1,
    zoomEnd: 1.15,
    panX: 0,
    panY: 0,
  },

  create(container, params) {
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:absolute;inset:0;overflow:hidden";
    const img = document.createElement("img");
    img.style.cssText = [
      "width:100%;height:100%",
      `object-fit:${params.objectFit || "cover"}`,
      "display:block;will-change:transform",
    ].join(";");
    img.alt = params.alt || "";
    if (params.src) img.src = params.src;
    wrap.appendChild(img);
    container.appendChild(wrap);
    return { wrap, img };
  },

  update(els, localT, params) {
    const duration = toNumber(localT, 0);
    // Normalize to 0-1 over a 10s assumed max, clamped
    const progress = clamp(duration / 10, 0, 1);
    const zoomStart = toNumber(params.zoomStart, 1);
    const zoomEnd = toNumber(params.zoomEnd, 1.15);
    const panX = toNumber(params.panX, 0);
    const panY = toNumber(params.panY, 0);
    const scale = lerp(zoomStart, zoomEnd, progress);
    const tx = panX * progress;
    const ty = panY * progress;
    els.img.style.transform = `scale(${scale}) translate(${tx}px, ${ty}px)`;
  },

  destroy(els) { els.wrap.remove(); },
};

})();


// --- lineChart ---
SCENE_REGISTRY["lineChart"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const FONT = '-apple-system, "SF Pro Display", sans-serif';

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

return {
  id: "lineChart",
  type: "svg",
  name: "Line Chart",
  category: "Data Viz",
  defaultParams: {
    data: [20, 55, 35, 80, 50, 90, 65],
    labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul"],
    color: "#6ee7ff",
    strokeWidth: 3,
    showDots: true,
    showArea: true,
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const data = normalizeArray(params.data, [20, 55, 35, 80, 50, 90, 65]);
    const labels = normalizeArray(params.labels, []);
    const color = params.color || "#6ee7ff";
    const sw = toNumber(params.strokeWidth, 3);
    const showDots = params.showDots !== false;
    const showArea = params.showArea !== false;

    const padL = 160, padR = 160, padT = 100, padB = 140;
    const chartW = 1920 - padL - padR;
    const chartH = 1080 - padT - padB;
    const maxVal = Math.max(...data, 1);
    const n = data.length;

    // grid
    for (let i = 0; i <= 4; i++) {
      const y = padT + (chartH / 4) * i;
      svg.appendChild(svgEl("line", {
        x1: String(padL), y1: String(y), x2: String(1920 - padR), y2: String(y),
        stroke: "rgba(255,255,255,0.08)", "stroke-width": "1",
      }));
    }

    // compute points
    const points = data.map((v, i) => ({
      x: padL + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2),
      y: padT + chartH - (v / maxVal) * chartH,
    }));
    const pointsStr = points.map((p) => `${p.x},${p.y}`).join(" ");

    // gradient for area
    const defs = svgEl("defs");
    const grad = svgEl("linearGradient", { id: "lineAreaGrad", x1: "0", y1: "0", x2: "0", y2: "1" });
    const stop1 = svgEl("stop", { offset: "0%", "stop-color": color, "stop-opacity": "0.3" });
    const stop2 = svgEl("stop", { offset: "100%", "stop-color": color, "stop-opacity": "0" });
    grad.appendChild(stop1);
    grad.appendChild(stop2);
    defs.appendChild(grad);
    svg.appendChild(defs);

    // area fill
    let area = null;
    if (showArea) {
      const baseY = padT + chartH;
      const areaD = `M${points[0].x},${baseY} ` +
        points.map((p) => `L${p.x},${p.y}`).join(" ") +
        ` L${points[n - 1].x},${baseY} Z`;
      area = svgEl("path", {
        d: areaD, fill: "url(#lineAreaGrad)", opacity: "0",
      });
      svg.appendChild(area);
    }

    // line
    const line = svgEl("polyline", {
      points: pointsStr, fill: "none", stroke: color,
      "stroke-width": String(sw), "stroke-linecap": "round", "stroke-linejoin": "round",
    });
    svg.appendChild(line);

    // measure total length
    const totalLen = (() => {
      let len = 0;
      for (let i = 1; i < points.length; i++) {
        const dx = points[i].x - points[i - 1].x;
        const dy = points[i].y - points[i - 1].y;
        len += Math.sqrt(dx * dx + dy * dy);
      }
      return len;
    })();
    line.setAttribute("stroke-dasharray", String(totalLen));
    line.setAttribute("stroke-dashoffset", String(totalLen));

    // dots
    const dots = [];
    if (showDots) {
      points.forEach((p) => {
        const c = svgEl("circle", {
          cx: String(p.x), cy: String(p.y), r: "6",
          fill: color, stroke: "#1a1a2e", "stroke-width": "2", opacity: "0",
        });
        svg.appendChild(c);
        dots.push(c);
      });
    }

    // labels
    labels.forEach((lbl, i) => {
      if (!points[i]) return;
      const txt = svgEl("text", {
        x: String(points[i].x), y: String(padT + chartH + 40),
        fill: "rgba(255,255,255,0.6)", "font-size": "20",
        "font-family": FONT, "text-anchor": "middle",
      });
      txt.textContent = lbl;
      svg.appendChild(txt);
    });

    return { svg, line, area, dots, totalLen };
  },

  update(els, localT) {
    const drawT = smoothstep(0, 1.5, localT);
    els.line.setAttribute("stroke-dashoffset", String(els.totalLen * (1 - drawT)));

    if (els.area) {
      els.area.setAttribute("opacity", String(clamp(drawT * 1.5, 0, 1)));
    }

    els.dots.forEach((dot, i) => {
      const threshold = (i / Math.max(els.dots.length - 1, 1)) * 1.5;
      const a = smoothstep(threshold, threshold + 0.2, localT);
      dot.setAttribute("opacity", String(a));
      const scale = 0.5 + a * 0.5;
      dot.setAttribute("r", String(6 * scale));
    });
  },

  destroy(els) { els.svg.remove(); },
};

})();

// --- meshGrid ---
SCENE_REGISTRY["meshGrid"] = (function() {
  
return {
  id: "meshGrid",
  type: "canvas",
  name: "Mesh Grid",
  category: "Effects",
  defaultParams: {
    cols: 20,
    rows: 12,
    color: "#4a6fa5",
    amplitude: 8,
    frequency: 1,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;

    const cols = clamp(toNumber(params.cols, 20), 3, 60) | 0;
    const rows = clamp(toNumber(params.rows, 12), 3, 40) | 0;
    const color = params.color || "#4a6fa5";
    const amp = toNumber(params.amplitude, 8);
    const freq = toNumber(params.frequency, 1);

    ctx.clearRect(0, 0, W, H);

    const cellW = W / cols;
    const cellH = H / rows;
    const t = localT * freq * 0.5;

    // Compute displaced grid points
    const points = new Array((cols + 1) * (rows + 1));
    for (let r = 0; r <= rows; r++) {
      for (let c = 0; c <= cols; c++) {
        const bx = c * cellW;
        const by = r * cellH;
        // Displacement using sin waves for organic motion
        const dx = Math.sin(t + c * 0.4 + r * 0.3) * amp;
        const dy = Math.cos(t * 0.8 + c * 0.3 - r * 0.5) * amp;
        points[r * (cols + 1) + c] = [bx + dx, by + dy];
      }
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.6;

    // Draw horizontal lines
    for (let r = 0; r <= rows; r++) {
      ctx.beginPath();
      for (let c = 0; c <= cols; c++) {
        const [px, py] = points[r * (cols + 1) + c];
        if (c === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // Draw vertical lines
    for (let c = 0; c <= cols; c++) {
      ctx.beginPath();
      for (let r = 0; r <= rows; r++) {
        const [px, py] = points[r * (cols + 1) + c];
        if (r === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // Draw dots at intersections
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = color;
    for (let r = 0; r <= rows; r++) {
      for (let c = 0; c <= cols; c++) {
        const [px, py] = points[r * (cols + 1) + c];
        ctx.beginPath();
        ctx.arc(px, py, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.globalAlpha = 1;
  },

  destroy(canvas) {
    canvas.remove();
  },
};

})();


// --- neonGrid ---
SCENE_REGISTRY["neonGrid"] = (function() {
  
return {
  id: "neonGrid",
  type: "canvas",
  name: "Neon Grid",
  category: "Backgrounds",
  defaultParams: {
    gridColor: "#ff2d95",
    skyColor: "#0a001a",
    speed: 1,
    perspective: 0.6,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;

    const gridColor = params.gridColor || "#ff2d95";
    const skyColor = params.skyColor || "#0a001a";
    const speed = toNumber(params.speed, 1);
    const persp = clamp(toNumber(params.perspective, 0.6), 0.3, 0.85);

    // Sky background
    const horizonY = H * persp;
    const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
    skyGrad.addColorStop(0, skyColor);
    skyGrad.addColorStop(0.6, skyColor);
    skyGrad.addColorStop(1, "#1a0030");
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, horizonY);

    // Ground gradient
    const groundGrad = ctx.createLinearGradient(0, horizonY, 0, H);
    groundGrad.addColorStop(0, "#1a0030");
    groundGrad.addColorStop(1, "#0a0015");
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, horizonY, W, H - horizonY);

    // Sun glow at horizon
    const sunGrad = ctx.createRadialGradient(W / 2, horizonY, 0, W / 2, horizonY, W * 0.3);
    sunGrad.addColorStop(0, "rgba(255, 45, 149, 0.3)");
    sunGrad.addColorStop(0.5, "rgba(255, 45, 149, 0.1)");
    sunGrad.addColorStop(1, "transparent");
    ctx.fillStyle = sunGrad;
    ctx.fillRect(0, horizonY * 0.5, W, H * 0.5);

    // Horizontal grid lines (perspective projected)
    const gridLines = 20;
    const t = (localT * speed * 0.08) % 1;
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 1;

    for (let i = 0; i < gridLines; i++) {
      // z goes from 0 (horizon) to 1 (bottom), with scroll offset
      const rawZ = (i / gridLines + t / gridLines);
      const z = rawZ > 1 ? rawZ - 1 : rawZ;
      // Perspective: exponential mapping gives density near horizon
      const perspZ = z * z;
      const y = horizonY + perspZ * (H - horizonY);

      const alpha = clamp(perspZ * 2, 0.05, 0.8);
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Vertical grid lines (converging to vanishing point)
    const vLines = 16;
    ctx.globalAlpha = 0.5;
    const vanishX = W / 2;

    for (let i = -vLines / 2; i <= vLines / 2; i++) {
      const bottomX = vanishX + (i / (vLines / 2)) * W * 0.8;
      ctx.beginPath();
      ctx.moveTo(vanishX, horizonY);
      ctx.lineTo(bottomX, H);
      ctx.stroke();
    }

    // Horizon glow line
    ctx.globalAlpha = 0.9;
    ctx.shadowColor = gridColor;
    ctx.shadowBlur = 15;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    ctx.lineTo(W, horizonY);
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  },

  destroy(canvas) {
    canvas.remove();
  },
};

})();

const DEFAULT_LAYERS = [

return {

  type: "dom",
  name: "Parallax Stack",

  defaultParams: {
    layers: DEFAULT_LAYERS,
  },

  create(container, params) {
    const root = createRoot(container, "display:flex;align-items:center;justify-content:center");
    const layers = normalizeArray(params.layers, DEFAULT_LAYERS);
    const divs = layers.map((layer) => {
      const size = toNumber(layer.size, 48);
      const color = layer.color || "#ffffff";
      const div = createNode("div", [
        "position:absolute;text-align:center;white-space:nowrap",
        `font-family:${SANS_FONT_STACK}`,

        `text-shadow:0 0 20px ${color}44`,
      ].join(";"), layer.text || "");
      root.appendChild(div);
      return { div, speed: toNumber(layer.speed, 0.5) };
    });
    return { root, divs };
  },

  update(els, localT) {
    const fadeIn = smoothstep(0, 0.15, localT);
    const fadeOut = 1 - smoothstep(0.85, 1, localT);
    const alpha = fadeIn * fadeOut;

    // Parallax offset: each layer moves at different speed
    const baseOffset = (localT - 0.5) * 200; // px range

    els.divs.forEach((item, i) => {
      const enterT = easeOutCubic(smoothstep(0.02 + i * 0.04, 0.15 + i * 0.04, localT));
      const y = baseOffset * item.speed + (1 - enterT) * 60;
      item.div.style.opacity = enterT * alpha;
      item.div.style.transform = `translateY(${y}px)`;
    });
  },

  destroy(els) { els.root.remove(); },
};

})();


// --- particleFlow ---
SCENE_REGISTRY["particleFlow"] = (function() {
  
return {
  id: "particleFlow",
  type: "canvas",
  name: "Particle Flow",
  category: "Effects",
  defaultParams: {
    count: 150,
    speed: 1,
    color: "#6ea8fe",
    size: 2,
    direction: 0,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);

    const count = clamp(toNumber(params.count, 150), 10, 1000) | 0;
    const particles = new Float64Array(count * 4); // x, y, speed_mult, size_mult
    let seed = 137;
    const rng = () => {
      seed = (seed * 1103515245 + 12345) & 0x7fffffff;
      return seed / 0x7fffffff;
    };
    for (let i = 0; i < count; i++) {
      particles[i * 4] = rng();       // x position 0..1
      particles[i * 4 + 1] = rng();   // y position 0..1
      particles[i * 4 + 2] = 0.3 + rng() * 0.7; // speed multiplier
      particles[i * 4 + 3] = 0.4 + rng() * 0.6; // size multiplier
    }
    canvas._data = { particles, count };
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;

    const speed = toNumber(params.speed, 1);
    const color = params.color || "#6ea8fe";
    const size = clamp(toNumber(params.size, 2), 0.5, 10);
    const angle = toNumber(params.direction, 0) * Math.PI / 180;

    const dx = Math.cos(angle);
    const dy = Math.sin(angle);

    ctx.clearRect(0, 0, W, H);

    const { particles, count } = canvas._data;
    const t = localT * speed * 0.05;

    for (let i = 0; i < count; i++) {
      const ox = particles[i * 4];
      const oy = particles[i * 4 + 1];
      const sm = particles[i * 4 + 2];
      const szm = particles[i * 4 + 3];

      // Flow along direction, wrap around
      let px = (ox + t * sm * dx) % 1;
      let py = (oy + t * sm * dy) % 1;
      if (px < 0) px += 1;
      if (py < 0) py += 1;

      const x = px * W;
      const y = py * H;
      const r = size * szm;

      // Glow effect: larger transparent circle + solid core
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
      grad.addColorStop(0, color);
      grad.addColorStop(0.3, color);
      grad.addColorStop(1, "transparent");

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r * 3, 0, Math.PI * 2);
      ctx.fill();
    }
  },

  destroy(canvas) {
    canvas._data = null;
    canvas.remove();
  },
};

})();


// --- pieChart ---
SCENE_REGISTRY["pieChart"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const FONT = '-apple-system, "SF Pro Display", sans-serif';
const PALETTE = ["#6ee7ff", "#a78bfa", "#f472b6", "#fb923c", "#4ade80", "#fbbf24"];
const TAU = Math.PI * 2;

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function polarToCart(cx, cy, r, angle) {
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

function arcPath(cx, cy, r, startAngle, endAngle) {
  if (endAngle - startAngle >= TAU - 0.001) {
    const mid = startAngle + Math.PI;
    const s = polarToCart(cx, cy, r, startAngle);
    const m = polarToCart(cx, cy, r, mid);
    return `M${s.x},${s.y} A${r},${r} 0 1,1 ${m.x},${m.y} A${r},${r} 0 1,1 ${s.x},${s.y}`;
  }
  const s = polarToCart(cx, cy, r, startAngle);
  const e = polarToCart(cx, cy, r, endAngle);
  const large = endAngle - startAngle > Math.PI ? 1 : 0;
  return `M${s.x},${s.y} A${r},${r} 0 ${large},1 ${e.x},${e.y}`;
}

function sectorPath(cx, cy, outerR, innerR, startAngle, endAngle) {
  if (innerR <= 0) {
    const a = arcPath(cx, cy, outerR, startAngle, endAngle);
    return endAngle - startAngle >= TAU - 0.001
      ? a + " Z"
      : a + ` L${cx},${cy} Z`;
  }
  const oStart = polarToCart(cx, cy, outerR, startAngle);
  const oEnd = polarToCart(cx, cy, outerR, endAngle);
  const iEnd = polarToCart(cx, cy, innerR, endAngle);
  const iStart = polarToCart(cx, cy, innerR, startAngle);
  const large = endAngle - startAngle > Math.PI ? 1 : 0;
  return [
    `M${oStart.x},${oStart.y}`,
    `A${outerR},${outerR} 0 ${large},1 ${oEnd.x},${oEnd.y}`,
    `L${iEnd.x},${iEnd.y}`,
    `A${innerR},${innerR} 0 ${large},0 ${iStart.x},${iStart.y}`,
    "Z",
  ].join(" ");
}

return {
  id: "pieChart",
  type: "svg",
  name: "Pie Chart",
  category: "Data Viz",
  defaultParams: {
    data: [35, 25, 20, 12, 8],
    labels: ["Design", "Dev", "Marketing", "Research", "Ops"],
    colors: PALETTE,
    innerRadius: 0,
    showLabels: true,
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const data = normalizeArray(params.data, [35, 25, 20, 12, 8]);
    const labels = normalizeArray(params.labels, []);
    const colors = normalizeArray(params.colors, PALETTE);
    const innerR = toNumber(params.innerRadius, 0);
    const showLabels = params.showLabels !== false;

    const cx = 960, cy = 540, outerR = 340;
    const total = data.reduce((s, v) => s + v, 0) || 1;

    // compute angles
    let cumAngle = -Math.PI / 2;
    const slices = data.map((val, i) => {
      const sweep = (val / total) * TAU;
      const start = cumAngle;
      cumAngle += sweep;
      return { val, start, sweep, color: colors[i % colors.length], label: labels[i] || "" };
    });

    // shadow filter
    const defs = svgEl("defs");
    const filter = svgEl("filter", { id: "pieShadow", x: "-20%", y: "-20%", width: "140%", height: "140%" });
    const blur = svgEl("feDropShadow", { dx: "0", dy: "4", stdDeviation: "8", "flood-color": "rgba(0,0,0,0.4)" });
    filter.appendChild(blur);
    defs.appendChild(filter);
    svg.appendChild(defs);

    const paths = slices.map((s) => {
      const path = svgEl("path", {
        d: sectorPath(cx, cy, outerR, innerR, s.start, s.start),
        fill: s.color, opacity: "0.9", filter: "url(#pieShadow)",
      });
      svg.appendChild(path);
      return path;
    });

    const lblEls = [];
    if (showLabels) {
      slices.forEach((s) => {
        const midAngle = s.start + s.sweep / 2;
        const lblR = outerR + 40;
        const pos = polarToCart(cx, cy, lblR, midAngle);
        const anchor = pos.x > cx ? "start" : "end";
        const txt = svgEl("text", {
          x: String(pos.x), y: String(pos.y + 6),
          fill: "rgba(255,255,255,0.7)", "font-size": "20",
          "font-family": FONT, "text-anchor": anchor, opacity: "0",
        });
        txt.textContent = s.label;
        svg.appendChild(txt);
        lblEls.push(txt);
      });
    }

    return { svg, paths, slices, cx, cy, outerR, innerR, lblEls };
  },

  update(els, localT) {
    const stagger = 0.15;
    const dur = 0.6;

    els.slices.forEach((s, i) => {
      const start = i * stagger;
      const raw = clamp((localT - start) / dur, 0, 1);
      const t = easeOutCubic(raw);
      const curSweep = s.sweep * t;
      const d = sectorPath(els.cx, els.cy, els.outerR, els.innerR, s.start, s.start + Math.max(curSweep, 0.001));
      els.paths[i].setAttribute("d", d);

      if (els.lblEls[i]) {
        els.lblEls[i].setAttribute("opacity", String(clamp((raw - 0.5) * 4, 0, 1)));
      }
    });
  },

  destroy(els) { els.svg.remove(); },
};

})();

SCENE_REGISTRY["progressRing"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

return {
  id: "progressRing",

  name: "Progress Ring",
  category: "Data Viz",

    progress: 75,

    const showPercent = params.showPercent !== false;
    const label = params.label || "";

    const defs = svgEl("defs");
    const filter = svgEl("filter", { id: "ringGlow", x: "-30%", y: "-30%", width: "160%", height: "160%" });

    const m2 = svgEl("feMergeNode", { in: "SourceGraphic" });
    merge.appendChild(m1);
    merge.appendChild(m2);
    filter.appendChild(blur);
    filter.appendChild(merge);
    defs.appendChild(filter);
    svg.appendChild(defs);

    // bg ring
    svg.appendChild(svgEl("circle", {
      cx: String(cx), cy: String(cy), r: String(r),
      fill: "none", stroke: bgColor, "stroke-width": String(sw),
    }));

    // progress arc
    const arc = svgEl("circle", {
      cx: String(cx), cy: String(cy), r: String(r),
      fill: "none", stroke: color, "stroke-width": String(sw),
      "stroke-linecap": "round",

SCENE_REGISTRY["pulseWave"] = (function() {
  
return {
  id: "pulseWave",
  type: "canvas",
  name: "Pulse Wave",
  category: "Effects",
  defaultParams: {
    bars: 32,
    color: "#a855f7",
    minHeight: 0.05,
    maxHeight: 0.8,
    beatFreq: 2,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);

    // Pre-compute per-bar frequency offsets for varied motion
    const barCount = clamp(toNumber(params.bars, 32), 4, 128) | 0;
    const offsets = new Float64Array(barCount);
    let seed = 73;
    for (let i = 0; i < barCount; i++) {
      seed = (seed * 1103515245 + 12345) & 0x7fffffff;
      offsets[i] = (seed / 0x7fffffff) * Math.PI * 2;
    }
    canvas._data = { offsets };
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;

    const barCount = clamp(toNumber(params.bars, 32), 4, 128) | 0;
    const color = params.color || "#a855f7";
    const minH = clamp(toNumber(params.minHeight, 0.05), 0, 0.5);
    const maxH = clamp(toNumber(params.maxHeight, 0.8), 0.1, 1);
    const beatFreq = toNumber(params.beatFreq, 2);

    const { offsets } = canvas._data;

    ctx.clearRect(0, 0, W, H);

    const gap = 2;
    const totalGap = gap * (barCount - 1);
    const barWidth = Math.max(1, (W - totalGap) / barCount);
    const centerY = H / 2;
    const t = localT * beatFreq;

    for (let i = 0; i < barCount; i++) {
      const offset = i < offsets.length ? offsets[i] : i;
      // Combine multiple frequencies for organic "audio" look
      const wave1 = Math.sin(t * 3.5 + offset) * 0.4;
      const wave2 = Math.sin(t * 2.1 + offset * 1.7) * 0.3;
      const wave3 = Math.sin(t * 5.8 + offset * 0.5) * 0.15;
      const beat = Math.pow(Math.abs(Math.sin(t * Math.PI)), 3) * 0.15;

      const raw = 0.5 + wave1 + wave2 + wave3 + beat;
      const normalized = clamp(raw, 0, 1);
      const heightFrac = lerp(minH, maxH, normalized);
      const barH = heightFrac * H * 0.5;

      const x = i * (barWidth + gap);

      // Gradient per bar
      const grad = ctx.createLinearGradient(x, centerY - barH, x, centerY + barH);
      grad.addColorStop(0, color);
      grad.addColorStop(0.5, color + "cc");
      grad.addColorStop(1, color);

      ctx.fillStyle = grad;

      // Round-capped bars using roundRect
      const rx = Math.min(barWidth / 2, 4);
      ctx.beginPath();
      ctx.roundRect(x, centerY - barH, barWidth, barH * 2, rx);
      ctx.fill();
    }
  },

  destroy(canvas) {
    canvas._data = null;
    canvas.remove();
  },
};

})();

// --- radarChart ---
SCENE_REGISTRY["radarChart"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const FONT = '-apple-system, "SF Pro Display", sans-serif';
const TAU = Math.PI * 2;

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function polarXY(cx, cy, r, angle) {
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

return {
  id: "radarChart",
  type: "svg",
  name: "Radar Chart",
  category: "Data Viz",
  defaultParams: {
    data: [85, 60, 75, 90, 50, 70],
    labels: ["Speed", "Power", "Range", "Armor", "Stealth", "Tech"],
    color: "#6ee7ff",
    fillOpacity: 0.25,
    maxValue: 100,
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const data = normalizeArray(params.data, [85, 60, 75, 90, 50, 70]);
    const labels = normalizeArray(params.labels, []);
    const color = params.color || "#6ee7ff";
    const fillOp = toNumber(params.fillOpacity, 0.25);
    const maxVal = toNumber(params.maxValue, 100);
    const n = data.length;

    const cx = 960, cy = 540, outerR = 340;
    const angleStep = TAU / n;
    const startAngle = -Math.PI / 2;

    // grid rings
    for (let ring = 1; ring <= 4; ring++) {
      const r = (outerR / 4) * ring;
      const pts = [];
      for (let i = 0; i < n; i++) {
        const a = startAngle + i * angleStep;
        const p = polarXY(cx, cy, r, a);
        pts.push(`${p.x},${p.y}`);
      }
      svg.appendChild(svgEl("polygon", {
        points: pts.join(" "), fill: "none",
        stroke: "rgba(255,255,255,0.08)", "stroke-width": "1",
      }));
    }

    // axis lines
    for (let i = 0; i < n; i++) {
      const a = startAngle + i * angleStep;
      const p = polarXY(cx, cy, outerR, a);
      svg.appendChild(svgEl("line", {
        x1: String(cx), y1: String(cy), x2: String(p.x), y2: String(p.y),
        stroke: "rgba(255,255,255,0.1)", "stroke-width": "1",
      }));
    }

    // labels
    for (let i = 0; i < n; i++) {
      const a = startAngle + i * angleStep;
      const p = polarXY(cx, cy, outerR + 35, a);
      const anchor = Math.abs(p.x - cx) < 10 ? "middle" : p.x > cx ? "start" : "end";
      const txt = svgEl("text", {
        x: String(p.x), y: String(p.y + 6),
        fill: "rgba(255,255,255,0.6)", "font-size": "20",
        "font-family": FONT, "text-anchor": anchor,
      });
      txt.textContent = labels[i] || "";
      svg.appendChild(txt);
    }

    // data polygon
    const dataShape = svgEl("polygon", {
      points: Array(n).fill(`${cx},${cy}`).join(" "),
      fill: color, "fill-opacity": String(fillOp),
      stroke: color, "stroke-width": "2.5",
    });
    svg.appendChild(dataShape);

    // data dots
    const dots = [];
    for (let i = 0; i < n; i++) {
      const dot = svgEl("circle", {
        cx: String(cx), cy: String(cy), r: "5",
        fill: color, stroke: "#1a1a2e", "stroke-width": "2", opacity: "0",
      });
      svg.appendChild(dot);
      dots.push(dot);
    }

    // precompute target points
    const targets = data.map((v, i) => {
      const ratio = clamp(v / maxVal, 0, 1);
      const a = startAngle + i * angleStep;
      return polarXY(cx, cy, outerR * ratio, a);
    });

    return { svg, dataShape, dots, targets, cx, cy, n };
  },

  update(els, localT) {
    const raw = clamp(localT / 1.5, 0, 1);
    const t = easeOutCubic(raw);

    const pts = [];
    for (let i = 0; i < els.n; i++) {
      const tgt = els.targets[i];
      const x = els.cx + (tgt.x - els.cx) * t;
      const y = els.cy + (tgt.y - els.cy) * t;
      pts.push(`${x},${y}`);
      els.dots[i].setAttribute("cx", String(x));
      els.dots[i].setAttribute("cy", String(y));
      els.dots[i].setAttribute("opacity", String(clamp((raw - 0.3) * 3, 0, 1)));
    }
    els.dataShape.setAttribute("points", pts.join(" "));
  },

  destroy(els) { els.svg.remove(); },
};

})();


// --- radialBurst ---
SCENE_REGISTRY["radialBurst"] = (function() {
  
return {
  id: "radialBurst",
  type: "canvas",
  name: "Radial Burst",
  category: "Effects",
  defaultParams: {
    rays: 24,
    color: "#e0c3fc",
    rotation: 1,
    spread: 0.4,
    fadeLength: 0.6,
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);

    // Pre-compute per-ray properties
    const rayCount = clamp(toNumber(params.rays, 24), 4, 120) | 0;
    const rayData = new Float64Array(rayCount * 3); // angleSeed, lengthMult, widthMult
    let seed = 257;
    const rng = () => {
      seed = (seed * 1103515245 + 12345) & 0x7fffffff;
      return seed / 0x7fffffff;
    };
    for (let i = 0; i < rayCount; i++) {
      rayData[i * 3] = rng() * 0.2 - 0.1;     // angle jitter
      rayData[i * 3 + 1] = 0.5 + rng() * 0.5;  // length multiplier
      rayData[i * 3 + 2] = 0.4 + rng() * 0.6;  // width multiplier
    }
    canvas._data = { rayData, rayCount };
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    const color = params.color || "#e0c3fc";
    const rotation = toNumber(params.rotation, 1);
    const spread = clamp(toNumber(params.spread, 0.4), 0.05, 1);
    const fadeLen = clamp(toNumber(params.fadeLength, 0.6), 0.1, 1);

    const { rayData, rayCount } = canvas._data;
    const maxLen = Math.hypot(cx, cy) * fadeLen;

    ctx.clearRect(0, 0, W, H);

    const baseAngle = localT * rotation * 0.2;
    const angleStep = (Math.PI * 2) / rayCount;
    const halfWidth = spread * angleStep * 0.5;

    for (let i = 0; i < rayCount; i++) {
      const jitter = rayData[i * 3];
      const lenMult = rayData[i * 3 + 1];
      const widMult = rayData[i * 3 + 2];

      const angle = baseAngle + i * angleStep + jitter;
      const len = maxLen * lenMult;
      const hw = halfWidth * widMult;

      // Pulsing alpha
      const pulse = 0.5 + 0.5 * Math.sin(localT * 2 + i * 0.7);
      const alpha = clamp(0.15 + pulse * 0.35, 0, 1);

      // Draw ray as a gradient triangle from center outward
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, len);
      grad.addColorStop(0, color);
      grad.addColorStop(0.6, color + "88");
      grad.addColorStop(1, "transparent");

      ctx.fillStyle = grad;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle - hw) * len, cy + Math.sin(angle - hw) * len);
      ctx.lineTo(cx + Math.cos(angle + hw) * len, cy + Math.sin(angle + hw) * len);
      ctx.closePath();
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  },

  destroy(canvas) {
    canvas._data = null;
    canvas.remove();
  },
};

})();

// --- starfield ---
SCENE_REGISTRY["starfield"] = (function() {
  
return {
  id: "starfield",
  type: "canvas",
  name: "Starfield",
  category: "Effects",
  defaultParams: {
    count: 200,
    speed: 1,
    depth: 1,
    color: "#ffffff",
  },

  create(container, params) {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;display:block";
    canvas.width = container.clientWidth || 1920;
    canvas.height = container.clientHeight || 1080;
    container.appendChild(canvas);

    const count = clamp(toNumber(params.count, 200), 10, 2000) | 0;
    const stars = new Float64Array(count * 3); // x, y, z
    let seed = 42;
    const rng = () => {
      seed = (seed * 1103515245 + 12345) & 0x7fffffff;
      return seed / 0x7fffffff;
    };
    for (let i = 0; i < count; i++) {
      stars[i * 3] = (rng() - 0.5) * 2;     // x: -1..1
      stars[i * 3 + 1] = (rng() - 0.5) * 2; // y: -1..1
      stars[i * 3 + 2] = rng();              // z: 0..1
    }
    canvas._data = { stars, count };
    return canvas;
  },

  update(canvas, localT, params) {
    const ctx = canvas.getContext("2d");
    const cw = canvas.parentElement?.clientWidth || canvas.width;
    const ch = canvas.parentElement?.clientHeight || canvas.height;
    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    const speed = toNumber(params.speed, 1);
    const depth = clamp(toNumber(params.depth, 1), 0.1, 3);
    const color = params.color || "#ffffff";

    ctx.clearRect(0, 0, W, H);

    const { stars, count } = canvas._data;
    const t = localT * speed * 0.1;

    for (let i = 0; i < count; i++) {
      const sx = stars[i * 3];
      const sy = stars[i * 3 + 1];
      const sz0 = stars[i * 3 + 2];

      // z cycles from 0..1 based on time, wrapping around
      let z = (sz0 - t * 0.3) % 1;
      if (z < 0) z += 1;
      z = clamp(z, 0.001, 1);

      const scale = depth / z;
      const px = cx + sx * scale * cx;
      const py = cy + sy * scale * cy;

      if (px < -10 || px > W + 10 || py < -10 || py > H + 10) continue;

      const alpha = clamp(1 - z, 0.1, 1);
      const radius = clamp((1 - z) * 2.5, 0.5, 3);

      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py, radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  },

  destroy(canvas) {
    canvas._data = null;
    canvas.remove();
  },
};

})();

// --- svgRings ---
SCENE_REGISTRY["svgRings"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const PALETTE = ["#6ee7ff", "#a78bfa", "#f472b6", "#fb923c", "#4ade80", "#fbbf24"];

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

return {
  id: "svgRings",
  type: "svg",
  name: "Decorative Rings",
  category: "Motion Graphics",
  defaultParams: {
    count: 4,
    colors: PALETTE,
    speed: 1,
    strokeWidth: 3,
    dashArray: "20 10",
  },

  create(container, params) {
    const svg = svgEl("svg", {
      viewBox: "0 0 1920 1080",
      style: "position:absolute;inset:0;width:100%;height:100%",
    });
    container.appendChild(svg);

    const count = toNumber(params.count, 4);
    const colors = normalizeArray(params.colors, PALETTE);
    const sw = toNumber(params.strokeWidth, 3);
    const dash = params.dashArray || "20 10";

    const cx = 960, cy = 540;
    const minR = 120, maxR = 420;

    // glow filter
    const defs = svgEl("defs");
    const filter = svgEl("filter", { id: "ringBlur", x: "-20%", y: "-20%", width: "140%", height: "140%" });
    const blur = svgEl("feGaussianBlur", { stdDeviation: "3", result: "blur" });
    const merge = svgEl("feMerge");
    merge.appendChild(svgEl("feMergeNode", { in: "blur" }));
    merge.appendChild(svgEl("feMergeNode", { in: "SourceGraphic" }));
    filter.appendChild(blur);
    filter.appendChild(merge);
    defs.appendChild(filter);
    svg.appendChild(defs);

    const rings = [];
    for (let i = 0; i < count; i++) {
      const r = minR + ((maxR - minR) / Math.max(count - 1, 1)) * i;
      const color = colors[i % colors.length];
      const direction = i % 2 === 0 ? 1 : -1;
      const speedMul = 0.6 + (i * 0.3);

      const g = svgEl("g");
      const circle = svgEl("circle", {
        cx: String(cx), cy: String(cy), r: String(r),
        fill: "none", stroke: color, "stroke-width": String(sw + i * 0.5),
        "stroke-dasharray": dash, "stroke-linecap": "round",
        opacity: String(0.5 + i * 0.1), filter: "url(#ringBlur)",
      });
      g.appendChild(circle);
      svg.appendChild(g);
      rings.push({ g, direction, speedMul, cx, cy });
    }

    return { svg, rings, speed: toNumber(params.speed, 1) };
  },

  update(els, localT) {
    els.rings.forEach((ring) => {
      const deg = localT * 40 * els.speed * ring.speedMul * ring.direction;
      ring.g.setAttribute("transform", `rotate(${deg} ${ring.cx} ${ring.cy})`);
    });
  },

  destroy(els) { els.svg.remove(); },
};

})();

SCENE_REGISTRY["timelineViz"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const DEFAULT_EVENTS = [

SCENE_REGISTRY["treeMap"] = (function() {
  
const SVG_NS = "http://www.w3.org/2000/svg";
const FONT = '-apple-system, "SF Pro Display", sans-serif';
const PALETTE = ["#6ee7ff", "#a78bfa", "#f472b6", "#fb923c", "#4ade80", "#fbbf24"];

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;

// simple squarified treemap layout
function layoutTreemap(items, x, y, w, h, gap) {
  const total = items.reduce((s, it) => s + it.value, 0) || 1;
  const rects = [];
  const sorted = items.map((it, i) => ({ ...it, idx: i })).sort((a, b) => b.value - a.value);
  let cx = x, cy = y, cw = w, ch = h;
  let remaining = total;

  for (let i = 0; i < sorted.length;) {
    const isHoriz = cw >= ch;
    let rowItems = [];
    let rowSum = 0;
    const side = isHoriz ? ch : cw;

    // greedily add items to current row
    for (let j = i; j < sorted.length; j++) {
      const trial = [...rowItems, sorted[j]];
      const trialSum = rowSum + sorted[j].value;
      const rowLen = (trialSum / remaining) * (isHoriz ? cw : ch);
      const worst = Math.max(...trial.map((it) => {
        const s = (it.value / trialSum) * side;
        return Math.max(rowLen / s, s / rowLen);
      }));
      if (rowItems.length > 0 && worst > Math.max(...rowItems.map((it) => {
        const s = (it.value / rowSum) * side;
        const rl = (rowSum / remaining) * (isHoriz ? cw : ch);
        return Math.max(rl / s, s / rl);
      }))) break;
      rowItems.push(sorted[j]);
      rowSum = trialSum;
      j; // eslint placeholder
    }

    if (rowItems.length === 0) { rowItems = [sorted[i]]; rowSum = sorted[i].value; }

    const rowLen = (rowSum / remaining) * (isHoriz ? cw : ch);
    let offset = 0;

    rowItems.forEach((it) => {
      const ratio = it.value / rowSum;
      const itemLen = ratio * side;
      const rx = isHoriz ? cx + offset : cx;
      const ry = isHoriz ? cy : cy + offset;
      const rw = isHoriz ? itemLen : rowLen;
      const rh = isHoriz ? rowLen : itemLen;
      rects.push({
        x: rx + gap / 2, y: ry + gap / 2,
        w: Math.max(0, rw - gap), h: Math.max(0, rh - gap),
        label: it.label, value: it.value, color: it.color, idx: it.idx,
      });
      offset += itemLen;
    });

    i += rowItems.length;
    remaining -= rowSum;
    if (isHoriz) { cx += rowLen; cw -= rowLen; }
    else { cy += rowLen; ch -= rowLen; }
  }

  return rects;
}

return {
  id: "treeMap",
  type: "svg",
  name: "Tree Map",
  category: "Data Viz",
  defaultParams: {
    data: [
      { label: "Videos", value: 45, color: "#6ee7ff" },
