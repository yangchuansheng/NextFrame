<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame · Scene Preview</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--panel:#141414;--border:#222;--accent:#da7756;--ink:#e8e0d8;--muted:#8a8078;--dim:#555}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Top nav */
.nav{height:44px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.back{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
.back:hover{color:var(--accent);border-color:var(--accent)}
.nav-title{font-size:15px;font-weight:600}
.nav-badge{font-size:9px;text-transform:uppercase;letter-spacing:.8px;padding:3px 10px;border-radius:10px;font-weight:500}
.nav-level{font-size:9px;padding:3px 10px;border-radius:10px;font-weight:500}
.nav-desc{font-size:11px;color:var(--muted);margin-left:8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Main layout */
.main{flex:1;display:flex;overflow:hidden}

/* Preview area */
.preview{flex:1;display:flex;flex-direction:column;background:#050505;min-width:0}
.preview-canvas{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
.preview-img{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.5);transition:opacity .15s}
.preview-img.loading{opacity:.6}
.preview-status{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--dim);background:rgba(0,0,0,.6);padding:4px 12px;border-radius:12px;backdrop-filter:blur(4px)}

/* Transport */
.transport{height:52px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.t-label{font-size:10px;color:var(--muted);min-width:28px;text-align:right}
.t-slider{flex:1;accent-color:var(--accent);height:6px}
.t-time{font-size:12px;font-family:monospace;color:var(--ink);min-width:100px;text-align:center}
.t-dur{font-size:10px;color:var(--dim)}

/* Right panel */
.sidebar{width:320px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sec{padding:16px 18px;border-bottom:1px solid var(--border)}
.sec h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.sec h4 .count{font-size:9px;background:rgba(255,255,255,.05);padding:1px 8px;border-radius:8px;color:var(--dim)}

/* Param rows */
.prow{margin-bottom:14px}
.prow-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.prow-name{font-size:12px;font-weight:500}
.prow-val{font-size:11px;font-family:monospace;color:var(--accent)}
.prow-sem{font-size:10px;color:var(--dim);margin-bottom:6px}
.prow-ctrl{display:flex;gap:8px;align-items:center}
.prow-slider{flex:1;accent-color:var(--accent)}
.prow-num{width:60px;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;padding:5px 6px;color:var(--ink);font-size:11px;font-family:monospace;text-align:right;outline:none}
.prow-num:focus{border-color:var(--accent)}
.prow-range{font-size:9px;color:var(--dim);margin-top:2px;font-family:monospace}
.prow-text{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--ink);font-size:11px;font-family:monospace;outline:none}
.prow-text:focus{border-color:var(--accent)}
.prow-sel{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--ink);font-size:11px;outline:none}
.prow-sel:focus{border-color:var(--accent)}
.prow-toggle{display:flex;align-items:center;gap:8px}
.toggle{width:36px;height:20px;background:#333;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* Tags */
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:3px 10px;border-radius:8px;background:rgba(255,255,255,.04);color:var(--dim);letter-spacing:.3px}

/* Code block */
.code-wrap{position:relative}
.code{display:block;background:#0a0a0a;border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-size:11px;color:var(--ink);font-family:monospace;white-space:pre;overflow-x:auto;line-height:1.6}
.copy-btn{position:absolute;top:6px;right:6px;padding:4px 10px;background:rgba(218,119,86,.1);border:1px solid var(--accent);border-radius:4px;color:var(--accent);font-size:10px;cursor:pointer}
.copy-btn:hover{background:rgba(218,119,86,.2)}

/* Actions */
.actions{display:flex;gap:8px}
.abtn{flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;text-align:center;transition:all .15s}
.abtn:hover{border-color:var(--accent);color:var(--accent)}
.abtn.primary{background:rgba(218,119,86,.1);border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="nav">
  <a class="back" href="/gallery">&larr; Gallery</a>
  <span class="nav-title" id="nav-title">—</span>
  <span class="nav-badge" id="nav-badge">—</span>
  <span class="nav-level" id="nav-level">—</span>
  <span class="nav-desc" id="nav-desc"></span>
</div>

<div class="main">
  <div class="preview">
    <div class="preview-canvas">
      <img class="preview-img" id="pimg" src="">
      <iframe id="pframe" class="preview-img" style="display:none;width:min(960px,100%);aspect-ratio:16/9;border:none;background:#1a1510"></iframe>
      <div class="preview-status" id="pstatus">Loading...</div>
    </div>
    <div class="transport">
      <span class="t-label">Time</span>
      <input type="range" class="t-slider" id="t-scrub" min="0" max="10" step="0.1" value="0">
      <span class="t-time" id="t-time">0.0s / 10.0s</span>
    </div>
  </div>

  <div class="sidebar" id="sidebar"></div>
</div>

<script>
const CAT_COLORS={Backgrounds:'#6366f1',Typography:'#f59e0b',Shapes:'#10b981','Data Viz':'#06b6d4',Overlays:'#ec4899',Series:'#da7756',Browser:'#8b5cf6',Media:'#14b8a6'};
const LEVEL_LABELS={starter:'Starter',advanced:'Advanced',pro:'Pro'};
const LEVEL_COLORS={starter:'#10b981',advanced:'#f59e0b',pro:'#ec4899'};

let scene = null;
let paramValues = {};
let currentT = 0;
let previewTimer = null;

// Get scene id from URL
const sceneId = new URLSearchParams(location.search).get('id') || location.pathname.split('/').pop();

async function init() {
  // Fetch scene list from API
  try {
    const resp = await fetch('/api/scenes');
    const data = await resp.json();
    if (data.ok) {
      const meta = data.value.scenes.find(s => s.id === sceneId);
      if (meta) {
        scene = meta;
        scene.tags = guessTags(meta);
        scene.level = guessLevel(meta);
        currentT = (meta.duration_hint || 5) * 0.4;
        for (const p of meta.params || []) paramValues[p.name] = p.default;
        renderNav();
        renderSidebar();
        renderTransport();
        fetchPreview();
        return;
      }
    }
  } catch(e) {}
  // Fallback: show error
  document.getElementById('pstatus').textContent = 'Scene not found: ' + sceneId;
}

function guessTags(meta) {
  const tags = [];
  const cat = meta.category;
  if (cat === 'Backgrounds') tags.push('ambient');
  if (cat === 'Typography') tags.push('title');
  if (cat === 'Data Viz') tags.push('data');
  if (cat === 'Overlays') tags.push('overlay');
  if (cat === 'Series') tags.push('brand');
  if (cat === 'Browser') tags.push('custom');
  if (cat === 'Media') tags.push('media');
  if ((meta.duration_hint || 0) <= 6) tags.push('short');
  if ((meta.duration_hint || 0) >= 10) tags.push('long');
  return tags;
}

function guessLevel(meta) {
  const np = (meta.params || []).length;
  if (meta.category === 'Browser' || meta.category === 'Media') return 'pro';
  if (np >= 7) return 'advanced';
  return 'starter';
}

function renderNav() {
  document.getElementById('nav-title').textContent = scene.id;
  const badge = document.getElementById('nav-badge');
  badge.textContent = scene.category;
  badge.style.background = `${CAT_COLORS[scene.category]||'#666'}18`;
  badge.style.color = CAT_COLORS[scene.category] || '#666';
  const lv = document.getElementById('nav-level');
  lv.textContent = LEVEL_LABELS[scene.level];
  lv.style.background = `${LEVEL_COLORS[scene.level]}18`;
  lv.style.color = LEVEL_COLORS[scene.level];
  document.getElementById('nav-desc').textContent = scene.description;
  document.title = `NextFrame · ${scene.id}`;
}

function renderTransport() {
  const dur = scene.duration_hint || 10;
  const scrub = document.getElementById('t-scrub');
  scrub.max = dur;
  scrub.value = currentT;
  scrub.oninput = function() {
    currentT = Number(this.value);
    updateTimeDisplay();
    schedulePreview();
  };
  updateTimeDisplay();
}

function updateTimeDisplay() {
  const dur = scene.duration_hint || 10;
  document.getElementById('t-time').textContent = `${currentT.toFixed(1)}s / ${dur.toFixed(1)}s`;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const params = scene.params || [];

  let html = '<div class="sec"><h4>Parameters <span class="count">' + params.length + '</span></h4>';

  for (const p of params) {
    html += '<div class="prow">';
    html += `<div class="prow-head"><span class="prow-name">${p.name}</span><span class="prow-val" id="pv_${p.name}">${formatVal(p.default)}</span></div>`;
    if (p.semantic) html += `<div class="prow-sem">${p.semantic}</div>`;

    if (p.type === 'number' && p.range) {
      const [mn,mx] = p.range;
      const step = (mx-mn) > 10 ? 1 : (mx-mn) > 1 ? 0.1 : 0.01;
      html += `<div class="prow-ctrl"><input type="range" class="prow-slider" min="${mn}" max="${mx}" step="${step}" value="${p.default}" data-pn="${p.name}" data-pt="number"><input type="number" class="prow-num" min="${mn}" max="${mx}" step="${step}" value="${p.default}" data-pn="${p.name}" data-pt="number"></div>`;
      html += `<div class="prow-range">${mn} — ${mx}</div>`;
    } else if (p.type === 'number') {
      html += `<div class="prow-ctrl"><input type="number" class="prow-num" style="width:100%" value="${p.default}" data-pn="${p.name}" data-pt="number"></div>`;
    } else if (p.type === 'enum' && p.options) {
      html += `<select class="prow-sel" data-pn="${p.name}" data-pt="enum">${p.options.map(o=>`<option${o===p.default?' selected':''}>${o}</option>`).join('')}</select>`;
    } else if (p.type === 'boolean') {
      html += `<div class="prow-toggle"><div class="toggle${p.default?' on':''}" data-pn="${p.name}" data-pt="boolean"></div><span style="font-size:11px;color:var(--muted)">${p.default ? 'Enabled' : 'Disabled'}</span></div>`;
    } else {
      html += `<input class="prow-text" value="${String(p.default).replace(/"/g,'&quot;')}" data-pn="${p.name}" data-pt="string">`;
    }
    html += '</div>';
  }
  html += '</div>';

  // Tags
  html += '<div class="sec"><h4>Tags</h4><div class="tags">' + scene.tags.map(t=>`<span class="tag">${t}</span>`).join('') + '</div></div>';

  // CLI
  html += '<div class="sec"><h4>CLI Command</h4><div class="code-wrap"><code class="code" id="cli-code"></code><button class="copy-btn" id="copy-btn">Copy</button></div></div>';

  // Actions
  html += '<div class="sec"><div class="actions"><button class="abtn" id="btn-reset">Reset Defaults</button><button class="abtn primary" id="btn-copy-json">Copy JSON</button></div></div>';

  sb.innerHTML = html;

  // Bind param inputs
  sb.querySelectorAll('[data-pn]').forEach(inp => {
    const handler = () => {
      const pn = inp.dataset.pn, pt = inp.dataset.pt;
      if (pt === 'number') paramValues[pn] = Number(inp.value);
      else if (pt === 'boolean') {
        paramValues[pn] = !paramValues[pn];
        inp.classList.toggle('on');
        inp.nextElementSibling.textContent = paramValues[pn] ? 'Enabled' : 'Disabled';
      }
      else if (pt === 'enum') paramValues[pn] = inp.value;
      else paramValues[pn] = inp.value;

      // Sync paired inputs
      sb.querySelectorAll(`[data-pn="${pn}"][data-pt="${pt}"]`).forEach(o => {
        if (o !== inp && o.type !== 'checkbox') o.value = inp.value;
      });
      const vd = document.getElementById('pv_' + pn);
      if (vd) vd.textContent = formatVal(paramValues[pn]);
      schedulePreview();
      updateCLI();
    };
    if (inp.dataset.pt === 'boolean') inp.onclick = handler;
    else { inp.addEventListener('input', handler); inp.addEventListener('change', handler); }
  });

  // Reset
  document.getElementById('btn-reset').onclick = () => {
    for (const p of params) paramValues[p.name] = p.default;
    renderSidebar();
    renderTransport();
    fetchPreview();
  };

  // Copy JSON
  document.getElementById('btn-copy-json').onclick = () => {
    const obj = {scene: scene.id, params: {...paramValues}};
    navigator.clipboard.writeText(JSON.stringify(obj, null, 2));
    document.getElementById('btn-copy-json').textContent = 'Copied!';
    setTimeout(() => document.getElementById('btn-copy-json').textContent = 'Copy JSON', 1200);
  };

  // Copy CLI
  document.getElementById('copy-btn').onclick = () => {
    const code = document.getElementById('cli-code').textContent;
    navigator.clipboard.writeText(code);
    document.getElementById('copy-btn').textContent = 'Copied!';
    setTimeout(() => document.getElementById('copy-btn').textContent = 'Copy', 1200);
  };

  updateCLI();
}

function formatVal(v) {
  if (typeof v === 'number') return Number.isInteger(v) ? String(v) : v.toFixed(2);
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  return String(v);
}

function updateCLI() {
  const changed = {};
  for (const p of scene.params || []) {
    if (paramValues[p.name] !== p.default) changed[p.name] = paramValues[p.name];
  }
  const paramsStr = Object.keys(changed).length > 0 ? `\n  --params='${JSON.stringify(changed)}'` : '';
  const el = document.getElementById('cli-code');
  if (el) el.textContent = `nextframe add-clip timeline.json \\\n  --track=v1 \\\n  --scene=${scene.id} \\\n  --start=0 \\\n  --duration=${scene.duration_hint||10}${paramsStr}`;
}

function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(fetchPreview, 120);
}

const BROWSER_SCENES = ['htmlSlide','svgOverlay','markdownSlide','lottieAnim'];

function browserParamsChanged() {
  if (!scene) return false;
  for (const p of scene.params || []) {
    if (paramValues[p.name] !== p.default) return true;
  }
  return false;
}

function fetchPreview() {
  if (!scene) return;
  const img = document.getElementById('pimg');
  const frame = document.getElementById('pframe');
  const status = document.getElementById('pstatus');

  // Browser scenes: always render in iframe
  if (BROWSER_SCENES.includes(scene.id)) {
    img.style.display = 'none';
    frame.style.display = 'block';
    renderBrowserPreview(frame, status);
    return;
  }

  // Canvas/other scenes: server-side render
  img.style.display = 'block';
  frame.style.display = 'none';
  img.classList.add('loading');
  status.textContent = 'Rendering...';

  const params = new URLSearchParams({id: scene.id, t: currentT, w: 960});
  for (const [k,v] of Object.entries(paramValues)) params.set(k, String(v));

  const url = `/api/scene-preview?${params}`;
  const tmp = new Image();
  tmp.onload = () => {
    img.src = url;
    img.classList.remove('loading');
    status.textContent = `Live · ${currentT.toFixed(1)}s · ${new Date().toLocaleTimeString()}`;
  };
  tmp.onerror = () => {
    img.src = `/thumbs/${scene.id}.png`;
    img.classList.remove('loading');
    status.textContent = 'Static thumbnail · start server for live preview';
  };
  tmp.src = url;
}

function renderBrowserPreview(frame, status) {
  const id = scene.id;
  let html = '';

  if (id === 'htmlSlide') {
    const raw = paramValues.html || '';
    const content = (raw.length > 20) ? raw : '<div style="padding:48px 64px"><h1 style="font-size:36px;margin-bottom:16px;color:#da7756">HTML Slide</h1><p style="font-size:18px;line-height:1.8;max-width:600px">This scene renders any HTML+CSS via headless Chrome. Edit the <code style="background:rgba(218,119,86,.15);padding:2px 8px;border-radius:3px">html</code> parameter to see your content here.</p><div style="margin-top:24px;padding:16px;border:1px solid rgba(218,119,86,.2);border-radius:8px;font-family:monospace;font-size:13px;color:#8a8078">&lt;div class="card"&gt;Your content&lt;/div&gt;</div></div>';
    html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1510;color:#f5ece0;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}</style></head><body>${content}</body></html>`;
  }
  else if (id === 'svgOverlay') {
    const raw = paramValues.svg || '';
    const svg = (raw.length > 20) ? raw : '<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg"><rect x="40" y="30" width="320" height="240" rx="12" fill="none" stroke="#da7756" stroke-width="2" opacity=".4"/><circle cx="140" cy="120" r="50" fill="#da7756" opacity=".7"/><circle cx="260" cy="120" r="35" fill="#6366f1" opacity=".6"/><circle cx="200" cy="180" r="45" fill="#10b981" opacity=".5"/><text x="200" y="260" text-anchor="middle" fill="#f5ece0" font-size="18" font-family="system-ui" font-weight="600">SVG Overlay</text><text x="200" y="280" text-anchor="middle" fill="#8a8078" font-size="11" font-family="system-ui">Edit svg param to render your markup</text></svg>';
    html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{margin:0}body{background:#12111a;display:flex;align-items:center;justify-content:center;min-height:100vh}svg{max-width:80%;max-height:80%}</style></head><body>${svg}</body></html>`;
  }
  else if (id === 'markdownSlide') {
    const raw = paramValues.md || '';
    const md = ((raw.length > 10) ? raw : '# Markdown Slide\n\n## Getting Started\n\nThis scene renders **markdown** as a styled slide.\n\n- Edit the `md` parameter\n- Choose a theme: `anthropic-warm`, `dark`, or `light`\n- Supports headings, lists, bold, italic, and `code`\n\n> Frame-pure rendering — every frame is a pure function of time.').replace(/\\n/g, '\n');
    const theme = paramValues.theme || 'anthropic-warm';
    const themes = {
      'anthropic-warm': 'background:#1a1510;color:#f5ece0;',
      'dark': 'background:#0d1117;color:#e6edf3;',
      'light': 'background:#ffffff;color:#1f2937;',
    };
    const bg = themes[theme] || themes['anthropic-warm'];
    // Simple markdown → HTML conversion (no external deps)
    const rendered = md
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:3px;font-size:0.9em">$1</code>')
      .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid #da7756;padding:8px 16px;margin:12px 0;color:#d4b483;font-style:italic">$1</blockquote>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul style="padding-left:24px;margin:8px 0">$1</ul>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
    html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{margin:0;box-sizing:border-box}body{${bg}font-family:Georgia,serif;padding:48px 64px;min-height:100vh;line-height:1.8}h1{font-size:36px;margin-bottom:16px;border-bottom:1px solid rgba(218,119,86,.3);padding-bottom:12px}h2{font-size:28px;margin:20px 0 12px}h3{font-size:22px;margin:16px 0 8px}strong{color:#da7756}ul{padding-left:24px;margin:8px 0}li{margin:4px 0}code{font-family:monospace}</style></head><body>${rendered}</body></html>`;
  }
  else if (id === 'lottieAnim') {
    const src = paramValues.src || '';
    const frameNum = paramValues.frame || 0;
    html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{margin:0}body{background:#12111a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;color:#f5ece0;font-family:system-ui}</style></head><body>
      <div style="width:200px;height:200px;border:2px solid rgba(218,119,86,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
        <svg viewBox="0 0 100 100" width="120" height="120"><circle cx="50" cy="50" r="35" fill="none" stroke="#da7756" stroke-width="3" stroke-dasharray="180" stroke-dashoffset="${180 - frameNum * 1.5}"><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"/></circle><circle cx="50" cy="50" r="8" fill="#da7756"/></svg>
      </div>
      <div style="font-size:13px;color:#8a8078">Lottie Animation</div>
      <div style="font-size:11px;color:#555;margin-top:4px">${src || 'No source file'} · frame ${frameNum}</div>
    </body></html>`;
  }

  frame.srcdoc = html;
  status.textContent = `Browser native · ${scene.id}`;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'Escape') location.href = '/gallery';
  if (e.key === 'ArrowLeft') { currentT = Math.max(0, currentT - 0.5); document.getElementById('t-scrub').value = currentT; updateTimeDisplay(); schedulePreview(); }
  if (e.key === 'ArrowRight') { currentT = Math.min(scene.duration_hint||10, currentT + 0.5); document.getElementById('t-scrub').value = currentT; updateTimeDisplay(); schedulePreview(); }
});

init();
</script>
</body>
</html>
