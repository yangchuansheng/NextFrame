<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame · Scene Gallery</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#151515;--border:#222;--accent:#da7756;--ink:#e8e0d8;--muted:#8a8078;--dim:#555}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

.top{position:sticky;top:0;z-index:10;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px}
.top h1{font-size:16px;font-weight:600;letter-spacing:.3px}
.top .dim{font-size:12px;color:var(--muted)}
.search{background:#141414;border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--ink);font-size:13px;outline:none;width:240px}
.search:focus{border-color:var(--accent)}

.filters{position:sticky;top:57px;z-index:9;background:rgba(10,10,10,.88);backdrop-filter:blur(12px);padding:10px 32px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ftag{padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .15s;letter-spacing:.3px}
.ftag:hover{border-color:var(--muted);color:var(--ink)}
.ftag.act{background:rgba(218,119,86,.12);border-color:var(--accent);color:var(--accent)}
.fcount{font-size:10px;color:var(--dim);margin-left:4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:24px 32px}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.card:hover{border-color:rgba(218,119,86,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#0a0a0a}
.card-body{padding:14px 16px}
.card-name{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card-cat{font-size:9px;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:10px;font-weight:500}
.card-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.card-meta{display:flex;gap:8px;font-size:10px;color:var(--dim)}
.card-meta span{display:flex;align-items:center;gap:3px}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:9px;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.04);color:var(--dim);letter-spacing:.3px}

/* Detail overlay */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);backdrop-filter:blur(8px)}
.overlay.show{display:flex;align-items:center;justify-content:center}
.detail{background:#141414;border:1px solid var(--border);border-radius:16px;width:90%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.detail::-webkit-scrollbar{width:4px}
.detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.detail-top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.detail-top h2{font-size:18px;display:flex;align-items:center;gap:10px}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.close-btn:hover{border-color:var(--accent);color:var(--accent)}
.detail-body{display:grid;grid-template-columns:1fr 300px;gap:0}
.detail-preview{padding:20px;border-right:1px solid var(--border)}
.detail-preview img{width:100%;border-radius:8px}
.detail-params{padding:16px;overflow-y:auto}
.detail-params h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.dp-row{margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:6px}
.dp-name{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:2px;display:flex;justify-content:space-between}
.dp-name .dp-type{font-size:10px;color:var(--dim);font-weight:400}
.dp-info{font-size:10px;color:var(--muted)}
.dp-default{font-family:monospace;color:var(--accent)}
.detail-desc{font-size:12px;color:var(--muted);line-height:1.6;padding:12px 20px;border-top:1px solid var(--border)}
.detail-usage{padding:12px 20px;border-top:1px solid var(--border)}
.detail-usage h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.detail-usage code{display:block;background:#0a0a0a;border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:11px;color:var(--ink);font-family:monospace;white-space:pre;overflow-x:auto}
</style>
</head>
<body>

  <h1>NextFrame</h1>
  <span class="dim">Scene Gallery · 33 scenes · 8 categories</span>
  <span style="flex:1"></span>
  <input class="search" placeholder="Search scenes..." id="q">

<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay"><div class="detail" id="detail"></div></div>

const LEVEL_LABELS={starter:'Starter',advanced:'Advanced',pro:'Pro'};
const LEVEL_COLORS={starter:'#10b981',advanced:'#f59e0b',pro:'#ec4899'};
const ALL_TAGS=[...new Set(SCENES.flatMap(s=>s.tags))].sort();
const ALL_CATS=[...new Set(SCENES.map(s=>s.cat))];

let filter={cat:null,tag:null,q:''};

// ── Filters ──
function renderFilters(){
  const el=document.getElementById('filters');
  let html=`<button class="ftag${!filter.cat?' act':''}" data-cat="">All<span class="fcount">${SCENES.length}</span></button>`;
  for(const c of ALL_CATS){
    const n=SCENES.filter(s=>s.cat===c).length;
    html+=`<button class="ftag${filter.cat===c?' act':''}" data-cat="${c}" style="${filter.cat===c?`background:${CAT_COLORS[c]}18;border-color:${CAT_COLORS[c]}60;color:${CAT_COLORS[c]}`:''}">${c}<span class="fcount">${n}</span></button>`;
  }
  html+='<span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>';
  for(const t of ['opening','body','transition','data','ambient','subtitle','brand']){
    html+=`<button class="ftag${filter.tag===t?' act':''}" data-tag="${t}">${t}</button>`;
  }
  el.innerHTML=html;
  el.querySelectorAll('[data-cat]').forEach(b=>{b.onclick=()=>{filter.cat=b.dataset.cat||null;renderFilters();renderGrid()}});
  el.querySelectorAll('[data-tag]').forEach(b=>{b.onclick=()=>{filter.tag=filter.tag===b.dataset.tag?null:b.dataset.tag;renderFilters();renderGrid()}});
}

// ── Grid ──
function renderGrid(){
  const el=document.getElementById('grid');
  const q=filter.q.toLowerCase();
  const filtered=SCENES.filter(s=>{
    if(filter.cat&&s.cat!==filter.cat)return false;
    if(filter.tag&&!s.tags.includes(filter.tag))return false;
    if(q&&!s.id.toLowerCase().includes(q)&&!s.desc.toLowerCase().includes(q))return false;
    return true;
  });
  el.innerHTML=filtered.map(s=>`
    <div class="card" data-id="${s.id}">
      <img class="card-img" src="thumbs/${s.id}.png" alt="${s.id}" loading="lazy" onerror="this.style.background='#1a1a2e'">
      <div class="card-body">
        <div class="card-name">${s.id}<span class="card-cat" style="background:${CAT_COLORS[s.cat]}18;color:${CAT_COLORS[s.cat]}">${s.cat}</span></div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-meta">
          <span style="color:${LEVEL_COLORS[s.level]}">${LEVEL_LABELS[s.level]}</span>
          <span>${s.dur}s</span>
          <span>${s.params.length} params</span>
        </div>
        <div class="tag-row">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
  el.querySelectorAll('.card').forEach(c=>{c.onclick=()=>location.href='/gallery/'+c.dataset.id});
}

// ── Detail with live preview ──
let detailState = null; // {scene, paramValues, t}
let previewTimer = null;

function showDetail(id){
  const s=SCENES.find(x=>x.id===id);if(!s)return;
  detailState = {scene:s, paramValues:{}, t: s.dur * 0.4};
  for(const p of s.params) detailState.paramValues[p.n] = p.d;

  const ol=document.getElementById('overlay');
  const dt=document.getElementById('detail');

  let paramsHtml = '';
  for (const p of s.params) {
    if (p.t === 'number' && p.r) {
      const [mn,mx] = p.r.split('–').map(Number);
      const step = (mx-mn) > 10 ? 1 : (mx-mn) > 1 ? 0.1 : 0.01;
      paramsHtml += `<div class="dp-row"><div class="dp-name">${p.n}<span class="dp-type" id="dpv_${p.n}">${p.d}</span></div>
        <div style="display:flex;gap:6px;align-items:center"><input type="range" style="flex:1;accent-color:var(--accent)" min="${mn}" max="${mx}" step="${step}" value="${p.d}" data-pn="${p.n}" data-pt="number">
        <input style="width:50px;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;padding:3px 5px;color:var(--ink);font-size:10px;font-family:monospace;text-align:right" type="number" min="${mn}" max="${mx}" step="${step}" value="${p.d}" data-pn="${p.n}" data-pt="number"></div>
        <div class="dp-info">${p.s}</div></div>`;
    } else if (p.t === 'string') {
      paramsHtml += `<div class="dp-row"><div class="dp-name">${p.n}<span class="dp-type">string</span></div>
        <input style="width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--ink);font-size:11px;font-family:monospace" value="${String(p.d).replace(/"/g,'&quot;')}" data-pn="${p.n}" data-pt="string">
        <div class="dp-info">${p.s}</div></div>`;
    } else if (p.t === 'boolean') {
      paramsHtml += `<div class="dp-row"><div class="dp-name">${p.n}<span class="dp-type">boolean</span></div>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:var(--muted)"><input type="checkbox" ${p.d?'checked':''} data-pn="${p.n}" data-pt="boolean"> ${p.s}</label></div>`;
    } else if (p.t === 'enum') {
      paramsHtml += `<div class="dp-row"><div class="dp-name">${p.n}<span class="dp-type">enum</span></div>
        <select style="width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;padding:4px;color:var(--ink);font-size:11px" data-pn="${p.n}" data-pt="enum">${(p.o||[p.d]).map(o=>`<option${o===p.d?' selected':''}>${o}</option>`).join('')}</select>
        <div class="dp-info">${p.s}</div></div>`;
    } else {
      paramsHtml += `<div class="dp-row"><div class="dp-name">${p.n}<span class="dp-type">${p.t}</span></div>
        <div class="dp-info">${p.s} · default: <span class="dp-default">${JSON.stringify(p.d)}</span></div></div>`;
    }
  }

  dt.innerHTML=`
    <div class="detail-top">
      <h2>${s.id}<span class="card-cat" style="background:${CAT_COLORS[s.cat]}18;color:${CAT_COLORS[s.cat]};margin-left:8px">${s.cat}</span>
      <span class="card-cat" style="background:${LEVEL_COLORS[s.level]}18;color:${LEVEL_COLORS[s.level]}">${LEVEL_LABELS[s.level]}</span></h2>
      <button class="close-btn" id="close-detail">&times;</button>
    </div>
    <div class="detail-body">
      <div class="detail-preview">
        <img id="live-preview" src="thumbs/${s.id}.png" alt="${s.id}" style="width:100%;border-radius:8px">
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--muted)">t =</span>
          <input type="range" id="time-scrub" style="flex:1;accent-color:var(--accent)" min="0" max="${s.dur}" step="0.1" value="${detailState.t}">
          <span style="font-size:11px;color:var(--dim);font-family:monospace;min-width:36px" id="time-val">${detailState.t.toFixed(1)}s</span>
        </div>
        <div style="margin-top:6px;font-size:10px;color:var(--dim);text-align:center" id="preview-status">Static thumbnail · edit params to see live preview</div>
      </div>
      <div class="detail-params">
        <h4>Parameters (${s.params.length})</h4>
        ${paramsHtml}
        <h4 style="margin-top:16px">Tags</h4>
        <div class="tag-row">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="detail-desc">${s.desc}</div>
    <div class="detail-usage">
      <h4>Quick Start</h4>
      <code id="detail-code">nextframe add-clip timeline.json \\
  --track=v1 \\
  --scene=${s.id} \\
  --start=0 \\
  --duration=${s.dur}</code>
    </div>
  `;
  ol.classList.add('show');
  document.getElementById('close-detail').onclick=()=>{ol.classList.remove('show');detailState=null};

  // Bind param inputs
  dt.querySelectorAll('[data-pn]').forEach(inp => {
    const handler = () => {
      const pn = inp.dataset.pn, pt = inp.dataset.pt;
      if (pt === 'number') detailState.paramValues[pn] = Number(inp.value);
      else if (pt === 'boolean') detailState.paramValues[pn] = inp.checked;
      else detailState.paramValues[pn] = inp.value;
      // Sync paired inputs (slider + number)
      dt.querySelectorAll(`[data-pn="${pn}"]`).forEach(o => {
        if (o !== inp) { if (o.type === 'checkbox') o.checked = inp.checked; else o.value = inp.value; }
      });
      const vd = document.getElementById('dpv_' + pn);
      if (vd) vd.textContent = pt === 'boolean' ? inp.checked : inp.value;
      schedulePreview();
      updateCode();
    };
    inp.addEventListener('input', handler);
    inp.addEventListener('change', handler);
  });

  // Time scrub
  document.getElementById('time-scrub').oninput = function() {
    detailState.t = Number(this.value);
    document.getElementById('time-val').textContent = detailState.t.toFixed(1) + 's';
    schedulePreview();
  };
}

function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(fetchPreview, 150);
}

function fetchPreview() {
  if (!detailState) return;
  const s = detailState.scene;
  const params = new URLSearchParams({id: s.id, t: detailState.t, w: 640});
  for (const [k,v] of Object.entries(detailState.paramValues)) {
    params.set(k, String(v));
  }
  const statusEl = document.getElementById('preview-status');
  statusEl.textContent = 'Rendering...';
  const img = document.getElementById('live-preview');
  const url = `/api/scene-preview?${params}`;
  const tmp = new Image();
  tmp.onload = () => { img.src = url; statusEl.textContent = 'Live preview · ' + new Date().toLocaleTimeString(); };
  tmp.onerror = () => { statusEl.textContent = 'Preview requires: node preview/server.mjs'; };
  tmp.src = url;
}

function updateCode() {
  if (!detailState) return;
  const s = detailState.scene;
  const changed = {};
  for (const p of s.params) {
    if (detailState.paramValues[p.n] !== p.d) changed[p.n] = detailState.paramValues[p.n];
  }
  const paramsStr = Object.keys(changed).length > 0 ? `\n  --params='${JSON.stringify(changed)}'` : '';
  const el = document.getElementById('detail-code');
  if (el) el.textContent = `nextframe add-clip timeline.json \\\n  --track=v1 \\\n  --scene=${s.id} \\\n  --start=0 \\\n  --duration=${s.dur}${paramsStr}`;
}

document.getElementById('overlay').onclick=(e)=>{if(e.target.id==='overlay')document.getElementById('overlay').classList.remove('show')};
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('overlay').classList.remove('show')});
document.getElementById('q').oninput=function(){filter.q=this.value;renderGrid()};

renderFilters();
renderGrid();
</script>
</body>
</html>
