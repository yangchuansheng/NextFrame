<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFrame Pipeline</title>
<style>
:root {
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --accent: #8a6fae;
  --accent-15: rgba(138,111,174,0.15);
  --accent-06: rgba(138,111,174,0.06);
  --accent-03: rgba(138,111,174,0.03);
  --ink: #f0ece4;
  --ink-mid: rgba(240,236,228,0.85);
  --ink-dim: rgba(240,236,228,0.65);
  --ink-ghost: rgba(240,236,228,0.15);
  --ink-faint: rgba(138,111,174,0.08);
  --bg: #0a0a0f;
  --bg-up: #111118;
  --bg-surface: #17171f;
  --bg-hover: #1d1d28;
  --warm: #da7756;
  --warm-20: rgba(218,119,86,0.2);
  --font-display: Georgia, 'Times New Roman', serif;
  --font-body: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
  --font-mono: 'SF Mono', Menlo, monospace;
  --border-a1: 1px solid rgba(138,111,174,0.1);
  --border-a2: 1px solid rgba(138,111,174,0.25);
  --border-a5: 1px solid rgba(138,111,174,0.5);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* === TOP BAR === */
.topbar {
  position: sticky; top: 0; z-index: 100;
  height: 48px;
  display: flex; align-items: center;
  padding: 0 24px;
  background: var(--bg-up);
  border-bottom: var(--border-a1);
  backdrop-filter: blur(12px);
  gap: 16px;
}
.topbar-brand {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.logo-mark {
  width: 18px; height: 18px;
  border-radius: 5px;
  background: linear-gradient(135deg, var(--accent), var(--warm));
}
.brand-name {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink);
}
.breadcrumb {
  font-size: 12px;
  color: var(--ink-dim);
  flex-shrink: 0;
}
.breadcrumb span { color: var(--ink-ghost); margin: 0 6px; }

.topbar-tabs {
  display: flex; align-items: center; gap: 0;
  margin-left: auto;
  height: 100%;
}
.tab-btn {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-body);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-dim);
  padding: 0 16px;
  height: 100%;
  display: flex; align-items: center;
  border-bottom: 2px solid transparent;
  transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
}
.tab-btn:hover { color: var(--ink-mid); }
.tab-btn.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}

/* === MAIN === */
.main {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* === EMPTY STATE === */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--ink-ghost);
  font-size: 14px;
}
.empty-state code {
  display: block;
  margin-top: 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-dim);
  opacity: 0.5;
}

/* === SCRIPT === */
.script-layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 48px;
  align-items: start;
}
.script-principles {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 32px;
}
.pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--bg-surface);
  color: var(--ink-dim);
  white-space: nowrap;
}
.arc-flow {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 40px;
}
.arc-node {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 3px;
  background: var(--accent-06);
  color: var(--accent);
  border: 1px solid var(--accent-15);
}
.arc-line {
  width: 24px; height: 1px;
  background: var(--ink-ghost);
  flex-shrink: 0;
}
.segment-text {
  position: relative;
  padding-left: 36px;
  margin-bottom: 28px;
}
.segment-num {
  position: absolute; left: 0; top: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-ghost);
}
.segment-narration {
  font-family: var(--font-display);
  font-size: 18px;
  line-height: 2.0;
  color: var(--ink);
}

.comments-col { padding-top: 84px; }
.comment-group { margin-bottom: 28px; }
.comment-annotation {
  font-size: 12px;
  padding: 10px 12px;
  background: var(--bg-surface);
  border-radius: 4px;
  margin-bottom: 6px;
  color: var(--ink-dim);
}
.comment-annotation.role { border-left: 2px solid var(--warm); }
.comment-annotation.visual { border-left: 2px solid var(--accent); }
.comment-annotation.logic { border-left: 2px solid var(--ink-ghost); font-style: italic; }

/* === AUDIO === */
.audio-hero {
  height: 240px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  border-bottom: var(--border-a1);
  margin-bottom: 32px;
  position: relative;
}
.audio-hero-text {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 0.02em;
  line-height: 1.8;
  text-align: center;
  max-width: 640px;
}
.audio-hero-text .char-spoken { color: var(--ink); }
.audio-hero-text .char-current { color: var(--accent); text-shadow: 0 0 12px rgba(138,111,174,0.5); }
.audio-hero-text .char-pending { color: var(--ink-ghost); }
.voice-tag {
  position: absolute;
  bottom: 16px; right: 0;
  font-size: 11px;
  color: var(--ink-dim);
  font-family: var(--font-mono);
}
.audio-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: var(--border-a1);
}
.audio-row:last-child { border-bottom: none; }
.audio-idx {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-ghost);
  text-align: center;
}
.audio-text {
  font-size: 13px;
  color: var(--ink-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.audio-dur {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-dim);
  min-width: 48px;
  text-align: right;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.green { background: #4ade80; }
.status-dot.gray { background: var(--ink-ghost); }
.audio-total {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-dim);
  padding-top: 16px;
  border-top: var(--border-a1);
  margin-top: 8px;
}

/* === ATOMS === */
.atom-filters {
  display: flex; gap: 8px;
  margin-bottom: 24px;
}
.filter-pill {
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 4px;
  background: var(--bg-surface);
  color: var(--ink-dim);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.filter-pill:hover { color: var(--ink-mid); background: var(--bg-hover); }
.filter-pill.active {
  color: var(--accent);
  border-color: var(--accent-15);
  background: var(--accent-06);
}
.atom-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.atom-card {
  background: var(--bg-surface);
  border: var(--border-a1);
  border-radius: 6px;
  padding: 16px;
  transition: border-color 0.2s var(--ease);
}
.atom-card:hover { border-color: rgba(138,111,174,0.2); }
.atom-card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.atom-name { font-size: 14px; color: var(--ink); }
.type-pill {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.type-pill.component { background: var(--accent-15); color: var(--accent); }
.type-pill.video { background: rgba(74,222,128,0.15); color: #4ade80; }
.type-pill.image { background: var(--warm-20); color: var(--warm); }
.atom-meta {
  font-size: 12px;
  color: var(--ink-dim);
  line-height: 1.8;
}
.atom-meta span {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-ghost);
}

/* === ASSEMBLY === */
.assembly-placeholder {
  text-align: center;
  padding: 80px 24px;
}
.assembly-placeholder p {
  color: var(--ink-dim);
  font-size: 15px;
  margin-bottom: 16px;
}
.assembly-placeholder a {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
  border-bottom: 1px solid var(--accent-15);
  padding-bottom: 2px;
}
.assembly-placeholder a:hover { border-bottom-color: var(--accent); }
.assembly-stats {
  display: flex; gap: 24px;
  justify-content: center;
  margin-top: 24px;
}
.assembly-stat {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-ghost);
}
.assembly-stat strong {
  color: var(--ink-dim);
  font-weight: 500;
}

/* === OUTPUT === */
.output-card {
  background: var(--bg-surface);
  border: var(--border-a1);
  border-radius: 6px;
  padding: 20px 24px;
  margin-bottom: 12px;
  transition: border-color 0.2s var(--ease);
}
.output-card:hover { border-color: rgba(138,111,174,0.2); }
.output-head {
  display: flex; align-items: baseline; gap: 16px;
  margin-bottom: 12px;
}
.output-name {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--ink);
}
.output-date {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-ghost);
}
.output-specs {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 10px;
}
.spec-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--bg-hover);
  color: var(--ink-dim);
}
.output-changes {
  font-size: 13px;
  color: var(--ink-dim);
  margin-bottom: 10px;
}
.output-published {
  display: flex; gap: 6px;
}
.pub-pill {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
}
.pub-pill.active { background: rgba(74,222,128,0.12); color: #4ade80; }
.pub-pill.none { background: var(--bg-hover); color: var(--ink-ghost); }

/* === STAGE CONTAINER === */
.stage { display: none; }
.stage.active { display: block; }

@media (max-width: 720px) {
  .script-layout { grid-template-columns: 1fr; gap: 32px; }
  .comments-col { padding-top: 0; }
  .atom-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<svg style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.035;z-index:9999;mix-blend-mode:overlay">
  <filter id="grain"><feTurbulence baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>

<div class="topbar">
  <div class="topbar-brand">
    <div class="logo-mark"></div>
    <span class="brand-name">NextFrame</span>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="topbar-tabs" id="tabs"></div>
</div>

<div class="main" id="main"></div>

<script>
const STAGES = [
  { key: 'script',   label: '脚本' },
  { key: 'audio',    label: '音频' },
  { key: 'atoms',    label: '原子' },
  { key: 'assembly', label: '拼装' },
  { key: 'output',   label: '产出' }
];

const DEMO_CONFIG = {
  shared: {
    brand: { name: "NextFrame", colors: ["#8a6fae", "#da7756"] },
    voice: { name: "晓晓", style: "女声·沉稳", speed: 1.0 },
    principles: { audience: "25-35岁创作者", tone: "专业友好", style: "数据驱动", pace: "快-慢-快" },
    exportPreset: { width: 1920, height: 1080, fps: 30, codec: "h264" }
  }
};

const DEMO_DATA = {
  version: "0.4",
  script: {
    principles: { audience: "25-35岁创作者", tone: "专业友好", style: "数据驱动", pace: "快-慢-快" },
    arc: ["痛点", "方案", "原理", "证据", "行动"],
    segments: [
      { id: 1, narration: "每天，我们花 3 小时在重复性工作上。这些时间，本可以用来做更有价值的事。", visual: "大数字 \"3\" + 配文 \"小时/天\"", role: "痛点", logic: "用具体数字制造共鸣，不讲道理，讲感受" },
      { id: 2, narration: "如果有一个工具，能把这些时间还给你？NextFrame，让视频制作像写文档一样简单。", visual: "产品 Logo 从模糊到清晰", role: "方案", logic: "先问问题再给答案，制造期待感" },
      { id: 3, narration: "从脚本到音频，从画面到成片——AI 全自动编排，你只需要审核。", visual: "三步流程图 📝→🔊→🎬", role: "原理", logic: "三步降低认知负担，\"你只需要\"是关键词" },
      { id: 4, narration: "传统流程 3 天，NextFrame 5 分钟。已有 2000+ 创作者在使用。", visual: "对比柱状图 3天 vs 5分钟", role: "证据", logic: "对比+社会证明，两个说服力叠加" },
      { id: 5, narration: "现在就开始，免费创建你的第一个视频。", visual: "大按钮 \"开始试用\" + 发光效果", role: "行动", logic: "\"免费\"降低门槛，\"第一个\"暗示简单" }
    ]
  },
  audio: {
    voice: "晓晓", speed: 1.0,
    segments: [
      { id: 1, status: "generated", duration: 8.2, sentences: [{ text: "每天，我们花 3 小时在重复性工作上。", start: 0, end: 4.1 }, { text: "这些时间，本可以用来做更有价值的事。", start: 4.1, end: 8.2 }] },
      { id: 2, status: "generated", duration: 10.5, sentences: [{ text: "如果有一个工具，能把这些时间还给你？", start: 0, end: 5.2 }, { text: "NextFrame，让视频制作像写文档一样简单。", start: 5.2, end: 10.5 }] },
      { id: 3, status: "generated", duration: 9.8, sentences: [{ text: "从脚本到音频，从画面到成片——", start: 0, end: 4.5 }, { text: "AI 全自动编排，你只需要审核。", start: 4.5, end: 9.8 }] },
      { id: 4, status: "pending" },
      { id: 5, status: "pending" }
    ]
  },
  atoms: [
    { id: 1, type: "component", name: "数字统计", scene: "numberCounter", segment: 1, params: { value: 3, unit: "小时/天" } },
    { id: 2, type: "component", name: "Logo 揭示", scene: "logoReveal", segment: 2, params: { text: "NextFrame" } },
    { id: 3, type: "component", name: "流程图", scene: "flowChart", segment: 3, params: { nodes: 3 } },
    { id: 4, type: "component", name: "对比图表", scene: "barChart", segment: 4, params: { bars: 2 } },
    { id: 5, type: "component", name: "行动号召", scene: "slideFrame", segment: 5, params: { text: "开始试用" } },
    { id: 6, type: "video", name: "产品演示录屏", file: "assets/screen-recording.mp4", duration: 15.2, resolution: "1920x1080" },
    { id: 7, type: "video", name: "用户采访片段", file: "assets/interview.mp4", duration: 8.4, resolution: "1920x1080" },
    { id: 8, type: "image", name: "产品 Logo 高清", file: "assets/logo-hd.png", dimensions: "2400x2400", size: "1.2MB" }
  ],
  outputs: [
    { id: 3, name: "v3 — 最终版", date: "2026-04-13T14:32:00Z", file: "exports/v3.mp4", specs: { width: 1920, height: 1080, fps: 30, codec: "h264", duration: 42.6, size: "12.4MB" }, changes: "更新了段2配音，调整了段4时长", published: ["抖音", "YouTube"] },
    { id: 2, name: "v2 — 修改配音", date: "2026-04-12T20:15:00Z", file: "exports/v2.mp4", specs: { width: 1920, height: 1080, fps: 30, codec: "h264", duration: 41.8, size: "12.1MB" }, changes: "替换了背景音乐，修正字幕时间", published: [] },
    { id: 1, name: "v1 — 初稿", date: "2026-04-11T16:48:00Z", file: "exports/v1.mp4", specs: { width: 1920, height: 1080, fps: 30, codec: "h264", duration: 43.2, size: "12.8MB" }, changes: "首次导出", published: [] }
  ]
};

// --- URL params ---
const params = new URLSearchParams(location.search);
const project = params.get('project') || 'demo';
const episode = params.get('episode') || 'ep01';
let currentStage = params.get('stage') || location.hash.replace('#','') || 'script';
if (!STAGES.find(s => s.key === currentStage)) currentStage = 'script';

// --- Breadcrumb ---
document.getElementById('breadcrumb').innerHTML =
  `${esc(project)} <span>/</span> ${esc(episode)}`;

// --- Tabs ---
const tabsEl = document.getElementById('tabs');
STAGES.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (s.key === currentStage ? ' active' : '');
  btn.textContent = s.label;
  btn.dataset.stage = s.key;
  btn.addEventListener('click', () => switchStage(s.key));
  tabsEl.appendChild(btn);
});

document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 5) switchStage(STAGES[n-1].key);
});

function switchStage(key) {
  currentStage = key;
  location.hash = key;
  tabsEl.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.stage === key);
  });
  renderCurrent();
}

// --- Data loading ---
async function loadData() {
  try {
    const [pipelineRes, configRes] = await Promise.all([
      fetch(`/api/pipeline?project=${project}&episode=${episode}`),
      fetch(`/api/project-config?project=${project}`)
    ]);
    if (!pipelineRes.ok || !configRes.ok) throw new Error('API error');
    const pipeline = (await pipelineRes.json()).value;
    const config = (await configRes.json()).value;
    return { pipeline, config };
  } catch (e) {
    return { pipeline: DEMO_DATA, config: DEMO_CONFIG };
  }
}

let DATA = null;
loadData().then(d => { DATA = d; renderCurrent(); });

function renderCurrent() {
  if (!DATA) return;
  const mainEl = document.getElementById('main');
  const { pipeline, config } = DATA;
  switch (currentStage) {
    case 'script':   mainEl.innerHTML = renderScript(pipeline, config); break;
    case 'audio':    mainEl.innerHTML = renderAudio(pipeline, config); break;
    case 'atoms':    mainEl.innerHTML = renderAtoms(pipeline, config); initAtomFilters(); break;
    case 'assembly': mainEl.innerHTML = renderAssembly(pipeline, config); break;
    case 'output':   mainEl.innerHTML = renderOutput(pipeline, config); break;
  }
}

// --- Helpers ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// --- SCRIPT ---
function renderScript(p, c) {
  const s = p.script;
  if (!s || !s.segments || s.segments.length === 0) {
    return `<div class="empty-state">暂无脚本 — 通过 CLI 添加<code>nextframe script-set ${esc(project)} ${esc(episode)} --segment=1 --narration='...'</code></div>`;
  }
  const pr = s.principles || (c.shared && c.shared.principles) || {};
  const prLabels = { audience: '受众', tone: '语气', style: '风格', pace: '节奏' };

  let pills = Object.entries(pr).map(([k,v]) =>
    `<span class="pill">${esc(prLabels[k]||k)} ${esc(v)}</span>`
  ).join('');

  let arc = '';
  if (s.arc && s.arc.length) {
    arc = '<div class="arc-flow">' + s.arc.map((a, i) =>
      (i > 0 ? '<div class="arc-line"></div>' : '') + `<span class="arc-node">${esc(a)}</span>`
    ).join('') + '</div>';
  }

  let article = s.segments.map(seg =>
    `<div class="segment-text">
      <span class="segment-num">${seg.id}</span>
      <div class="segment-narration">${esc(seg.narration)}</div>
    </div>`
  ).join('');

  let comments = s.segments.map(seg =>
    `<div class="comment-group">
      <div class="comment-annotation role">${esc(seg.role)}</div>
      <div class="comment-annotation visual">${esc(seg.visual)}</div>
      <div class="comment-annotation logic">${esc(seg.logic)}</div>
    </div>`
  ).join('');

  return `<div class="script-layout">
    <div>
      <div class="script-principles">${pills}</div>
      ${arc}
      ${article}
    </div>
    <div class="comments-col">${comments}</div>
  </div>`;
}

// --- AUDIO ---
function renderAudio(p, c) {
  const a = p.audio;
  if (!a || !a.segments || a.segments.length === 0) {
    return `<div class="empty-state">暂无音频 — 通过 CLI 添加<code>nextframe audio-gen ${esc(project)} ${esc(episode)}</code></div>`;
  }

  // Hero: first generated segment's full text
  const firstGen = a.segments.find(s => s.status === 'generated' && s.sentences);
  let heroHtml = '';
  if (firstGen) {
    const fullText = firstGen.sentences.map(s => s.text).join('');
    const chars = [...fullText];
    const splitAt = 10;
    heroHtml = chars.map((ch, i) => {
      const cls = i < splitAt ? 'char-spoken' : i === splitAt ? 'char-current' : 'char-pending';
      return `<span class="${cls}">${esc(ch)}</span>`;
    }).join('');
  }

  const voiceName = a.voice || (c.shared && c.shared.voice && c.shared.voice.name) || '—';
  const speed = a.speed || (c.shared && c.shared.voice && c.shared.voice.speed) || 1.0;

  // Find narration text from script segments for pending audio
  const scriptSegs = p.script && p.script.segments ? p.script.segments : [];

  let totalDur = 0;
  const rows = a.segments.map(seg => {
    const isGen = seg.status === 'generated';
    const dur = isGen ? seg.duration : 0;
    totalDur += dur;
    let text = '';
    if (isGen && seg.sentences) {
      text = seg.sentences.map(s => s.text).join(' ');
    } else {
      const scr = scriptSegs.find(s => s.id === seg.id);
      text = scr ? scr.narration : '';
    }
    return `<div class="audio-row">
      <span class="audio-idx">${seg.id}</span>
      <span class="audio-text">${esc(text)}</span>
      <span class="audio-dur">${isGen ? dur.toFixed(1) + 's' : '—'}</span>
      <span class="status-dot ${isGen ? 'green' : 'gray'}"></span>
    </div>`;
  }).join('');

  return `<div class="audio-hero">
    <div class="audio-hero-text">${heroHtml}</div>
    <span class="voice-tag">${esc(voiceName)} · ${speed}x</span>
  </div>
  ${rows}
  <div class="audio-total">总时长 <strong>${totalDur.toFixed(1)}s</strong>（已生成）</div>`;
}

// --- ATOMS ---
function renderAtoms(p, c) {
  const atoms = p.atoms;
  if (!atoms || atoms.length === 0) {
    return `<div class="empty-state">暂无原子 — 通过 CLI 添加<code>nextframe atom-add ${esc(project)} ${esc(episode)} --type=component --scene=numberCounter</code></div>`;
  }

  const types = ['all', 'component', 'video', 'image'];
  const typeLabels = { all: '全部', component: '组件', video: '视频', image: '图片' };
  const filters = types.map(t =>
    `<button class="filter-pill${t==='all'?' active':''}" data-filter="${t}">${typeLabels[t]}</button>`
  ).join('');

  const cards = atoms.map(a => {
    let meta = '';
    if (a.type === 'component') {
      meta = `场景 <span>${esc(a.scene)}</span> · 段落 <span>${a.segment}</span>`;
      if (a.params) {
        const ps = Object.entries(a.params).map(([k,v]) => `${k}: ${v}`).join(', ');
        meta += `<br><span>${esc(ps)}</span>`;
      }
    } else if (a.type === 'video') {
      meta = `${esc(a.file||'')}<br><span>${a.duration ? a.duration+'s' : ''} ${a.resolution||''}</span>`;
    } else if (a.type === 'image') {
      meta = `${esc(a.file||'')}<br><span>${a.dimensions||''} ${a.size||''}</span>`;
    }
    return `<div class="atom-card" data-type="${a.type}">
      <div class="atom-card-head">
        <span class="atom-name">${esc(a.name)}</span>
        <span class="type-pill ${a.type}">${typeLabels[a.type]||a.type}</span>
      </div>
      <div class="atom-meta">${meta}</div>
    </div>`;
  }).join('');

  return `<div class="atom-filters" id="atomFilters">${filters}</div>
  <div class="atom-grid" id="atomGrid">${cards}</div>`;
}

function initAtomFilters() {
  const filtersEl = document.getElementById('atomFilters');
  if (!filtersEl) return;
  filtersEl.addEventListener('click', e => {
    const btn = e.target.closest('.filter-pill');
    if (!btn) return;
    filtersEl.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.atom-card').forEach(card => {
      card.style.display = (f === 'all' || card.dataset.type === f) ? '' : 'none';
    });
  });
}

// --- ASSEMBLY ---
function renderAssembly(p, c) {
  const segCount = p.script && p.script.segments ? p.script.segments.length : 0;
  let totalDur = 0;
  if (p.audio && p.audio.segments) {
    p.audio.segments.forEach(s => { if (s.duration) totalDur += s.duration; });
  }

  return `<div class="assembly-placeholder">
    <p>拼装视图在编辑器中查看</p>
    <a href="/preview.html">打开预览编辑器</a>
    <div class="assembly-stats">
      <span class="assembly-stat">段落 <strong>${segCount}</strong></span>
      <span class="assembly-stat">音频时长 <strong>${totalDur.toFixed(1)}s</strong></span>
    </div>
  </div>`;
}

// --- OUTPUT ---
function renderOutput(p, c) {
  const outputs = p.outputs;
  if (!outputs || outputs.length === 0) {
    return `<div class="empty-state">暂无产出 — 通过 CLI 导出<code>nextframe export ${esc(project)} ${esc(episode)}</code></div>`;
  }

  return outputs.map(o => {
    const sp = o.specs || {};
    const specPills = [
      sp.width && sp.height ? `${sp.width}x${sp.height}` : null,
      sp.fps ? `${sp.fps}fps` : null,
      sp.codec || null,
      sp.duration ? `${sp.duration}s` : null,
      sp.size || null
    ].filter(Boolean).map(s => `<span class="spec-pill">${esc(s)}</span>`).join('');

    let pubHtml = '';
    if (o.published && o.published.length > 0) {
      pubHtml = o.published.map(pl => `<span class="pub-pill active">${esc(pl)}</span>`).join('');
    } else {
      pubHtml = '<span class="pub-pill none">未发布</span>';
    }

    return `<div class="output-card">
      <div class="output-head">
        <span class="output-name">${esc(o.name)}</span>
        <span class="output-date">${fmtDate(o.date)}</span>
      </div>
      <div class="output-specs">${specPills}</div>
      <div class="output-changes">${esc(o.changes||'')}</div>
      <div class="output-published">${pubHtml}</div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
