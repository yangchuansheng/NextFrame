<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NextFrame · AI 指令库</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
}
html, body {
  height: 100%;
  background: #050507;
  color: rgba(255,255,255,0.80);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body {
  padding: 48px 24px;
  overflow-y: auto;
}
body::-webkit-scrollbar { width: 5px; }
body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

.page-title {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: rgba(255,255,255,0.95);
  margin-bottom: 32px;
  letter-spacing: -0.2px;
}

.aurora {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 20% at 50% 0%, rgba(139,92,246,0.14), transparent),
    radial-gradient(ellipse 60% 15% at 50% 100%, rgba(124,58,237,0.08), transparent);
}
</style>
</head>
<body>
<div class="aurora"></div>
<div style="position:relative;z-index:1">
  <div style="display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:32px">
    <button onclick="location.href='../../index.html'" style="position:absolute;left:0;background:none;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);padding:4px 12px;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--sans)">← 返回</button>
    <span style="font-size:20px;font-weight:600;color:rgba(255,255,255,0.95);letter-spacing:-0.2px">✨ AI 指令库</span>
  </div>
  <div id="ai-prompts-root"></div>
</div>
<script src="ai-prompts.js"></script>
<script>
// Inline data for file:// protocol (fetch blocked by CORS)
AIPrompts.init(document.getElementById('ai-prompts-root'), {
  "sections": [
    { "icon": "📁", "title": "项目管理", "prompts": [
      "新建一个横屏教程项目，名字叫\"XX课\"",
      "删除项目\"项目名\"以及所有相关文件",
      "列出所有项目，显示集数和最后修改时间",
      "重命名项目\"旧名\"为\"新名\"",
      "复制项目\"XX\"创建一个副本"
    ]},
    { "icon": "🎬", "title": "视频制作", "prompts": [
      "给\"XX\"项目新建一集，主题是...",
      "用这段文字生成脚本，自动配音并预览",
      "预览第一集的时间线，截图给我看",
      "把第二集的字幕样式改成居中大字",
      "给这一集加一个 3 秒的片头动画",
      "调整背景音乐音量到 30%"
    ]},
    { "icon": "📤", "title": "导出发布", "prompts": [
      "导出\"XX\"项目所有集，1080p 30fps h264",
      "导出当前集的竖屏版本 9:16",
      "把最新导出的视频发布到抖音",
      "批量导出所有项目的第一集"
    ]},
    { "icon": "📦", "title": "素材管理", "prompts": [
      "从这个 YouTube 链接下载素材并转写字幕",
      "列出所有已下载的素材和时长",
      "把这段音频切成按句子分割的片段",
      "导入本地文件夹作为素材库"
    ]},
    { "icon": "⚙️", "title": "设置与维护", "prompts": [
      "把默认导出设置改成 4K 60fps ProRes",
      "清理所有缓存，释放磁盘空间",
      "显示当前存储占用情况",
      "切换界面语言为英文"
    ]}
  ]
});
</script>
</body>
</html>
