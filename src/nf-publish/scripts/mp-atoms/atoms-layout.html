<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>公众号原子 — 布局</title><style>body{max-width:420px;margin:40px auto;padding:0 16px;font-family:-apple-system,sans-serif;background:#fff}.L{font-size:12px;color:#999;letter-spacing:2px;margin:32px 0 8px;padding-top:16px;border-top:1px dashed #e0e0e0}.L:first-of-type{border-top:none;margin-top:16px}h1{font-size:20px;color:#2c1810;margin:0 0 8px}.sub{font-size:12px;color:#999;margin:0 0 24px}</style></head><body>
<h1>Flex 布局</h1><p class="sub">5 个原子</p>

<p class="L">双栏</p>
<section style="display:flex;margin-bottom:8px;">
<section style="flex:1;background:#f5f0e8;border:1px solid #e8dcc8;border-radius:10px;padding:14px;margin-right:6px;">
<p style="font-size:11px;color:#c49a3c;letter-spacing:3px;margin:0 0 8px;font-weight:600;">左栏</p>
<p style="font-size:13px;color:#5c4a35;line-height:1.7;margin:0;">适合对比、正反、前后类内容。</p>
</section>
<section style="flex:1;background:#f5f0e8;border:1px solid #e8dcc8;border-radius:10px;padding:14px;margin-left:6px;">
<p style="font-size:11px;color:#c49a3c;letter-spacing:3px;margin:0 0 8px;font-weight:600;">右栏</p>
<p style="font-size:13px;color:#5c4a35;line-height:1.7;margin:0;">flex:1 等宽，margin 控制间距。</p>
</section>
</section>

<p class="L">三列图标</p>
<section style="display:flex;margin-bottom:8px;text-align:center;">
<section style="flex:1;background:#f5f0e8;border:1px solid #e8dcc8;border-radius:10px;padding:14px 6px;margin-right:4px;">
<p style="font-size:26px;margin:0 0 4px;">🎨</p>
<p style="font-size:12px;font-weight:700;color:#2c1810;margin:0 0 3px;">设计</p>
<p style="font-size:10px;color:#9a8470;margin:0;">色彩 · 字号</p>
</section>
<section style="flex:1;background:#f5f0e8;border:1px solid #e8dcc8;border-radius:10px;padding:14px 6px;margin:0 4px;">
<p style="font-size:26px;margin:0 0 4px;">📐</p>
<p style="font-size:12px;font-weight:700;color:#2c1810;margin:0 0 3px;">布局</p>
<p style="font-size:10px;color:#9a8470;margin:0;">双栏 · 三栏</p>
</section>
<section style="flex:1;background:#f5f0e8;border:1px solid #e8dcc8;border-radius:10px;padding:14px 6px;margin-left:4px;">
<p style="font-size:26px;margin:0 0 4px;">✨</p>
<p style="font-size:12px;font-weight:700;color:#2c1810;margin:0 0 3px;">交互</p>
<p style="font-size:10px;color:#9a8470;margin:0;">SVG · 动画</p>
</section>
</section>

<p class="L">图标+文字行</p>
<section style="display:flex;align-items:flex-start;margin-bottom:8px;">
<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;min-width:22px;background:rgba(196,154,60,0.15);color:#c49a3c;border-radius:6px;font-size:12px;font-weight:700;margin-right:10px;margin-top:2px;">S</span>
<section><p style="font-size:14px;color:#2c1810;font-weight:600;line-height:1.4;margin:0;">脚本生成</p><p style="font-size:12px;color:#7a6650;line-height:1.6;margin:3px 0 0;">深度调研 → 方法论选择 → 自动成稿</p></section>
</section>

<p class="L">编号列表</p>
<section style="margin-bottom:8px;">
<section style="display:flex;margin-bottom:6px;align-items:flex-start;">
<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;min-width:20px;background:rgba(196,154,60,0.15);color:#c49a3c;border-radius:50%;font-size:11px;font-weight:700;margin-right:10px;margin-top:2px;">1</span>
<p style="font-size:14px;color:#5c4a35;line-height:1.6;margin:0;">彩色替灰度——深浅模式通吃</p>
</section>
<section style="display:flex;margin-bottom:6px;align-items:flex-start;">
<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;min-width:20px;background:rgba(196,154,60,0.15);color:#c49a3c;border-radius:50%;font-size:11px;font-weight:700;margin-right:10px;margin-top:2px;">2</span>
<p style="font-size:14px;color:#5c4a35;line-height:1.6;margin:0;">不用 position——flex + margin 替代</p>
</section>
</section>

<p class="L">竖线时间轴</p>
<section style="padding-left:16px;border-left:2px solid #c49a3c;margin:0 0 8px;">
<section style="margin-bottom:14px;">
<p style="font-size:13px;font-weight:700;color:#2c1810;margin:0 0 3px;">Step 1 · 选题</p>
<p style="font-size:12px;color:#7a6650;line-height:1.6;margin:0;">32 个数据源扫描</p>
</section>
<section style="margin-bottom:14px;">
<p style="font-size:13px;font-weight:700;color:#2c1810;margin:0 0 3px;">Step 2 · 制作</p>
<p style="font-size:12px;color:#7a6650;line-height:1.6;margin:0;">脚本→画面→语音→合成</p>
</section>
<section>
<p style="font-size:13px;font-weight:700;color:#2c1810;margin:0 0 3px;">Step 3 · 发布</p>
<p style="font-size:12px;color:#7a6650;line-height:1.6;margin:0;">7 平台一键触达</p>
</section>
</section>

</body></html>
