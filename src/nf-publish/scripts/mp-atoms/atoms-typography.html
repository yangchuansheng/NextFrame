<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>公众号原子 — 文字排版</title>
<style>body{max-width:420px;margin:40px auto;padding:0 16px;font-family:-apple-system,sans-serif;background:#fff}.L{font-size:12px;color:#999;letter-spacing:2px;margin:32px 0 8px;padding-top:16px;border-top:1px dashed #e0e0e0}.L:first-of-type{border-top:none;margin-top:16px}h1{font-size:20px;color:#2c1810;margin:0 0 8px}.sub{font-size:12px;color:#999;margin:0 0 24px}</style>
</head><body>
<h1>文字排版</h1><p class="sub">6 个原子</p>

<p class="L">正文段落</p>
<p style="font-size:15px;color:#5c4a35;line-height:2.0;letter-spacing:0.5px;margin:0 0 8px;">好的排版让文字有节奏地呼吸。15px 字号、2.0 行高、0.5px 字间距、深棕色。</p>

<p class="L">首行缩进</p>
<p style="font-size:15px;color:#5c4a35;line-height:2.0;letter-spacing:0.5px;margin:0 0 8px;text-indent:2em;">首行缩进两个字，传统中文排版写法。适合书信体、杂志体、长文叙事。</p>

<p class="L">文字强调（四种）</p>
<p style="font-size:15px;color:#5c4a35;line-height:2.0;margin:0 0 8px;">这是<strong style="font-weight:700;color:#c49a3c;">金色加粗</strong>，这是<strong style="font-weight:700;color:#2c1810;border-bottom:2px solid #c49a3c;">底线强调</strong>，这是<strong style="font-weight:700;color:#2c1810;background:rgba(196,154,60,0.12);padding:1px 4px;border-radius:3px;">高亮标记</strong>，这是<em style="font-style:italic;color:#9a8470;">斜体弱化</em>。</p>

<p class="L">标题层级</p>
<p style="font-size:26px;font-weight:900;color:#2c1810;margin:0 0 4px;">一级 26px</p>
<p style="font-size:20px;font-weight:800;color:#2c1810;margin:0 0 4px;">二级 20px</p>
<p style="font-size:17px;font-weight:700;color:#5c4a35;margin:0 0 4px;">三级 17px</p>
<p style="font-size:15px;font-weight:600;color:#7a6650;margin:0 0 8px;">四级 15px</p>

<p class="L">章节标题（圆编号）</p>
<section style="display:flex;align-items:center;margin:0 0 8px;">
<section style="width:28px;height:28px;background:#c49a3c;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-right:10px;"><span style="color:#fff;font-size:14px;font-weight:700;">1</span></section>
<span style="font-size:20px;font-weight:800;color:#2c1810;">章节标题文字</span>
</section>

<p class="L">CHAPTER 式标题</p>
<section style="margin:0 0 8px;">
<p style="font-size:10px;color:#c49a3c;letter-spacing:5px;margin:0 0 6px;font-weight:600;">CHAPTER 01</p>
<p style="font-size:20px;font-weight:800;color:#2c1810;margin:0 0 4px;">标题文字</p>
<p style="font-size:12px;color:#9a8470;margin:0 0 6px;">English Subtitle</p>
<section style="width:32px;height:2px;background:#c49a3c;"></section>
</section>

</body></html>
