<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>公众号原子 — 数据可视化</title><style>body{max-width:420px;margin:40px auto;padding:0 16px;font-family:-apple-system,sans-serif;background:#fff}.L{font-size:12px;color:#999;letter-spacing:2px;margin:32px 0 8px;padding-top:16px;border-top:1px dashed #e0e0e0}.L:first-of-type{border-top:none;margin-top:16px}h1{font-size:20px;color:#2c1810;margin:0 0 8px}.sub{font-size:12px;color:#999;margin:0 0 24px}</style></head><body>
<h1>数据可视化</h1><p class="sub">4 个原子</p>

<p class="L">大数字三列</p>
<section style="background:#f5f0e8;border:1px solid #e8dcc8;border-radius:10px;padding:18px;margin:0 0 8px;">
<section style="display:flex;text-align:center;">
<section style="flex:1;border-right:1px solid #e8dcc8;">
<p style="font-size:32px;font-weight:900;color:#c49a3c;margin:0 0 4px;">32+</p>
<p style="font-size:10px;color:#9a8470;margin:0;letter-spacing:2px;">数据源</p>
</section>
<section style="flex:1;border-right:1px solid #e8dcc8;">
<p style="font-size:32px;font-weight:900;color:#c49a3c;margin:0 0 4px;">7</p>
<p style="font-size:10px;color:#9a8470;margin:0;letter-spacing:2px;">平台</p>
</section>
<section style="flex:1;">
<p style="font-size:32px;font-weight:900;color:#c49a3c;margin:0 0 4px;">0</p>
<p style="font-size:10px;color:#9a8470;margin:0;letter-spacing:2px;">人工</p>
</section>
</section>
</section>

<p class="L">进度条</p>
<section style="margin-bottom:8px;">
<section style="display:flex;align-items:center;margin-bottom:4px;"><span style="font-size:12px;color:#5c4a35;min-width:50px;">排版</span><span style="font-size:12px;color:#c49a3c;font-weight:700;">95%</span></section>
<section style="background:#e8dcc8;border-radius:4px;height:6px;margin-bottom:10px;"><section style="width:95%;height:6px;background:linear-gradient(90deg,#c49a3c,#e8c86e);border-radius:4px;"></section></section>
<section style="display:flex;align-items:center;margin-bottom:4px;"><span style="font-size:12px;color:#5c4a35;min-width:50px;">交互</span><span style="font-size:12px;color:#c49a3c;font-weight:700;">70%</span></section>
<section style="background:#e8dcc8;border-radius:4px;height:6px;"><section style="width:70%;height:6px;background:linear-gradient(90deg,#c49a3c,#e8c86e);border-radius:4px;"></section></section>
</section>

<p class="L">流程对比卡片</p>
<section style="margin-bottom:8px;">
<section style="background:#c49a3c;border-radius:8px 8px 0 0;padding:10px 16px;">
<p style="font-size:12px;font-weight:700;color:#fff;margin:0;">人负责想</p>
</section>
<section style="background:#f5f0e8;border:1px solid #e8dcc8;border-radius:0 0 8px 8px;padding:12px 16px;">
<p style="font-size:12px;color:#7a6650;line-height:1.8;margin:0;">选题 · 核心观点 · 目标受众 · 最终审核</p>
</section>
</section>

<p class="L">标签药丸（6色）</p>
<section style="display:flex;flex-wrap:wrap;margin-bottom:8px;">
<span style="display:inline-block;background:rgba(196,154,60,0.12);color:#c49a3c;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;margin:0 6px 8px 0;">金色</span>
<span style="display:inline-block;background:rgba(37,99,180,0.10);color:#2563b4;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;margin:0 6px 8px 0;">蓝色</span>
<span style="display:inline-block;background:rgba(180,60,80,0.10);color:#b43c50;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;margin:0 6px 8px 0;">红色</span>
<span style="display:inline-block;background:rgba(34,140,80,0.10);color:#228c50;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;margin:0 6px 8px 0;">绿色</span>
<span style="display:inline-block;background:rgba(140,80,180,0.10);color:#8c50b4;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;margin:0 6px 8px 0;">紫色</span>
<span style="display:inline-block;background:rgba(180,100,40,0.10);color:#b46428;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;margin:0 6px 8px 0;">橙色</span>
</section>

</body></html>
