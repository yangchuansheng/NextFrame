<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>公众号原子 — 引用金句</title><style>body{max-width:420px;margin:40px auto;padding:0 16px;font-family:-apple-system,sans-serif;background:#fff}.L{font-size:12px;color:#999;letter-spacing:2px;margin:32px 0 8px;padding-top:16px;border-top:1px dashed #e0e0e0}.L:first-of-type{border-top:none;margin-top:16px}h1{font-size:20px;color:#2c1810;margin:0 0 8px}.sub{font-size:12px;color:#999;margin:0 0 24px}</style></head><body>
<h1>引用与金句</h1><p class="sub">5 个原子</p>

<p class="L">书摘式引用</p>
<section style="border-top:1px solid #e8dcc8;border-bottom:1px solid #e8dcc8;padding:16px 0;margin:0 0 8px;text-align:center;">
<p style="font-size:15px;color:#9a8470;line-height:1.8;margin:0;font-style:italic;">「排版是无声的说服力。读者不会注意到好排版，但一定会被坏排版赶走。」</p>
</section>

<p class="L">左竖线引用</p>
<section style="border-left:3px solid #c49a3c;padding:12px 16px;margin:0 0 8px;">
<p style="font-size:14px;color:#5c4a35;line-height:1.8;margin:0;">微信公众号只允许 inline style。没有 class，没有外部 CSS，没有 JavaScript。</p>
</section>

<p class="L">卡片引用（带出处）</p>
<section style="background:#f5f0e8;border:1px solid #e8dcc8;border-radius:10px;padding:18px;margin:0 0 8px;">
<p style="font-size:14px;color:#9a8470;line-height:1.8;margin:0;font-style:italic;">「秘密在色相里——哪怕只加 1% 的暖色，微信就认定它是彩色，不再转换。」</p>
<p style="font-size:12px;color:#b8a88a;margin:8px 0 0;text-align:right;">— 30 项深色模式实测</p>
</section>

<p class="L">居中大金句</p>
<section style="margin:0 0 8px;text-align:center;padding:16px 8px;">
<section style="border-top:1px solid #e8dcc8;border-bottom:1px solid #e8dcc8;padding:20px 0;">
<p style="font-size:20px;font-weight:800;color:#2c1810;line-height:1.6;margin:0 0 4px;letter-spacing:1.5px;">上限不在工具，在想象力。</p>
<p style="font-size:20px;font-weight:800;color:#c49a3c;line-height:1.6;margin:0;letter-spacing:1.5px;">微信给了画布，AI 来画。</p>
</section>
</section>

<p class="L">提示框（tip）</p>
<section style="background:rgba(34,140,80,0.08);border-left:3px solid #228c50;padding:14px 16px;margin:0 0 8px;border-radius:0 8px 8px 0;">
<p style="font-size:13px;font-weight:700;color:#228c50;margin:0 0 6px;">💡 提示</p>
<p style="font-size:14px;color:#5c4a35;line-height:1.7;margin:0;">用带色相的颜色替代灰度色，深浅模式自动通吃。</p>
</section>

</body></html>
