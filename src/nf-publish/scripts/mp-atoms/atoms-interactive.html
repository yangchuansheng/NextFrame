<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>公众号原子 — SVG 交互</title><style>body{max-width:420px;margin:40px auto;padding:0 16px;font-family:-apple-system,sans-serif;background:#fff}.L{font-size:12px;color:#999;letter-spacing:2px;margin:32px 0 8px;padding-top:16px;border-top:1px dashed #e0e0e0}.L:first-of-type{border-top:none;margin-top:16px}h1{font-size:20px;color:#2c1810;margin:0 0 8px}.sub{font-size:12px;color:#999;margin:0 0 24px}</style></head><body>
<h1>SVG 交互</h1><p class="sub">3 个原子 — 手机预览才能点击</p>

<p class="L">点击展开</p>
<section style="margin:0 0 8px;">
<svg viewBox="0 0 690 200" width="100%" style="display:block;" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="690" height="60" rx="10" fill="#f5f0e8" stroke="#e8dcc8"/>
  <text x="345" y="28" text-anchor="middle" fill="#c49a3c" font-size="14" font-weight="bold">点击展开</text>
  <text x="345" y="48" text-anchor="middle" fill="#b8a88a" font-size="10">tap to reveal</text>
  <animate attributeName="height" begin="click" dur="0.4s" from="60" to="200" fill="freeze" restart="never"/>
  <rect x="0" y="70" width="690" height="120" fill="#f5f0e8" stroke="#e8dcc8" opacity="0">
    <animate attributeName="opacity" begin="click" dur="0.3s" to="1" fill="freeze" restart="never"/>
  </rect>
  <text x="345" y="110" text-anchor="middle" fill="#2c1810" font-size="15" font-weight="bold" opacity="0">
    隐藏内容出现了
    <animate attributeName="opacity" begin="click" dur="0.4s" to="1" fill="freeze" restart="never"/>
  </text>
  <text x="345" y="150" text-anchor="middle" fill="#c49a3c" font-size="13" opacity="0">
    SVG animate + begin="click"
    <animate attributeName="opacity" begin="click" dur="0.6s" to="1" fill="freeze" restart="never"/>
  </text>
</svg>
</section>

<p class="L">问答切换</p>
<section style="margin:0 0 8px;">
<svg viewBox="0 0 690 90" width="100%" style="display:block;" xmlns="http://www.w3.org/2000/svg">
  <rect width="690" height="90" rx="10" fill="#f5f0e8" stroke="#e8dcc8"/>
  <text x="345" y="40" text-anchor="middle" fill="#2563b4" font-size="14" font-weight="bold">Q: 公众号排版的天花板？</text>
  <text x="345" y="65" text-anchor="middle" fill="#b8a88a" font-size="11">点击看答案</text>
  <rect width="690" height="90" rx="10" fill="#f5f0e8" stroke="#c49a3c" opacity="0">
    <animate attributeName="opacity" begin="click" dur="0.3s" to="1" fill="freeze" restart="never"/>
  </rect>
  <text x="345" y="40" text-anchor="middle" fill="#c49a3c" font-size="14" font-weight="bold" opacity="0">
    A: inline style 是唯一通道
    <animate attributeName="opacity" begin="click" dur="0.3s" to="1" fill="freeze" restart="never"/>
  </text>
  <text x="345" y="65" text-anchor="middle" fill="#7a6650" font-size="11" opacity="0">
    但 SVG 可以突破静态限制
    <animate attributeName="opacity" begin="click" dur="0.4s" to="1" fill="freeze" restart="never"/>
  </text>
</svg>
</section>

<p class="L">SVG 不变色块</p>
<section style="margin:0 0 8px;">
<svg viewBox="0 0 690 40" width="100%" style="display:block;" xmlns="http://www.w3.org/2000/svg">
  <rect width="690" height="40" rx="8" fill="#c49a3c"/>
  <text x="345" y="26" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">SVG 颜色不受深色模式影响</text>
</svg>
</section>

</body></html>
