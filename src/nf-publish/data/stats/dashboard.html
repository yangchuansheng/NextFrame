<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>MediaAgentTeam — 全平台数据仪表盘</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #d29922; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', sans-serif; padding: 24px; max-width: 1200px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { color: var(--dim); font-size: 13px; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.platform-name { font-size: 16px; font-weight: 600; }
.followers { color: var(--accent); font-size: 14px; }
.status-online { color: var(--green); }
.status-offline { color: var(--red); }
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.metric { text-align: center; padding: 8px 4px; background: rgba(255,255,255,0.03); border-radius: 6px; }
.metric-value { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
.metric-label { font-size: 11px; color: var(--dim); margin-top: 2px; }
.items { border-top: 1px solid var(--border); padding-top: 12px; }
.items-title { font-size: 13px; color: var(--dim); margin-bottom: 8px; }
.item { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.item:last-child { border-bottom: none; }
.item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 12px; }
.item-stats { color: var(--dim); white-space: nowrap; font-size: 12px; }
.item-date { color: var(--dim); font-size: 11px; margin-left: 8px; }
.video-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.video-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
.video-date { font-size: 11px; color: var(--dim); margin-bottom: 8px; }
.video-stats { display: flex; flex-wrap: wrap; gap: 6px; }
.video-stat { background: rgba(255,255,255,0.04); border-radius: 4px; padding: 3px 8px; font-size: 12px; }
.video-stat strong { color: var(--accent); margin-left: 3px; }
.video-stat.plays { background: rgba(88,166,255,0.1); }
.video-stat.plays strong { color: #79c0ff; }
.highlight { color: var(--green); }
.section-title { font-size: 15px; font-weight: 600; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.overview-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
.overview-chip { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.2); border-radius: 20px; padding: 4px 12px; font-size: 12px; }
.overview-chip strong { color: var(--accent); margin-left: 4px; }
.footer { text-align: center; color: var(--dim); font-size: 11px; margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<h1>MediaAgentTeam — 全平台数据</h1>
<div class="subtitle" id="ts">采集时间: 加载中...</div>

<div class="grid" id="cards"></div>

<div class="section-title">全部内容列表</div>
<div id="all-items"></div>

<div class="footer">
  数据来源: automedia 安全模式采集（wp_text/wp_html 离线解析，零 JS 注入）<br>
  OPC·王宇轩的数字员工团队
</div>

<script>

      }
    },
    {

      "followers": 1591,
      "overview": {
        "净增关注": "179",
        "新增播放": "6736",
        "新增点赞": "31",
        "新增评论": "2"
      },
      "items": [
        {
          "title": "「秒剪」自动字幕...",
          "date": "2026-04-01 08:10",
          "plays": "5.7万",
          "likes": "190",
          "comments": "79",
          "forwards": "1042",
          "saves": "561"
        },
        {
          "title": "我是如何用Claude Code打造全自动化AI自媒体的？",
          "date": "2026-04-03 21:42",
          "plays": "-",
          "likes": "-",
          "comments": "-"
        },
        {
          "title": "Anthropic一周两次事故，51万行源码被全世界看到",
          "date": "2026-04-01 21:54",
          "plays": "2.4万",
          "likes": "92",
          "comments": "35",
          "forwards": "644",
          "saves": "228"
        },
        {
          "title": "你发一句话，51万行代码跑了什么？",
          "date": "2026-04-01 08:47",
          "plays": "2.1万",

        }
      ]
    },
    {
      "platform": "快手",
      "status": "offline",
      "followers": 0,
      "items": []
    },
    {
      "platform": "知乎",
      "followers": 0,
      "score": "453",
      "items": [
        {
          "title": "视频",
          "date": "2026-04-04",
          "stats": {
            "播放": "1"
          }
        },
        {

          }
        }
      ]
    },
    {
      "platform": "公众号",
      "status": "offline",
      "items": [
        {
          "title": "G00 吃瓜时间线：从源码泄露到开源",
          "date": "2026-04-03",
          "reads": "10000"
        },
        {
          "title": "Claude Code 源码讲解系列开篇",
          "date": "2026-04-03",
          "reads": "20000"
        }
      ]
    }
  ]
};

document.getElementById('ts').textContent = '采集时间: ' + (DATA.ts || '-');

const cardsEl = document.getElementById('cards');
const allItemsEl = document.getElementById('all-items');

const platformColors = {'抖音':'#fe2c55','小红书':'#ff2442','视频号':'#fa9d3b','快手':'#ff4906','知乎':'#0066ff','公众号':'#07c160'};

DATA.platforms.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  const isOffline = p.status === 'offline';
  const color = platformColors[p.platform] || '#58a6ff';

  let metricsHtml = '';
  if (p.overview) {
    const entries = Object.entries(p.overview);
    entries.forEach(([k, v]) => {
      metricsHtml += `<div class="metric"><div class="metric-value">${v}</div><div class="metric-label">${k}</div></div>`;
    });
  }
  if (p.diagnosis) {
    const d = p.diagnosis;
    if (d.play_rank_pct) metricsHtml += `<div class="metric"><div class="metric-value highlight">${d.play_rank_pct}%</div><div class="metric-label">播放排名</div></div>`;
    if (d.completion_rate !== undefined) metricsHtml += `<div class="metric"><div class="metric-value">${d.completion_rate}%</div><div class="metric-label">完播率</div></div>`;
  }

  let itemsHtml = '';
  if (p.items && p.items.length > 0) {
    itemsHtml = '<div class="items"><div class="items-title">内容 (' + p.items.length + '条)</div>';
    p.items.forEach(item => {
      const plays = item.plays || item.reads || (item.stats && (item.stats['播放'] || item.stats['被浏览'])) || '-';
      let statsHtml = `<span class="video-stat plays">播放<strong>${plays}</strong></span>`;
      if (item.likes && item.likes !== '-') statsHtml += `<span class="video-stat">点赞<strong>${item.likes}</strong></span>`;
      if (item.comments && item.comments !== '-') statsHtml += `<span class="video-stat">评论<strong>${item.comments}</strong></span>`;
      if (item.shares && item.shares !== '-') statsHtml += `<span class="video-stat">分享<strong>${item.shares}</strong></span>`;
      if (item.forwards) statsHtml += `<span class="video-stat">转发<strong>${item.forwards}</strong></span>`;
      if (item.saves && item.saves !== '-') statsHtml += `<span class="video-stat">收藏<strong>${item.saves}</strong></span>`;
      if (item.avg_duration) statsHtml += `<span class="video-stat">时长<strong>${item.avg_duration}</strong></span>`;
      if (item.cover_click_rate) statsHtml += `<span class="video-stat">封面CTR<strong>${item.cover_click_rate}</strong></span>`;
      if (item.danmaku && item.danmaku !== '0') statsHtml += `<span class="video-stat">弹幕<strong>${item.danmaku}</strong></span>`;
      if (item.reads) statsHtml = `<span class="video-stat plays">阅读<strong>${item.reads}</strong></span>`;
      if (item.stats) {
        Object.entries(item.stats).forEach(([k,v]) => { statsHtml += `<span class="video-stat">${k}<strong>${v}</strong></span>`; });
      }
      itemsHtml += `<div class="video-card">
        <div class="video-title">${item.title || '未知'}</div>
        <div class="video-date">${item.date || '-'}</div>
        <div class="video-stats">${statsHtml}</div>
      </div>`;
    });
    itemsHtml += '</div>';
  }

  card.innerHTML = `
    <div class="card-header">
      <span class="platform-name" style="color:${color}">${p.platform}</span>
      <span class="followers">${isOffline ? '<span class="status-offline">离线</span>' : (p.followers ? p.followers + ' 粉丝' : '')}</span>
    </div>
    <div class="metrics">${metricsHtml}</div>
    ${itemsHtml}
  `;
  cardsEl.appendChild(card);

  // 汇总到全部列表
  if (p.items) {
    p.items.forEach(item => {
      const plays = item.plays || item.reads || (item.stats && (item.stats['播放'] || item.stats['被浏览'])) || '-';
      let statsArr = [];
      if (plays !== '-') statsArr.push(`播放 ${plays}`);
      if (item.likes && item.likes !== '-') statsArr.push(`赞 ${item.likes}`);
      if (item.comments && item.comments !== '-') statsArr.push(`评论 ${item.comments}`);
      if (item.forwards) statsArr.push(`转发 ${item.forwards}`);
      if (item.saves && item.saves !== '-') statsArr.push(`收藏 ${item.saves}`);
      if (item.reads) statsArr.push(`阅读 ${item.reads}`);
      if (item.stats) Object.entries(item.stats).forEach(([k,v]) => statsArr.push(`${k} ${v}`));
      const div = document.createElement('div');
      div.className = 'item';
      div.style.flexWrap = 'wrap';
      div.innerHTML = `
        <span class="item-title"><span style="color:${color};font-size:11px;margin-right:6px;font-weight:600">${p.platform}</span>${item.title || '未知'}</span>
        <span class="item-stats">${statsArr.join(' | ')}</span>
        <span class="item-date">${(item.date || '').substring(0, 10)}</span>
      `;
      allItemsEl.appendChild(div);
    });
  }
});
</script>
</body>
</html>
