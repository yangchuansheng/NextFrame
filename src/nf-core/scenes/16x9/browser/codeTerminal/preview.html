<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>codeTerminal 16:9 Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
.info{font-size:13px;color:#888;margin-bottom:12px}
.info span{color:#da7756;font-weight:700}
.canvas-wrap{position:relative;width:960px;height:540px;background:#1a1510;border:1px solid #333;border-radius:8px;overflow:hidden}
.canvas-inner{width:1920px;height:1080px;transform-origin:0 0;transform:scale(0.5);position:absolute;top:0;left:0}
.controls{margin-top:16px;display:flex;gap:16px;align-items:center}
.controls input[type=range]{width:400px}
.controls button{background:#da7756;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px}
.time-display{font-family:monospace;font-size:14px;color:#da7756;min-width:80px}
.params{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap}
.pg{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:10px}
.pg label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.pg select,.pg input{background:#222;border:1px solid #444;color:#fff;padding:4px 8px;border-radius:3px;font-size:13px}
</style>
</head>
<body>

<div class="info"><span>codeTerminal</span> · 16:9 · DOM · 终端代码块</div>

<div class="canvas-wrap">
  <div class="canvas-inner" id="canvas"></div>
</div>

<div class="controls">
  <button id="playBtn">▶ Play</button>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <div class="time-display" id="timeDisplay">0.00s</div>
</div>

<div class="params">
  <div class="pg">
    <label>Theme</label>
    <select id="themeSelect">
      <option value="github-dark">github-dark</option>
      <option value="anthropic-warm" selected>anthropic-warm</option>
      <option value="monokai">monokai</option>
    </select>
  </div>
  <div class="pg">
    <label>Line Delay</label>
    <input type="range" id="lineDelay" min="0" max="2" step="0.1" value="0.4">
    <span id="delayVal">0.4s</span>
  </div>
  <div class="pg">
    <label>Font Size</label>
    <input type="range" id="fontSize" min="12" max="24" step="1" value="15">
    <span id="fsVal">15px</span>
  </div>
  <div class="pg">
    <label>Width</label>
    <input type="range" id="termWidth" min="300" max="1200" step="10" value="560">
    <span id="wVal">560px</span>
  </div>
</div>

<script>
(function(){
  // ═══ Inline render function (same as index.js render) ═══
  var themes = {
    "github-dark": { bg:"#0d1117", barBg:"#21262d", text:"#e6edf3", prompt:"#7ee787", comment:"#8b949e", keyword:"#ff7b72", string:"#7ee787", variable:"#ffa657", error:"#ff7b72" },
    "anthropic-warm": { bg:"#1a1510", barBg:"#2a2319", text:"#f5ece0", prompt:"#da7756", comment:"rgba(245,236,224,.35)", keyword:"#da7756", string:"#7ec699", variable:"#d4b483", error:"#e06c75" },
    "monokai": { bg:"#272822", barBg:"#3e3d32", text:"#f8f8f2", prompt:"#a6e22e", comment:"#75715e", keyword:"#f92672", string:"#e6db74", variable:"#66d9ef", error:"#f92672" }
  };

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function render(t, p, vp) {
    var lines = p.lines || [];
    var w = p.width || 560;
    var h = p.height || 0;
    var x = p.x || 60;
    var yCenter = !p.y;
    var yVal = p.y || 0;
    var fs = p.fontSize || 15;
    var delay = p.lineDelay || 0.4;
    var br = p.borderRadius || 12;
    var showDots = p.showDots !== false;
    var bg = p.bg || "#0d1117";
    var barBg = p.barBg || "#21262d";
    var textC = p.text || "#e6edf3";
    var promptC = p.prompt || "#7ee787";
    var commentC = p.comment || "#8b949e";
    var keywordC = p.keyword || "#ff7b72";
    var stringC = p.string || "#7ee787";
    var variableC = p.variable || "#ffa657";
    var errorC = p.error || "#ff7b72";

    function lc(type) {
      switch(type) {
        case "prompt": return promptC;
        case "comment": case "dim": return commentC;
        case "keyword": return keywordC;
        case "string": return stringC;
        case "variable": return variableC;
        case "error": return errorC;
        default: return textC;
      }
    }

    var linesHtml = "";
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var lineT = i * delay;
      var opacity = t >= lineT ? 1 : 0;
      var text = line.text || "";
      var type = line.type || "plain";

      if (type === "separator") {
        linesHtml += '<div style="margin:10px 0;border-top:1px dashed rgba(255,255,255,.08);opacity:' + opacity + '"></div>';
        continue;
      }

      var color = lc(type);
      var fw = (type==="error"||type==="keyword"||type==="prompt") ? "700" : "400";
      var fi = type==="comment" ? "italic" : "normal";
      var displayText;

      if (type === "prompt" && text.indexOf("$ ") === 0) {
        displayText = '<span style="color:'+promptC+';font-weight:700">$ </span><span style="color:'+textC+'">' + esc(text.slice(2)) + '</span>';
      } else {
        displayText = esc(text);
      }

        linesHtml += '<div style="opacity:'+opacity+';color:'+color+';font-weight:'+fw+';font-style:'+fi+';line-height:1.75;min-height:'+(fs*1.75)+'px;white-space:pre-wrap">'+displayText+'</div>';
    }

    var dotsHtml = showDots
      ? '<div style="display:flex;gap:8px;align-items:center">' +
          '<div style="width:12px;height:12px;border-radius:50%;background:#ff5f57"></div>' +
          '<div style="width:12px;height:12px;border-radius:50%;background:#febc2e"></div>' +
          '<div style="width:12px;height:12px;border-radius:50%;background:#28c840"></div>' +
        '</div>'
      : '';
    var safeMaxWidth = Math.max(320, vp.width - x - 60);
    var posStyle = yCenter
      ? 'position:absolute;left:'+x+'px;top:50%;transform:translateY(-50%);width:'+w+'px;max-width:'+safeMaxWidth+'px'
      : 'position:absolute;left:'+x+'px;top:'+yVal+'px;width:'+w+'px;max-width:'+safeMaxWidth+'px';
    var heightStyle = h > 0 ? 'height:'+h+'px;' : '';

    return '<div style="'+posStyle+';'+heightStyle+'background:'+bg+';border-radius:'+br+'px;overflow:hidden;box-shadow:0 8px 48px rgba(0,0,0,.65);display:flex;flex-direction:column;font-family:\'SF Mono\',\'JetBrains Mono\',\'Fira Code\',Consolas,monospace">' +
      '<div style="background:'+barBg+';padding:11px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0">' +
        dotsHtml +
        '<div style="flex:1;text-align:center;font-size:14px;color:rgba(255,255,255,.3)">' + esc(p.title||"Terminal") + '</div>' +
      '</div>' +
      '<div style="padding:20px 24px;font-size:'+fs+'px;flex:1;overflow:hidden">' +
        linesHtml +
      '</div>' +
    '</div>';
  }

  // ═══ Demo data ═══
  var demoLines = [
    { text: "$ git commit -m \"add feature\"", type: "prompt" },
    { text: "", type: "separator" },
    { text: "Running pre-commit hook...", type: "dim" },
    { text: "Checking code style... OK", type: "output" },
    { text: "Running tests...       OK", type: "output" },
    { text: "Lint check...          FAILED", type: "error" },
    { text: "", type: "separator" },
    { text: "hook rejected: commit blocked", type: "error" },
    { text: "", type: "separator" },
    { text: "// 不通过就不让提交", type: "comment" },
  ];

  // ═══ Controls ═══
  var canvas = document.getElementById('canvas');
  var scrubber = document.getElementById('scrubber');
  var timeDisplay = document.getElementById('timeDisplay');
  var playBtn = document.getElementById('playBtn');
  var duration = 10;

  function getParams() {
    var name = document.getElementById('themeSelect').value;
    var tc = themes[name] || themes["anthropic-warm"];
    return Object.assign({
      title: "Git Hook 演示",
      lines: demoLines,
      lineDelay: parseFloat(document.getElementById('lineDelay').value),
      fontSize: parseInt(document.getElementById('fontSize').value),
      width: parseInt(document.getElementById('termWidth').value),
      height: 0,
      x: 60,
      y: 0,
      showDots: true,
      borderRadius: 12
    }, tc);
  }

  function renderFrame(t) {
    var bgHtml = '<div style="position:absolute;inset:0;background:#1a1510;background-image:radial-gradient(ellipse at 40% 40%,rgba(212,180,131,.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(218,119,86,.03) 0%,transparent 50%)"></div>';
    canvas.innerHTML = bgHtml + '<div style="position:absolute;inset:0">' + render(t, getParams(), {width:1920,height:1080}) + '</div>';
  }

  scrubber.addEventListener('input', function() {
    var t = (scrubber.value / 1000) * duration;
    timeDisplay.textContent = t.toFixed(2) + 's';
    renderFrame(t);
  });

  var playing = false, startTime = 0, startOffset = 0;
  function tick() {
    if (!playing) return;
    var elapsed = (Date.now() - startTime) / 1000 + startOffset;
    var t = elapsed % duration;
    scrubber.value = (t / duration) * 1000;
    timeDisplay.textContent = t.toFixed(2) + 's';
    renderFrame(t);
    requestAnimationFrame(tick);
  }

  playBtn.addEventListener('click', function() {
    playing = !playing;
    if (playing) {
      startTime = Date.now();
      startOffset = (scrubber.value / 1000) * duration;
      playBtn.textContent = '⏸ Pause';
      tick();
    } else {
      playBtn.textContent = '▶ Play';
    }
  });

  ['themeSelect','lineDelay','fontSize','termWidth'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      document.getElementById('delayVal').textContent = document.getElementById('lineDelay').value + 's';
      document.getElementById('fsVal').textContent = document.getElementById('fontSize').value + 'px';
      document.getElementById('wVal').textContent = document.getElementById('termWidth').value + 'px';
      renderFrame((scrubber.value / 1000) * duration);
    });
  });

  renderFrame(0);
})();
</script>

</body>
</html>
