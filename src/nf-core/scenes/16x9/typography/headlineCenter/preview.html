<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>headlineCenter 16:9 Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
.info{font-size:13px;color:#888;margin-bottom:12px}.info span{color:#da7756;font-weight:700}
.canvas-wrap{position:relative;width:960px;height:540px;background:#1a1510;border:1px solid #333;border-radius:8px;overflow:hidden}
.canvas-inner{width:1920px;height:1080px;transform-origin:0 0;transform:scale(0.5);position:absolute;top:0;left:0}
.controls{margin-top:16px;display:flex;gap:16px;align-items:center}
.controls input[type=range]{width:400px}
.controls button{background:#da7756;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px}
.time-display{font-family:monospace;font-size:14px;color:#da7756;min-width:80px}
</style>
</head>
<body>
<div class="info"><span>headlineCenter</span> · 16:9 · DOM · 居中大标题</div>
<div class="canvas-wrap"><div class="canvas-inner" id="canvas"></div></div>
<div class="controls">
  <button id="playBtn">▶ Play</button>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <div class="time-display" id="timeDisplay">0.00s</div>
</div>
<script>
(function(){
  function ease3(p){return 1-Math.pow(1-Math.max(0,Math.min(1,p)),3)}
  function fadeIn(t,s,d){return ease3((t-s)/d)}
  function render(t,p,vp){
    var op=fadeIn(t,p.enterDelay||0,0.7);
    var fs=p.fontSize||42;var c=p.color||'#f5ece0';
    var maxWidth=Math.max(320,vp.width-120);
    var pos=p.y>0?'position:absolute;left:60px;right:60px;top:'+p.y+'px;text-align:center;max-width:'+maxWidth+'px;margin:0 auto':'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 60px';
    return '<div style="'+pos+'"><div style="font:700 '+fs+'px Georgia,\'Noto Serif SC\',serif;color:'+c+';text-align:center;line-height:1.3;opacity:'+op+';max-width:'+maxWidth+'px">'+(p.text||'')+'</div></div>';
  }
  var DEMO={text:'给 AI 安了一个<span style="color:#da7756">安检员</span>',fontSize:42,enterDelay:0.3};
  var duration=5;var canvas=document.getElementById('canvas');var scrubber=document.getElementById('scrubber');var td=document.getElementById('timeDisplay');var pb=document.getElementById('playBtn');
  function rf(t){canvas.innerHTML='<div style="position:absolute;inset:0;background:#1a1510;background-image:radial-gradient(ellipse at 40% 40%,rgba(212,180,131,.04) 0%,transparent 50%)"></div><div style="position:absolute;inset:0">'+render(t,DEMO,{width:1920,height:1080})+'</div>';}
  scrubber.addEventListener('input',function(){var t=(scrubber.value/1000)*duration;td.textContent=t.toFixed(2)+'s';rf(t);});
  var playing=false,st=0,so=0;
  function tick(){if(!playing)return;var t=((Date.now()-st)/1000+so)%duration;scrubber.value=(t/duration)*1000;td.textContent=t.toFixed(2)+'s';rf(t);requestAnimationFrame(tick);}
  pb.addEventListener('click',function(){playing=!playing;if(playing){st=Date.now();so=(scrubber.value/1000)*duration;pb.textContent='⏸ Pause';tick();}else{pb.textContent='▶ Play';}});
  rf(0);
})();
</script>
</body>
</html>
