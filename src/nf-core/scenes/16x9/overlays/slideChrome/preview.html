<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>slideChrome Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
.info{font-size:13px;color:#888;margin-bottom:12px}.info span{color:#da7756;font-weight:700}
.canvas-wrap{position:relative;width:960px;height:540px;background:#1a1510;border:1px solid #333;border-radius:8px;overflow:hidden}
.canvas-inner{width:1920px;height:1080px;transform-origin:0 0;transform:scale(0.5);position:absolute;top:0;left:0}
.controls{margin-top:16px;display:flex;gap:16px;align-items:center}
.controls input[type=range]{width:400px}
.controls button{background:#da7756;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px}
.time-display{font-family:monospace;font-size:14px;color:#da7756;min-width:80px}
</style>
</head>
<body>
<div class="info"><span>slideChrome</span> · 16:9 · overlays — 讲解视频顶栏（品牌+系列横幅+水印）</div>
<div class="canvas-wrap"><div class="canvas-inner" id="canvas"></div></div>
<div class="controls">
  <button id="playBtn">▶ Play</button>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <div class="time-display" id="timeDisplay">0.00s</div>
</div>
<script>
(function(){
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render(t, params, vp) {
    var p = {
      brand:         params.brand         !== undefined ? params.brand         : "OPC · 王宇轩",
      series:        params.series        !== undefined ? params.series        : "《深入浅出 Claude Code 源代码》",
      epTitle:       params.epTitle       !== undefined ? params.epTitle       : "以终为始：从最终提示词倒推逻辑",
      watermark:     params.watermark     !== undefined ? params.watermark     : "E01",
      barHeight:     params.barHeight     !== undefined ? params.barHeight     : 50,
      fontSize:      params.fontSize      !== undefined ? params.fontSize      : 14,
      brandColor:    params.brandColor    !== undefined ? params.brandColor    : "#d4b483",
      seriesBg:      params.seriesBg      !== undefined ? params.seriesBg      : "rgba(218,119,86,0.15)",
      seriesColor:   params.seriesColor   !== undefined ? params.seriesColor   : "#da7756",
      epTitleColor:  params.epTitleColor  !== undefined ? params.epTitleColor  : "rgba(245,236,224,0.6)",
      watermarkColor:params.watermarkColor!== undefined ? params.watermarkColor: "rgba(218,119,86,0.12)",
      watermarkSize: params.watermarkSize !== undefined ? params.watermarkSize : 120,
    };

    var W = vp.width;
    var H = vp.height;
    var barH = p.barHeight;
    var fs = p.fontSize;

    var brandHtml = p.brand
      ? '<div style="font:600 '+fs+'px system-ui,sans-serif;color:'+p.brandColor+';white-space:nowrap">'+esc(p.brand)+'</div>'
      : '';

    var seriesHtml = p.series
      ? '<div style="background:'+p.seriesBg+';color:'+p.seriesColor+';font:500 '+fs+'px system-ui,sans-serif;padding:6px 16px;border-radius:4px;white-space:nowrap">'+esc(p.series)+'</div>'
      : '';

    var epHtml = p.epTitle
      ? '<div style="font:400 '+fs+'px system-ui,sans-serif;color:'+p.epTitleColor+';white-space:nowrap;margin-left:12px">'+esc(p.epTitle)+'</div>'
      : '';

    var centerHtml = '<div style="display:flex;align-items:center">'+seriesHtml+epHtml+'</div>';

    var wmHtml = p.watermark
      ? '<div style="position:absolute;top:-20px;right:30px;font:900 '+p.watermarkSize+'px system-ui,sans-serif;color:'+p.watermarkColor+';line-height:1;pointer-events:none;user-select:none">'+esc(p.watermark)+'</div>'
      : '';

    return '<div style="position:absolute;top:0;left:0;width:'+W+'px;height:'+H+'px;pointer-events:none">' +
      '<div style="position:absolute;top:0;left:0;right:0;height:'+barH+'px;display:flex;align-items:center;justify-content:space-between;padding:0 30px">' +
        brandHtml + centerHtml + '<div></div>' +
      '</div>' +
      wmHtml +
    '</div>';
  }

  var duration = 30;
  var canvas = document.getElementById('canvas');
  var scrubber = document.getElementById('scrubber');
  var timeDisplay = document.getElementById('timeDisplay');
  var playBtn = document.getElementById('playBtn');

  var DEMO_PARAMS = {
    brand: "OPC · 王宇轩",
    series: "《深入浅出 Claude Code 源代码》",
    epTitle: "以终为始：从最终提示词倒推逻辑",
    watermark: "E01",
  };

  function renderFrame(t) {
    canvas.innerHTML =
      // Background simulation
      '<div style="position:absolute;inset:0;background:radial-gradient(ellipse 54% 54% at 52% 34%,rgba(218,119,86,0.16) 0%,transparent 70%),#1a1510"></div>' +
      // Placeholder content area label
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">' +
        '<div style="font:600 36px Georgia,serif;color:rgba(245,236,224,0.1)">内容区（其他 scene 叠加在此）</div>' +
      '</div>' +
      render(t, DEMO_PARAMS, { width: 1920, height: 1080 });
  }

  scrubber.addEventListener('input', function(){
    var t = (scrubber.value / 1000) * duration;
    timeDisplay.textContent = t.toFixed(2) + 's';
    renderFrame(t);
  });

  var playing = false, startTime = 0, startOffset = 0;
  function tick() {
    if (!playing) return;
    var t = ((Date.now() - startTime) / 1000 + startOffset) % duration;
    scrubber.value = (t / duration) * 1000;
    timeDisplay.textContent = t.toFixed(2) + 's';
    renderFrame(t);
    requestAnimationFrame(tick);
  }
  playBtn.addEventListener('click', function(){
    playing = !playing;
    if (playing) { startTime = Date.now(); startOffset = (scrubber.value/1000)*duration; playBtn.textContent='⏸ Pause'; tick(); }
    else { playBtn.textContent = '▶ Play'; }
  });
  renderFrame(0);
})();
</script>
</body>
</html>
