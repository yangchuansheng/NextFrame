<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Video Clip (16:9)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: block; position: relative; background: #0f0c09; }
#progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #da7756; border-radius: 2px; width: 0%; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(218,119,86,0.15); border: 1px solid rgba(218,119,86,0.3); color: #da7756; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 280px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; line-height: 1.5; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin: 12px 0 8px; }
.param { margin-bottom: 8px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #da7756; cursor: pointer; }
input[type=text], select { width: 100%; height: 28px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #fff; font-size: 12px; padding: 0 8px; outline: none; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #da7756; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">8.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>Video Clip</h2>
    <div class="desc">预览里用占位框代替真实视频文件，展示定位、尺寸、圆角和 object-fit 结果。</div>
    <div id="params"></div>
    <div id="info">
      <p>比例: <code>16:9</code> (1920x1080)</p>
      <p>预览: <code id="preview-size"></code></p>
      <p>技术: <code>video</code></p>
      <p>时长: <code>8s demo</code></p>
    </div>
  </div>
</div>
<script>
const REAL_W = 1920, REAL_H = 1080, DURATION = 8;
const MAX_W = Math.min(window.innerWidth - 340, 920);
const SCALE = MAX_W / REAL_W;
const PW = Math.round(REAL_W * SCALE);
const PH = Math.round(REAL_H * SCALE);

const stage = document.getElementById('stage');
stage.style.width = PW + 'px';
stage.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';
document.getElementById('preview-size').textContent = PW + 'x' + PH;
document.getElementById('t-total').textContent = DURATION.toFixed(2);

const params = {
  src: '/Users/demo/assets/interview.mp4',
  x: 120,
  y: 90,
  width: 1680,
  height: 900,
  borderRadius: 28,
  objectFit: 'cover',
};

const paramDefs = [
  { key: 'src', type: 'text', label: '视频地址', group: 'content' },
  { key: 'objectFit', type: 'select', label: '填充模式', group: 'style', options: ['cover', 'contain'] },
  { key: 'x', type: 'range', label: 'X', group: 'layout', min: 0, max: 400, step: 10 },
  { key: 'y', type: 'range', label: 'Y', group: 'layout', min: 0, max: 220, step: 10 },
  { key: 'width', type: 'range', label: '宽度', group: 'layout', min: 640, max: 1920, step: 20 },
  { key: 'height', type: 'range', label: '高度', group: 'layout', min: 0, max: 1080, step: 20 },
  { key: 'borderRadius', type: 'range', label: '圆角', group: 'style', min: 0, max: 80, step: 2 },
];

function escHtml(value) {
  return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderPlaceholder(t, p, vp) {
  const width = p.width > 0 ? p.width : vp.width;
  const height = p.height > 0 ? p.height : Math.round(width * 9 / 16);
  const fitLabel = p.objectFit === 'contain' ? 'CONTAIN' : 'COVER';
  const textSize = Math.max(18, Math.round(width * 0.026));
  return '<div style="position:absolute;left:0;top:0;width:'+vp.width+'px;height:'+vp.height+'px;overflow:hidden;background:linear-gradient(180deg,#120f0b 0%,#1f1811 100%)">' +
    '<div style="position:absolute;left:'+p.x+'px;top:'+p.y+'px;width:'+width+'px;height:'+height+'px;border-radius:'+p.borderRadius+'px;overflow:hidden;border:2px solid rgba(245,236,224,.22);background:linear-gradient(135deg,rgba(218,119,86,.14) 0%,rgba(138,180,204,.12) 100%),repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 12px,transparent 12px,transparent 24px)">' +
      '<div style="position:absolute;inset:0;border:1px dashed rgba(255,255,255,.22);border-radius:'+p.borderRadius+'px"></div>' +
      '<div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.14)"></div>' +
      '<div style="position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.14)"></div>' +
      '<div style="position:absolute;left:24px;right:24px;bottom:24px;padding:12px 14px;border-radius:14px;background:rgba(9,8,7,.58);backdrop-filter:blur(8px)">' +
        '<div style="font:700 '+textSize+'px \'SF Mono\',monospace;color:#f5ece0;line-height:1.35">VIDEO: '+escHtml(p.src)+'</div>' +
        '<div style="margin-top:6px;font:600 '+Math.max(12, Math.round(textSize * 0.55))+'px \'SF Mono\',monospace;color:rgba(245,236,224,.55);letter-spacing:.08em">'+fitLabel+' · t='+t.toFixed(2)+'s</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

const paramsEl = document.getElementById('params');
let group = '';
for (const def of paramDefs) {
  if (def.group !== group) {
    group = def.group;
    const gt = document.createElement('div');
    gt.className = 'group-title';
    gt.textContent = group;
    paramsEl.appendChild(gt);
  }
  const div = document.createElement('div');
  div.className = 'param';
  const head = document.createElement('div');
  head.className = 'param-head';
  const label = document.createElement('span');
  label.textContent = def.label;
  head.appendChild(label);
  if (def.type === 'range') {
    const value = document.createElement('span');
    value.className = 'val';
    value.id = 'v_' + def.key;
    value.textContent = params[def.key];
    head.appendChild(value);
  }
  div.appendChild(head);
  if (def.type === 'text') {
    const input = document.createElement('input');
    input.type = 'text';
    input.value = params[def.key];
    input.addEventListener('input', () => { params[def.key] = input.value; });
    div.appendChild(input);
  } else if (def.type === 'select') {
    const select = document.createElement('select');
    for (const option of def.options) {
      const el = document.createElement('option');
      el.value = option;
      el.textContent = option;
      if (option === params[def.key]) el.selected = true;
      select.appendChild(el);
    }
    select.addEventListener('change', () => { params[def.key] = select.value; });
    div.appendChild(select);
  } else {
    const input = document.createElement('input');
    input.type = 'range';
    input.min = def.min;
    input.max = def.max;
    input.step = def.step;
    input.value = params[def.key];
    input.addEventListener('input', () => {
      params[def.key] = +input.value;
      document.getElementById('v_' + def.key).textContent = input.value;
    });
    div.appendChild(input);
  }
  paramsEl.appendChild(div);
}

let currentT = 0;
let playing = true;
let startTime = performance.now();
const progressFill = document.getElementById('progress-fill');
const timeCurrent = document.getElementById('t-current');
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', () => {
  playing = !playing;
  if (playing) {
    startTime = performance.now() - currentT * 1000;
    playBtn.textContent = '⏸ 暂停';
  } else {
    playBtn.textContent = '▶ 播放';
  }
});

document.getElementById('progress-bar').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentT = ratio * DURATION;
  startTime = performance.now() - currentT * 1000;
});

function frame() {
  if (playing) currentT = ((performance.now() - startTime) / 1000) % DURATION;
  timeCurrent.textContent = currentT.toFixed(2);
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  stage.innerHTML = renderPlaceholder(currentT, params, { width: REAL_W, height: REAL_H });
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
