<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>eventList 16:9 Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
.info{font-size:13px;color:#888;margin-bottom:12px}
.info span{color:#da7756;font-weight:700}
.canvas-wrap{position:relative;width:960px;height:540px;background:#1a1510;border:1px solid #333;border-radius:8px;overflow:hidden}
.canvas-inner{width:1920px;height:1080px;transform-origin:0 0;transform:scale(0.5);position:absolute;top:0;left:0}
.controls{margin-top:16px;display:flex;gap:16px;align-items:center}
.controls input[type=range]{width:400px}
.controls button{background:#da7756;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px}
.time-display{font-family:monospace;font-size:14px;color:#da7756;min-width:80px}
</style>
</head>
<body>
<div class="info"><span>eventList</span> · 16:9 · data</div>
<div class="canvas-wrap"><div class="canvas-inner" id="canvas"></div></div>
<div class="controls">
  <button id="playBtn">▶ Play</button>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <div class="time-display" id="timeDisplay">0.00s</div>
</div>
<script>
(function(){
  // INLINED render from eventList/index.js
  var meta_params = {
    title:        { default:"" },
    items:        { default:[] },
    highlight:    { default:"" },
    x:            { default:60 },
    y:            { default:140 },
    stagger:      { default:0.4 },
    dotBorder:    { default:"rgba(245,236,224,.25)" },
    highlightDot: { default:"#da7756" },
    titleColor:   { default:"#f5ece0" },
    textColor:    { default:"rgba(245,236,224,.8)" },
    lineColor:    { default:"rgba(245,236,224,.12)" }
  };

  function ease3(p){return 1-Math.pow(1-Math.max(0,Math.min(1,p)),3)}
  function fadeIn(t,start,dur){return ease3((t-start)/dur)}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  function render(t, params, vp) {
    var p = {};
    for(var k in meta_params) p[k] = params[k]!==undefined ? params[k] : meta_params[k].default;
    var items = Array.isArray(p.items) ? p.items : [];
    var x = p.x;
    var y = p.y;
    var titleOp = fadeIn(t, 0, 0.5);
    var DOT_SIZE = 16;
    var maxWidth = Math.max(380, vp.width - x - 60);
    var rows = items.map(function(item, i) {
      var isHl = p.highlight && String(item) === String(p.highlight);
      var itemOp = fadeIn(t, i * p.stagger, 0.5);
      if(itemOp <= 0) return '';
      var dotBg   = isHl ? p.highlightDot : 'transparent';
      var dotBorder = isHl ? p.highlightDot : p.dotBorder;
      var glow    = isHl ? ';box-shadow:0 0 10px 3px '+p.highlightDot+'80' : '';
      var fontSize = isHl ? '16px' : '14px';
      var fontWeight = isHl ? '700' : '400';
      var color = isHl ? '#f5ece0' : p.textColor;
      return '<div style="position:relative;display:flex;align-items:center;gap:0;opacity:'+itemOp+';margin-bottom:'+(isHl?'18':'12')+'px">' +
        '<div style="width:'+DOT_SIZE+'px;height:'+DOT_SIZE+'px;border-radius:50%;flex-shrink:0;' +
          'background:'+dotBg+';border:2px solid '+dotBorder+glow+'"></div>' +
        '<div style="margin-left:16px;font:'+fontWeight+' '+fontSize+' \'SF Mono\',\'JetBrains Mono\',monospace;color:'+color+';line-height:1.5">'+esc(item)+'</div>' +
      '</div>';
    }).join('');
    return '<div style="position:absolute;left:'+x+'px;top:'+y+'px;min-width:380px;max-width:'+maxWidth+'px">' +
      (p.title ? '<div style="font:700 13px \'SF Mono\',monospace;letter-spacing:.12em;text-transform:uppercase;color:'+p.titleColor+';opacity:'+titleOp+';margin-bottom:24px">'+esc(p.title)+'</div>' : '') +
      '<div style="position:relative">' +
        '<div style="position:absolute;left:'+(DOT_SIZE/2)+'px;top:0;bottom:0;width:2px;background:'+p.lineColor+'"></div>' +
        rows +
      '</div>' +
    '</div>';
  }

  var DEMO_PARAMS = {
    title: '9 EVENT HOOKS',
    items: ['SessionStart','UserMessage','PreToolUse','PostToolUse','ModelResponse','Stop'],
    highlight: 'PreToolUse',
    x: 60,
    y: 140,
    stagger: 0.4
  };

  var duration = 10;
  var canvas = document.getElementById('canvas');
  var scrubber = document.getElementById('scrubber');
  var timeDisplay = document.getElementById('timeDisplay');
  var playBtn = document.getElementById('playBtn');

  function renderFrame(t) {
    canvas.innerHTML = '<div style="position:absolute;inset:0;background:#1a1510"></div>' +
      '<div style="position:absolute;inset:0">' + render(t, DEMO_PARAMS, {width:1920,height:1080}) + '</div>';
  }

  scrubber.addEventListener('input', function(){
    var t=(scrubber.value/1000)*duration;
    timeDisplay.textContent=t.toFixed(2)+'s';
    renderFrame(t);
  });

  var playing=false,startTime=0,startOffset=0;
  function tick(){
    if(!playing)return;
    var t=((Date.now()-startTime)/1000+startOffset)%duration;
    scrubber.value=(t/duration)*1000;
    timeDisplay.textContent=t.toFixed(2)+'s';
    renderFrame(t);
    requestAnimationFrame(tick);
  }
  playBtn.addEventListener('click',function(){
    playing=!playing;
    if(playing){startTime=Date.now();startOffset=(scrubber.value/1000)*duration;playBtn.textContent='⏸ Pause';tick();}
    else{playBtn.textContent='▶ Play';}
  });
  renderFrame(0);
})();
</script>
</body>
</html>
