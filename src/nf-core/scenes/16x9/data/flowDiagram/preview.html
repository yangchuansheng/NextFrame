<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>flowDiagram 16:9 Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui;display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
.info{font-size:13px;color:#888;margin-bottom:12px}
.info span{color:#da7756;font-weight:700}
.canvas-wrap{position:relative;width:960px;height:540px;background:#1a1510;border:1px solid #333;border-radius:8px;overflow:hidden}
.canvas-inner{width:1920px;height:1080px;transform-origin:0 0;transform:scale(0.5);position:absolute;top:0;left:0}
.controls{margin-top:16px;display:flex;gap:16px;align-items:center}
.controls input[type=range]{width:400px}
.controls button{background:#da7756;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px}
.time-display{font-family:monospace;font-size:14px;color:#da7756;min-width:80px}
</style>
</head>
<body>
<div class="info"><span>flowDiagram</span> · 16:9 · data</div>
<div class="canvas-wrap"><div class="canvas-inner" id="canvas"></div></div>
<div class="controls">
  <button id="playBtn">▶ Play</button>
  <input type="range" id="scrubber" min="0" max="1000" value="0">
  <div class="time-display" id="timeDisplay">0.00s</div>
</div>
<script>
(function(){
  // INLINED render from flowDiagram/index.js
  var meta_params = {
    headline:      { default:"" },
    nodes:         { default:[] },
    forkNodes:     { default:[] },
    quote:         { default:"" },
    headlineDelay: { default:0.3 },
    flowDelay:     { default:2.5 },
    quoteDelay:    { default:6.0 }
  };

  function ease3(p){return 1-Math.pow(1-Math.max(0,Math.min(1,p)),3)}
  function fadeIn(t,start,dur){return ease3((t-start)/dur)}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  var COLOR_MAP = { blue:"#8ab4cc", orange:"#da7756", green:"#7ec699", red:"#e06c75" };
  function resolveColor(c){ return COLOR_MAP[c] || c || "#8ab4cc"; }

  function nodeHtml(icon, label, sub, color) {
    var c = resolveColor(color);
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:10px;min-width:100px">' +
      '<div style="width:72px;height:72px;border-radius:50%;border:2px solid '+c+';background:'+c+'18;' +
        'display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">' +
        esc(icon||'') +
      '</div>' +
      (label ? '<div style="font:700 13px \'SF Mono\',monospace;color:#f5ece0;text-align:center;line-height:1.3">'+esc(label)+'</div>' : '') +
      (sub   ? '<div style="font:400 11px system-ui,sans-serif;color:rgba(245,236,224,.5);text-align:center">'+esc(sub)+'</div>' : '') +
    '</div>';
  }

  function arrowHtml() {
    return '<div style="color:rgba(245,236,224,.3);font-size:22px;margin:0 4px;align-self:center">→</div>';
  }

  function render(t, params, vp) {
    var p = {};
    for(var k in meta_params) p[k] = params[k]!==undefined ? params[k] : meta_params[k].default;
    var nodes = Array.isArray(p.nodes) ? p.nodes : [];
    var forkNodes = Array.isArray(p.forkNodes) ? p.forkNodes : [];
    var hlOp = fadeIn(t, p.headlineDelay, 0.7);
    var flowOp = fadeIn(t, p.flowDelay, 0.8);
    var qOp = fadeIn(t, p.quoteDelay, 0.7);

    var mainRow = nodes.map(function(n, i) {
      return (i > 0 ? arrowHtml() : '') + nodeHtml(n.icon, n.label, n.sub, n.color);
    }).join('');

    var forkHtml = '';
    if(forkNodes.length > 0) {
      var forkItems = forkNodes.map(function(fn) {
        var c = resolveColor(fn.color);
        return '<div style="display:flex;align-items:center;gap:10px;min-width:110px">' +
          '<div style="width:52px;height:52px;border-radius:50%;border:2px solid '+c+';background:'+c+'18;' +
            'display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+esc(fn.icon||'')+'</div>' +
          '<div style="font:400 12px system-ui,sans-serif;color:rgba(245,236,224,.7)">'+esc(fn.sub||'')+'</div>' +
        '</div>';
      }).join('<div style="height:12px"></div>');
      forkHtml = '<div style="display:flex;align-items:center;gap:8px">' +
        '<div style="color:rgba(245,236,224,.3);font-size:22px;align-self:center">→</div>' +
        '<div style="display:flex;flex-direction:column;gap:0;border-left:2px solid rgba(245,236,224,.15);padding-left:12px">' +
          forkItems +
        '</div>' +
      '</div>';
    }

    // headline supports HTML (for accent spans)
    var headlineHtml = p.headline || '';
    return '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px">' +
      (p.headline ? '<div style="font:700 38px Georgia,\'Noto Serif SC\',serif;color:#f5ece0;text-align:center;margin-bottom:52px;opacity:'+hlOp+'">'+headlineHtml+'</div>' : '') +
      '<div style="display:flex;align-items:center;gap:4px;opacity:'+flowOp+'">' +
        mainRow + forkHtml +
      '</div>' +
      (p.quote ? '<div style="font:italic 400 18px Georgia,serif;color:#d4b483;margin-top:48px;text-align:center;max-width:700px;opacity:'+qOp+'">'+esc(p.quote)+'</div>' : '') +
    '</div>';
  }

  var DEMO_PARAMS = {
    headline: '给 AI 安了一个<span style="color:#da7756">安检员</span>',
    nodes: [
      {icon:'AI', label:'AI 请求', sub:'要执行操作', color:'blue'},
      {icon:'H',  label:'Hook 安检', sub:'脚本检查', color:'orange'}
    ],
    forkNodes: [
      {icon:'PASS', sub:'放行执行', color:'green'},
      {icon:'BLOCK', sub:'拦截拒绝', color:'red'}
    ],
    quote: '每次动手之前，安检员先过一遍——该拦的拦，该放行的放行'
  };

  var duration = 10;
  var canvas = document.getElementById('canvas');
  var scrubber = document.getElementById('scrubber');
  var timeDisplay = document.getElementById('timeDisplay');
  var playBtn = document.getElementById('playBtn');

  function renderFrame(t) {
    canvas.innerHTML = '<div style="position:absolute;inset:0;background:#1a1510"></div>' +
      '<div style="position:absolute;inset:0">' + render(t, DEMO_PARAMS, {width:1920,height:1080}) + '</div>';
  }

  scrubber.addEventListener('input', function(){
    var t=(scrubber.value/1000)*duration;
    timeDisplay.textContent=t.toFixed(2)+'s';
    renderFrame(t);
  });

  var playing=false,startTime=0,startOffset=0;
  function tick(){
    if(!playing)return;
    var t=((Date.now()-startTime)/1000+startOffset)%duration;
    scrubber.value=(t/duration)*1000;
    timeDisplay.textContent=t.toFixed(2)+'s';
    renderFrame(t);
    requestAnimationFrame(tick);
  }
  playBtn.addEventListener('click',function(){
    playing=!playing;
    if(playing){startTime=Date.now();startOffset=(scrubber.value/1000)*duration;playBtn.textContent='⏸ Pause';tick();}
    else{playBtn.textContent='▶ Play';}
  });
  renderFrame(0);
})();
</script>
</body>
</html>
