<!-- NOTE: render logic is duplicated from index.js because file:// CORS blocks ES module imports.
     When served via HTTP, preview can import from index.js directly. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Pie Chart (16:9)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage-container { background: #0a0a12; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
#progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 0%; transition: none; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 260px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin: 12px 0 8px; }
.param { margin-bottom: 8px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6366f1; cursor: pointer; }
input[type=text] { width: 100%; height: 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; color: #fff; font-size: 12px; padding: 0 6px; outline: none; }
input[type=text]:focus { border-color: #6366f1; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #6366f1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage-container">
      <svg id="stage" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">6.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>饼图动画</h2>
    <div class="desc">16:9 横屏 · 扇形从 0 扩展</div>
    <div id="params-panel"></div>
    <div id="info">
      <p>比例: <code>16:9</code> (1920×1080)</p>
      <p>预览: <code id="preview-size"></code></p>
      <p>技术: <code>SVG</code></p>
      <p>时长: <code>6s</code></p>
    </div>
  </div>
</div>
<script>
const REAL_W = 1920, REAL_H = 1080;
const MAX_W = Math.min(window.innerWidth - 320, 900);
const SCALE = MAX_W / REAL_W;
const PW = Math.round(REAL_W * SCALE);
const PH = Math.round(REAL_H * SCALE);

const svg = document.getElementById('stage');
const stageContainer = document.getElementById('stage-container');
stageContainer.style.width = PW + 'px';
stageContainer.style.height = PH + 'px';
svg.setAttribute('viewBox', '0 0 ' + REAL_W + ' ' + REAL_H);
svg.style.width = PW + 'px';
svg.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';
document.getElementById('progress-bar').style.width = PW + 'px';
document.getElementById('preview-size').textContent = PW + 'x' + PH;

const DURATION = 6;
document.getElementById('t-total').textContent = DURATION.toFixed(2);

// ─── Params ───
const params = {
  title: '市场占比', unit: '%',
  data: [35, 25, 20, 12, 8],
  labels: ['产品A', '产品B', '产品C', '产品D', '产品E'],
  hueStart: 250, hueSpan: 200, saturation: 70, lightness: 60,
  innerRadius: 0, animDur: 1.2, stagger: 0.15,
};

const paramDefs = [
  { key: 'title',       type: 'text',  label: '图表标题',    group: 'content' },
  { key: 'unit',        type: 'text',  label: '单位后缀',    group: 'content' },
  { key: 'hueStart',    type: 'range', label: '起始色相',    group: 'color',     min: 0,   max: 360,  step: 1 },
  { key: 'hueSpan',     type: 'range', label: '色相跨度',    group: 'color',     min: 30,  max: 360,  step: 5 },
  { key: 'saturation',  type: 'range', label: '饱和度',      group: 'color',     min: 30,  max: 100,  step: 1 },
  { key: 'lightness',   type: 'range', label: '亮度',        group: 'color',     min: 30,  max: 80,   step: 1 },
  { key: 'innerRadius', type: 'range', label: '内圆半径',    group: 'style',     min: 0,   max: 0.7,  step: 0.05 },
  { key: 'animDur',     type: 'range', label: '动画时长(s)', group: 'animation', min: 0.4, max: 3.0,  step: 0.1 },
  { key: 'stagger',     type: 'range', label: '扇形延迟(s)', group: 'animation', min: 0.05,max: 0.5,  step: 0.01 },
];

// ─── Build param UI ───
const paramsPanel = document.getElementById('params-panel');
let currentGroup = null;
for (const def of paramDefs) {
  if (def.group !== currentGroup) {
    const gt = document.createElement('div');
    gt.className = 'group-title';
    gt.textContent = def.group;
    paramsPanel.appendChild(gt);
    currentGroup = def.group;
  }
  const div = document.createElement('div');
  div.className = 'param';
  const head = document.createElement('div');
  head.className = 'param-head';
  const labelSpan = document.createElement('span');
  labelSpan.textContent = def.label;
  head.appendChild(labelSpan);

  if (def.type === 'text') {
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'text';
    input.value = params[def.key];
    input.addEventListener('input', () => { params[def.key] = input.value; });
    div.appendChild(input);
  } else {
    const valSpan = document.createElement('span');
    valSpan.className = 'val';
    valSpan.id = 'v_' + def.key;
    valSpan.textContent = def.step < 1 ? params[def.key].toFixed(2) : String(params[def.key]);
    head.appendChild(valSpan);
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = def.min; input.max = def.max; input.step = def.step;
    input.value = params[def.key];
    input.addEventListener('input', () => {
      params[def.key] = +input.value;
      valSpan.textContent = def.step < 1 ? (+input.value).toFixed(2) : String(+input.value);
    });
    div.appendChild(input);
  }
  paramsPanel.appendChild(div);
}

// ─── Render ───
function easeIO(p) { return p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p; }

function renderFrame(t) {
  const W = REAL_W, H = REAL_H;
  const { title, unit, data, labels, hueStart, hueSpan, saturation, lightness, innerRadius, animDur, stagger } = params;
  const n = data.length;
  const total = data.reduce((s, v) => s + v, 0) || 1;
  const pct = data.map((v) => v / total);

  const cx = W * 0.42;
  const cy = H * 0.54;
  const outerR = Math.min(W * 0.28, H * 0.4);
  const innerR = outerR * innerRadius;

  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Background rect
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', W); bg.setAttribute('height', H); bg.setAttribute('fill', '#0a0a12');
  svg.appendChild(bg);

  // Title
  const titleOpacity = Math.min(1, t / 0.5);
  const titleEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  titleEl.setAttribute('x', W * 0.42);
  titleEl.setAttribute('y', H * 0.1);
  titleEl.setAttribute('text-anchor', 'middle');
  titleEl.setAttribute('fill', 'rgba(255,255,255,' + titleOpacity + ')');
  titleEl.setAttribute('font-size', H * 0.055);
  titleEl.setAttribute('font-weight', '700');
  titleEl.setAttribute('font-family', 'Inter,-apple-system,sans-serif');
  titleEl.textContent = title;
  svg.appendChild(titleEl);

  let angleStart = -Math.PI / 2;
  for (let i = 0; i < n; i++) {
    const delay = i * stagger;
    const progress = Math.max(0, Math.min(1, (t - delay) / animDur));
    const eased = easeIO(progress);
    const fullAngle = pct[i] * Math.PI * 2;
    const sweepAngle = fullAngle * eased;
    const angleEnd = angleStart + sweepAngle;
    const hue = (hueStart + (hueSpan * i) / Math.max(1, n - 1)) % 360;
    const color = 'hsl(' + hue + ',' + saturation + '%,' + lightness + '%)';
    const opacity = 0.3 + eased * 0.7;

    if (sweepAngle > 0.001) {
      const x1 = cx + Math.cos(angleStart) * outerR;
      const y1 = cy + Math.sin(angleStart) * outerR;
      const x2 = cx + Math.cos(angleEnd) * outerR;
      const y2 = cy + Math.sin(angleEnd) * outerR;
      const largeArc = sweepAngle > Math.PI ? 1 : 0;

      let d;
      if (innerR > 0) {
        const ix1 = cx + Math.cos(angleStart) * innerR;
        const iy1 = cy + Math.sin(angleStart) * innerR;
        const ix2 = cx + Math.cos(angleEnd) * innerR;
        const iy2 = cy + Math.sin(angleEnd) * innerR;
        d = 'M ' + x1 + ' ' + y1 + ' A ' + outerR + ' ' + outerR + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 +
            ' L ' + ix2 + ' ' + iy2 + ' A ' + innerR + ' ' + innerR + ' 0 ' + largeArc + ' 0 ' + ix1 + ' ' + iy1 + ' Z';
      } else {
        d = 'M ' + cx + ' ' + cy + ' L ' + x1 + ' ' + y1 + ' A ' + outerR + ' ' + outerR + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 + ' Z';
      }

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', color);
      path.setAttribute('opacity', opacity);
      path.setAttribute('stroke', 'rgba(0,0,0,0.3)');
      path.setAttribute('stroke-width', '1.5');
      svg.appendChild(path);

      // Value label
      if (progress > 0.85 && pct[i] > 0.04) {
        const labelAlpha = Math.min(1, (progress - 0.85) / 0.15);
        const midAngle = angleStart + fullAngle / 2;
        const labelR = innerR > 0 ? (innerR + outerR) / 2 : outerR * 0.65;
        const lx = cx + Math.cos(midAngle) * labelR;
        const ly = cy + Math.sin(midAngle) * labelR;
        const displayVal = Math.round(pct[i] * 100);
        const valEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        valEl.setAttribute('x', lx); valEl.setAttribute('y', ly);
        valEl.setAttribute('text-anchor', 'middle'); valEl.setAttribute('dominant-baseline', 'middle');
        valEl.setAttribute('fill', 'rgba(255,255,255,' + labelAlpha + ')');
        valEl.setAttribute('font-size', H * 0.028); valEl.setAttribute('font-weight', '700');
        valEl.setAttribute('font-family', 'Inter,-apple-system,sans-serif');
        valEl.textContent = displayVal + unit;
        svg.appendChild(valEl);
      }
    }

    // Legend
    const legendX = W * 0.72;
    const legendY = H * 0.28 + i * H * 0.1;
    const legendAlpha = Math.min(1, Math.max(0, (t - delay - animDur * 0.6) / 0.3));
    if (legendAlpha > 0) {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', legendX); rect.setAttribute('y', legendY - H * 0.018);
      rect.setAttribute('width', H * 0.03); rect.setAttribute('height', H * 0.03);
      rect.setAttribute('rx', '3'); rect.setAttribute('fill', color);
      rect.setAttribute('opacity', legendAlpha * opacity);
      svg.appendChild(rect);

      const labelEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      labelEl.setAttribute('x', legendX + H * 0.045); labelEl.setAttribute('y', legendY);
      labelEl.setAttribute('dominant-baseline', 'middle');
      labelEl.setAttribute('fill', 'rgba(255,255,255,' + (legendAlpha * 0.85) + ')');
      labelEl.setAttribute('font-size', H * 0.026); labelEl.setAttribute('font-family', 'Inter,-apple-system,sans-serif');
      labelEl.textContent = (labels[i] || '');
      svg.appendChild(labelEl);

      const valPct = Math.round(pct[i] * 100);
      const pctEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      pctEl.setAttribute('x', W * 0.95); pctEl.setAttribute('y', legendY);
      pctEl.setAttribute('text-anchor', 'end'); pctEl.setAttribute('dominant-baseline', 'middle');
      pctEl.setAttribute('fill', 'rgba(255,255,255,' + (legendAlpha * 0.55) + ')');
      pctEl.setAttribute('font-size', H * 0.024); pctEl.setAttribute('font-family', 'Inter,-apple-system,sans-serif');
      pctEl.textContent = valPct + unit;
      svg.appendChild(pctEl);
    }

    angleStart += fullAngle;
  }
}

// ─── Playback ───
let playing = true;
let currentT = 0;
let startTime = performance.now();
const progressFill = document.getElementById('progress-fill');
const tCurrent = document.getElementById('t-current');
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', () => {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸ 暂停'; }
  else { playBtn.textContent = '▶ 播放'; }
});

document.getElementById('progress-bar').addEventListener('click', (e) => {
  const rect = document.getElementById('progress-bar').getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentT = ratio * DURATION;
  startTime = performance.now() - currentT * 1000;
});

function loop() {
  if (playing) { currentT = ((performance.now() - startTime) / 1000) % DURATION; }
  tCurrent.textContent = currentT.toFixed(2);
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  renderFrame(currentT);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
