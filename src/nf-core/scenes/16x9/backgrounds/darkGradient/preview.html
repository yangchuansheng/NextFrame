<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Dark Gradient (16:9)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: block; position: relative; }
#controls { width: 280px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; line-height: 1.5; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin: 12px 0 8px; }
.param { margin-bottom: 8px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #da7756; cursor: pointer; }
input[type=color] { width: 100%; height: 28px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #da7756; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage"></div>
  </div>
  <div id="controls">
    <h2>Dark Gradient</h2>
    <div class="desc">讲解视频用的克制深色背景。纯 CSS，无 canvas，无额外动画噪音。</div>
    <div id="params"></div>
    <div id="info">
      <p>比例: <code>16:9</code> (1920x1080)</p>
      <p>预览: <code id="preview-size"></code></p>
      <p>技术: <code>dom</code></p>
      <p>用途: <code>lecture background</code></p>
    </div>
  </div>
</div>
<script>
const REAL_W = 1920, REAL_H = 1080;
const MAX_W = Math.min(window.innerWidth - 340, 920);
const SCALE = MAX_W / REAL_W;
const PW = Math.round(REAL_W * SCALE);
const PH = Math.round(REAL_H * SCALE);

const stage = document.getElementById('stage');
stage.style.width = PW + 'px';
stage.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';
document.getElementById('preview-size').textContent = PW + 'x' + PH;

const params = {
  bg: '#1a1510',
  glowColor: '#da7756',
  glowOpacity: 0.16,
  glowX: 52,
  glowY: 34,
  glowSize: 54,
};

const paramDefs = [
  { key: 'bg', type: 'color', label: '背景色', group: 'color' },
  { key: 'glowColor', type: 'color', label: '光晕色', group: 'color' },
  { key: 'glowOpacity', type: 'range', label: '光晕透明度', group: 'style', min: 0, max: 0.4, step: 0.01 },
  { key: 'glowX', type: 'range', label: '光晕 X', group: 'layout', min: 0, max: 100, step: 1 },
  { key: 'glowY', type: 'range', label: '光晕 Y', group: 'layout', min: 0, max: 100, step: 1 },
  { key: 'glowSize', type: 'range', label: '光晕尺寸', group: 'style', min: 10, max: 120, step: 1 },
];

function hexToRgb(hex) {
  const clean = hex.replace('#', '');
  const full = clean.length === 3 ? clean.split('').map((c) => c + c).join('') : clean;
  const int = parseInt(full, 16);
  return { r: (int >> 16) & 255, g: (int >> 8) & 255, b: int & 255 };
}

function renderScene(p, vp) {
  const rgb = hexToRgb(p.glowColor);
  const glowColor = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + p.glowOpacity + ')';
  const glow = 'radial-gradient(circle at ' + p.glowX + '% ' + p.glowY + '%, ' + glowColor + ' 0%, transparent ' + p.glowSize + '%)';
  const vignette = 'linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.4) 100%)';
  return '<div style="position:absolute;left:0;top:0;width:'+vp.width+'px;height:'+vp.height+'px;overflow:hidden;background:'+p.bg+'">' +
    '<div style="position:absolute;inset:0;background:'+glow+'"></div>' +
    '<div style="position:absolute;inset:0;background:'+vignette+'"></div>' +
  '</div>';
}

const paramsEl = document.getElementById('params');
let group = '';
for (const def of paramDefs) {
  if (def.group !== group) {
    group = def.group;
    const gt = document.createElement('div');
    gt.className = 'group-title';
    gt.textContent = group;
    paramsEl.appendChild(gt);
  }
  const div = document.createElement('div');
  div.className = 'param';
  const head = document.createElement('div');
  head.className = 'param-head';
  const label = document.createElement('span');
  label.textContent = def.label;
  head.appendChild(label);
  if (def.type === 'range') {
    const value = document.createElement('span');
    value.className = 'val';
    value.id = 'v_' + def.key;
    value.textContent = def.step < 1 ? params[def.key].toFixed(2) : params[def.key];
    head.appendChild(value);
  }
  div.appendChild(head);
  if (def.type === 'color') {
    const input = document.createElement('input');
    input.type = 'color';
    input.value = params[def.key];
    input.addEventListener('input', () => { params[def.key] = input.value; draw(); });
    div.appendChild(input);
  } else {
    const input = document.createElement('input');
    input.type = 'range';
    input.min = def.min;
    input.max = def.max;
    input.step = def.step;
    input.value = params[def.key];
    input.addEventListener('input', () => {
      params[def.key] = +input.value;
      document.getElementById('v_' + def.key).textContent = def.step < 1 ? (+input.value).toFixed(2) : input.value;
      draw();
    });
    div.appendChild(input);
  }
  paramsEl.appendChild(div);
}

function draw() {
  stage.innerHTML = renderScene(params, { width: REAL_W, height: REAL_H });
}
draw();
</script>
</body>
</html>
