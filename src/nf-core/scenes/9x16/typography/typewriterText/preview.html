<!-- NOTE: render logic is duplicated from index.js because file:// CORS blocks ES module imports.
     When served via HTTP (dev server or build), preview can import from index.js directly. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Typewriter Text (9:16)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: block; background: #0a0a12; }
#progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 0%; transition: none; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 280px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; max-height: 90vh; overflow-y: auto; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin: 12px 0 8px; }
.param { margin-bottom: 8px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6366f1; cursor: pointer; }
input[type=text] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; padding: 4px 8px; font-size: 12px; }
textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; padding: 4px 8px; font-size: 11px; resize: vertical; min-height: 80px; font-family: monospace; }
select { width: 100%; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; padding: 4px 8px; font-size: 12px; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #6366f1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">12.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>打字机文字</h2>
    <div class="desc">9:16 竖屏 · 逐行打字机效果</div>
    <div id="params"></div>
    <div id="info">
      <p>比例: <code>9:16</code></p>
      <p>预览: <code id="preview-size"></code></p>
      <p>技术: <code>dom</code></p>
      <p>时长: <code>12s</code></p>
    </div>
  </div>
</div>
<script>
// ─── Render function (matches index.js logic) ───
function renderTypewriter(container, t, params, W, H) {
  const {
    lines, hue, saturation, lightness, fontSize,
    charDelay, lineGap, cursorChar, cursorBlink, align, bgOpacity
  } = params;

  const fs = Math.round(W * fontSize);
  const lineHeight = fs * 1.7;
  const paddingX = W * 0.08;
  const color = `hsl(${hue},${saturation}%,${lightness}%)`;
  const cursorColor = `hsl(${hue},${saturation}%,${Math.min(100, lightness + 10)}%)`;

  const safeLines = Array.isArray(lines) ? lines : [];

  // Precompute line start times
  const lineStartTimes = [];
  let cursor = 0;
  for (let i = 0; i < safeLines.length; i++) {
    lineStartTimes.push(cursor);
    cursor += safeLines[i].length * charDelay + lineGap;
  }

  // Visible chars per line at t
  const visibleCharsPerLine = safeLines.map((line, i) => {
    const elapsed = t - lineStartTimes[i];
    if (elapsed < 0) return 0;
    return Math.min(line.length, Math.floor(elapsed / charDelay));
  });

  // Active line
  let activeLineIdx = -1;
  for (let i = 0; i < safeLines.length; i++) {
    const elapsed = t - lineStartTimes[i];
    if (elapsed >= 0 && visibleCharsPerLine[i] < safeLines[i].length) {
      activeLineIdx = i;
      break;
    }
  }
  if (activeLineIdx === -1 && safeLines.length > 0) {
    activeLineIdx = safeLines.length - 1;
  }

  const blinkPeriod = 1 / cursorBlink;
  const showCursor = (t % blinkPeriod) < blinkPeriod * 0.5;

  const blockH = safeLines.length * lineHeight;
  const startY = (H - blockH) / 2;

  const justifyContent = align === 'center' ? 'center' : 'flex-start';

  let linesHtml = '';
  for (let i = 0; i < safeLines.length; i++) {
    const visible = visibleCharsPerLine[i];
    const text = safeLines[i].substring(0, visible);
    const isActive = i === activeLineIdx;
    const cursorSpan = isActive && showCursor
      ? `<span style="opacity:1;color:${cursorColor}">${cursorChar}</span>`
      : `<span style="opacity:0">${cursorChar}</span>`;
    const lineOpacity = visible > 0 || isActive ? 1 : 0;
    linesHtml += `<div style="height:${lineHeight}px;display:flex;align-items:center;justify-content:${justifyContent};opacity:${lineOpacity};white-space:pre">${text}${cursorSpan}</div>`;
  }

  const bgStyle = bgOpacity > 0
    ? `background:rgba(0,0,0,${bgOpacity});border-radius:${W * 0.02}px;padding:${H * 0.02}px ${paddingX}px;`
    : `padding:0 ${paddingX}px;`;

  container.innerHTML = `<div style="width:${W}px;height:${H}px;position:relative;overflow:hidden;font-family:ui-monospace,'JetBrains Mono','Fira Code',monospace">
  <div style="position:absolute;top:${startY}px;left:0;right:0;display:flex;flex-direction:column;align-items:${align === 'center' ? 'center' : 'flex-start'};${bgStyle}font-size:${fs}px;font-weight:400;color:${color};letter-spacing:0.02em;line-height:${lineHeight}px">
    ${linesHtml}
  </div>
</div>`;
}

// ─── Preview setup ───
const REAL_W = 1080, REAL_H = 1920;
const MAX_H = Math.min(window.innerHeight - 120, 700);
const SCALE = MAX_H / REAL_H;
const PW = Math.round(REAL_W * SCALE);
const PH = Math.round(REAL_H * SCALE);

const stage = document.getElementById('stage');
stage.style.width = PW + 'px';
stage.style.height = PH + 'px';
stage.style.position = 'relative';
document.getElementById('stage-box').style.width = PW + 'px';
document.getElementById('preview-size').textContent = PW + 'x' + PH;

// Scale wrapper
const inner = document.createElement('div');
inner.style.cssText = `transform-origin:top left;transform:scale(${SCALE});width:${REAL_W}px;height:${REAL_H}px;position:absolute;top:0;left:0;`;
stage.appendChild(inner);

const DURATION = 12;
document.getElementById('t-total').textContent = DURATION.toFixed(2);

// ─── Params ───
const params = {
  lines: ['In the beginning', 'there was nothing.', 'Then came light.', 'And then, video.'],
  hue: 0, saturation: 0, lightness: 92,
  fontSize: 0.055, charDelay: 0.06, lineGap: 0.5,
  cursorChar: '|', cursorBlink: 1.8,
  align: 'left', bgOpacity: 0
};

const paramDefs = [
  { key: 'lines',       type: 'textarea', label: '文字行（每行一行）', group: 'content',
    serialize: v => v.join('\n'), deserialize: v => v.split('\n').filter(l => l.trim().length > 0) },
  { key: 'hue',         type: 'range', range: [0, 360], step: 1, label: '文字色相', group: 'color' },
  { key: 'saturation',  type: 'range', range: [0, 100], step: 1, label: '文字饱和度', group: 'color' },
  { key: 'lightness',   type: 'range', range: [30, 100], step: 1, label: '文字亮度', group: 'color' },
  { key: 'fontSize',    type: 'range', range: [0.03, 0.1], step: 0.005, label: '字号比例', group: 'style' },
  { key: 'bgOpacity',   type: 'range', range: [0, 0.8], step: 0.05, label: '背景遮罩透明度', group: 'style' },
  { key: 'cursorChar',  type: 'text', label: '光标字符', group: 'style' },
  { key: 'align',       type: 'select', options: ['left', 'center'], label: '对齐方式', group: 'style' },
  { key: 'charDelay',   type: 'range', range: [0.02, 0.2], step: 0.01, label: '每字延迟(s)', group: 'animation' },
  { key: 'lineGap',     type: 'range', range: [0.1, 2], step: 0.1, label: '行间停顿(s)', group: 'animation' },
  { key: 'cursorBlink', type: 'range', range: [0.5, 4], step: 0.1, label: '光标闪烁(Hz)', group: 'animation' },
];

const paramsEl = document.getElementById('params');
const groups = {};
for (const def of paramDefs) {
  const g = def.group;
  if (!groups[g]) {
    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = g;
    paramsEl.appendChild(title);
    groups[g] = true;
  }
  const div = document.createElement('div');
  div.className = 'param';

  if (def.type === 'range') {
    const head = document.createElement('div');
    head.className = 'param-head';
    const labelSpan = document.createElement('span');
    labelSpan.textContent = def.label;
    const valSpan = document.createElement('span');
    valSpan.className = 'val';
    valSpan.id = 'v_' + def.key;
    valSpan.textContent = params[def.key];
    head.appendChild(labelSpan);
    head.appendChild(valSpan);
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = def.range[0]; input.max = def.range[1]; input.step = def.step;
    input.value = params[def.key];
    input.addEventListener('input', () => {
      params[def.key] = +input.value;
      valSpan.textContent = def.step < 1 ? (+input.value).toFixed(2) : (+input.value).toFixed(0);
    });
    div.appendChild(input);
  } else if (def.type === 'textarea') {
    const label = document.createElement('div');
    label.className = 'group-title';
    label.textContent = def.label;
    div.appendChild(label);
    const ta = document.createElement('textarea');
    ta.value = def.serialize(params[def.key]);
    ta.addEventListener('input', () => {
      params[def.key] = def.deserialize(ta.value);
    });
    div.appendChild(ta);
  } else if (def.type === 'text') {
    const head = document.createElement('div');
    head.className = 'param-head';
    const labelSpan = document.createElement('span');
    labelSpan.textContent = def.label;
    head.appendChild(labelSpan);
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'text';
    input.value = params[def.key];
    input.addEventListener('input', () => { params[def.key] = input.value; });
    div.appendChild(input);
  } else if (def.type === 'select') {
    const head = document.createElement('div');
    head.className = 'param-head';
    const labelSpan = document.createElement('span');
    labelSpan.textContent = def.label;
    head.appendChild(labelSpan);
    div.appendChild(head);
    const sel = document.createElement('select');
    for (const opt of def.options) {
      const o = document.createElement('option');
      o.value = opt; o.textContent = opt;
      if (opt === params[def.key]) o.selected = true;
      sel.appendChild(o);
    }
    sel.addEventListener('change', () => { params[def.key] = sel.value; });
    div.appendChild(sel);
  }

  paramsEl.appendChild(div);
}

// ─── Playback ───
let playing = true;
let startTime = performance.now();
const progressFill = document.getElementById('progress-fill');
const tCurrent = document.getElementById('t-current');
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', () => {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸ 暂停'; }
  else { playBtn.textContent = '▶ 播放'; }
});

const progressBar = document.getElementById('progress-bar');
progressBar.addEventListener('click', e => {
  const rect = progressBar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentT = ratio * DURATION;
  startTime = performance.now() - currentT * 1000;
});

let currentT = 0;

function loop() {
  if (playing) {
    currentT = ((performance.now() - startTime) / 1000) % DURATION;
  }
  tCurrent.textContent = currentT.toFixed(2);
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  renderTypewriter(inner, currentT, params, REAL_W, REAL_H);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
