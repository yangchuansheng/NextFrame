<!-- NOTE: render logic is duplicated from index.js because file:// CORS blocks ES module imports. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Star Burst (9:16)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: block; }
#progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #f59e0b; border-radius: 2px; width: 0%; transition: none; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 260px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin: 12px 0 8px; }
.param { margin-bottom: 8px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; cursor: pointer; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #f59e0b; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <canvas id="stage"></canvas>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">8.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>星芒爆炸</h2>
    <div class="desc">9:16 竖屏 · shapes · canvas2d</div>
    <div id="params"></div>
    <div id="info">
      <p>比例: <code>9:16</code> (1080x1920)</p>
      <p>预览: <code id="preview-size"></code></p>
      <p>技术: <code>canvas2d</code></p>
      <p>时长: <code>8s</code></p>
    </div>
  </div>
</div>
<script>
// ─── Deterministic RNG ───
function seededRng(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ─── Scene render (mirrors index.js logic) ───
function renderStarBurst(ctx, t, params, W, H) {
  const { hueCenter, hueSpread, starCount, points, speed, trailLength, glowRadius, bgAlpha } = params;
  const minDim = Math.min(W, H);
  const maxR = minDim * 0.48;
  const glowR = minDim * glowRadius;

  const stars = [];
  const rng = seededRng(42);
  for (let i = 0; i < starCount; i++) {
    const angle = (2 * Math.PI * i) / starCount + rng() * 0.3 - 0.15;
    const hue = ((hueCenter + (rng() - 0.5) * hueSpread * 2) + 360) % 360;
    const phaseOffset = rng();
    stars.push({ angle, hue, phaseOffset });
  }

  ctx.fillStyle = 'rgba(10,10,18,' + bgAlpha + ')';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;

  function drawStar(sx, sy, r, hue, alpha, npts) {
    if (r < 1) return;
    const outer = r, inner = r * 0.42;
    ctx.beginPath();
    for (let i = 0; i < npts * 2; i++) {
      const a = (Math.PI / npts) * i - Math.PI / 2;
      const rr = i % 2 === 0 ? outer : inner;
      if (i === 0) ctx.moveTo(sx + Math.cos(a) * rr, sy + Math.sin(a) * rr);
      else ctx.lineTo(sx + Math.cos(a) * rr, sy + Math.sin(a) * rr);
    }
    ctx.closePath();
    ctx.fillStyle = 'hsla(' + hue + ',85%,68%,' + alpha + ')';
    ctx.fill();
  }

  function drawGlow(sx, sy, hue, alpha) {
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR * 2.5);
    g.addColorStop(0, 'hsla(' + hue + ',90%,80%,' + (alpha * 0.9) + ')');
    g.addColorStop(0.4, 'hsla(' + hue + ',80%,65%,' + (alpha * 0.5) + ')');
    g.addColorStop(1, 'hsla(' + hue + ',70%,55%,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(sx, sy, glowR * 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  stars.forEach(function(star) {
    const phase = ((t * speed) + star.phaseOffset) % 1;
    const travelPhase = phase < 0.7 ? phase / 0.7 : 1;
    const fadePhase = phase >= 0.7 ? (phase - 0.7) / 0.3 : 0;
    const r = travelPhase * maxR;
    const alpha = phase < 0.7 ? 1 : 1 - fadePhase;
    const sx = cx + Math.cos(star.angle) * r;
    const sy = cy + Math.sin(star.angle) * r;

    const trailR = r - trailLength * maxR;
    if (trailR > 0 && alpha > 0.05) {
      const tAlpha = alpha * 0.35;
      const tSize = glowR * 1.2;
      const trailX = cx + Math.cos(star.angle) * trailR;
      const trailY = cy + Math.sin(star.angle) * trailR;
      ctx.globalCompositeOperation = 'lighter';
      const tg = ctx.createRadialGradient(trailX, trailY, 0, trailX, trailY, tSize * 3);
      tg.addColorStop(0, 'hsla(' + star.hue + ',80%,70%,' + tAlpha + ')');
      tg.addColorStop(1, 'hsla(' + star.hue + ',70%,55%,0)');
      ctx.fillStyle = tg;
      ctx.beginPath();
      ctx.arc(trailX, trailY, tSize * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }

    if (alpha > 0.05) {
      ctx.globalCompositeOperation = 'lighter';
      drawGlow(sx, sy, star.hue, alpha * 0.6);
      ctx.globalCompositeOperation = 'source-over';
    }

    if (alpha > 0.05) {
      const starSize = glowR * 1.8 * (0.5 + travelPhase * 0.5);
      drawStar(sx, sy, starSize, star.hue, alpha, points);
    }
  });
}

// ─── Preview setup: full-res canvas, CSS scaled down ───
const REAL_W = 1080, REAL_H = 1920;
const MAX_H = Math.min(window.innerHeight - 120, 700);
const SCALE = MAX_H / REAL_H;
const PW = Math.round(REAL_W * SCALE);
const PH = Math.round(REAL_H * SCALE);

const canvas = document.getElementById('stage');
canvas.width = REAL_W;
canvas.height = REAL_H;
canvas.style.width = PW + 'px';
canvas.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';
document.getElementById('preview-size').textContent = PW + 'x' + PH;

const ctx = canvas.getContext('2d');
// Initialize with black background
ctx.fillStyle = '#0a0a12';
ctx.fillRect(0, 0, REAL_W, REAL_H);

const DURATION = 8;
document.getElementById('t-total').textContent = DURATION.toFixed(2);

// ─── Params ───
const params = { hueCenter: 45, hueSpread: 30, starCount: 12, points: 6, speed: 1.0, trailLength: 0.35, glowRadius: 0.018, bgAlpha: 0.18 };
const paramDefs = {
  hueCenter:   { range: [0, 360],    step: 1,     label: '主色相',     group: 'color' },
  hueSpread:   { range: [0, 180],    step: 5,     label: '色相扩散',   group: 'color' },
  starCount:   { range: [4, 24],     step: 1,     label: '星芒数量',   group: 'shape' },
  points:      { range: [3, 12],     step: 1,     label: '角数',       group: 'shape' },
  speed:       { range: [0.3, 3.0],  step: 0.1,   label: '爆发速度',   group: 'animation' },
  trailLength: { range: [0.05, 0.7], step: 0.05,  label: '尾迹长度',   group: 'animation' },
  glowRadius:  { range: [0.005, 0.05], step: 0.001, label: '光晕半径', group: 'style' },
  bgAlpha:     { range: [0.05, 0.5], step: 0.01,  label: '背景透明度', group: 'style' },
};

const paramsEl = document.getElementById('params');
const groups = {};
for (const [key, def] of Object.entries(paramDefs)) {
  const g = def.group;
  if (!groups[g]) {
    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = g;
    paramsEl.appendChild(title);
    groups[g] = true;
  }
  const div = document.createElement('div');
  div.className = 'param';
  const head = document.createElement('div');
  head.className = 'param-head';
  const labelSpan = document.createElement('span');
  labelSpan.textContent = def.label;
  const valSpan = document.createElement('span');
  valSpan.className = 'val';
  valSpan.id = 'v_' + key;
  valSpan.textContent = params[key];
  head.appendChild(labelSpan);
  head.appendChild(valSpan);
  div.appendChild(head);
  const input = document.createElement('input');
  input.type = 'range';
  input.min = def.range[0]; input.max = def.range[1]; input.step = def.step; input.value = params[key];
  input.addEventListener('input', function() {
    params[key] = +input.value;
    valSpan.textContent = def.step < 1 ? (+input.value).toFixed(3) : (+input.value).toFixed(0);
  });
  div.appendChild(input);
  paramsEl.appendChild(div);
}

// ─── Playback ───
let playing = true;
let startTime = performance.now();
let currentT = 0;
const progressFill = document.getElementById('progress-fill');
const tCurrent = document.getElementById('t-current');
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', function() {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸ 暂停'; }
  else { playBtn.textContent = '▶ 播放'; }
});

const progressBar = document.getElementById('progress-bar');
progressBar.addEventListener('click', function(e) {
  const rect = progressBar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentT = ratio * DURATION;
  startTime = performance.now() - currentT * 1000;
});

function loop() {
  if (playing) {
    currentT = ((performance.now() - startTime) / 1000) % DURATION;
  }
  tCurrent.textContent = currentT.toFixed(2);
  progressFill.style.width = (currentT / DURATION * 100) + '%';

  renderStarBurst(ctx, currentT, params, REAL_W, REAL_H);

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
