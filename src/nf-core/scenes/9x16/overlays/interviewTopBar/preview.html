<!-- NOTE: render logic is duplicated from index.js because file:// CORS blocks ES module imports. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Interview Top Bar (9:16)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: block; position: relative; background: #0d0e18; }
#progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 0%; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 280px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.param { margin-bottom: 10px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6366f1; cursor: pointer; }
input[type=text] { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #6366f1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">81.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>访谈顶部栏</h2>
    <div class="desc">9:16 竖屏 · 叠加层</div>
    <div class="param">
      <div class="param-head"><span>节目名称</span></div>
      <input type="text" value="硅谷访谈" oninput="params.seriesName=this.value;frame()">
    </div>
    <div class="param">
      <div class="param-head"><span>嘉宾姓名</span></div>
      <input type="text" value="Dario Amodei" oninput="params.guestName=this.value;frame()">
    </div>
    <div class="param">
      <div class="param-head"><span>期号标签</span></div>
      <input type="text" value="EP.01" oninput="params.episodeTag=this.value;frame()">
    </div>
    <div class="param">
      <div class="param-head"><span>强调色色相</span><span class="val" id="v-accentHue">200</span></div>
      <input type="range" min="0" max="360" step="1" value="200" oninput="params.accentHue=+this.value;document.getElementById('v-accentHue').textContent=this.value;frame()">
    </div>
    <div id="info">
      <p>比例: <code>9:16</code> (1080×1920)</p>
      <p>技术: <code>dom</code></p>
      <p>时长: <code>81s</code></p>
    </div>
  </div>
</div>
<script>
const REAL_W = 1080, REAL_H = 1920, DURATION = 81;
const MAX_H = Math.min(window.innerHeight - 120, 700);
const SCALE = MAX_H / REAL_H;
const PW = Math.round(REAL_W * SCALE), PH = Math.round(REAL_H * SCALE);

const stage = document.getElementById('stage');
stage.style.width = PW + 'px';
stage.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';

const params = { seriesName: '硅谷访谈', guestName: 'Dario Amodei', episodeTag: 'EP.01', accentHue: 200, showTag: true };

let t = 0, playing = true, lastTs = null;

function renderScene(t, p, W, H) {
  const fadeIn = Math.min(1, t / 0.5);
  const px = W * 0.055;
  const barH = H * 0.095;
  const accentColor = `hsl(${p.accentHue},70%,60%)`;
  const accentBg = `hsla(${p.accentHue},60%,50%,0.15)`;
  const accentBorder = `hsla(${p.accentHue},60%,50%,0.3)`;
  const seriesFontSize = W * 0.035;
  const guestFontSize = W * 0.05;
  const tagFontSize = W * 0.028;
  const dotSize = W * 0.014;

  return `<div style="width:${W}px;height:${H}px;position:relative;opacity:${fadeIn};transform:scale(${SCALE});transform-origin:top left">
    <div style="position:absolute;top:0;left:0;right:0;height:${barH}px;padding:0 ${px}px;display:flex;flex-direction:column;justify-content:center;gap:${H * 0.006}px">
      <div style="display:flex;align-items:center;gap:${W * 0.02}px">
        <div style="width:${dotSize}px;height:${dotSize}px;border-radius:50%;background:${accentColor};box-shadow:0 0 ${W * 0.01}px ${accentColor}"></div>
        <span style="font-size:${seriesFontSize}px;color:rgba(255,255,255,0.55);letter-spacing:0.06em;font-weight:500">${p.seriesName}</span>
        ${p.showTag ? `<div style="margin-left:auto;padding:${H * 0.003}px ${W * 0.022}px;background:${accentBg};border:1px solid ${accentBorder};border-radius:${W * 0.025}px">
          <span style="font-size:${tagFontSize}px;color:${accentColor};font-weight:600;letter-spacing:0.08em">${p.episodeTag}</span>
        </div>` : ''}
      </div>
      <div style="font-size:${guestFontSize}px;font-weight:700;color:rgba(255,255,255,0.92);letter-spacing:0.01em">${p.guestName}</div>
    </div>
    <div style="position:absolute;top:${barH}px;left:${px}px;right:${px}px;height:1px;background:rgba(255,255,255,0.07)"></div>
  </div>`;
}

function frame() {
  stage.innerHTML = renderScene(t, params, REAL_W, REAL_H);
  document.getElementById('t-current').textContent = t.toFixed(2);
  document.getElementById('progress-fill').style.width = (t / DURATION * 100) + '%';
}

function loop(ts) {
  if (playing) {
    if (lastTs !== null) t = Math.min(DURATION, t + (ts - lastTs) / 1000);
    if (t >= DURATION) t = 0;
    lastTs = ts;
    frame();
    requestAnimationFrame(loop);
  }
}

document.getElementById('play-btn').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '⏸ 暂停' : '▶ 播放';
  if (playing) { lastTs = null; requestAnimationFrame(loop); }
};
document.getElementById('progress-bar').onclick = function(e) {
  t = (e.offsetX / this.offsetWidth) * DURATION; frame();
};

frame();
requestAnimationFrame(loop);
</script>
</body>
</html>
