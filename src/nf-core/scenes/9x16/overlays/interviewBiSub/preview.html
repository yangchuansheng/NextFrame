<!-- NOTE: render logic is duplicated from index.js because file:// CORS blocks ES module imports. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Interview Bilingual Subtitle (9:16)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: block; position: relative; background: #0d0e18; }
#progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 0%; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 300px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; overflow-y: auto; max-height: 80vh; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.param { margin-bottom: 10px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6366f1; cursor: pointer; }
.seg-list { font-size: 11px; color: rgba(255,255,255,0.35); line-height: 2; margin-top: 8px; }
.seg-list span { color: rgba(255,255,255,0.6); cursor: pointer; }
.seg-list span:hover { color: #6366f1; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #6366f1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">81.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>双语字幕</h2>
    <div class="desc">9:16 竖屏 · 字幕叠加层</div>
    <div class="param">
      <div class="param-head"><span>说话人色相</span><span class="val" id="v-sh">35</span></div>
      <input type="range" min="0" max="360" step="1" value="35" oninput="params.speakerHue=+this.value;document.getElementById('v-sh').textContent=this.value;frame()">
    </div>
    <div class="param">
      <div class="param-head"><span>中文色相</span><span class="val" id="v-zh">200</span></div>
      <input type="range" min="0" max="360" step="1" value="200" oninput="params.zhHue=+this.value;document.getElementById('v-zh').textContent=this.value;frame()">
    </div>
    <div class="param">
      <div class="param-head"><span>卡片透明度</span><span class="val" id="v-op">0.82</span></div>
      <input type="range" min="0.4" max="1" step="0.02" value="0.82" oninput="params.cardOpacity=+this.value;document.getElementById('v-op').textContent=(+this.value).toFixed(2);frame()">
    </div>
    <div class="seg-list">
      <p>字幕段落 (点击跳转):</p>
      <div id="seg-links"></div>
    </div>
    <div id="info">
      <p>比例: <code>9:16</code> (1080×1920)</p>
      <p>技术: <code>dom</code></p>
      <p>时长: <code>81s</code></p>
    </div>
  </div>
</div>
<script>
const REAL_W = 1080, REAL_H = 1920, DURATION = 81;
const MAX_H = Math.min(window.innerHeight - 120, 700);
const SCALE = MAX_H / REAL_H;
const PW = Math.round(REAL_W * SCALE), PH = Math.round(REAL_H * SCALE);

const stage = document.getElementById('stage');
stage.style.width = PW + 'px';
stage.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';

const SEGMENTS = [
  { speaker: 'DWARKESH', en: 'So we talked three years ago.', zh: '我们三年前谈过一次。', start: 2, end: 9 },
  { speaker: 'DWARKESH', en: "I'm curious in your view, what has been the biggest update?", zh: '这三年，你最大的认知更新是什么？', start: 10, end: 19 },
  { speaker: 'DARIO', en: 'The underlying technology exponential has gone about as I expected.', zh: '底层技术的指数增长，基本跟我预期差不多。', start: 21, end: 35 },
  { speaker: 'DARIO', en: 'The most surprising thing has been the lack of public recognition of how close we are to the end of the exponential.', zh: '大众完全没意识到，我们离指数终点有多近。', start: 37, end: 58 },
];

const params = { segments: SEGMENTS, cardOpacity: 0.82, enHue: 0, zhHue: 200, speakerHue: 35 };

// Build segment links
const linksEl = document.getElementById('seg-links');
SEGMENTS.forEach((s, i) => {
  const el = document.createElement('div');
  el.innerHTML = `<span onclick="t=${s.start + 0.1};frame()">[${s.start}s] ${s.speaker}: ${s.en.substring(0, 30)}...</span>`;
  linksEl.appendChild(el);
});

let t = 0, playing = true, lastTs = null;

function renderScene(t, p, W, H) {
  const segs = p.segments || [];
  const seg = segs.find(s => t >= s.start && t < s.end);
  if (!seg) {
    return `<div style="width:${W}px;height:${H}px;transform:scale(${SCALE});transform-origin:top left"></div>`;
  }
  const fadeDur = 0.25;
  const segDur = seg.end - seg.start;
  const localT = t - seg.start;
  const fadeIn  = Math.min(1, localT / fadeDur);
  const fadeOut = localT > segDur - fadeDur ? Math.min(1, (segDur - localT) / fadeDur) : 1;
  const opacity = fadeIn * fadeOut;

  const px = W * 0.05;
  const cardPx = W * 0.055;
  const cardPy = H * 0.018;
  const cardBottom = H * 0.045;
  const cardMaxW = W - px * 2;

  const sColor = `hsl(${p.speakerHue},80%,65%)`;
  const sBg    = `hsla(${p.speakerHue},60%,50%,0.18)`;
  const sBorder= `hsla(${p.speakerHue},60%,50%,0.35)`;
  const enColor= p.enHue === 0 ? 'rgba(255,255,255,0.95)' : `hsl(${p.enHue},20%,90%)`;
  const zhColor= `hsl(${p.zhHue},55%,72%)`;
  const cardBg = `rgba(8,10,18,${p.cardOpacity})`;

  const enFS   = W * 0.042;
  const zhFS   = W * 0.034;
  const spFS   = W * 0.025;

  return `<div style="width:${W}px;height:${H}px;position:relative;opacity:${opacity};transform:scale(${SCALE});transform-origin:top left">
    <div style="position:absolute;bottom:${cardBottom}px;left:${px}px;width:${cardMaxW}px;background:${cardBg};backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:${W * 0.03}px;border:1px solid rgba(255,255,255,0.07);padding:${cardPy}px ${cardPx}px">
      <div style="display:inline-flex;align-items:center;padding:${H * 0.004}px ${W * 0.028}px;background:${sBg};border:1px solid ${sBorder};border-radius:${W * 0.02}px;margin-bottom:${H * 0.008}px">
        <span style="font-size:${spFS}px;font-weight:700;color:${sColor};letter-spacing:0.1em">${seg.speaker}</span>
      </div>
      <div style="font-size:${enFS}px;color:${enColor};line-height:1.45;font-weight:500;margin-bottom:${H * 0.007}px">${seg.en}</div>
      <div style="font-size:${zhFS}px;color:${zhColor};line-height:1.5;font-weight:400">${seg.zh}</div>
    </div>
  </div>`;
}

function frame() {
  stage.innerHTML = renderScene(t, params, REAL_W, REAL_H);
  document.getElementById('t-current').textContent = t.toFixed(2);
  document.getElementById('progress-fill').style.width = (t / DURATION * 100) + '%';
}

function loop(ts) {
  if (playing) {
    if (lastTs !== null) t = Math.min(DURATION, t + (ts - lastTs) / 1000);
    if (t >= DURATION) t = 0;
    lastTs = ts;
    frame();
    requestAnimationFrame(loop);
  }
}

document.getElementById('play-btn').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '⏸ 暂停' : '▶ 播放';
  if (playing) { lastTs = null; requestAnimationFrame(loop); }
};
document.getElementById('progress-bar').onclick = function(e) {
  t = (e.offsetX / this.offsetWidth) * DURATION; frame();
};

frame();
requestAnimationFrame(loop);
</script>
</body>
</html>
