<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Lower Third Velvet (9:16)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage-container { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
#scene-root {
  width: 1080px; height: 1920px;
  transform-origin: top left;
  position: relative;
  background: #0a0a12;
  overflow: hidden;
}
#bar {
  position: absolute;
  left: 6%; width: 88%; height: 10%;
  top: 78%;
  border-radius: 28px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
}
#bar-bg {
  position: absolute; inset: 0;
  border-radius: 28px;
}
#accent-line {
  position: absolute; top: 0; left: 0; width: 100%; height: 3%;
}
#dot-outer {
  position: absolute;
  left: 4.5%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
}
#dot-inner {
  position: absolute;
  left: 4.5%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
}
#title-text {
  position: absolute;
  left: 10%; top: 28%;
  font-weight: bold;
  color: rgba(255,255,255,0.95);
  white-space: nowrap;
  overflow: hidden;
}
#subtitle-text {
  position: absolute;
  left: 10%; top: 58%;
  color: rgba(255,255,255,0.55);
  white-space: nowrap;
}
#progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; position: relative; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 0%; transition: none; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 260px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); margin: 12px 0 8px; }
.param { margin-bottom: 8px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums; }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6366f1; cursor: pointer; }
input[type=text] { width: 100%; height: 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; color: #fff; font-size: 12px; padding: 0 6px; outline: none; }
input[type=text]:focus { border-color: #6366f1; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #6366f1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage-container">
      <div id="scene-root">
        <div id="bar">
          <div id="bar-bg"></div>
          <div id="accent-line"></div>
          <div id="dot-outer"></div>
          <div id="dot-inner"></div>
          <div id="title-text"></div>
          <div id="subtitle-text"></div>
        </div>
      </div>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">6.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>下三分之一字幕条</h2>
    <div class="desc">9:16 竖屏 · 擦除揭示 + 脉冲圆点</div>
    <div id="params"></div>
    <div id="info">
      <p>比例: <code>9:16</code> (1080x1920)</p>
      <p>预览: <code id="preview-size"></code></p>
      <p>技术: <code>DOM + CSS</code></p>
      <p>时长: <code>6s</code></p>
    </div>
  </div>
</div>
<script>
// ─── Setup: 1080x1920 div scaled via CSS transform ───
const REAL_W = 1080, REAL_H = 1920;
const MAX_H = Math.min(window.innerHeight - 120, 700);
const SCALE = MAX_H / REAL_H;
const PW = Math.round(REAL_W * SCALE);
const PH = Math.round(REAL_H * SCALE);

const sceneRoot = document.getElementById('scene-root');
const stageContainer = document.getElementById('stage-container');
sceneRoot.style.transform = 'scale(' + SCALE + ')';
stageContainer.style.width = PW + 'px';
stageContainer.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';
document.getElementById('progress-bar').style.width = PW + 'px';
document.getElementById('preview-size').textContent = PW + 'x' + PH;

const DURATION = 6;
document.getElementById('t-total').textContent = DURATION.toFixed(2);

// DOM elements
const bar = document.getElementById('bar');
const barBg = document.getElementById('bar-bg');
const accentLine = document.getElementById('accent-line');
const dotOuter = document.getElementById('dot-outer');
const dotInner = document.getElementById('dot-inner');
const titleText = document.getElementById('title-text');
const subtitleText = document.getElementById('subtitle-text');

// ─── Params ───
const params = { title: 'NEXTFRAME', subtitle: 'AI Video Engine', hueA: 20, hueB: 320, holdEnd: 4, fadeOut: 0.6 };
const paramDefs = {
  title:    { type: 'text', label: '主标题', group: 'content' },
  subtitle: { type: 'text', label: '副标题', group: 'content' },
  hueA:     { range: [0, 360], step: 1, label: '主色相', group: 'color' },
  hueB:     { range: [0, 360], step: 1, label: '副色相', group: 'color' },
  holdEnd:  { range: [0.5, 20], step: 0.1, label: '持续到(s)', group: 'animation' },
  fadeOut:  { range: [0.1, 4], step: 0.1, label: '淡出时长(s)', group: 'animation' },
};

function easeOut(t) { return t * (2 - t); }

function renderFrame(t) {
  const { title, subtitle, hueA, hueB, holdEnd, fadeOut } = params;
  const wipeInDur = 0.4;
  const typeInStart = 0.2;
  const subtitleStart = 0.6;

  // Phase calculation
  let barReveal = 0;
  let barAlpha = 1;

  if (t < wipeInDur) {
    barReveal = easeOut(t / wipeInDur);
  } else if (t < holdEnd) {
    barReveal = 1;
  } else if (t < holdEnd + fadeOut) {
    barReveal = 1;
    barAlpha = 1 - easeOut((t - holdEnd) / fadeOut);
  } else {
    barReveal = 0;
    barAlpha = 0;
  }

  // Bar visibility via clip-path (wipe from left)
  if (barReveal <= 0 && barAlpha <= 0) {
    bar.style.opacity = '0';
    return;
  }

  bar.style.opacity = barAlpha;
  bar.style.clipPath = 'inset(0 ' + ((1 - barReveal) * 100) + '% 0 0)';

  // Bar background gradient (glassmorphism)
  barBg.style.background = 'linear-gradient(90deg, hsla(' + hueA + ',70%,18%,0.85), hsla(' + hueB + ',70%,18%,0.85))';

  // Accent line
  accentLine.style.background = 'linear-gradient(90deg, hsl(' + hueA + ',80%,55%), hsl(' + hueB + ',80%,55%))';

  // Pulsing dot
  const pulse = 1 + 0.3 * Math.sin(t * 4);
  const dotSize = 24 * pulse;
  const dotGlowSize = 60 * pulse;
  dotInner.style.width = dotSize + 'px';
  dotInner.style.height = dotSize + 'px';
  dotInner.style.background = 'hsl(' + hueA + ',85%,60%)';
  dotOuter.style.width = dotGlowSize + 'px';
  dotOuter.style.height = dotGlowSize + 'px';
  dotOuter.style.background = 'hsla(' + hueA + ',85%,60%,0.2)';

  // Title — typewriter effect
  titleText.style.fontSize = '58px';
  if (t > typeInStart) {
    const typeProgress = Math.min(1, (t - typeInStart) / (title.length * 0.05));
    const visibleChars = Math.floor(typeProgress * title.length);
    titleText.textContent = title.substring(0, visibleChars);
  } else {
    titleText.textContent = '';
  }

  // Subtitle — fade in
  subtitleText.style.fontSize = '38px';
  if (t > subtitleStart) {
    const subAlpha = Math.min(1, (t - subtitleStart) / 0.4);
    subtitleText.style.opacity = subAlpha * 0.55;
    subtitleText.textContent = subtitle;
  } else {
    subtitleText.style.opacity = '0';
    subtitleText.textContent = subtitle;
  }
}

// ─── Param UI ───
const paramsEl = document.getElementById('params');
const groups = {};
for (const [key, def] of Object.entries(paramDefs)) {
  const g = def.group;
  if (!groups[g]) {
    const gtitle = document.createElement('div');
    gtitle.className = 'group-title';
    gtitle.textContent = g;
    paramsEl.appendChild(gtitle);
    groups[g] = true;
  }
  const div = document.createElement('div');
  div.className = 'param';
  const head = document.createElement('div');
  head.className = 'param-head';
  const labelSpan = document.createElement('span');
  labelSpan.textContent = def.label;
  head.appendChild(labelSpan);

  if (def.type === 'text') {
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'text';
    input.value = params[key];
    input.addEventListener('input', function() { params[key] = input.value; });
    div.appendChild(input);
  } else {
    const valSpan = document.createElement('span');
    valSpan.className = 'val';
    valSpan.id = 'v_' + key;
    valSpan.textContent = def.step < 1 ? params[key].toFixed(1) : params[key].toFixed(0);
    head.appendChild(valSpan);
    div.appendChild(head);
    const input = document.createElement('input');
    input.type = 'range';
    input.min = def.range[0]; input.max = def.range[1]; input.step = def.step; input.value = params[key];
    input.addEventListener('input', function() {
      params[key] = +input.value;
      valSpan.textContent = def.step < 1 ? (+input.value).toFixed(1) : (+input.value).toFixed(0);
    });
    div.appendChild(input);
  }
  paramsEl.appendChild(div);
}

// ─── Playback ───
let playing = true;
let startTime = performance.now();
const progressFill = document.getElementById('progress-fill');
const tCurrent = document.getElementById('t-current');
const playBtn = document.getElementById('play-btn');

playBtn.addEventListener('click', function() {
  playing = !playing;
  if (playing) { startTime = performance.now() - currentT * 1000; playBtn.textContent = '⏸ 暂停'; }
  else { playBtn.textContent = '▶ 播放'; }
});

const progressBar = document.getElementById('progress-bar');
progressBar.addEventListener('click', function(e) {
  const rect = progressBar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentT = ratio * DURATION;
  startTime = performance.now() - currentT * 1000;
});

let currentT = 0;

function loop() {
  if (playing) {
    currentT = ((performance.now() - startTime) / 1000) % DURATION;
  }
  tCurrent.textContent = currentT.toFixed(2);
  progressFill.style.width = (currentT / DURATION * 100) + '%';
  renderFrame(currentT);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
