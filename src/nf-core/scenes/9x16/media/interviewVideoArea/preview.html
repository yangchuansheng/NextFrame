<!-- NOTE: render logic is duplicated from index.js because file:// CORS blocks ES module imports. -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Preview: Interview Video Area (9:16)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
#wrapper { display: flex; gap: 24px; align-items: flex-start; padding: 20px; }
#stage-box { flex-shrink: 0; }
#stage { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: block; position: relative; background: #1a1a2a; }
#progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; cursor: pointer; }
#progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 0%; }
#time-row { display: flex; justify-content: space-between; margin-top: 4px; }
#time-row span { font-size: 11px; color: rgba(255,255,255,0.3); }
#play-btn { margin-top: 8px; width: 100%; height: 28px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; border-radius: 6px; cursor: pointer; font-size: 12px; }
#controls { width: 260px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
#controls h2 { font-size: 14px; margin-bottom: 4px; }
#controls .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.param { margin-bottom: 10px; }
.param-head { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
.param-head .val { color: rgba(255,255,255,0.85); }
input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #6366f1; cursor: pointer; }
#info { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8; }
#info code { color: #6366f1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="stage-box">
    <div id="stage"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="time-row"><span id="t-current">0.00</span><span id="t-total">81.00</span></div>
    <button id="play-btn">⏸ 暂停</button>
  </div>
  <div id="controls">
    <h2>视频占位区</h2>
    <div class="desc">9:16 竖屏 · 媒体层</div>
    <div class="param">
      <div class="param-head"><span>顶部位置(比例)</span><span class="val" id="v-top">0.14</span></div>
      <input type="range" min="0.05" max="0.4" step="0.01" value="0.14" oninput="params.topFrac=+this.value;document.getElementById('v-top').textContent=this.value;frame()">
    </div>
    <div class="param">
      <div class="param-head"><span>高度(比例)</span><span class="val" id="v-height">0.48</span></div>
      <input type="range" min="0.2" max="0.7" step="0.01" value="0.48" oninput="params.heightFrac=+this.value;document.getElementById('v-height').textContent=this.value;frame()">
    </div>
    <div class="param">
      <div class="param-head"><span>圆角(px)</span><span class="val" id="v-radius">16</span></div>
      <input type="range" min="0" max="40" step="2" value="16" oninput="params.borderRadius=+this.value;document.getElementById('v-radius').textContent=this.value;frame()">
    </div>
    <div id="info">
      <p>比例: <code>9:16</code> (1080×1920)</p>
      <p>技术: <code>dom</code></p>
      <p>时长: <code>81s</code></p>
    </div>
  </div>
</div>
<script>
const REAL_W = 1080, REAL_H = 1920, DURATION = 81;
const MAX_H = Math.min(window.innerHeight - 120, 700);
const SCALE = MAX_H / REAL_H;
const PW = Math.round(REAL_W * SCALE), PH = Math.round(REAL_H * SCALE);

const stage = document.getElementById('stage');
stage.style.width = PW + 'px';
stage.style.height = PH + 'px';
document.getElementById('stage-box').style.width = PW + 'px';

const params = { topFrac: 0.14, heightFrac: 0.48, borderRadius: 16, borderOpacity: 0.15 };

let t = 0, playing = true, lastTs = null;

function renderScene(t, p, W, H) {
  const margin = W * 0.04;
  const rectW = W - margin * 2;
  const rectH = Math.round(H * p.heightFrac);
  const rectTop = Math.round(H * p.topFrac);
  const border = `1px solid rgba(255,255,255,${p.borderOpacity})`;
  return `<div style="width:${W}px;height:${H}px;position:relative;overflow:hidden;transform:scale(${SCALE});transform-origin:top left">
    <div style="position:absolute;left:${margin}px;top:${rectTop}px;width:${rectW}px;height:${rectH}px;background:#000;border-radius:${p.borderRadius}px;border:${border};overflow:hidden;display:flex;align-items:center;justify-content:center">
      <div style="color:rgba(255,255,255,0.08);font-size:${W * 0.035}px;font-family:monospace">VIDEO AREA</div>
    </div>
  </div>`;
}

function frame() {
  stage.innerHTML = renderScene(t, params, REAL_W, REAL_H);
  document.getElementById('t-current').textContent = t.toFixed(2);
  document.getElementById('progress-fill').style.width = (t / DURATION * 100) + '%';
}

function loop(ts) {
  if (playing) {
    if (lastTs !== null) t = Math.min(DURATION, t + (ts - lastTs) / 1000);
    if (t >= DURATION) t = 0;
    lastTs = ts;
    frame();
    requestAnimationFrame(loop);
  }
}

document.getElementById('play-btn').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '⏸ 暂停' : '▶ 播放';
  if (playing) { lastTs = null; requestAnimationFrame(loop); }
};
document.getElementById('progress-bar').onclick = function(e) {
  t = (e.offsetX / this.offsetWidth) * DURATION; frame();
};

frame();
requestAnimationFrame(loop);
</script>
</body>
</html>
