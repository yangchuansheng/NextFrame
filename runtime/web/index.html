<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NextFrame</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0b14;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 7vw, 5.5rem);
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      #status {
        margin-top: 1rem;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.95rem;
        max-width: min(80vw, 56rem);
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NextFrame</h1>
      <div id="status"></div>
    </main>
    <script>
      document.getElementById("status").textContent = navigator.userAgent;
    </script>
  </body>
</html>
