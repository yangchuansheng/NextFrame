<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NextFrame</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --bg-glow: rgba(52, 211, 153, 0.14);
        --panel: rgba(11, 16, 32, 0.88);
        --border: rgba(125, 211, 252, 0.18);
        --text: #f8fafc;
        --muted: rgba(226, 232, 240, 0.72);
        --accent: #7dd3fc;
        --accent-strong: #34d399;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top, var(--bg-glow), transparent 38%),
          linear-gradient(180deg, #08111f 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        width: 28rem;
        height: 28rem;
        border-radius: 999px;
        filter: blur(120px);
        opacity: 0.5;
        pointer-events: none;
      }

      body::before {
        top: -8rem;
        right: -8rem;
        background: rgba(125, 211, 252, 0.2);
      }

      body::after {
        bottom: -10rem;
        left: -8rem;
        background: rgba(52, 211, 153, 0.16);
      }

      main {
        position: relative;
        width: min(92vw, 52rem);
        padding: 2.5rem;
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        background: var(--panel);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(20px);
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        font-size: 0.82rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 7vw, 5rem);
        line-height: 0.92;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
      }

      .subtitle {
        margin-top: 1rem;
        max-width: 36rem;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
      }

      #status {
        margin-top: 1.5rem;
        display: inline-flex;
        align-items: center;
        min-height: 2.5rem;
        padding: 0.75rem 1rem;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.88);
        color: var(--text);
        font-size: 0.95rem;
      }

      .scenes {
        margin-top: 2rem;
      }

      .scenes-label {
        margin-bottom: 0.85rem;
        font-size: 0.82rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }

      #scene-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .chip {
        padding: 0.75rem 0.95rem;
        border: 1px solid rgba(52, 211, 153, 0.24);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.82);
        font-size: 0.95rem;
        color: var(--text);
      }

      .chip small {
        margin-left: 0.45rem;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        main {
          padding: 1.5rem;
          border-radius: 1.25rem;
        }

        #status {
          display: flex;
          border-radius: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">NextFrame</p>
      <h1>Bridge wired</h1>
      <p class="subtitle">
        The webview can call into Rust and receive structured responses back
        over the Wry IPC channel.
      </p>
      <div id="status">Connecting…</div>
      <section class="scenes" aria-labelledby="scene-heading">
        <p class="scenes-label" id="scene-heading">Available scenes</p>
        <div id="scene-chips"></div>
      </section>
    </main>

    <script type="module">
      import * as bridge from "./src/bridge.js";

      const statusEl = document.getElementById("status");
      const chipsEl = document.getElementById("scene-chips");

      function renderScenes(scenes) {
        chipsEl.replaceChildren(
          ...scenes.map((scene) => {
            const chip = document.createElement("div");
            chip.className = "chip";
            chip.textContent = scene.name;

            const meta = document.createElement("small");
            meta.textContent = scene.id;
            chip.append(" ");
            chip.append(meta);

            return chip;
          }),
        );
      }

      async function boot() {
        try {
          const scenes = await bridge.call("scene.list", {});
          renderScenes(scenes);
          await bridge.call("log", {
            level: "info",
            msg: "hello from webview",
          });
          statusEl.textContent = "✅ IPC READY";
        } catch (error) {
          statusEl.textContent = `❌ ${error.message}`;
          chipsEl.textContent = "";
        }
      }

      boot();
    </script>
  </body>
</html>
