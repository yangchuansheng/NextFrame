<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Multi-Track Final · 引擎 + 库 + JSON 时间线</title>
<style>
:root {
  --bg: #06060c;
  --fg: #f4f2fb;
  --dim: #7a7590;
  --line: #1c1a2a;
  --accent: #ff7e55;
  --pink: #ff6bb5;
  --purple: #b878ff;
  --cyan: #6bd5ff;
  --green: #5fd9a8;
  --yellow: #ffc858;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  display: grid;
  grid-template-rows: 1fr 200px;
  height: 100vh;
}

/* ============ 主舞台 ============ */
.stage {
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--line);
}
canvas#main {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* ============ 底部时间线面板 ============ */
.bottom {
  display: grid;
  grid-template-rows: 50px 1fr;
  background: #08080f;
}

/* 控制条 */
.controls {
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  border-bottom: 1px solid var(--line);
  background: #0a0a14;
}
button.play {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  border: none;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px rgba(255, 126, 85, 0.4);
}
.time {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: var(--fg);
  font-variant-numeric: tabular-nums;
  width: 110px;
}
.time .sep, .time .total { color: var(--dim); }
.scrub-wrap {
  flex: 1;
  position: relative;
  height: 30px;
  display: flex;
  align-items: center;
}
.scrub-track {
  position: absolute;
  left: 0; right: 0;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
}
.scrub-fill {
  position: absolute;
  height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--pink), var(--purple));
  border-radius: 2px;
  pointer-events: none;
}
.scrub-input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 30px;
  opacity: 0;
  cursor: pointer;
}
.label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
}

/* 时间线轨道视图 */
.tracks {
  position: relative;
  overflow: hidden;
  background: #08080f;
}
.tracks-inner {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 100px 1fr;
}
.track-labels {
  background: #0a0a14;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
}
.track-label {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 10px;
  font-weight: 800;
  color: var(--dim);
  letter-spacing: 0.12em;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-family: "SF Mono", Menlo, monospace;
}
.tracks-area {
  position: relative;
  overflow: hidden;
}
.track-row {
  position: absolute;
  left: 0; right: 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.tl-clip {
  position: absolute;
  top: 4px;
  bottom: 4px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  padding: 0 6px;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.04em;
  font-family: "SF Mono", Menlo, monospace;
}
.tl-playhead {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--accent);
  z-index: 20;
  pointer-events: none;
  box-shadow: 0 0 10px var(--accent);
}
</style>
</head>
<body>

<div class="stage">
  <canvas id="main"></canvas>
</div>

<div class="bottom">
  <div class="controls">
    <button class="play" id="play-btn">⏸</button>
    <div class="time">
      <span id="t-cur">00:00</span>
      <span class="sep"> / </span>
      <span class="total">01:00</span>
    </div>
    <div class="scrub-wrap">
      <div class="scrub-track"></div>
      <div class="scrub-fill" id="scrub-fill"></div>
      <input type="range" class="scrub-input" id="scrub" min="0" max="60" step="0.01" value="0">
    </div>
    <div class="label">FRAME-PURE · 6 TRACKS · 1 ENGINE</div>
  </div>

  <div class="tracks">
    <div class="tracks-inner">
      <div class="track-labels" id="labels"></div>
      <div class="tracks-area" id="tracks-area">
        <div class="tl-playhead" id="tl-playhead"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 引擎核心：TAU、随机、缓动、SVG 库
// ============================================================
const TAU = Math.PI * 2;
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// 种子化随机
function hash(i, salt = 0) {
  let x = (i * 374761393 + salt * 668265263) | 0;
  x = (x ^ (x >>> 13)) * 1274126177 | 0;
  x = (x ^ (x >>> 16));
  return ((x >>> 0) % 10000) / 10000;
}

// 解析 "30%" / 100 这种位置参数
function px(v, total) {
  if (typeof v === 'number') return v;
  if (typeof v === 'string' && v.endsWith('%')) return parseFloat(v) / 100 * total;
  return parseFloat(v) || 0;
}

// ============================================================
// SVG 资产库
// ============================================================
const SVG_ICONS = {
  star: 'M 0 -32 L 9 -10 L 32 -10 L 13 5 L 20 28 L 0 14 L -20 28 L -13 5 L -32 -10 L -9 -10 Z',
  heart: 'M 0 -10 C -10 -28, -32 -22, -32 -4 C -32 14, 0 30, 0 30 C 0 30, 32 14, 32 -4 C 32 -22, 10 -28, 0 -10 Z',
  diamond: 'M 0 -32 L 28 0 L 0 32 L -28 0 Z',
  bolt: 'M -8 -32 L 12 -32 L 4 -8 L 18 -8 L -10 32 L -2 4 L -16 4 Z',
  check: 'M -20 0 L -6 14 L 24 -16',
};

function drawSvgIcon(ctx, name, x, y, size, color, opacity = 1) {
  const path = new Path2D(SVG_ICONS[name]);
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size / 32, size / 32);
  ctx.globalAlpha = opacity;
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 24;
  ctx.fill(path);
  ctx.restore();
}

// ============================================================
// SCENE 库（行为）
// 每个 scene: (localT, params, ctx, globalT) => void
// 必须 frame-pure：只依赖输入，不存累积状态
// ============================================================
const SCENES = {

  // ---------- BG: 流动渐变背景 + 微粒 ----------
  bg(t, p, ctx, gt) {
    // 每帧重画背景（不依赖前帧）
    const grad = ctx.createRadialGradient(
      W * (0.4 + Math.sin(gt * 0.1) * 0.1),
      H * (0.4 + Math.cos(gt * 0.13) * 0.1),
      0,
      W / 2, H / 2, Math.max(W, H) * 0.7
    );
    grad.addColorStop(0, '#1a0f26');
    grad.addColorStop(0.4, '#0d0814');
    grad.addColorStop(1, '#04030a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // 远景星点（种子化）
    for (let i = 0; i < 200; i++) {
      const sx = hash(i, 1) * W;
      const sy = hash(i, 2) * H;
      const phase = hash(i, 3) * TAU;
      const twinkle = 0.3 + Math.sin(gt * 1.5 + phase) * 0.4;
      ctx.fillStyle = `rgba(180, 200, 255, ${twinkle * 0.7})`;
      ctx.fillRect(sx, sy, 1.2, 1.2);
    }

    // 远景流动光带
    ctx.save();
    ctx.globalAlpha = 0.06;
    for (let i = 0; i < 3; i++) {
      const offset = (gt * 8 + i * 200) % (W + 200) - 100;
      const grad2 = ctx.createLinearGradient(offset - 200, 0, offset + 200, 0);
      grad2.addColorStop(0, 'transparent');
      grad2.addColorStop(0.5, '#ff6bb5');
      grad2.addColorStop(1, 'transparent');
      ctx.fillStyle = grad2;
      ctx.fillRect(offset - 200, 0, 400, H);
    }
    ctx.restore();
  },

  // ---------- 傅里叶圆链 ----------
  fourier(t, p, ctx, gt) {
    const numCircles = 9;
    const baseR = Math.min(W * 0.07, H * 0.16);
    const cx = W * 0.5;
    const cy = H * 0.5;
    const speed = 0.5;

    let x = cx, y = cy;
    const chain = [];
    for (let k = 0; k < numCircles; k++) {
      const n = 2 * k + 1;
      const r = baseR / n;
      const angle = n * gt * speed;
      chain.push({ x, y, r, angle });
      x += r * Math.cos(angle);
      y += r * Math.sin(angle);
    }

    for (const c of chain) {
      ctx.strokeStyle = 'rgba(170, 185, 235, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, TAU);
      ctx.stroke();
      const tx = c.x + c.r * Math.cos(c.angle);
      const ty = c.y + c.r * Math.sin(c.angle);
      ctx.strokeStyle = '#a5bfff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(tx, ty);
      ctx.stroke();
    }
    const last = chain[chain.length - 1];
    const tipX = last.x + last.r * Math.cos(last.angle);
    const tipY = last.y + last.r * Math.sin(last.angle);
    ctx.fillStyle = '#ff4d5e';
    ctx.shadowColor = 'rgba(255, 77, 94, 0.85)';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(tipX, tipY, 8, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 历史轨迹（往回算）
    ctx.strokeStyle = '#ff9a3c';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = 'rgba(255, 154, 60, 0.5)';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    const samples = 200;
    for (let i = 0; i < samples; i++) {
      const tt = gt - (samples - i) / 60;
      let py = cy;
      for (let k = 0; k < numCircles; k++) {
        const n = 2 * k + 1;
        const r = baseR / n;
        py += r * Math.sin(n * tt * speed);
      }
      const ttx = cx + (i / samples - 0.5) * baseR * 4 + baseR * 2;
      if (i === 0) ctx.moveTo(ttx, py);
      else ctx.lineTo(ttx, py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  },

  // ---------- 利萨如曲线 ----------
  lissajous(t, p, ctx, gt) {
    const a = 3 + Math.sin(gt * 0.15) * 1.5;
    const b = 4 + Math.cos(gt * 0.18) * 1.5;
    const delta = gt * 0.3;
    const cx = W * 0.5;
    const cy = H * 0.5;
    const R = Math.min(W, H) * 0.28;

    for (let layer = 0; layer < 5; layer++) {
      const lt = layer / 5;
      const lr = R * (1 - lt * 0.25);
      const phase = delta + lt * Math.PI;
      const hue = (20 + lt * 60 + gt * 8) % 360;
      ctx.strokeStyle = `hsla(${hue}, 80%, 65%, ${0.85 - lt * 0.5})`;
      ctx.lineWidth = 3 - lt;
      ctx.shadowColor = `hsla(${hue}, 80%, 60%, 0.6)`;
      ctx.shadowBlur = 14 - lt * 2;
      ctx.beginPath();
      const STEPS = 360;
      for (let i = 0; i <= STEPS; i++) {
        const u = (i / STEPS) * TAU;
        const px = cx + lr * Math.sin(a * u + phase);
        const py = cy + lr * Math.sin(b * u);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  },

  // ---------- 数据柱状图 ----------
  chartBars(t, p, ctx, gt) {
    const cx = W * 0.5;
    const cy = H * 0.55;
    const N = 14;
    const barW = Math.min(W * 0.04, 50);
    const gap = 8;
    const totalW = N * (barW + gap) - gap;
    const startX = cx - totalW / 2;
    const maxH = H * 0.32;

    for (let i = 0; i < N; i++) {
      // bar 高度由 (i, gt) 决定，平滑波动
      const phase = i * 0.5;
      const v = (Math.sin(gt * 1.2 + phase) + 1) / 2;
      const v2 = (Math.sin(gt * 0.6 + phase * 1.3 + 1) + 1) / 2;
      const h = (v * 0.6 + v2 * 0.4) * maxH;

      const x = startX + i * (barW + gap);
      const y = cy - h;

      const grad = ctx.createLinearGradient(0, y, 0, cy);
      grad.addColorStop(0, '#ffd58c');
      grad.addColorStop(1, '#ff6bb5');
      ctx.fillStyle = grad;
      ctx.shadowColor = 'rgba(255, 154, 60, 0.5)';
      ctx.shadowBlur = 12;
      // 圆角矩形
      const r = 4;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + barW - r, y);
      ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      ctx.lineTo(x + barW, cy);
      ctx.lineTo(x, cy);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      // 数值
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '700 10px "SF Mono", Menlo, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(Math.floor(v * 100), x + barW / 2, y - 6);
    }

    // axis
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(startX - 10, cy + 0.5);
    ctx.lineTo(startX + totalW + 10, cy + 0.5);
    ctx.stroke();
  },

  // ---------- 隧道 ----------
  tunnel(t, p, ctx, gt) {
    const cx = W * 0.5;
    const cy = H * 0.5;
    const NUM = 40;
    for (let i = 0; i < NUM; i++) {
      const z = ((i * 1.0) - (gt * 3 % 1.0)) * 0.5;
      if (z < 0.05) continue;
      const scale = 1 / z;
      const r = 0.5 * Math.min(W, H) * scale * 0.5;
      if (r > Math.max(W, H) * 1.2) continue;

      const offsetX = Math.sin(z * 0.3 + gt * 0.2) * 70 * scale;
      const offsetY = Math.cos(z * 0.4 + gt * 0.15) * 50 * scale;

      const alpha = Math.min(1, scale * 0.7);
      const hue = (z * 30 + gt * 25) % 360;
      ctx.strokeStyle = `hsla(${hue}, 75%, 60%, ${alpha})`;
      ctx.lineWidth = 2.5 * scale + 0.5;
      ctx.shadowColor = `hsla(${hue}, 80%, 60%, ${alpha * 0.5})`;
      ctx.shadowBlur = 18 * scale;
      ctx.beginPath();
      ctx.arc(cx + offsetX, cy + offsetY, r, 0, TAU);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  },

  // ---------- 大标题 ----------
  titleCard(t, p, ctx) {
    const localProgress = Math.min(t / 0.5, 1);
    const fadeOut = t > 4 ? 1 - (t - 4) / 1 : 1;
    const alpha = clamp(localProgress * fadeOut, 0, 1);
    const offsetY = (1 - easeOut(localProgress)) * 30;

    const text = p.text || 'TITLE';
    const x = px(p.x || '50%', W);
    const y = px(p.y || '14%', H);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y + offsetY);
    ctx.font = '900 38px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 渐变文字
    const grad = ctx.createLinearGradient(-200, 0, 200, 0);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.5, '#ffc98a');
    grad.addColorStop(1, '#ff6bb5');
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(255, 126, 85, 0.5)';
    ctx.shadowBlur = 30;
    ctx.fillText(text, 0, 0);

    // 下划线
    const tw = ctx.measureText(text).width;
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ff7e55';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-tw/2, 26);
    ctx.lineTo(-tw/2 + tw * easeOut(localProgress), 26);
    ctx.stroke();
    ctx.restore();
  },

  // ---------- SVG 图标 ----------
  svgIcon(t, p, ctx) {
    const localProgress = Math.min(t / 0.4, 1);
    const fadeOut = t > 3 ? 1 - (t - 3) / 1 : 1;
    const alpha = clamp(localProgress * fadeOut, 0, 1);
    const scale = lerp(0.3, 1, easeOut(localProgress)) * (p.scale || 1);

    const x = px(p.x || '50%', W);
    const y = px(p.y || '50%', H);
    const size = (p.size || 60) * scale;
    const color = p.color || '#ffc858';
    const rotation = (p.rotation || 0) + t * (p.spin || 30);

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation * Math.PI / 180);
    drawSvgIcon(ctx, p.icon, 0, 0, size, color, alpha);
    ctx.restore();
  },

  // ---------- 字幕 ----------
  caption(t, p, ctx) {
    const localProgress = Math.min(t / 0.3, 1);
    const fadeOut = t > 2.5 ? 1 - (t - 2.5) / 0.5 : 1;
    const alpha = clamp(localProgress * fadeOut, 0, 1);
    const offsetY = (1 - easeOut(localProgress)) * 12;

    const text = p.text || '';
    const x = W / 2;
    const y = H * 0.78;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = '600 22px -apple-system, "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 背景模糊条
    const tw = ctx.measureText(text).width;
    ctx.fillStyle = 'rgba(7, 6, 12, 0.7)';
    const bx = W/2 - tw/2 - 20;
    const by = y - 22 + offsetY;
    const bw = tw + 40;
    const bh = 44;
    const r = 8;
    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.arcTo(bx + bw, by, bx + bw, by + bh, r);
    ctx.arcTo(bx + bw, by + bh, bx, by + bh, r);
    ctx.arcTo(bx, by + bh, bx, by, r);
    ctx.arcTo(bx, by, bx + bw, by, r);
    ctx.fill();

    // 文字
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(255, 126, 85, 0.5)';
    ctx.shadowBlur = 14;
    ctx.fillText(text, W/2, y + offsetY);
    ctx.restore();
  },

  // ---------- HUD 角标 ----------
  hud(t, p, ctx, gt) {
    // 左上：项目名
    ctx.save();
    ctx.font = '700 11px -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(154, 142, 181, 0.85)';
    ctx.fillText('PRISM ENGINE · MULTI-TRACK DEMO', 24, 28);

    ctx.font = '900 18px -apple-system, sans-serif';
    const grad = ctx.createLinearGradient(0, 0, 200, 0);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, '#ff6bb5');
    ctx.fillStyle = grad;
    ctx.fillText('FRAME-PURE × MULTI-TRACK', 24, 50);

    // 右上：FPS / 帧号 / 时间
    ctx.font = '700 10px "SF Mono", Menlo, monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const frameNum = Math.floor(gt * 30);
    ctx.fillText(`FRAME ${String(frameNum).padStart(5, '0')} · 30FPS`, W - 24, 28);
    ctx.fillText(`t = ${gt.toFixed(2)}s`, W - 24, 44);
    ctx.fillText(`renderAt(${gt.toFixed(2)}) → frame`, W - 24, 60);

    // 左下：实时小坐标
    ctx.font = '600 9px "SF Mono", Menlo, monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(154, 142, 181, 0.5)';
    ctx.fillText('● REC', 24, H - 28);

    // 右下：版本号
    ctx.textAlign = 'right';
    ctx.fillText('v0.1 · 6 TRACKS · 8 SCENES', W - 24, H - 28);

    ctx.restore();

    // 顶部进度条（mini）
    const totalDur = 60;
    const progressW = W - 240;
    const progressX = 240;
    const progressY = 40;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(progressX, progressY, progressW, 2);
    const fillW = (gt / totalDur) * progressW;
    const grad2 = ctx.createLinearGradient(progressX, 0, progressX + fillW, 0);
    grad2.addColorStop(0, '#ff7e55');
    grad2.addColorStop(1, '#ff6bb5');
    ctx.fillStyle = grad2;
    ctx.fillRect(progressX, progressY, fillW, 2);
  },
};

// ============================================================
// TIMELINE — 多轨道 JSON 数据（这就是"剧本"）
// ============================================================
const TIMELINE = {
  duration: 60,
  tracks: [
    {
      name: 'BG',
      color: '#3a2a5a',
      clips: [
        { scene: 'bg', start: 0, dur: 60 }
      ]
    },
    {
      name: 'V1 MAIN',
      color: '#ff7e55',
      clips: [
        { scene: 'fourier',   start: 0,  dur: 15 },
        { scene: 'lissajous', start: 15, dur: 15 },
        { scene: 'chartBars', start: 30, dur: 15 },
        { scene: 'tunnel',    start: 45, dur: 15 },

// ============================================================
// ENGINE — 渲染调度器
// ============================================================
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = rect.width;
  H = rect.height;
}
resize();
window.addEventListener('resize', () => { resize(); renderAt(virtualT); });

// 唯一的渲染入口 —— frame-pure
function renderAt(t) {
  t = clamp(t, 0, TIMELINE.duration);
  // 不在这里 clearRect，让 BG scene 自己画背景

  // 扫所有轨道，按顺序渲染激活的 clip
  for (const track of TIMELINE.tracks) {
    for (const clip of track.clips) {
      if (t >= clip.start && t < clip.start + clip.dur) {
        const localT = t - clip.start;
        const sceneFn = SCENES[clip.scene];
        if (sceneFn) {
          sceneFn(localT, clip.params || {}, ctx, t);
        }
      }
    }
  }

  // 更新 UI
  document.getElementById('t-cur').textContent = fmt(t);
  document.getElementById('scrub-fill').style.width = (t / TIMELINE.duration * 100) + '%';
  document.getElementById('scrub').value = t;
  document.getElementById('tl-playhead').style.left = (t / TIMELINE.duration * 100) + '%';
}

function fmt(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

// ============================================================
// 播放
// ============================================================
let playing = true;
let virtualT = 0;
let lastWall = performance.now();

function tick(now) {
  if (playing) {
    const dt = (now - lastWall) / 1000;
    virtualT = (virtualT + dt) % TIMELINE.duration;
    renderAt(virtualT);
  }
  lastWall = now;
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// 播放控制
document.getElementById('play-btn').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? '⏸' : '▶';
});
document.getElementById('scrub').addEventListener('input', e => {
  virtualT = parseFloat(e.target.value);
  renderAt(virtualT);
});

// ============================================================
// 时间线轨道视图（底部）
// ============================================================
function buildTimelineView() {
  const labels = document.getElementById('labels');
  const area = document.getElementById('tracks-area');
  const TRACK_H = 100 / TIMELINE.tracks.length;

  TIMELINE.tracks.forEach((track, i) => {
    // label
    const lb = document.createElement('div');
    lb.className = 'track-label';
    lb.textContent = track.name;
    lb.style.color = track.color;
    labels.appendChild(lb);

    // row
    const row = document.createElement('div');
    row.className = 'track-row';
    row.style.top = (i * TRACK_H) + '%';
    row.style.height = TRACK_H + '%';
    area.appendChild(row);

    // clips
    track.clips.forEach(clip => {
      const el = document.createElement('div');
      el.className = 'tl-clip';
      const left = (clip.start / TIMELINE.duration * 100);
      const width = (clip.dur / TIMELINE.duration * 100);
      el.style.left = left + '%';
      el.style.width = width + '%';
      el.style.background = `linear-gradient(135deg, ${track.color}cc, ${track.color}55)`;
      el.style.borderLeft = `2px solid ${track.color}`;
      el.textContent = clip.scene + (clip.params?.text ? `: ${clip.params.text}` : '');
      row.appendChild(el);
    });
  });
}
buildTimelineView();

// ============================================================
// recorder 接口（可选）
// ============================================================
window.__onFrame = function(data) {
  renderAt(data.time);
};
