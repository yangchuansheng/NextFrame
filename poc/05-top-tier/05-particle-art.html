<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FLOW FIELD · GENERATIVE</title>
<style>
  :root {
    --ink: rgba(240, 238, 230, 0.78);
    --ink-dim: rgba(240, 238, 230, 0.38);
    --ink-faint: rgba(240, 238, 230, 0.18);
    --bg: #060709;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    cursor: crosshair;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
  }

  /* thin grain overlay for museum feel */
  #stage::after { content: ""; }

  .hud {
    position: fixed;
    z-index: 10;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 400;
    color: var(--ink);
    mix-blend-mode: screen;
    pointer-events: none;
    user-select: none;
  }

  .hud .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #ff6b4a;
    box-shadow: 0 0 8px #ff6b4a, 0 0 16px #ff6b4a80;
    vertical-align: middle;
    margin-right: 8px;
    animation: breathe 3.4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 1.0;  transform: scale(1.25); }
  }

  .tl { top: 28px; left: 32px; }
  .tr { top: 28px; right: 32px; text-align: right; color: var(--ink-dim); }
  .bl { bottom: 28px; left: 32px;  color: var(--ink-dim); }
  .br { bottom: 28px; right: 32px; color: var(--ink-faint); text-align: right; }

  .tl .line2 {
    display: block;
    margin-top: 6px;
    color: var(--ink-faint);
    letter-spacing: 0.28em;
    font-size: 9px;
  }

  .tr .line2,
  .bl .line2,
  .br .line2 {
    display: block;
    margin-top: 4px;
    font-size: 9px;
    color: var(--ink-faint);
  }

  /* vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 40%,
      rgba(0,0,0,0.35) 78%,
      rgba(0,0,0,0.78) 100%);
    mix-blend-mode: multiply;
  }

  /* subtle film grain */
  .grain {
    position: fixed;
    inset: -50%;
    pointer-events: none;
    z-index: 6;
    opacity: 0.06;
    mix-blend-mode: overlay;
    background-image:
      radial-gradient(rgba(255,255,255,.9) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    animation: grainShift 1.8s steps(6) infinite;
  }
  @keyframes grainShift {
    0%   { transform: translate(0,0); }
    20%  { transform: translate(-2%, 1%); }
    40%  { transform: translate(1%, -2%); }
    60%  { transform: translate(-1%, 2%); }
    80%  { transform: translate(2%, 1%); }
    100% { transform: translate(0,0); }
  }
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="vignette"></div>
  <div class="grain"></div>

  <div class="hud tl">
    <span class="dot"></span>FLOW FIELD · GENERATIVE
    <span class="line2">an infinite drawing</span>
  </div>
  <div class="hud tr">
    <span id="frameLabel">FRAME 0000</span>
    <span class="line2" id="particleLabel">0000 PARTICLES</span>
  </div>
  <div class="hud bl">
    v1.0 · PERLIN + CURL
    <span class="line2" id="seedLabel">SEED 00000</span>
  </div>
  <div class="hud br">
    <span id="paletteLabel">PALETTE · MIDNIGHT EMBER</span>
    <span class="line2">SILENT · LOOPING</span>
  </div>

<script>
/* ============================================================
   FLOW FIELD — generative particle drawing
   Perlin-ish 3D noise → 2D vector field → particle advection
   Motion blur by semi-transparent black fill each frame.
   Pure Canvas 2D. No libraries.
   ============================================================ */
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d', { alpha: false });

  // ---------- DPR + resize ----------
  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // paint base
    ctx.fillStyle = '#060709';
    ctx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- classic Perlin noise (Ken Perlin ref impl) ----------
  // 3D perlin so we can animate the field smoothly in Z (time).
  const perlin = (() => {
    const permutation = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
    const p = new Uint8Array(512);
    for (let i = 0; i < 512; i++) p[i] = permutation[i & 255];
    function fade(t){ return t*t*t*(t*(t*6-15)+10); }
    function lerp(t,a,b){ return a + t*(b-a); }
    function grad(hash,x,y,z){
      const h = hash & 15;
      const u = h < 8 ? x : y;
      const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
      return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
    }
    return function noise(x, y, z) {
      const X = Math.floor(x) & 255;
      const Y = Math.floor(y) & 255;
      const Z = Math.floor(z) & 255;
      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
      const u = fade(x), v = fade(y), w = fade(z);
      const A  = p[X]   + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
      const B  = p[X+1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
      return lerp(w,
        lerp(v,
          lerp(u, grad(p[AA],   x,   y,   z),
                   grad(p[BA],   x-1, y,   z)),
          lerp(u, grad(p[AB],   x,   y-1, z),
                   grad(p[BB],   x-1, y-1, z))),
        lerp(v,
          lerp(u, grad(p[AA+1], x,   y,   z-1),
                   grad(p[BA+1], x-1, y,   z-1)),
          lerp(u, grad(p[AB+1], x,   y-1, z-1),
                   grad(p[BB+1], x-1, y-1, z-1))));
    };
  })();

  // fractal brownian motion (layered noise) → richer structure
  function fbm(x, y, z) {
    let s = 0, amp = 1, freq = 1, norm = 0;
    for (let o = 0; o < 3; o++) {
      s += perlin(x * freq, y * freq, z * freq) * amp;
      norm += amp;
      amp  *= 0.55;
      freq *= 2.05;
    }
    return s / norm;
  }

  // ---------- palettes (curated, not rainbow) ----------
  // each palette is 5 stops; we sample along t ∈ [0,1].
  // hex strings → {r,g,b} in lerp-friendly form.
  function hex(c) {
    const n = parseInt(c.slice(1), 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }
  const PALETTES = [
    {
      name: 'MIDNIGHT EMBER',
      stops: ['#0a0f2c', '#1d2a6b', '#6a3c8c', '#d46a5f', '#ffc27a'].map(hex),
      accent: hex('#fff1c8'),
    },
    {
      name: 'GLACIER BLOOM',
      stops: ['#06121f', '#0f3a56', '#2a7a8a', '#7ecec6', '#e4f6ef'].map(hex),
      accent: hex('#ffe9c4'),
    },
    {
      name: 'IRON ORCHID',
      stops: ['#0b0811', '#3d1236', '#7a2368', '#d86aa0', '#ffd9cb'].map(hex),
      accent: hex('#ffd37a'),
    },
    {
      name: 'COPPER VEIL',
      stops: ['#08070a', '#2a1812', '#7a3a1e', '#e07b3a', '#f7d492'].map(hex),
      accent: hex('#9ed9ff'),
    },
  ];
  let palette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
  document.getElementById('paletteLabel').textContent = 'PALETTE · ' + palette.name;

  function sampleStops(stops, t) {
    t = Math.max(0, Math.min(1, t));
    const n = stops.length - 1;
    const i = Math.min(n - 1, Math.floor(t * n));
    const f = t * n - i;
    const a = stops[i], b = stops[i + 1];
    return {
      r: a.r + (b.r - a.r) * f,
      g: a.g + (b.g - a.g) * f,
      b: a.b + (b.b - a.b) * f,
    };
  }

  // ---------- particles ----------
  // count scales with viewport but clamps.
  function particleCount() {
    const area = W * H;
    const n = Math.floor(area / 180);
    return Math.max(3500, Math.min(12000, n));
  }

  let particles = [];
  function spawn(p) {
    // bias spawn: mostly uniform, but some concentrated near center for depth
    const r = Math.random();
    if (r < 0.22) {
      // center-biased
      const ang = Math.random() * Math.PI * 2;
      const rad = Math.pow(Math.random(), 0.6) * Math.min(W, H) * 0.45;
      p.x = W * 0.5 + Math.cos(ang) * rad;
      p.y = H * 0.5 + Math.sin(ang) * rad;
    } else {
      p.x = Math.random() * W;
      p.y = Math.random() * H;
    }
    p.px = p.x;
    p.py = p.y;
    p.life = 0;
    p.maxLife = 140 + Math.random() * 260;
    // depth layer: 0 (far, slow, dim) → 1 (near, fast, bright)
    p.z = Math.random();
    // each particle gets a fixed "color offset" so palette shifts across the field
    p.hueOffset = Math.random() * 0.35 - 0.175;
    p.speed = 0.5 + p.z * 1.6;
    p.alpha = 0.04 + p.z * 0.18;
    p.width = 0.3 + p.z * 1.2;
  }

  function rebuildParticles() {
    const target = particleCount();
    particles = new Array(target);
    for (let i = 0; i < target; i++) {
      particles[i] = {};
      spawn(particles[i]);
    }
    document.getElementById('particleLabel').textContent =
      String(target).padStart(4, '0') + ' PARTICLES';
  }
  rebuildParticles();
  window.addEventListener('resize', rebuildParticles);

  // ---------- random seed for label ----------
  const seed = Math.floor(Math.random() * 100000);
  document.getElementById('seedLabel').textContent =
    'SEED ' + String(seed).padStart(5, '0');

  // ---------- render loop ----------
  let frame = 0;
  const NOISE_SCALE = 0.0018;          // field spatial scale
  const NOISE_Z_SPEED = 0.00055;       // how fast field evolves
  const FIELD_ROT = 1.9 * Math.PI;     // max rotation angle per sample
  // motion blur: low-alpha black every frame
  const TRAIL_FADE = 'rgba(6, 7, 9, 0.055)';

  function tick() {
    frame++;

    // motion blur background
    ctx.fillStyle = TRAIL_FADE;
    ctx.fillRect(0, 0, W, H);

    // global "breathing" — field intensity oscillates
    const breath = 0.82 + Math.sin(frame * 0.0032) * 0.18;

    const z = frame * NOISE_Z_SPEED;

    // draw particles
    // batch by style for minor perf: we'll just draw per particle (Canvas 2D fast enough at 8k).
    ctx.lineCap = 'round';

    for (let i = 0, L = particles.length; i < L; i++) {
      const p = particles[i];

      // sample field
      const nx = p.x * NOISE_SCALE;
      const ny = p.y * NOISE_SCALE;
      const n = fbm(nx, ny, z);
      // map n (~[-1,1]) → angle
      const angle = n * FIELD_ROT + Math.PI * 0.25;

      const step = p.speed * breath;
      p.px = p.x;
      p.py = p.y;
      p.x += Math.cos(angle) * step;
      p.y += Math.sin(angle) * step;
      p.life++;

      // color: palette position from noise value + own offset
      const t = (n * 0.5 + 0.5) + p.hueOffset;
      const base = sampleStops(palette.stops, t);

      // accent sparkle on a few particles near bright palette stops
      let r = base.r, g = base.g, b = base.b;
      const isAccent = (p.z > 0.86 && t > 0.78);
      if (isAccent) {
        r = (r + palette.accent.r) * 0.5;
        g = (g + palette.accent.g) * 0.5;
        b = (b + palette.accent.b) * 0.5;
      }

      // depth-based alpha, with slight flicker on nearest layer
      let alpha = p.alpha;
      if (p.z > 0.7) alpha *= 0.85 + Math.sin((frame + i) * 0.06) * 0.15;

      ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha.toFixed(3)})`;
      ctx.lineWidth = p.width;
      ctx.beginPath();
      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();

      // bright accent halo for a few
      if (isAccent && Math.random() < 0.02) {
        ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},0.18)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.4 + p.z * 1.6, 0, Math.PI * 2);
        ctx.fill();
      }

      // respawn if out of bounds or life expired
      if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20 || p.life > p.maxLife) {
        spawn(p);
      }
    }

    // update HUD frame counter (every frame, cheap)
    if ((frame & 3) === 0) {
      document.getElementById('frameLabel').textContent =
        'FRAME ' + String(frame).padStart(4, '0');
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // click → re-seed palette + soft wipe
  canvas.addEventListener('click', () => {
    palette = PALETTES[(PALETTES.indexOf(palette) + 1) % PALETTES.length];
    document.getElementById('paletteLabel').textContent = 'PALETTE · ' + palette.name;
    // fade overlay to ease transition
    ctx.fillStyle = 'rgba(6,7,9,0.4)';
    ctx.fillRect(0, 0, W, H);
  });
})();
</script>
</body>
</html>
