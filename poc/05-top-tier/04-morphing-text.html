<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Words in Motion — Typography Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --ink: #f4f1ea;
    --accent: #ff5a1f;       /* a measured, editorial orange */
    --dim: #5a5852;
    --rule: #1a1915;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, "Helvetica Neue", sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    user-select: none;
  }

  /* ============================================================
     STAGE
     ============================================================ */
  .stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 42%, rgba(255, 90, 31, 0.045), transparent 55%),
      radial-gradient(ellipse at 50% 120%, rgba(255, 255, 255, 0.02), transparent 60%),
      var(--bg);
  }

  /* Dot-grid texture */
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 1.5px);
    background-size: 22px 22px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at 50% 50%, #000 40%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 50%, #000 40%, transparent 85%);
  }

  /* Subtle vignette */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  /* ============================================================
     FRAME CHROME
     ============================================================ */
  .chrome {
    position: fixed;
    inset: 28px;
    pointer-events: none;
    z-index: 20;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .chrome .tl { grid-row: 1; grid-column: 1; }
  .chrome .tr { grid-row: 1; grid-column: 2; text-align: right; }
  .chrome .bl { grid-row: 3; grid-column: 1; }
  .chrome .br { grid-row: 3; grid-column: 2; text-align: right; }

  .chrome .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    vertical-align: middle;
    margin-right: 8px;
    animation: blink 1.6s infinite;
  }
  @keyframes blink {
    0%, 55% { opacity: 1; }
    55.1%, 100% { opacity: 0.18; }
  }

  /* Corner brackets */
  .bracket {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1.2px solid rgba(244, 241, 234, 0.28);
    z-index: 21;
    pointer-events: none;
  }
  .bracket.tl { top: 22px; left: 22px; border-right: 0; border-bottom: 0; }
  .bracket.tr { top: 22px; right: 22px; border-left: 0; border-bottom: 0; }
  .bracket.bl { bottom: 22px; left: 22px; border-right: 0; border-top: 0; }
  .bracket.br { bottom: 22px; right: 22px; border-left: 0; border-top: 0; }

  /* ============================================================
     SCENE CONTAINER
     ============================================================ */
  .scene {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 260ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .scene.active { opacity: 1; pointer-events: auto; }

  /* Shared type base for the giant words */
  .mega {
    font-family: "Inter", sans-serif;
    font-weight: 900;
    font-size: clamp(72px, 14vw, 200px);
    line-height: 0.88;
    letter-spacing: -0.045em;
    color: var(--ink);
    text-align: center;
    font-variation-settings: "wght" 900, "opsz" 32;
  }

  /* ============================================================
     SCENE 1 — SPLIT TEXT (letters fly in with stagger)
     ============================================================ */
  #scene1 .word {
    display: inline-flex;
    gap: 0;
  }
  #scene1 .word span {
    display: inline-block;
    opacity: 0;
    transform: translate3d(var(--tx, 0), var(--ty, 120px), 0) rotate(var(--rot, 0deg));
    filter: blur(10px);
    will-change: transform, opacity, filter;
  }
  #scene1.active .word span {
    animation: split-in 900ms cubic-bezier(0.16, 1.02, 0.32, 1) forwards;
    animation-delay: var(--delay, 0ms);
  }
  @keyframes split-in {
    0% {
      opacity: 0;
      transform: translate3d(var(--tx, 0), var(--ty, 120px), 0) rotate(var(--rot, 0deg));
      filter: blur(10px);
    }
    60% {
      opacity: 1;
      filter: blur(0);
    }
    100% {
      opacity: 1;
      transform: translate3d(0, 0, 0) rotate(0deg);
      filter: blur(0);
    }
  }

  #scene1 .accent-bar {
    position: absolute;
    top: calc(50% + 110px);
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    transform-origin: left center;
    width: 260px;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 18px rgba(255, 90, 31, 0.5);
  }
  #scene1.active .accent-bar {
    animation: bar-in 700ms cubic-bezier(0.77, 0, 0.175, 1) 900ms forwards;
  }
  @keyframes bar-in {
    to { transform: translateX(-50%) scaleX(1); }
  }

  /* ============================================================
     SCENE 2 — CLIP-PATH REVEAL (slices open horizontally)
     ============================================================ */
  #scene2 .reveal-wrap {
    position: relative;
    text-align: center;
  }
  #scene2 .reveal {
    font-family: "Fraunces", "Times New Roman", serif;
    font-weight: 300;
    font-variation-settings: "wght" 250, "opsz" 144;
    font-size: clamp(58px, 10vw, 150px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    font-style: italic;
    color: var(--ink);
    clip-path: inset(0 100% 0 0);
    -webkit-clip-path: inset(0 100% 0 0);
  }
  #scene2.active .reveal {
    animation: reveal-sweep 1200ms cubic-bezier(0.77, 0, 0.175, 1) forwards;
  }
  @keyframes reveal-sweep {
    0%   { clip-path: inset(0 100% 0 0); -webkit-clip-path: inset(0 100% 0 0); }
    100% { clip-path: inset(0 0 0 0);    -webkit-clip-path: inset(0 0 0 0); }
  }

  #scene2 .line {
    position: absolute;
    height: 1px;
    background: var(--accent);
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    transform-origin: left center;
    width: 0;
  }
  #scene2 .line.top    { top: -42px; }
  #scene2 .line.bottom { bottom: -42px; }
  #scene2.active .line {
    animation: line-draw 900ms cubic-bezier(0.77, 0, 0.175, 1) 200ms forwards;
  }
  @keyframes line-draw {
    to { width: 100%; transform: translateX(-50%) scaleX(1); }
  }

  #scene2 .kicker {
    position: absolute;
    top: -78px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--accent);
    opacity: 0;
  }
  #scene2.active .kicker {
    animation: kicker-in 600ms cubic-bezier(0.22, 1, 0.36, 1) 400ms forwards;
  }
  @keyframes kicker-in {
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Black sweep over text at end of scene 2 for a seamless exit */
  #scene2 .sweeper {
    position: absolute;
    inset: -80px -60px;
    background: var(--bg);
    clip-path: inset(0 100% 0 0);
    -webkit-clip-path: inset(0 100% 0 0);
    pointer-events: none;
  }

  /* ============================================================
     SCENE 3 — STROKE DRAW (SVG paths drawing letter by letter)
     ============================================================ */
  #scene3 svg {
    width: min(88vw, 1200px);
    height: auto;
    overflow: visible;
  }
  #scene3 .stroke-letter {
    fill: transparent;
    stroke: var(--ink);
    stroke-width: 1.4;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 4000;
    stroke-dashoffset: 4000;
  }
  #scene3.active .stroke-letter {
    animation: stroke-draw 1700ms cubic-bezier(0.77, 0, 0.175, 1) forwards,
               stroke-fill 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 150ms, 1750ms;
  }
  @keyframes stroke-draw {
    to { stroke-dashoffset: 0; }
  }
  @keyframes stroke-fill {
    0%   { fill: transparent; stroke-width: 1.4; }
    100% { fill: var(--ink); stroke-width: 0.4; }
  }

  #scene3 .stroke-accent {
    fill: transparent;
    stroke: var(--accent);
    stroke-width: 1.2;
    stroke-dasharray: 800;
    stroke-dashoffset: 800;
  }
  #scene3.active .stroke-accent {
    animation: stroke-accent-draw 900ms cubic-bezier(0.77, 0, 0.175, 1) 1900ms forwards;
  }
  @keyframes stroke-accent-draw {
    to { stroke-dashoffset: 0; }
  }

  #scene3 .meta-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    fill: var(--dim);
    opacity: 0;
  }
  #scene3.active .meta-label {
    animation: meta-in 600ms cubic-bezier(0.22, 1, 0.36, 1) 2300ms forwards;
  }
  @keyframes meta-in { to { opacity: 1; } }

  /* ============================================================
     SCENE 4 — VARIABLE WEIGHT WAVE (breathing)
     ============================================================ */
  #scene4 .wave-word {
    display: inline-flex;
    align-items: baseline;
    font-family: "Inter", sans-serif;
    font-size: clamp(70px, 13vw, 180px);
    line-height: 0.9;
    letter-spacing: -0.035em;
    color: var(--ink);
  }
  #scene4 .wave-word span {
    display: inline-block;
    font-variation-settings: "wght" 100;
    transition: font-variation-settings 80ms linear;
    will-change: font-variation-settings, transform;
    transform: translateY(0);
  }

  #scene4.active .wave-word span {
    animation: breathe 2600ms cubic-bezier(0.45, 0, 0.55, 1) infinite;
    animation-delay: var(--wdelay, 0ms);
  }
  @keyframes breathe {
    0%, 100% { font-variation-settings: "wght" 120; transform: translateY(0); }
    50%      { font-variation-settings: "wght" 900; transform: translateY(-4px); }
  }

  #scene4 .caption {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--accent);
    opacity: 0;
  }
  #scene4.active .caption {
    animation: cap-in 700ms cubic-bezier(0.22, 1, 0.36, 1) 500ms forwards;
  }
  @keyframes cap-in { to { opacity: 0.9; } }

  /* ============================================================
     SCENE 5 — GLITCH / RGB SPLIT
     ============================================================ */
  #scene5 .glitch {
    position: relative;
    display: inline-block;
    font-family: "Inter", sans-serif;
    font-weight: 900;
    font-variation-settings: "wght" 900;
    font-size: clamp(80px, 15vw, 200px);
    letter-spacing: -0.055em;
    line-height: 0.9;
    color: transparent; /* base gives size; layers render the visible text */
  }
  #scene5 .glitch .base {
    visibility: hidden;
  }
  #scene5 .glitch .layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    mix-blend-mode: screen;
    white-space: nowrap;
  }
  #scene5 .glitch .r { color: #ff0044; }
  #scene5 .glitch .c { color: #00d4ff; }
  #scene5 .glitch .w { color: var(--ink); }

  #scene5.active .r { animation: rgb-r 2.4s infinite cubic-bezier(0.86, 0, 0.07, 1); }
  #scene5.active .c { animation: rgb-c 2.4s infinite cubic-bezier(0.86, 0, 0.07, 1); }
  #scene5.active .w { animation: rgb-w 2.4s infinite cubic-bezier(0.86, 0, 0.07, 1); }

  @keyframes rgb-r {
    0%, 100% { transform: translate(1.5px, 0); clip-path: inset(0 0 0 0); }
    20%      { transform: translate(-4px, 2px); clip-path: inset(40% 0 10% 0); }
    22%      { transform: translate(3px, -1px); clip-path: inset(0 0 70% 0); }
    40%      { transform: translate(-2px, 0); clip-path: inset(0 0 0 0); }
    60%      { transform: translate(5px, 1px); clip-path: inset(55% 0 10% 0); }
    62%      { transform: translate(-3px, 0); clip-path: inset(0 0 0 0); }
  }
  @keyframes rgb-c {
    0%, 100% { transform: translate(-1.5px, 0); clip-path: inset(0 0 0 0); }
    20%      { transform: translate(4px, -2px); clip-path: inset(10% 0 40% 0); }
    22%      { transform: translate(-3px, 1px); clip-path: inset(70% 0 0 0); }
    40%      { transform: translate(2px, 0); clip-path: inset(0 0 0 0); }
    60%      { transform: translate(-5px, -1px); clip-path: inset(10% 0 55% 0); }
    62%      { transform: translate(3px, 0); clip-path: inset(0 0 0 0); }
  }
  @keyframes rgb-w {
    0%, 100% { transform: translate(0, 0); }
    20%      { transform: translate(0, 1px) skewX(-3deg); }
    22%      { transform: translate(0, -1px); }
    60%      { transform: translate(0, 1px) skewX(2deg); }
    62%      { transform: translate(0, 0); }
  }

  /* Slice bands */
  #scene5 .slice {
    position: absolute;
    left: -30vw; right: -30vw;
    height: 8px;
    background: rgba(244, 241, 234, 0.08);
    mix-blend-mode: difference;
    pointer-events: none;
    opacity: 0;
  }
  #scene5.active .slice.s1 { animation: slice-flash 2.4s infinite; top: 38%; }
  #scene5.active .slice.s2 { animation: slice-flash 2.4s infinite 1.2s; top: 62%; height: 3px; }
  @keyframes slice-flash {
    0%, 18%, 24%, 100% { opacity: 0; }
    20%, 22% { opacity: 1; }
  }

  /* ============================================================
     SCENE 6 — TEXT ON CURVED PATH
     ============================================================ */
  #scene6 svg {
    width: min(92vw, 1200px);
    height: auto;
    overflow: visible;
  }
  #scene6 .curve-text {
    font-family: "Fraunces", serif;
    font-variation-settings: "wght" 700, "opsz" 144;
    font-size: 64px;
    letter-spacing: 0.08em;
    fill: var(--ink);
  }
  #scene6 .curve-text-accent {
    font-family: "JetBrains Mono", monospace;
    font-size: 18px;
    letter-spacing: 0.5em;
    fill: var(--accent);
  }

  #scene6 .guide {
    fill: none;
    stroke: rgba(244, 241, 234, 0.14);
    stroke-width: 0.8;
    stroke-dasharray: 3 5;
  }

  #scene6 .center-dot {
    fill: var(--accent);
  }

  /* Rotation handled via SVG <animateTransform> for reliable
     SVG-user-space rotation origin. */

  #scene6 .text-fade {
    opacity: 0;
  }
  #scene6.active .text-fade {
    animation: fade-up 900ms cubic-bezier(0.22, 1, 0.36, 1) 150ms forwards;
  }
  @keyframes fade-up {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ============================================================
     SCENE LABEL (bottom center)
     ============================================================ */
  .scene-label {
    position: fixed;
    bottom: 64px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink);
    z-index: 30;
  }
  .scene-label .num {
    color: var(--accent);
    font-weight: 500;
  }
  .scene-label .sep {
    width: 28px;
    height: 1px;
    background: var(--dim);
  }
  .scene-label .name {
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 400ms cubic-bezier(0.22, 1, 0.36, 1), transform 400ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .scene-label .name.on {
    opacity: 1;
    transform: translateY(0);
  }

  /* Scene progress segments */
  .progress {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 30;
  }
  .progress .seg {
    width: 30px;
    height: 2px;
    background: rgba(244, 241, 234, 0.12);
    position: relative;
    overflow: hidden;
  }
  .progress .seg.on::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform-origin: left;
    animation: seg-fill linear forwards;
  }
  @keyframes seg-fill {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* ============================================================
     FLASH TRANSITION
     ============================================================ */
  .flash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 40;
    pointer-events: none;
    clip-path: inset(0 0 100% 0);
    -webkit-clip-path: inset(0 0 100% 0);
  }
  .flash.sweep {
    animation: flash-sweep 600ms cubic-bezier(0.77, 0, 0.175, 1);
  }
  @keyframes flash-sweep {
    0%   { clip-path: inset(0 0 100% 0); -webkit-clip-path: inset(0 0 100% 0); }
    50%  { clip-path: inset(0 0 0 0);    -webkit-clip-path: inset(0 0 0 0); }
    100% { clip-path: inset(100% 0 0 0); -webkit-clip-path: inset(100% 0 0 0); }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- chrome -->
  <span class="bracket tl"></span>
  <span class="bracket tr"></span>
  <span class="bracket bl"></span>
  <span class="bracket br"></span>

  <div class="chrome">
    <div class="tl"><span class="dot"></span>WORDS IN MOTION</div>
    <div class="tr">VOL. 01 &nbsp;/&nbsp; TYPOGRAPHY</div>
    <div class="bl">A STUDY OF SIX MOVEMENTS</div>
    <div class="br">LOOP &middot; 24S</div>
  </div>

  <!-- progress -->
  <div class="progress" id="progress"></div>

  <!-- SCENE 1: SPLIT TEXT -->
  <div class="scene" id="scene1">
    <div style="position:relative;">
      <div class="mega word" id="word1" aria-label="HORIZON"></div>
      <div class="accent-bar"></div>
    </div>
  </div>

  <!-- SCENE 2: CLIP-PATH REVEAL -->
  <div class="scene" id="scene2">
    <div class="reveal-wrap">
      <div class="kicker">&mdash; A QUIET REVELATION &mdash;</div>
      <div class="line top"></div>
      <div class="reveal">design in motion</div>
      <div class="line bottom"></div>
    </div>
  </div>

  <!-- SCENE 3: STROKE DRAW (SVG) -->
  <div class="scene" id="scene3">
    <svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
      <text x="600" y="260" text-anchor="middle"
            class="stroke-letter"
            style="font-family: Fraunces, 'Times New Roman', serif; font-weight: 900; font-size: 240px; font-style: italic; font-variation-settings: 'wght' 900, 'opsz' 144;"
            >drawn</text>
      <path class="stroke-accent"
            d="M 280 310 L 920 310" />
      <text class="meta-label" x="600" y="360" text-anchor="middle">
        &mdash; TRACED IN 1.7s &mdash;
      </text>
    </svg>
  </div>

  <!-- SCENE 4: VARIABLE WEIGHT WAVE -->
  <div class="scene" id="scene4">
    <div class="wave-word" id="wave4" aria-label="TYPOGRAPHY"></div>
    <div class="caption">&#9670; BREATHING &middot; 100 &rarr; 900 &#9670;</div>
  </div>

  <!-- SCENE 5: GLITCH -->
  <div class="scene" id="scene5">
    <div class="glitch">
      <span class="base">FRACTURE</span>
      <span class="layer r">FRACTURE</span>
      <span class="layer c">FRACTURE</span>
      <span class="layer w">FRACTURE</span>
      <span class="slice s1"></span>
      <span class="slice s2"></span>
    </div>
  </div>

  <!-- SCENE 6: TEXT ON PATH -->
  <div class="scene" id="scene6">
    <svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Outer circle for rotating accent text -->
        <path id="outerCircle" d="M 600,340 m -300,0 a 300,300 0 1,1 600,0 a 300,300 0 1,1 -600,0" />
        <!-- Inner circle for body text -->
        <path id="innerCircle" d="M 600,340 m -220,0 a 220,220 0 1,1 440,0 a 220,220 0 1,1 -440,0" />
      </defs>

      <!-- guide rings -->
      <g class="text-fade">
        <circle class="guide" cx="600" cy="340" r="300" />
        <circle class="guide" cx="600" cy="340" r="220" />
        <circle class="guide" cx="600" cy="340" r="6" fill="#ff5a1f" stroke="none" />
      </g>

      <!-- rotating accent text (outer) -->
      <g class="text-fade">
        <g>
          <animateTransform attributeName="transform"
                            type="rotate"
                            from="0 600 340"
                            to="360 600 340"
                            dur="18s"
                            repeatCount="indefinite" />
          <text class="curve-text-accent">
            <textPath href="#outerCircle" startOffset="0">
              &#9670; ORBITING TYPOGRAPHY &nbsp;&middot;&nbsp; WORDS IN MOTION &nbsp;&middot;&nbsp; VOL. 01 &nbsp;&middot;&nbsp; TYPE AS OBJECT &nbsp;&middot;&nbsp;
            </textPath>
          </text>
        </g>
      </g>

      <!-- static centered word label on inner path -->
      <g class="text-fade">
        <text class="curve-text" text-anchor="middle">
          <textPath href="#innerCircle" startOffset="25%">GRAVITY</textPath>
        </text>
      </g>
    </svg>
  </div>

  <!-- scene label -->
  <div class="scene-label">
    <span class="num" id="labelNum">01</span>
    <span class="sep"></span>
    <span class="name" id="labelName">SPLIT TEXT</span>
  </div>

  <!-- transition flash -->
  <div class="flash" id="flash"></div>

</div>

<script>
(function() {
  // ========================================================
  // SCENE DEFINITIONS
  // ========================================================
  const SCENES = [
    { id: "scene1", label: "SPLIT TEXT",       duration: 3800 },
    { id: "scene2", label: "CLIP REVEAL",      duration: 3600 },
    { id: "scene3", label: "STROKE DRAW",      duration: 4000 },
    { id: "scene4", label: "WEIGHT WAVE",      duration: 3800 },
    { id: "scene5", label: "RGB FRACTURE",     duration: 3600 },
    { id: "scene6", label: "ORBIT PATH",       duration: 4200 },
  ];

  // ========================================================
  // SCENE 1: Build split-text letters with random entry dirs
  // ========================================================
  const WORD1 = "HORIZON";
  const word1El = document.getElementById("word1");
  // pre-baked entry vectors for a controlled composition
  const dirs = [
    [  0, -160, -8 ],
    [-70,  130,  6 ],
    [ 40, -130,  4 ],
    [ -50, 140, -6 ],
    [ 80, -150,  8 ],
    [ -60,-130, -4 ],
    [ 30,  150,  6 ],
  ];
  for (let i = 0; i < WORD1.length; i++) {
    const s = document.createElement("span");
    s.textContent = WORD1[i];
    const d = dirs[i % dirs.length];
    s.style.setProperty("--tx", d[0] + "px");
    s.style.setProperty("--ty", d[1] + "px");
    s.style.setProperty("--rot", d[2] + "deg");
    s.style.setProperty("--delay", (i * 70) + "ms");
    word1El.appendChild(s);
  }

  // ========================================================
  // SCENE 4: Build weight-wave letters with phase delays
  // ========================================================
  const WORD4 = "TYPOGRAPHY";
  const wave4 = document.getElementById("wave4");
  for (let i = 0; i < WORD4.length; i++) {
    const s = document.createElement("span");
    s.textContent = WORD4[i];
    // phase delay so wave sweeps across
    s.style.setProperty("--wdelay", (-i * 180) + "ms");
    wave4.appendChild(s);
  }

  // ========================================================
  // Progress segments
  // ========================================================
  const progEl = document.getElementById("progress");
  SCENES.forEach(() => {
    const seg = document.createElement("div");
    seg.className = "seg";
    progEl.appendChild(seg);
  });
  const segs = progEl.querySelectorAll(".seg");

  const labelNum  = document.getElementById("labelNum");
  const labelName = document.getElementById("labelName");
  const flashEl   = document.getElementById("flash");

  let current = -1;
  let flashTimer = null;

  function setLabel(i) {
    const s = SCENES[i];
    labelNum.textContent = String(i + 1).padStart(2, "0");
    labelName.classList.remove("on");
    labelName.textContent = s.label;
    // trigger reflow then fade in
    void labelName.offsetWidth;
    labelName.classList.add("on");
  }

  function activateScene(i) {
    // Deactivate all scenes to stop + reset their CSS animations.
    SCENES.forEach((s) => {
      const el = document.getElementById(s.id);
      el.classList.remove("active");
    });
    // Reset progress segments.
    segs.forEach((seg) => {
      seg.classList.remove("on");
    });
    // Force reflow so removed classes take effect before re-adding.
    void document.body.offsetWidth;

    requestAnimationFrame(() => {
      const el = document.getElementById(SCENES[i].id);
      el.classList.add("active");
      segs[i].style.setProperty("--dur", SCENES[i].duration + "ms");
      segs[i].classList.add("on");
    });
  }

  function doFlash() {
    flashEl.classList.remove("sweep");
    void flashEl.offsetWidth;
    flashEl.classList.add("sweep");
  }

  function advance() {
    current = (current + 1) % SCENES.length;
    setLabel(current);
    doFlash();
    // Activate scene at midpoint of flash sweep so the stage is briefly black
    setTimeout(() => activateScene(current), 300);
    // schedule next
    flashTimer = setTimeout(advance, SCENES[current].duration);
  }

  // Set per-segment animation duration via CSS variable
  const style = document.createElement("style");
  style.textContent = `
    .progress .seg.on::before { animation-duration: var(--dur, 3600ms); }
  `;
  document.head.appendChild(style);

  // Kickoff
  window.addEventListener("load", () => {
    // initial state: start first scene without pre-flash so we see the entry
    current = 0;
    setLabel(0);
    activateScene(0);
    flashTimer = setTimeout(advance, SCENES[0].duration);
  });
})();
</script>
</body>
</html>
