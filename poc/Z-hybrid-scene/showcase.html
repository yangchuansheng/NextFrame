<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NextFrame Showcase — All Technologies</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif; overflow: hidden; }

  /* ===== 视频画框：居中，保持比例 ===== */
  #viewport {
    position: relative;
    background: #05050c;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(100, 80, 200, 0.15);
  }

  /* ===== Track 层 ===== */
  .track { position: absolute; inset: 0; pointer-events: none; }
  .clip { position: absolute; inset: 0; display: none; }
  .clip.active { display: block; }

  /* ===== 比例选择器 ===== */
  #ratio-bar {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10000;
  }
  #ratio-bar button {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.5); padding: 5px 14px; border-radius: 20px; cursor: pointer;
    font: 12px "SF Mono", monospace; transition: all 0.2s;
  }
  #ratio-bar button.active { background: rgba(167,139,250,0.2); border-color: rgba(167,139,250,0.5); color: #fff; }

  /* ===== 时间控制 ===== */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 20px; background: rgba(0,0,0,0.95);
    display: flex; align-items: center; gap: 12px;
    font: 13px -apple-system, sans-serif; color: #aaa; z-index: 10000;
  }
  #controls button { background: #222; border: 1px solid #444; color: #fff; padding: 5px 14px; border-radius: 4px; cursor: pointer; }
  #controls input[type=range] { flex: 1; accent-color: #a78bfa; }
  .ctrl-time { min-width: 80px; text-align: right; font: 12px "SF Mono", monospace; }
  .ctrl-info { font-size: 11px; color: #555; }

  /* ===== WebGL canvas ===== */
  #webgl-canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<!-- 比例选择 -->
<div id="ratio-bar">
  <button data-ratio="16:9" data-w="1920" data-h="1080" class="active">16:9</button>
  <button data-ratio="4:3" data-w="1440" data-h="1080">4:3</button>
  <button data-ratio="9:16" data-w="608" data-h="1080">9:16</button>
  <button data-ratio="1:1" data-w="1080" data-h="1080">1:1</button>
  <button data-ratio="4K" data-w="3840" data-h="2160">4K 16:9</button>
</div>

<!-- ===== 视频画框 ===== -->
<div id="viewport">

  <!-- ====== Track 0: WebGL 着色器背景 (z:0) ====== -->
  <div class="track" style="z-index:0">
    <div class="clip active" data-clip-id="webgl-bg" data-start="0" data-dur="15">
      <canvas id="webgl-canvas"></canvas>
    </div>
  </div>

  <!-- ====== Track 1: Canvas 2D 粒子层 (z:1, blend:screen) ====== -->
  <div class="track" style="z-index:1">
    <div class="clip" data-clip-id="particles" data-start="0" data-dur="15" data-blend="screen">
      <canvas id="particle-canvas" style="width:100%;height:100%;display:block"></canvas>
    </div>
  </div>

  <!-- ====== Track 2: SVG 数据可视化 (z:2, blend:screen) ====== -->
  <div class="track" style="z-index:2">
    <div class="clip" data-clip-id="svg-viz" data-start="1" data-dur="14" data-blend="screen"
         data-effect-enter="fadeIn:0.8">
      <svg id="svg-layer" viewBox="0 0 1920 1080" style="width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6ee7ff" stop-opacity="0"/>
            <stop offset="30%" stop-color="#6ee7ff" stop-opacity="0.7"/>
            <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="lg2" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#6ee7ff" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
        </defs>
        <!-- 旋转环 -->
        <g id="svg-rings" opacity="0.5">
          <circle cx="960" cy="400" r="200" fill="none" stroke="rgba(110,231,255,0.1)" stroke-width="0.8"/>
          <circle cx="960" cy="400" r="240" fill="none" stroke="rgba(167,139,250,0.07)" stroke-width="0.5" stroke-dasharray="5 10"/>
          <circle cx="960" cy="400" r="160" fill="none" stroke="rgba(244,114,182,0.05)" stroke-width="0.5" stroke-dasharray="2 8"/>
        </g>
        <!-- 数据曲线 -->
        <path id="svg-curve" fill="none" stroke="url(#lg1)" stroke-width="2" filter="url(#glow)"/>
        <!-- 面积图 -->
        <path id="svg-area" fill="url(#lg2)" opacity="0.3"/>
        <!-- 数据点 -->
        <g id="svg-dots"></g>
        <!-- 柱状图 -->
        <g id="svg-bars"></g>
      </svg>
    </div>
  </div>

  <!-- ====== Track 3: DOM 主标题 (z:3) ====== -->
  <div class="track" style="z-index:3">
    <div class="clip" data-clip-id="headline" data-start="0.5" data-dur="6"
         data-effect-enter="fadeIn:0.8" data-effect-exit="fadeOut:0.5">
      <div id="headline-container" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div id="main-title" style="font-weight:900;letter-spacing:-4px;line-height:1;text-align:center;
                    background:linear-gradient(135deg,#6ee7ff 0%,#a78bfa 30%,#f472b6 60%,#fb923c 100%);
                    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                    filter:drop-shadow(0 0 50px rgba(167,139,250,0.25))">
          NextFrame
        </div>
        <div id="sub-title" style="margin-top:16px;font-weight:500;
                    font-family:'SF Mono',Menlo,monospace;color:rgba(200,190,255,0.5);
                    letter-spacing:5px;text-transform:uppercase">
          AI-Native Video Editor
        </div>
      </div>
    </div>
  </div>

  <!-- ====== Track 4: DOM 功能卡片 (z:4) ====== -->
  <div class="track" style="z-index:4">
    <div class="clip" data-clip-id="cards" data-start="2" data-dur="8"
         data-effect-enter="slideUp:1">
      <div id="cards-container" style="position:absolute;bottom:15%;left:50%;transform:translateX(-50%);display:flex;gap:20px">
        <div class="card-item" data-delay="0" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
                    border-radius:16px;padding:28px 24px;text-align:center;backdrop-filter:blur(20px);min-width:160px">
          <div style="font-size:28px;margin-bottom:8px">🎨</div>
          <div style="font-size:28px;font-weight:800;color:#fff">Canvas</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:6px">渐变 · 粒子</div>
        </div>
        <div class="card-item" data-delay="1" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
                    border-radius:16px;padding:28px 24px;text-align:center;backdrop-filter:blur(20px);min-width:160px">
          <div style="font-size:28px;margin-bottom:8px">📝</div>
          <div style="font-size:28px;font-weight:800;color:#fff">DOM</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:6px">文字 · 排版</div>
        </div>
        <div class="card-item" data-delay="2" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
                    border-radius:16px;padding:28px 24px;text-align:center;backdrop-filter:blur(20px);min-width:160px">
          <div style="font-size:28px;margin-bottom:8px">📐</div>
          <div style="font-size:28px;font-weight:800;color:#fff">SVG</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:6px">图表 · 矢量</div>
        </div>
        <div class="card-item" data-delay="3" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
                    border-radius:16px;padding:28px 24px;text-align:center;backdrop-filter:blur(20px);min-width:160px">
          <div style="font-size:28px;margin-bottom:8px">🔮</div>
          <div style="font-size:28px;font-weight:800;color:#fff">WebGL</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:6px">着色器 · 3D</div>
        </div>
        <div class="card-item" data-delay="4" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
                    border-radius:16px;padding:28px 24px;text-align:center;backdrop-filter:blur(20px);min-width:160px">
          <div style="font-size:28px;margin-bottom:8px">🎬</div>
          <div style="font-size:28px;font-weight:800;color:#fff">Video</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:6px">媒体 · 图片</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== Track 5: DOM 角标 + 角落 (z:5) ====== -->
  <div class="track" style="z-index:5">
    <div class="clip active" data-clip-id="chrome" data-start="0" data-dur="15" data-effect-enter="fadeIn:0.4">
      <div style="position:absolute;top:32px;left:36px;display:flex;align-items:center;gap:8px">
        <div style="width:8px;height:8px;background:#a78bfa;border-radius:50%;box-shadow:0 0 10px rgba(167,139,250,0.6)"></div>
        <span style="font:600 13px -apple-system,sans-serif;color:rgba(255,255,255,0.4);letter-spacing:2px">NEXTFRAME</span>
      </div>
      <div style="position:absolute;top:32px;right:36px;display:flex;align-items:center;gap:10px">
        <span style="background:linear-gradient(135deg,#ef4444,#ec4899);color:#fff;font:700 12px -apple-system,sans-serif;padding:4px 12px;border-radius:5px;letter-spacing:1px">SHOWCASE</span>
        <span style="color:rgba(255,255,255,0.4);font:12px 'SF Mono',monospace" id="ratio-label">16:9</span>
      </div>
      <!-- 角落线 -->
      <div style="position:absolute;top:20px;left:20px;width:28px;height:28px;border-top:1px solid rgba(255,255,255,0.08);border-left:1px solid rgba(255,255,255,0.08)"></div>
      <div style="position:absolute;top:20px;right:20px;width:28px;height:28px;border-top:1px solid rgba(255,255,255,0.08);border-right:1px solid rgba(255,255,255,0.08)"></div>
      <div style="position:absolute;bottom:20px;left:20px;width:28px;height:28px;border-bottom:1px solid rgba(255,255,255,0.08);border-left:1px solid rgba(255,255,255,0.08)"></div>
      <div style="position:absolute;bottom:20px;right:20px;width:28px;height:28px;border-bottom:1px solid rgba(255,255,255,0.08);border-right:1px solid rgba(255,255,255,0.08)"></div>
      <!-- 时间码 -->
      <div style="position:absolute;bottom:28px;right:36px;font:11px 'SF Mono',monospace;color:rgba(255,255,255,0.2)" id="timecode">00:00:00.000</div>
    </div>
  </div>

  <!-- ====== Track 6: DOM 技术标签弹幕 (z:6) ====== -->
  <div class="track" style="z-index:6">
    <div class="clip" data-clip-id="tech-tags" data-start="7" data-dur="8" data-effect-enter="fadeIn:1">
      <div id="tag-container" style="position:absolute;inset:0;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:12px;padding:20%">
      </div>
    </div>
  </div>

</div>

<script>
// ===== 全局状态 =====
const DURATION = 15;
let VW = 1920, VH = 1080;
const viewport = document.getElementById('viewport');

// ===== 比例切换 =====
function setRatio(w, h, label) {
  VW = w; VH = h;
  const maxW = window.innerWidth * 0.88;
  const maxH = (window.innerHeight - 80) * 0.88;
  const scale = Math.min(maxW / w, maxH / h);
  viewport.style.width = w + 'px';
  viewport.style.height = h + 'px';
  viewport.style.transform = `scale(${scale})`;
  viewport.style.transformOrigin = 'center center';

  // 更新 canvas 尺寸
  const pc = document.getElementById('particle-canvas');
  pc.width = w; pc.height = h;
  const wc = document.getElementById('webgl-canvas');
  wc.width = w; wc.height = h;
  initWebGL(wc);

  // 更新 SVG viewBox
  document.getElementById('svg-layer').setAttribute('viewBox', `0 0 ${w} ${h}`);

  // 更新字号
  const titleSize = Math.min(w, h) * 0.1;
  document.getElementById('main-title').style.fontSize = titleSize + 'px';
  document.getElementById('sub-title').style.fontSize = Math.max(14, titleSize * 0.18) + 'px';

  document.getElementById('ratio-label').textContent = label;
  document.querySelectorAll('#ratio-bar button').forEach(b => b.classList.toggle('active', b.dataset.ratio === label));
}

document.querySelectorAll('#ratio-bar button').forEach(btn => {
  btn.addEventListener('click', () => setRatio(+btn.dataset.w, +btn.dataset.h, btn.dataset.ratio));
});

// ===== WebGL 着色器背景 =====
let gl, glProgram, glTimeUniform, glResUniform;
function initWebGL(canvas) {
  gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`);
  gl.compileShader(vs);
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;
    void main(){
      vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
      uv.x*=u_res.x/u_res.y;
      float d1=length(uv-vec2(sin(u_time*0.15)*0.6,cos(u_time*0.12)*0.3));
      float d2=length(uv-vec2(cos(u_time*0.18)*0.5,-sin(u_time*0.14)*0.4));
      float d3=length(uv-vec2(-cos(u_time*0.1)*0.4,sin(u_time*0.2)*0.3));
      vec3 c1=vec3(0.25,0.1,0.45)*exp(-d1*2.2);
      vec3 c2=vec3(0.4,0.05,0.25)*exp(-d2*2.5);
      vec3 c3=vec3(0.05,0.15,0.35)*exp(-d3*3.0);
      vec3 col=c1+c2+c3+vec3(0.02,0.02,0.04);
      gl_FragColor=vec4(col,1.0);
    }
  `);
  gl.compileShader(fs);
  glProgram = gl.createProgram();
  gl.attachShader(glProgram, vs); gl.attachShader(glProgram, fs);
  gl.linkProgram(glProgram); gl.useProgram(glProgram);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(glProgram, 'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  glTimeUniform = gl.getUniformLocation(glProgram, 'u_time');
  glResUniform = gl.getUniformLocation(glProgram, 'u_res');
}

function renderWebGL(t) {
  if (!gl) return;
  gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
  gl.uniform1f(glTimeUniform, t);
  gl.uniform2f(glResUniform, gl.canvas.width, gl.canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ===== Canvas 2D 粒子 =====
const particles = Array.from({length:100}, () => ({
  x: Math.random(), y: Math.random(),
  vx: (Math.random()-0.5)*0.0003, vy: (Math.random()-0.5)*0.0002,
  r: Math.random()*1.5+0.3, hue: 240+Math.random()*80, alpha: Math.random()*0.3+0.05,
}));

function renderParticles(t) {
  const c = document.getElementById('particle-canvas');
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.clearRect(0, 0, w, h);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x<0) p.x=1; if (p.x>1) p.x=0;
    if (p.y<0) p.y=1; if (p.y>1) p.y=0;
    ctx.beginPath();
    ctx.arc(p.x*w, p.y*h, p.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${p.hue},60%,70%,${p.alpha*(0.5+0.5*Math.sin(t*2+p.hue))})`;
    ctx.fill();
  }
}

// ===== SVG 数据动画 =====
function renderSVG(t) {
  const w = VW, h = VH;
  // 环旋转
  const rings = document.getElementById('svg-rings');
  if (rings) {
    rings.children[0].setAttribute('transform', `rotate(${t*14} ${w/2} ${h*0.37})`);
    rings.children[1].setAttribute('transform', `rotate(${-t*10} ${w/2} ${h*0.37})`);
    rings.children[2].setAttribute('transform', `rotate(${t*20} ${w/2} ${h*0.37})`);
    // 更新中心点
    for (const c of rings.children) { c.setAttribute('cx', w/2); c.setAttribute('cy', h*0.37); }
  }
  // 数据曲线
  const pts = [];
  for (let i = 0; i <= 20; i++) {
    const x = (i/20) * w;
    const y = h*0.75 + Math.sin(i*0.8+t*1.5)*h*0.05 + Math.cos(i*0.5+t*0.8)*h*0.03;
    pts.push([x, y]);
  }
  const d = 'M' + pts.map(p => p.join(',')).join(' L');
  document.getElementById('svg-curve').setAttribute('d', d);
  document.getElementById('svg-area').setAttribute('d', d + ` L${w},${h} L0,${h} Z`);

  // 数据点
  const dotsG = document.getElementById('svg-dots');
  dotsG.innerHTML = '';
  for (let i = 2; i < pts.length; i += 3) {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pts[i][0]); circle.setAttribute('cy', pts[i][1]);
    circle.setAttribute('r', 3); circle.setAttribute('fill', '#6ee7ff');
    circle.setAttribute('opacity', 0.6 + Math.sin(t*3+i)*0.3);
    dotsG.appendChild(circle);
  }

  // 柱状图
  const barsG = document.getElementById('svg-bars');
  barsG.innerHTML = '';
  const barCount = 12;
  const barW = w * 0.03;
  const barGap = w * 0.05;
  const barStartX = w * 0.1;
  for (let i = 0; i < barCount; i++) {
    const barH = (0.3 + Math.sin(i*0.7+t*2)*0.15 + Math.cos(i*1.1+t*1.3)*0.1) * h * 0.15;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', barStartX + i * barGap);
    rect.setAttribute('y', h*0.88 - barH);
    rect.setAttribute('width', barW);
    rect.setAttribute('height', barH);
    rect.setAttribute('rx', barW/2);
    rect.setAttribute('fill', `hsla(${220+i*12},70%,65%,0.25)`);
    barsG.appendChild(rect);
  }
}

// ===== 技术标签 =====
const TAGS = ['Canvas 2D','WebGL','WebGPU','DOM','CSS Grid','Flexbox','SVG','CSS Filter',
  'mix-blend-mode','CSS Animation','backdrop-filter','transform3d','clip-path',
  '<video>','<img>','Web Audio','OffscreenCanvas','requestAnimationFrame',
  'CSS Gradient','font-face','letter-spacing','text-shadow','box-shadow',
  'border-radius','linear-gradient','radial-gradient','conic-gradient','@keyframes',
  'transition','pointer-events','z-index','position:absolute','opacity','scale()'];
function initTags() {
  const container = document.getElementById('tag-container');
  container.innerHTML = '';
  TAGS.forEach((tag, i) => {
    const el = document.createElement('span');
    el.textContent = tag;
    el.style.cssText = `display:inline-block;padding:6px 14px;border-radius:20px;
      font:12px "SF Mono",monospace;color:rgba(255,255,255,0.5);
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      opacity:0;transform:translateY(10px);transition:all 0.4s ${i*0.06}s`;
    el.dataset.index = i;
    container.appendChild(el);
  });
}
function updateTags(localT) {
  document.querySelectorAll('#tag-container span').forEach(el => {
    const i = +el.dataset.index;
    const appear = i * 0.08;
    if (localT > appear) {
      el.style.opacity = Math.min(1, (localT - appear) * 2) * 0.7;
      el.style.transform = 'translateY(0)';
    }
  });
}
initTags();

// ===== Clip 管理 =====
const clips = Array.from(document.querySelectorAll('.clip')).map(el => ({
  el, start: parseFloat(el.dataset.start||0), dur: parseFloat(el.dataset.dur||15),
  blend: el.dataset.blend||'normal',
  effectEnter: el.dataset.effectEnter||null, effectExit: el.dataset.effectExit||null,
}));

function easeOutCubic(x) { return 1-(1-x)**3; }

function calcEffect(clip, localT) {
  let opacity = 1, transform = '';
  if (clip.effectEnter) {
    const [type, d] = clip.effectEnter.split(':');
    const dur = parseFloat(d)||0.5;
    if (localT < dur) {
      const p = easeOutCubic(Math.min(1, localT/dur));
      if (type==='fadeIn') opacity = p;
      else if (type==='slideUp') { opacity = p; transform = `translateY(${(1-p)*30}px)`; }
      else if (type==='scaleIn') { opacity = p; transform = `scale(${0.92+0.08*p})`; }
    }
  }
  if (clip.effectExit) {
    const [type, d] = clip.effectExit.split(':');
    const dur = parseFloat(d)||0.4;
    const exitStart = clip.dur - dur;
    if (localT > exitStart) { const p = Math.min(1,(localT-exitStart)/dur); opacity *= (1-p); }
  }
  return { opacity, transform };
}

// ===== 渲染一帧 =====
function renderFrame(t) {
  for (const clip of clips) {
    const localT = t - clip.start;
    const active = t >= clip.start && t < clip.start + clip.dur;
    if (active) {
      clip.el.classList.add('active');
      const { opacity, transform } = calcEffect(clip, localT);
      clip.el.style.opacity = opacity;
      clip.el.style.transform = transform;
      clip.el.style.mixBlendMode = clip.blend;
    } else {
      clip.el.classList.remove('active');
    }
  }

  renderWebGL(t);
  renderParticles(t);
  renderSVG(t);

  // 技术标签
  const tagsClip = clips.find(c => c.el.dataset.clipId === 'tech-tags');
  if (tagsClip && t >= tagsClip.start && t < tagsClip.start + tagsClip.dur) {
    updateTags(t - tagsClip.start);
  }

  // 卡片逐个入场
  document.querySelectorAll('.card-item').forEach(card => {
    const cardsStart = 2;
    const delay = (+card.dataset.delay) * 0.15;
    const cardLocalT = t - cardsStart - delay;
    if (cardLocalT > 0) {
      const p = easeOutCubic(Math.min(1, cardLocalT / 0.6));
      card.style.opacity = p;
      card.style.transform = `translateY(${(1-p)*25}px)`;
    } else {
      card.style.opacity = 0;
      card.style.transform = 'translateY(25px)';
    }
  });

  // 时间码
  const tc = document.getElementById('timecode');
  const m = Math.floor(t/60), s = Math.floor(t%60), ms = Math.floor((t%1)*1000);
  tc.textContent = `00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

// ===== 协议 =====
window.__onFrame = function(frame) { renderFrame(Number(frame.time)||0); return true; };

// ===== 控制条 =====
const controls = document.createElement('div');
controls.id = 'controls';
controls.innerHTML = `<button id="pbtn">▶</button><input type="range" id="sl" min="0" max="${DURATION*1000}" value="0"><span class="ctrl-time" id="tl">0.000s</span><span class="ctrl-info" id="ci"></span>`;
document.body.appendChild(controls);

const sl = document.getElementById('sl'), tl = document.getElementById('tl'), pbtn = document.getElementById('pbtn'), ci = document.getElementById('ci');
let playing = false, sw = 0, st = 0;

function seek(t) {
  t = Math.max(0, Math.min(DURATION, t));
  sl.value = t*1000; tl.textContent = t.toFixed(3)+'s';
  ci.textContent = `| ${DURATION}s | ${VW}×${VH} | tracks:${document.querySelectorAll('.track').length} clips:${clips.length}`;
  renderFrame(t);
}

sl.addEventListener('input', () => { playing=false; pbtn.textContent='▶'; seek(sl.value/1000); });
pbtn.addEventListener('click', () => {
  if (playing) { playing=false; pbtn.textContent='▶'; return; }
  playing=true; pbtn.textContent='⏸'; sw=performance.now(); st=sl.value/1000;
  (function tick() { if(!playing) return; const t=st+(performance.now()-sw)/1000;
    if(t>=DURATION){seek(DURATION);playing=false;pbtn.textContent='▶';return;} seek(t); requestAnimationFrame(tick); })();
});

// 初始化
setRatio(1920, 1080, '16:9');
seek(2.5);
</script>
