<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>POC: Hybrid Scene — Canvas + DOM + SVG + Video 共存</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; overflow: hidden; width: 1920px; height: 1080px; position: relative; font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif; }

  /* ===== Layer 0: Canvas 背景（渐变 + 粒子） ===== */
  #bg-canvas { position: absolute; inset: 0; z-index: 0; }

  /* ===== Layer 1: SVG 图表 ===== */
  #svg-layer { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

  /* ===== Layer 2: DOM 文字 ===== */
  #dom-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

  /* ===== Layer 3: Video 元素 ===== */
  #video-layer { position: absolute; inset: 0; z-index: 3; pointer-events: none; }

  /* ---- DOM 文字样式 ---- */
  .headline {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 96px;
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b9d, #c850c0, #4158d0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    line-height: 1.1;
    letter-spacing: -2px;
    animation: headline-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes headline-in {
    from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); filter: blur(8px); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
  }

  .subtitle {
    position: absolute;
    top: calc(50% + 80px); left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    font-weight: 500;
    color: rgba(200, 190, 255, 0.7);
    font-family: "SF Mono", Menlo, monospace;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fade-up 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  .badge {
    position: absolute;
    top: 40px; right: 40px;
    display: flex; align-items: center; gap: 12px;
    animation: fade-up 0.6s 1s both;
  }
  .badge-label {
    background: linear-gradient(135deg, #e44, #c850c0);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  .badge-version {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-family: "SF Mono", monospace;
  }

  /* ---- 底部数据卡片（DOM 排版） ---- */
  .stats-bar {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 40px;
    animation: fade-up 0.8s 1.2s both;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 48px;
    font-weight: 800;
    color: #fff;
  }
  .stat-label {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* ---- 角落装饰线（纯 CSS） ---- */
  .corner {
    position: absolute;
    width: 40px; height: 40px;
    border-color: rgba(255,255,255,0.15);
    border-style: solid;
    border-width: 0;
  }
  .corner.tl { top: 30px; left: 30px; border-top-width: 1px; border-left-width: 1px; }
  .corner.tr { top: 30px; right: 30px; border-top-width: 1px; border-right-width: 1px; }
  .corner.bl { bottom: 30px; left: 30px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner.br { bottom: 30px; right: 30px; border-bottom-width: 1px; border-right-width: 1px; }

  /* ---- 时间控制条 ---- */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 20px;
    background: rgba(0,0,0,0.9);
    display: flex; align-items: center; gap: 12px;
    font: 13px -apple-system, sans-serif; color: #aaa;
    z-index: 9999;
  }
  #controls button { background: #333; border: 1px solid #555; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
  #controls input[type=range] { flex: 1; accent-color: #e44; }
</style>
</head>
<body>

<!-- Layer 0: Canvas 渐变背景 + 粒子 -->
<canvas id="bg-canvas" width="1920" height="1080"></canvas>

<!-- Layer 1: SVG 装饰图形 -->
<svg id="svg-layer" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 环形装饰 -->
  <circle cx="960" cy="540" r="280" fill="none" stroke="rgba(200,130,255,0.12)" stroke-width="1">
    <animateTransform attributeName="transform" type="rotate" from="0 960 540" to="360 960 540" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="540" r="320" fill="none" stroke="rgba(100,180,255,0.08)" stroke-width="1" stroke-dasharray="8 12">
    <animateTransform attributeName="transform" type="rotate" from="360 960 540" to="0 960 540" dur="30s" repeatCount="indefinite"/>
  </circle>
  <!-- 数据曲线 -->
  <path d="M200,800 Q400,700 600,750 T1000,650 T1400,700 T1720,600" fill="none" stroke="url(#line-grad)" stroke-width="2" opacity="0.5">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M200,800 Q400,700 600,750 T1000,650 T1400,700 T1720,600;
              M200,780 Q400,720 600,700 T1000,680 T1400,650 T1720,620;
              M200,800 Q400,700 600,750 T1000,650 T1400,700 T1720,600"/>
  </path>
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4158d0" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c850c0" stop-opacity="1"/>
      <stop offset="70%" stop-color="#ff6b9d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>

<!-- Layer 2: DOM 文字 -->
<div id="dom-layer">
  <div class="headline">NextFrame</div>
  <div class="subtitle">AI-Native Video Editor</div>
  <div class="badge">
    <span class="badge-label">DEMO</span>
    <span class="badge-version">v0.2</span>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-value">39</div><div class="stat-label">Scenes</div></div>
    <div class="stat"><div class="stat-value">4K</div><div class="stat-label">Resolution</div></div>
    <div class="stat"><div class="stat-value">&lt;10s</div><div class="stat-label">Render Time</div></div>
  </div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
</div>

<!-- Layer 3: 保留给 video 元素（此 POC 不加真实视频） -->
<div id="video-layer"></div>

<script>
// ===== Canvas: Aurora 渐变背景 + 漂浮粒子 =====
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
const W = 1920, H = 1080;
let t = 0;

const particles = Array.from({length: 60}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 2 + 0.5,
  vx: (Math.random() - 0.5) * 0.3,
  vy: (Math.random() - 0.5) * 0.3,
  alpha: Math.random() * 0.4 + 0.1,
}));

function renderCanvas(time) {
  t = time;
  // 渐变背景
  const g = ctx.createRadialGradient(
    W * 0.3 + Math.sin(t * 0.2) * 200, H * 0.4 + Math.cos(t * 0.15) * 100, 50,
    W * 0.5, H * 0.5, W * 0.8
  );
  g.addColorStop(0, `hsla(${260 + Math.sin(t * 0.3) * 30}, 80%, 25%, 1)`);
  g.addColorStop(0.4, `hsla(${300 + Math.cos(t * 0.2) * 20}, 60%, 12%, 1)`);
  g.addColorStop(1, '#0a0a14');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 第二个光斑
  const g2 = ctx.createRadialGradient(
    W * 0.7 + Math.cos(t * 0.25) * 150, H * 0.6 + Math.sin(t * 0.18) * 80, 30,
    W * 0.7, H * 0.5, W * 0.5
  );
  g2.addColorStop(0, `hsla(${340 + Math.sin(t * 0.4) * 20}, 70%, 20%, 0.6)`);
  g2.addColorStop(0.5, 'transparent');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);

  // 粒子
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
    ctx.fill();
  }
}

// 初始渲染
renderCanvas(0);

// 自动播放动画
let startTime = performance.now();
function animate() {
  const elapsed = (performance.now() - startTime) / 1000;
  renderCanvas(elapsed);
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
