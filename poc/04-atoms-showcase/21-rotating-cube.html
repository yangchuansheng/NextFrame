<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>21 · Rotating Cube</title>
<style>
:root {
  --bg: #0a0a0d;
  --text: #e4e5ea;
  --text-dim: #7a7d86;
  --accent: #ff9a3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 20%, #15151b, #050608);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: var(--text);
}
.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  max-height: 92vh;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background: #06070a;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.7));
  border: 1px solid rgba(255,255,255,0.04);
}
canvas { display: block; width: 100%; height: 100%; }
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: rgba(255,255,255,0.06);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  z-index: 100;
  backdrop-filter: blur(8px);
}
.replay:hover { background: rgba(255,255,255,0.12); }
.info {
  position: absolute;
  left: 22px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
  z-index: 10;
}
.atom-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
  text-shadow: 0 2px 12px rgba(0,0,0,0.8);
}
.tech {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.corner {
  position: absolute;
  top: 18px;
  right: 18px;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.25);
  font-weight: 600;
  z-index: 10;
}
</style>
</head>
<body>

<button class="replay" id="replayBtn">↻ REPLAY</button>

<div class="stage">
  <canvas id="c"></canvas>
  <div class="corner">21 / 24</div>
  <div class="info">
    <span class="atom-name">Rotating Cube · PBR</span>
    <span class="tech">THREE.JS · PHYSICAL MATERIAL · 3-POINT LIGHT</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('c');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#06070a');
  scene.fog = new THREE.Fog('#06070a', 6, 18);

  const camera = new THREE.PerspectiveCamera(38, 16 / 9, 0.1, 100);
  camera.position.set(0, 1.2, 6.5);
  camera.lookAt(0, 0, 0);

  function resize() {
    const rect = canvas.getBoundingClientRect();
    renderer.setSize(rect.width, rect.height, false);
    camera.aspect = rect.width / rect.height;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Cube (PBR) ----
  const cubeGeo = new THREE.BoxGeometry(1.6, 1.6, 1.6, 4, 4, 4);
  const cubeMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color('#d6d8e0'),
    metalness: 0.85,
    roughness: 0.22,
    envMapIntensity: 1.0,
  });
  const cube = new THREE.Mesh(cubeGeo, cubeMat);
  cube.position.y = 0.2;
  scene.add(cube);

  // Edges (glowing lines on 12 edges)
  const edgeGeo = new THREE.EdgesGeometry(cubeGeo, 1);
  const edgeMat = new THREE.LineBasicMaterial({
    color: new THREE.Color('#ffd59a'),
    transparent: true,
    opacity: 0.9,
  });
  const edges = new THREE.LineSegments(edgeGeo, edgeMat);
  cube.add(edges);

  // ---- Ground reflector disc ----
  const discGeo = new THREE.CircleGeometry(4, 64);
  const discMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color('#0a0d14'),
    metalness: 0.9,
    roughness: 0.35,
    transparent: true,
    opacity: 0.85,
  });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.rotation.x = -Math.PI / 2;
  disc.position.y = -1.0;
  scene.add(disc);

  // Subtle glow ring under disc
  const ringGeo = new THREE.RingGeometry(1.6, 1.8, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color('#ff9a3c'),
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -0.99;
  scene.add(ring);

  // ---- Lights ----
  const ambient = new THREE.AmbientLight(0x202028, 0.6);
  scene.add(ambient);

  // Key light (white, front-right)
  const keyLight = new THREE.DirectionalLight(0xffffff, 2.4);
  keyLight.position.set(4, 5, 4);
  scene.add(keyLight);

  // Fill light (cool blue, left)
  const fillLight = new THREE.PointLight(0x5aa0ff, 3.0, 12, 2);
  fillLight.position.set(-3.5, 1.5, 2.5);
  scene.add(fillLight);

  // Rim light (orange, back)
  const rimLight = new THREE.PointLight(0xff9a3c, 3.5, 14, 2);
  rimLight.position.set(0, 2.0, -4);
  scene.add(rimLight);

  // Tiny visible point sources (so light feels real)
  const makeBulb = (color) => new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 16, 16),
    new THREE.MeshBasicMaterial({ color })
  );
  const bulbFill = makeBulb(0x5aa0ff); bulbFill.position.copy(fillLight.position); scene.add(bulbFill);
  const bulbRim  = makeBulb(0xff9a3c); bulbRim.position.copy(rimLight.position); scene.add(bulbRim);

  // ---- Animate ----
  const clock = new THREE.Clock();
  let rafId = 0;

  function tick() {
    const t = clock.getElapsedTime();

    // Cube slow rotation
    cube.rotation.x = t * 0.35;
    cube.rotation.y = t * 0.55;

    // Camera breathing
    camera.position.y = 1.2 + Math.sin(t * 0.6) * 0.35;
    camera.position.x = Math.sin(t * 0.25) * 0.3;
    camera.lookAt(0, 0.2, 0);

    // Edge color pulsation
    const pulse = 0.75 + Math.sin(t * 1.4) * 0.2;
    edgeMat.opacity = pulse;

    // Rim light orbit slightly
    rimLight.position.x = Math.sin(t * 0.4) * 2.2;
    bulbRim.position.copy(rimLight.position);

    // Ground ring pulse
    ringMat.opacity = 0.10 + Math.sin(t * 1.1) * 0.05;

    renderer.render(scene, camera);
    rafId = requestAnimationFrame(tick);
  }

  function replay() {
    cancelAnimationFrame(rafId);
    clock.start();
    tick();
  }

  document.getElementById('replayBtn').onclick = replay;
  tick();
})();
</script>
</body>
</html>
