<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vaporwave · Aesthetic Sunset</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 30%, #120820, #040208);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(200, 0, 180, 0.25));
  background:
    linear-gradient(to bottom,
      #12003a 0%,
      #3a0a5e 12%,
      #8a1a8e 30%,
      #ff3aa0 48%,
      #ff7a50 55%,
      #0a0828 58%,
      #0a0828 100%);
  perspective: 900px;
  perspective-origin: 50% 40%;
}

/* Sky stars */
.stars {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 58%;
  z-index: 1;
  background-image:
    radial-gradient(1px 1px at 10% 15%, #fff, transparent),
    radial-gradient(1px 1px at 25% 40%, #fff, transparent),
    radial-gradient(1px 1px at 40% 10%, #fff, transparent),
    radial-gradient(1px 1px at 55% 25%, #fff, transparent),
    radial-gradient(1px 1px at 70% 15%, #fff, transparent),
    radial-gradient(1px 1px at 85% 35%, #fff, transparent),
    radial-gradient(1px 1px at 92% 8%, #fff, transparent),
    radial-gradient(1px 1px at 15% 50%, #fff, transparent),
    radial-gradient(1px 1px at 65% 45%, #fff, transparent);
  background-size: 100% 100%;
  opacity: 0.6;
  animation: twinkle 4s infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.9; }
}

/* The sun */
.sun {
  position: absolute;
  left: 50%;
  top: 22%;
  width: 300px;
  height: 300px;
  margin-left: -150px;
  border-radius: 50%;
  background: linear-gradient(to bottom,
    #fff8d0 0%,
    #ffd24a 20%,
    #ff7a50 50%,
    #ff2a8a 90%);
  z-index: 2;
  box-shadow:
    0 0 80px rgba(255, 100, 180, 0.8),
    0 0 160px rgba(255, 60, 140, 0.5);
  animation: sunPulse 5s infinite;
}
@keyframes sunPulse {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.15); }
}
/* Horizontal slices on the sun */
.sun::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0%,
    transparent 58%,
    #0a0828 58%,
    #0a0828 62%,
    transparent 62%,
    transparent 68%,
    #0a0828 68%,
    #0a0828 71%,
    transparent 71%,
    transparent 78%,
    #0a0828 78%,
    #0a0828 80%,
    transparent 80%,
    transparent 88%,
    #0a0828 88%,
    #0a0828 89%);
}

/* Mountains */
.mountains {
  position: absolute;
  left: 0; right: 0;
  bottom: 42%;
  height: 18%;
  z-index: 3;
}
.mountains svg { width: 100%; height: 100%; display: block; }

/* Ground / grid */
.ground {
  position: absolute;
  left: -20%; right: -20%;
  bottom: 0;
  height: 58%;
  z-index: 4;
  transform-style: preserve-3d;
  transform: rotateX(72deg);
  transform-origin: 50% 0%;
}
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(255, 80, 220, 0.9) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255, 80, 220, 0.9) 2px, transparent 2px);
  background-size: 60px 60px;
  animation: gridMove 1.8s linear infinite;
}
@keyframes gridMove {
  0%   { background-position: 0 0; }
  100% { background-position: 0 60px; }
}
/* Glow near horizon */
.ground::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(255, 100, 200, 0.4) 0%,
    transparent 40%);
  pointer-events: none;
}

/* Horizon glow */
.horizon-glow {
  position: absolute;
  left: 0; right: 0;
  bottom: 42%;
  height: 3px;
  background: #fff;
  box-shadow:
    0 0 20px #fff,
    0 0 40px #ff3aa0,
    0 0 80px #ff3aa0;
  z-index: 5;
}

/* Big title */
.title {
  position: absolute;
  left: 0; right: 0;
  top: 38%;
  text-align: center;
  z-index: 10;
  font-family: "Times New Roman", "Didot", serif;
  font-size: clamp(50px, 9vw, 110px);
  font-weight: 900;
  letter-spacing: 0.22em;
  background: linear-gradient(180deg,
    #fff8ff 0%,
    #ffd0f0 30%,
    #a0e0ff 50%,
    #5e8fff 70%,
    #fff8ff 95%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow:
    0 2px 0 rgba(0,0,0,0.2);
  filter: drop-shadow(0 0 18px rgba(100, 200, 255, 0.5))
          drop-shadow(0 0 40px rgba(255, 80, 200, 0.4));
  animation: titleFloat 4s ease-in-out infinite;
}
@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* Japanese vertical text */
.jp {
  position: absolute;
  right: 28px;
  top: 32%;
  writing-mode: vertical-rl;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 20px;
  letter-spacing: 0.4em;
  color: rgba(255, 200, 240, 0.85);
  text-shadow: 0 0 10px rgba(255, 100, 200, 0.6);
  z-index: 11;
  font-weight: 500;
}

/* Top-left label */
.topL {
  position: absolute;
  top: 22px; left: 26px;
  font-family: "Courier New", monospace;
  font-size: 11px;
  color: rgba(255, 220, 255, 0.7);
  letter-spacing: 0.2em;
  z-index: 11;
}

/* Scanlines overlay */
.scan {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0.025) 0px,
    rgba(255, 255, 255, 0.025) 1px,
    transparent 1px,
    transparent 4px
  );
  pointer-events: none;
  z-index: 20;
}

/* Light vignette */
.vig {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 40%, transparent 50%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 19;
}

/* REPLAY btn */
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: #1a0830;
  color: #ff9ee0;
  border: 1px solid #ff4da6;
  border-radius: 8px;
  cursor: pointer;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  z-index: 100;
  box-shadow: 0 0 16px rgba(255, 77, 166, 0.35);
}
.replay:hover { background: #2a1050; }

.info {
  position: fixed;
  left: 24px;
  bottom: 24px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 11px;
  color: #7a7d86;
}
.info .atom-name { color: #ffc0f0; font-weight: 700; letter-spacing: 0.1em; }
.info .tech { color: #6a4d65; }
</style>
</head>
<body>

<button class="replay" id="replayBtn">↻ REPLAY</button>

<div class="info">
  <span class="atom-name">07 · VAPORWAVE</span>
  <span class="tech">CSS perspective · gradients</span>
</div>

<div class="stage" id="stage">
  <div class="stars"></div>
  <div class="sun"></div>

  <div class="mountains">
    <svg viewBox="0 0 960 120" preserveAspectRatio="none">
      <polygon points="0,120 80,60 140,95 220,40 300,85 380,50 440,90 520,35 600,80 680,55 760,95 840,50 920,85 960,70 960,120" fill="#2a0a4a" opacity="0.85"/>
      <polygon points="0,120 60,90 120,105 200,75 280,100 360,80 440,110 520,85 600,105 680,85 760,110 840,95 960,100 960,120" fill="#1a052e"/>
    </svg>
  </div>

  <div class="horizon-glow"></div>

  <div class="ground">
    <div class="grid"></div>
  </div>

  <div class="title">AESTHETIC</div>
  <div class="jp">真実 ・ 夢</div>
  <div class="topL">[ SUNSET_88.MOV ]</div>

  <div class="vig"></div>
  <div class="scan"></div>
</div>

<script>
function reset() {
  document.querySelectorAll('.stage *').forEach(el => {
    const anims = el.getAnimations ? el.getAnimations() : [];
    anims.forEach(a => { a.cancel(); a.play(); });
  });
}
document.getElementById('replayBtn').onclick = reset;
window.addEventListener('load', reset);
</script>
</body>
</html>
