<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Film Grain · 1942</title>
<style>
:root {
  --bg: #0a0a0d;
  --ink: #e4e5ea;
  --dim: #7a7d86;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 40%, #14141a, #050608 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: var(--ink);
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.65));
  background: #000;
}

/* ============ Photo layer (Ken Burns) ============ */
.photo {
  position: absolute;
  inset: -8%;
  transform-origin: 55% 60%;
  animation: kenBurns 14s ease-in-out infinite;
  filter: sepia(0.7) contrast(1.05) brightness(0.88) saturate(0.6);
}
@keyframes kenBurns {
  0%   { transform: scale(1.0) translate(0, 0); }
  50%  { transform: scale(1.14) translate(-2.5%, -1.8%); }
  100% { transform: scale(1.0) translate(0, 0); }
}

.photo svg { width: 100%; height: 100%; display: block; }

/* ============ Grain overlay ============ */
.grain {
  position: absolute;
  inset: -10%;
  pointer-events: none;
  mix-blend-mode: overlay;
  opacity: 0.55;
  animation: grainJitter 0.18s steps(1) infinite;
}
.grain svg { width: 100%; height: 100%; }
@keyframes grainJitter {
  0%   { transform: translate(0, 0); }
  20%  { transform: translate(-2%, 1%); }
  40%  { transform: translate(1.5%, -1%); }
  60%  { transform: translate(-1%, -1.5%); }
  80%  { transform: translate(1%, 1.5%); }
  100% { transform: translate(0, 0); }
}

/* Secondary fine grain, different blend */
.grain2 {
  position: absolute;
  inset: -10%;
  pointer-events: none;
  mix-blend-mode: soft-light;
  opacity: 0.7;
  animation: grainJitter 0.12s steps(1) infinite reverse;
}
.grain2 svg { width: 100%; height: 100%; }

/* ============ Vignette ============ */
.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 50%, transparent 38%, rgba(0,0,0,0.45) 72%, rgba(0,0,0,0.85) 100%),
    linear-gradient(to bottom, rgba(40,20,0,0.15), transparent 20%, transparent 80%, rgba(40,20,0,0.2));
}

/* ============ Scratch line (white streak) ============ */
.scratch {
  position: absolute;
  top: -6%;
  width: 1.5px;
  height: 112%;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(255,240,220,0.0) 8%,
    rgba(255,240,220,0.85) 12%,
    rgba(255,240,220,0.6) 50%,
    rgba(255,240,220,0.9) 88%,
    transparent 100%);
  opacity: 0;
  filter: blur(0.4px);
  box-shadow: 0 0 2px rgba(255,240,220,0.6);
}
.scratch.s1 { left: 22%; animation: scratchFlash 9s linear infinite; }
.scratch.s2 { left: 68%; animation: scratchFlash 9s linear infinite 4.2s; width: 1px; }
.scratch.s3 { left: 41%; animation: scratchFlash 9s linear infinite 6.8s; height: 40%; top: 12%; }

@keyframes scratchFlash {
  0%, 2%   { opacity: 0; transform: translateX(0) scaleY(1); }
  3%       { opacity: 0.9; transform: translateX(-1px) scaleY(1.02); }
  4%, 6%   { opacity: 0.75; transform: translateX(0.5px) scaleY(0.98); }
  7%       { opacity: 0; }
  100%     { opacity: 0; }
}

/* ============ Dust specks ============ */
.dust {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  animation: dustBlink 2.4s steps(1) infinite;
}
@keyframes dustBlink {
  0%, 48%   { opacity: 0; }
  50%, 52%  { opacity: 0.6; }
  54%, 100% { opacity: 0; }
}
.dust span {
  position: absolute;
  background: rgba(30,18,6,0.8);
  border-radius: 50%;
}
.dust span:nth-child(1) { left: 18%; top: 24%; width: 3px; height: 3px; }
.dust span:nth-child(2) { left: 62%; top: 41%; width: 2px; height: 2px; }
.dust span:nth-child(3) { left: 78%; top: 68%; width: 4px; height: 2px; border-radius: 40%; }
.dust span:nth-child(4) { left: 33%; top: 77%; width: 2px; height: 2px; }
.dust span:nth-child(5) { left: 48%; top: 15%; width: 2px; height: 2px; }

/* ============ Flicker (exposure variation) ============ */
.flicker {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: rgba(255, 235, 200, 0.04);
  mix-blend-mode: overlay;
  animation: flicker 2.3s steps(6) infinite;
}
@keyframes flicker {
  0%   { opacity: 0.3; }
  16%  { opacity: 0.9; }
  33%  { opacity: 0.4; }
  50%  { opacity: 1.0; }
  66%  { opacity: 0.5; }
  83%  { opacity: 0.85; }
  100% { opacity: 0.3; }
}

/* ============ Year stamp ============ */
.year {
  position: absolute;
  right: 28px;
  bottom: 24px;
  font-family: "Courier New", "SF Mono", monospace;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #f0e4c8;
  text-shadow:
    0 0 1px rgba(0,0,0,0.9),
    0 2px 6px rgba(0,0,0,0.8);
  mix-blend-mode: screen;
  opacity: 0.85;
  /* typewriter wobble */
  animation: stampWobble 0.11s steps(2) infinite;
}
.year::before {
  content: "";
  position: absolute;
  left: -10px;
  right: -10px;
  top: -6px;
  bottom: -6px;
  border: 1px solid rgba(240,228,200,0.15);
  border-radius: 2px;
}
@keyframes stampWobble {
  0%, 100% { transform: translate(0, 0); }
  50%      { transform: translate(0.3px, -0.3px); }
}

/* ============ Frame counter ============ */
.meta {
  position: absolute;
  left: 28px;
  top: 22px;
  font-family: "Courier New", monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: rgba(240,228,200,0.55);
  mix-blend-mode: screen;
}
.meta .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #d8402a;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 6px;
  box-shadow: 0 0 6px #d8402a;
  animation: rec 1.2s steps(2) infinite;
}
@keyframes rec { 50% { opacity: 0.2; } }

/* ============ Gate weave (rolling) ============ */
.gate {
  position: absolute;
  inset: 0;
  animation: gate 0.09s steps(2) infinite;
}
@keyframes gate {
  0%   { transform: translate(0, 0); }
  50%  { transform: translate(0.6px, -0.4px); }
}

/* ============ Replay ============ */
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: #1a1a1c;
  color: #f0e4c8;
  border: 1px solid #3a3a40;
  border-radius: 10px;
  cursor: pointer;
  font-family: "Courier New", monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  z-index: 100;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
.replay:hover { background: #22222a; }

.info {
  position: fixed;
  left: 24px;
  bottom: 22px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-family: -apple-system, "PingFang SC", sans-serif;
}
.info .atom-name {
  font-size: 13px;
  font-weight: 700;
  color: #e4e5ea;
  letter-spacing: 0.04em;
}
.info .tech {
  font-size: 10px;
  color: #7a7d86;
  letter-spacing: 0.08em;
}
</style>
</head>

<script>
const stage = document.getElementById('stage');
const btn = document.getElementById('replayBtn');

function replay() {
  // Re-seed turbulence for an instantaneous "reload" feel
  const filters = stage.querySelectorAll('feTurbulence');
  filters.forEach(f => {
    const s = Math.floor(Math.random() * 1000);
    f.setAttribute('seed', s);
  });
  // Restart CSS animations
  stage.querySelectorAll('.photo, .grain, .grain2, .scratch, .flicker, .dust, .gate').forEach(el => {
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });
}

// Continuously re-seed grain so it doesn't look static
setInterval(() => {
  const filters = stage.querySelectorAll('feTurbulence');
  filters.forEach(f => {
    const s = (parseInt(f.getAttribute('seed')) + 1) % 999;
    f.setAttribute('seed', s);
  });
}, 80);

btn.onclick = replay;
</script>
