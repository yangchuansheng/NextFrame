<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>24 · Tunnel Flight</title>
<style>
:root {
  --bg: #0a0a0d;
  --text: #e4e5ea;
  --text-dim: #7a7d86;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 30%, #0d0815, #020205);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: var(--text);
}
.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  max-height: 92vh;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background: #030308;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.7));
  border: 1px solid rgba(255,255,255,0.04);
}
canvas { display: block; width: 100%; height: 100%; }
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: rgba(255,255,255,0.06);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  z-index: 100;
  backdrop-filter: blur(8px);
}
.replay:hover { background: rgba(255,255,255,0.12); }
.info {
  position: absolute;
  left: 22px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
  z-index: 10;
}
.atom-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
  text-shadow: 0 2px 12px rgba(0,0,0,0.8);
}
.tech {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.corner {
  position: absolute;
  top: 18px;
  right: 18px;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
  z-index: 10;
}
.speed-hud {
  position: absolute;
  right: 22px;
  bottom: 22px;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.4);
  font-weight: 600;
  z-index: 10;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<button class="replay" id="replayBtn">↻ REPLAY</button>

<div class="stage">
  <canvas id="c"></canvas>
  <div class="corner">24 / 24</div>
  <div class="info">
    <span class="atom-name">Tunnel Flight</span>
    <span class="tech">THREE.JS · TORUS RING LOOP · POINT LIGHTS</span>
  </div>
  <div class="speed-hud" id="hud">SPEED 0.00</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('c');
  const hud = document.getElementById('hud');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#030308');
  scene.fog = new THREE.Fog('#030308', 10, 55);

  const camera = new THREE.PerspectiveCamera(72, 16 / 9, 0.1, 120);
  camera.position.set(0, 0, 0);

  function resize() {
    const rect = canvas.getBoundingClientRect();
    renderer.setSize(rect.width, rect.height, false);
    camera.aspect = rect.width / rect.height;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Tunnel rings ----
  const RING_COUNT = 40;
  const RING_SPACING = 2.2;   // distance between rings
  const TUNNEL_START = 1;     // where first ring sits ahead of camera
  const TOTAL_LEN = RING_COUNT * RING_SPACING;

  const rings = [];
  const ringGroup = new THREE.Group();
  scene.add(ringGroup);

  // Color ramp: near=warm vivid, far=deep cool
  const nearColor = new THREE.Color('#ff6aa8');
  const midColor  = new THREE.Color('#8a5aff');
  const farColor  = new THREE.Color('#1a2040');

  for (let i = 0; i < RING_COUNT; i++) {
    const geo = new THREE.TorusGeometry(2.2, 0.09, 16, 96);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      metalness: 0.75,
      roughness: 0.3,
      emissive: 0x000000,
      emissiveIntensity: 1.0,
    });
    const m = new THREE.Mesh(geo, mat);
    m.position.z = -(TUNNEL_START + i * RING_SPACING);
    m.rotation.z = Math.random() * Math.PI * 2;
    m.userData.spinSpeed = (Math.random() - 0.5) * 0.3 + 0.15;
    m.userData.baseRadius = 2.2;
    rings.push(m);
    ringGroup.add(m);
  }

  function colorForDepth(depth) {
    // depth 0 = near, 1 = far
    const c = new THREE.Color();
    if (depth < 0.5) c.copy(nearColor).lerp(midColor, depth / 0.5);
    else c.copy(midColor).lerp(farColor, (depth - 0.5) / 0.5);
    return c;
  }

  // ---- Point lights along the tunnel (sparse, so it's cheap) ----
  const lights = [];
  const LIGHT_COUNT = 6;
  const lightColors = [0xff4a7a, 0xff7a3c, 0x7a5aff, 0x3caaff, 0xff5aa0, 0xffaa3c];
  for (let i = 0; i < LIGHT_COUNT; i++) {
    const L = new THREE.PointLight(lightColors[i], 4.5, 12, 2);
    L.position.z = -((i + 0.5) * (TOTAL_LEN / LIGHT_COUNT));
    L.position.x = Math.cos(i * 1.5) * 0.8;
    L.position.y = Math.sin(i * 1.5) * 0.8;
    scene.add(L);
    lights.push(L);
  }

  const ambient = new THREE.AmbientLight(0x1a1a2e, 0.5);
  scene.add(ambient);

  // ---- Starfield streaks far ahead ----
  const starCount = 400;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const r = 0.3 + Math.random() * 1.8;
    starPos[i*3]   = Math.cos(theta) * r;
    starPos[i*3+1] = Math.sin(theta) * r;
    starPos[i*3+2] = -Math.random() * TOTAL_LEN;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.05,
    transparent: true,
    opacity: 0.6,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // ---- Animation ----
  const clock = new THREE.Clock();
  let travel = 0;   // how far we've flown
  const SPEED = 6.5;
  let rafId = 0;
  let lastT = 0;

  function tick() {
    const t = clock.getElapsedTime();
    const dt = Math.min(t - lastT, 0.05);
    lastT = t;

    // Forward travel
    travel += SPEED * dt;

    // Move each ring: when a ring passes the camera, wrap it to the far end
    for (let i = 0; i < rings.length; i++) {
      const m = rings[i];
      m.position.z += SPEED * dt;

      // Wavy tunnel: offset x/y by sine of absolute world z
      const absZ = m.position.z + travel;
      m.position.x = Math.sin(absZ * 0.08) * 0.6;
      m.position.y = Math.cos(absZ * 0.06) * 0.5;

      // Spin
      m.rotation.z += m.userData.spinSpeed * dt;

      if (m.position.z > 1.5) {
        // Find farthest ring and put this one behind it
        let minZ = Infinity;
        for (let j = 0; j < rings.length; j++) {
          if (rings[j].position.z < minZ) minZ = rings[j].position.z;
        }
        m.position.z = minZ - RING_SPACING;
      }

      // Depth-based color + emissive (near bright, far dim)
      const depth = Math.min(Math.max(-m.position.z / TOTAL_LEN, 0), 1);
      const c = colorForDepth(depth);
      m.material.color.copy(c);
      m.material.emissive.copy(c);
      m.material.emissiveIntensity = (1 - depth) * 1.4 + 0.2;
    }

    // Move lights forward too, wrap them
    for (let i = 0; i < lights.length; i++) {
      const L = lights[i];
      L.position.z += SPEED * dt;
      if (L.position.z > 1) L.position.z -= TOTAL_LEN;
      const absZ = L.position.z + travel;
      L.position.x = Math.cos(absZ * 0.1 + i) * 1.4;
      L.position.y = Math.sin(absZ * 0.09 + i) * 1.1;
    }

    // Stars wrap
    const sp = starGeo.getAttribute('position');
    for (let i = 0; i < starCount; i++) {
      sp.array[i*3+2] += SPEED * dt * 1.05;
      if (sp.array[i*3+2] > 1) sp.array[i*3+2] -= TOTAL_LEN;
    }
    sp.needsUpdate = true;

    // Camera roll (slow wobble)
    camera.rotation.z = Math.sin(t * 0.35) * 0.18;
    // tiny sway
    camera.position.x = Math.sin(t * 0.6) * 0.12;
    camera.position.y = Math.cos(t * 0.5) * 0.1;
    camera.lookAt(
      Math.sin(t * 0.25) * 0.5,
      Math.cos(t * 0.22) * 0.4,
      -5
    );
    // re-apply roll because lookAt resets it
    camera.rotateZ(Math.sin(t * 0.35) * 0.18);

    // HUD
    hud.textContent = 'SPEED ' + (SPEED + Math.sin(t * 2) * 0.3).toFixed(2);

    renderer.render(scene, camera);
    rafId = requestAnimationFrame(tick);
  }

  function replay() {
    cancelAnimationFrame(rafId);
    clock.start();
    lastT = 0;
    travel = 0;
    // reset ring positions
    for (let i = 0; i < rings.length; i++) {
      rings[i].position.z = -(TUNNEL_START + i * RING_SPACING);
    }
    tick();
  }

  document.getElementById('replayBtn').onclick = replay;
  tick();
})();
</script>
</body>
</html>
