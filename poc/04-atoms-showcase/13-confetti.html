<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atom 13 · Confetti Burst</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 20%, #15151a, #070709);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  background: radial-gradient(ellipse at 50% 55%, #1f1f28 0%, #0a0a0d 70%);
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6));
}

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 2;
}

.title {
  font-size: clamp(44px, 7vw, 84px);
  font-weight: 900;
  letter-spacing: 0.12em;
  background: linear-gradient(180deg, #fff 0%, #ffd56b 60%, #ff8f3c 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 2px 40px rgba(255, 190, 80, 0.25);
  transform: scale(0.7);
  opacity: 0;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
}
.title.pop { transform: scale(1); opacity: 1; }
.title.kick { animation: kick 0.5s ease-out; }
@keyframes kick {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.14); }
  100% { transform: scale(1); }
}

.sub {
  margin-top: 10px;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: #b4b5bc;
  opacity: 0.7;
}

.burst-btn {
  margin-top: 26px;
  pointer-events: auto;
  padding: 12px 26px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: #0a0a0d;
  background: linear-gradient(180deg, #ffd56b, #ff8f3c);
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(255, 143, 60, 0.35);
  transition: transform 0.15s, box-shadow 0.3s;
}
.burst-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 38px rgba(255, 143, 60, 0.5); }
.burst-btn:active { transform: translateY(0) scale(0.96); }

.replay {
  position: absolute;
  right: 16px;
  top: 16px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.08);
  color: #e4e5ea;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  z-index: 10;
  backdrop-filter: blur(8px);
}
.replay:hover { background: rgba(255,255,255,0.14); }

.info {
  position: absolute;
  left: 16px;
  bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  z-index: 10;
  font-size: 11px;
  letter-spacing: 0.12em;
}
.info .atom-name { color: #e4e5ea; font-weight: 700; }
.info .tech { color: #6a6d76; }

.flash {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(255, 220, 140, 0.35), transparent 55%);
  opacity: 0;
  pointer-events: none;
  mix-blend-mode: screen;
}
.flash.on { animation: flash 0.45s ease-out; }
@keyframes flash {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="stage">
  <canvas id="canvas"></canvas>
  <div class="flash" id="flash"></div>
  <div class="center">
    <div class="title" id="title">YOU WIN</div>
    <div class="sub">TAP TO CELEBRATE</div>
    <button class="burst-btn" id="burstBtn">BOOM</button>
  </div>
  <button class="replay" id="replayBtn">REPLAY</button>
  <div class="info">
    <span class="atom-name">13 · Confetti Burst</span>
    <span class="tech">Canvas 2D · particle physics</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stage = canvas.parentElement;
const title = document.getElementById('title');
const flash = document.getElementById('flash');

let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const r = stage.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const COLORS = ['#ff4d6d', '#ffd166', '#06d6a0', '#4cc9f0', '#b892ff', '#ff8f3c', '#f1f1f1', '#ff3cac'];
const SHAPES = ['rect', 'circle', 'tri'];

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    // radial burst with some upward bias
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 10;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - (3 + Math.random() * 4); // upward kick
    this.size = 6 + Math.random() * 10;
    this.color = COLORS[(Math.random() * COLORS.length) | 0];
    this.shape = SHAPES[(Math.random() * SHAPES.length) | 0];
    this.rot = Math.random() * Math.PI * 2;
    this.vrot = (Math.random() - 0.5) * 0.4;
    this.life = 1;
    this.decay = 0.006 + Math.random() * 0.005;
    this.wobble = Math.random() * Math.PI * 2;
  }
  update(dt) {
    // physics
    this.vy += 0.38 * dt;         // gravity
    this.vx *= 0.992;              // air drag
    this.vy *= 0.992;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rot += this.vrot * dt;
    this.wobble += 0.18 * dt;
    // fade once falling past center
    if (this.vy > 0) this.life -= this.decay * dt;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    // mimic 3D flip via horizontal squish
    const flip = Math.cos(this.wobble);
    ctx.scale(flip, 1);
    ctx.fillStyle = this.color;
    if (this.shape === 'rect') {
      ctx.fillRect(-this.size * 0.6, -this.size * 0.4, this.size * 1.2, this.size * 0.8);
    } else if (this.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, this.size * 0.55, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(0, -this.size * 0.65);
      ctx.lineTo(this.size * 0.6, this.size * 0.5);
      ctx.lineTo(-this.size * 0.6, this.size * 0.5);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

let particles = [];

function burst() {
  const cx = W / 2;
  const cy = H / 2;
  const n = 170 + ((Math.random() * 40) | 0);
  for (let i = 0; i < n; i++) {
    particles.push(new Particle(cx, cy));
  }
  title.classList.remove('kick');
  void title.offsetWidth;
  title.classList.add('kick');
  flash.classList.remove('on');
  void flash.offsetWidth;
  flash.classList.add('on');
}

let lastTime = performance.now();
function tick(t) {
  const dt = Math.min(2.5, (t - lastTime) / 16.67);
  lastTime = t;
  ctx.clearRect(0, 0, W, H);

  // subtle center glow
  const grd = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.5);
  grd.addColorStop(0, 'rgba(255, 210, 120, 0.06)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update(dt);
    p.draw(ctx);
    if (p.life <= 0 || p.y > H + 60) particles.splice(i, 1);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

let autoTimer;
function start() {
  particles = [];
  title.classList.remove('pop');
  void title.offsetWidth;
  setTimeout(() => title.classList.add('pop'), 80);
  setTimeout(() => burst(), 650);
  clearInterval(autoTimer);
  autoTimer = setInterval(burst, 3400);
}

document.getElementById('replayBtn').onclick = start;
document.getElementById('burstBtn').onclick = burst;
window.addEventListener('load', () => setTimeout(start, 200));
</script>

</body>
</html>
