<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atom 15 · Heart Rain</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #0a0a0d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6));
  background:
    radial-gradient(ellipse 60% 50% at 30% 35%, rgba(255, 60, 120, 0.22), transparent 60%),
    radial-gradient(ellipse 55% 45% at 75% 60%, rgba(140, 80, 255, 0.22), transparent 60%),
    linear-gradient(180deg, #120814 0%, #1b0a28 40%, #0a0510 100%);
}

/* soft glow blobs */
.bg-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  filter: blur(60px);
  opacity: 0.6;
}
.bg-glow::before {
  content: '';
  position: absolute;
  width: 360px; height: 360px;
  left: -60px; top: 30%;
  background: radial-gradient(circle, #ff2d6f 0%, transparent 65%);
  animation: drift1 9s ease-in-out infinite alternate;
}
.bg-glow::after {
  content: '';
  position: absolute;
  width: 420px; height: 420px;
  right: -80px; top: 10%;
  background: radial-gradient(circle, #8a3cff 0%, transparent 65%);
  animation: drift2 11s ease-in-out infinite alternate;
}
@keyframes drift1 {
  0%   { transform: translate(0, 0); }
  100% { transform: translate(40px, -30px); }
}
@keyframes drift2 {
  0%   { transform: translate(0, 0); }
  100% { transform: translate(-30px, 40px); }
}

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* counter */
.counter {
  position: absolute;
  left: 24px;
  bottom: 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 5;
}

.like-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(145deg, #ff3c6f, #c41a5a);
  border: 2px solid rgba(255, 255, 255, 0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow:
    0 0 30px rgba(255, 60, 110, 0.55),
    0 8px 20px rgba(0,0,0,0.4),
    inset 0 2px 8px rgba(255,255,255,0.25);
  animation: btnPulse 1s ease-in-out infinite;
  transition: transform 0.1s;
}
.like-btn:active { transform: scale(0.88); }
.like-btn svg { width: 34px; height: 34px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }

@keyframes btnPulse {
  0%, 100% {
    box-shadow: 0 0 30px rgba(255, 60, 110, 0.55), 0 8px 20px rgba(0,0,0,0.4), inset 0 2px 8px rgba(255,255,255,0.25);
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 48px rgba(255, 60, 110, 0.85), 0 8px 20px rgba(0,0,0,0.4), inset 0 2px 8px rgba(255,255,255,0.3);
    transform: scale(1.06);
  }
}

.count-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.count-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: #b49dc0;
  font-weight: 600;
}
.count-num {
  font-size: 30px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.02em;
  text-shadow: 0 2px 12px rgba(255, 60, 110, 0.6);
  display: flex;
  align-items: baseline;
  gap: 2px;
  font-variant-numeric: tabular-nums;
}

.digit {
  display: inline-block;
  height: 1em;
  overflow: hidden;
  position: relative;
  width: 0.62em;
  text-align: center;
  vertical-align: bottom;
}
.digit .roll {
  display: flex;
  flex-direction: column;
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.digit .roll > span { height: 1em; line-height: 1; display: flex; align-items: center; justify-content: center; }

.comma { opacity: 0.6; }

/* top-right ticker */
.live-tag {
  position: absolute;
  right: 16px;
  top: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: rgba(255, 60, 110, 0.15);
  border: 1px solid rgba(255, 60, 110, 0.5);
  border-radius: 6px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.22em;
  color: #ff7f9d;
  z-index: 5;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #ff3c6f;
  box-shadow: 0 0 8px #ff3c6f;
  animation: liveBlink 1s ease-in-out infinite;
}
@keyframes liveBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.replay {
  position: absolute;
  right: 16px;
  bottom: 16px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.08);
  color: #e4e5ea;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  z-index: 10;
  backdrop-filter: blur(8px);
}
.replay:hover { background: rgba(255,255,255,0.14); }

.info {
  position: absolute;
  left: 24px;
  top: 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  z-index: 5;
  font-size: 11px;
  letter-spacing: 0.12em;
}
.info .atom-name { color: #fff; font-weight: 700; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
.info .tech { color: #a08fb0; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
</style>
</head>
<body>

<div class="stage">
  <div class="bg-glow"></div>
  <canvas id="canvas"></canvas>

  <div class="info">
    <span class="atom-name">15 · Heart Rain</span>
    <span class="tech">Canvas 2D · live reaction</span>
  </div>

  <div class="live-tag">
    <span class="live-dot"></span>LIVE
  </div>

  <div class="counter">
    <button class="like-btn" id="likeBtn" aria-label="like">
      <svg viewBox="0 0 32 32">
        <path d="M16 28 C 3 19, 3 10, 9 7 C 13 5, 16 8, 16 11 C 16 8, 19 5, 23 7 C 29 10, 29 19, 16 28 Z"
              fill="#fff"/>
      </svg>
    </button>
    <div class="count-wrap">
      <div class="count-label">LIKES</div>
      <div class="count-num" id="counter"></div>
    </div>
  </div>

  <button class="replay" id="replayBtn">REPLAY</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stage = canvas.parentElement;
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const r = stage.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const HEART_COLORS = [
  '#ff3c6f', '#ff7f9d', '#ff2d55',
  '#ff5e9c', '#ffb3c6', '#ff1b5e',
  '#ff8fb8'
];

function drawHeart(ctx, size) {
  // path scaled to size (0..1 sort of)
  const s = size;
  ctx.beginPath();
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(0, s * 0.05, -s * 0.5, -s * 0.15, -s * 0.5, s * 0.1);
  ctx.bezierCurveTo(-s * 0.5, s * 0.35, -s * 0.2, s * 0.55, 0, s * 0.8);
  ctx.bezierCurveTo(s * 0.2, s * 0.55, s * 0.5, s * 0.35, s * 0.5, s * 0.1);
  ctx.bezierCurveTo(s * 0.5, -s * 0.15, 0, s * 0.05, 0, s * 0.3);
  ctx.closePath();
}

class Heart {
  constructor() {
    this.x = W * 0.08 + Math.random() * W * 0.84;
    this.y = H + 30;
    this.size = 18 + Math.random() * 26;
    this.vy = -(1.2 + Math.random() * 1.8);
    this.baseX = this.x;
    this.drift = 18 + Math.random() * 40;
    this.phase = Math.random() * Math.PI * 2;
    this.freq = 0.02 + Math.random() * 0.03;
    this.color = HEART_COLORS[(Math.random() * HEART_COLORS.length) | 0];
    this.rot = (Math.random() - 0.5) * 0.5;
    this.life = 1;
    this.popIn = 0; // scale-in from 0 to 1
  }
  update(dt) {
    this.popIn = Math.min(1, this.popIn + 0.08 * dt);
    this.phase += this.freq * 16 * dt;
    this.y += this.vy * dt;
    this.x = this.baseX + Math.sin(this.phase) * this.drift;
    // fade near top
    const fadeStart = H * 0.35;
    if (this.y < fadeStart) {
      this.life = Math.max(0, (this.y - H * 0.08) / (fadeStart - H * 0.08));
    }
  }
  draw(ctx) {
    if (this.life <= 0) return;
    const scale = this.popIn < 1
      ? (1.25 - Math.abs(0.5 - this.popIn) * 0.5) * this.popIn
      : 1;
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.scale(scale, scale);

    // glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 18;
    ctx.fillStyle = this.color;
    drawHeart(ctx, this.size);
    ctx.fill();

    // highlight
    ctx.shadowBlur = 0;
    ctx.globalAlpha = this.life * 0.55;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(-this.size * 0.15, -this.size * 0.02, this.size * 0.12, this.size * 0.07, -0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

let hearts = [];
let count = 12453;

function spawn(n = 1) {
  for (let i = 0; i < n; i++) hearts.push(new Heart());
  count += n;
  updateCounter();
}

// counter with digit roll
function formatNumber(n) {
  return n.toLocaleString('en-US');
}

const counterEl = document.getElementById('counter');
let currentStr = '';

function buildCounter(str) {
  counterEl.innerHTML = '';
  for (const ch of str) {
    if (/\d/.test(ch)) {
      const d = document.createElement('span');
      d.className = 'digit';
      const roll = document.createElement('span');
      roll.className = 'roll';
      for (let i = 0; i <= 9; i++) {
        const s = document.createElement('span');
        s.textContent = i;
        roll.appendChild(s);
      }
      d.appendChild(roll);
      d.dataset.val = ch;
      roll.style.transform = `translateY(-${ch}em)`;
      counterEl.appendChild(d);
    } else {
      const s = document.createElement('span');
      s.className = 'comma';
      s.textContent = ch;
      counterEl.appendChild(s);
    }
  }
  currentStr = str;
}

function updateCounter() {
  const str = formatNumber(count);
  if (str.length !== currentStr.length) {
    buildCounter(str);
    return;
  }
  const nodes = counterEl.children;
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    const node = nodes[i];
    if (!node) continue;
    if (/\d/.test(ch)) {
      if (node.dataset.val !== ch) {
        node.dataset.val = ch;
        node.querySelector('.roll').style.transform = `translateY(-${ch}em)`;
      }
    }
  }
}

buildCounter(formatNumber(count));

let lastT = performance.now();
let spawnAcc = 0;
function tick(t) {
  const dt = Math.min(3, (t - lastT) / 16.67);
  lastT = t;
  ctx.clearRect(0, 0, W, H);

  // auto spawn ~6-10 per second
  spawnAcc += dt;
  if (spawnAcc > 10) {
    spawn(1 + ((Math.random() * 2) | 0));
    spawnAcc = 0;
  }

  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    h.update(dt);
    h.draw(ctx);
    if (h.life <= 0 || h.y < -40) hearts.splice(i, 1);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

document.getElementById('likeBtn').onclick = () => {
  spawn(6 + ((Math.random() * 4) | 0));
};

document.getElementById('replayBtn').onclick = () => {
  hearts = [];
  count = 12453;
  buildCounter(formatNumber(count));
};

window.addEventListener('load', () => {
  // start with a little swarm
  setTimeout(() => spawn(8), 300);
});
</script>

</body>
</html>
