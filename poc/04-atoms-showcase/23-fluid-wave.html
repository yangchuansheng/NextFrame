<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>23 · Fluid Wave Shader</title>
<style>
:root {
  --bg: #0a0a0d;
  --text: #e4e5ea;
  --text-dim: #7a7d86;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 30%, #0c0815, #020205);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: var(--text);
}
.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  max-height: 92vh;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  background: #020206;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.7));
  border: 1px solid rgba(255,255,255,0.04);
}
canvas { display: block; width: 100%; height: 100%; }
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: rgba(255,255,255,0.06);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  z-index: 100;
  backdrop-filter: blur(8px);
}
.replay:hover { background: rgba(255,255,255,0.12); }
.info {
  position: absolute;
  left: 22px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
  z-index: 10;
}
.atom-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
  text-shadow: 0 2px 12px rgba(0,0,0,0.8);
}
.tech {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.corner {
  position: absolute;
  top: 18px;
  right: 18px;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.4);
  font-weight: 600;
  z-index: 10;
  mix-blend-mode: difference;
}
</style>
</head>
<body>

<button class="replay" id="replayBtn">↻ REPLAY</button>

<div class="stage" id="stage">
  <canvas id="c"></canvas>
  <div class="corner">23 / 24</div>
  <div class="info">
    <span class="atom-name">Fluid Wave · FBM Shader</span>
    <span class="tech">THREE.JS · FRAGMENT SHADER · FBM NOISE</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('c');
  const stage = document.getElementById('stage');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const vert = /* glsl */`
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position, 1.0);
    }
  `;

  const frag = /* glsl */`
    precision highp float;
    varying vec2 vUv;
    uniform float uTime;
    uniform vec2  uRes;
    uniform vec2  uMouse;

    // hash & value-noise
    float hash(vec2 p){
      p = fract(p * vec2(234.34, 435.345));
      p += dot(p, p + 34.23);
      return fract(p.x * p.y);
    }
    float noise(vec2 p){
      vec2 i = floor(p);
      vec2 f = fract(p);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
    }
    float fbm(vec2 p){
      float v = 0.0;
      float a = 0.5;
      mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
      for(int i = 0; i < 6; i++){
        v += a * noise(p);
        p = rot * p * 2.02;
        a *= 0.5;
      }
      return v;
    }

    // Cosine palette (Iñigo Quilez)
    vec3 palette(float t){
      vec3 a = vec3(0.55, 0.45, 0.55);
      vec3 b = vec3(0.45, 0.35, 0.50);
      vec3 c = vec3(1.0, 1.0, 1.0);
      vec3 d = vec3(0.00, 0.25, 0.55); // phase
      return a + b * cos(6.2831 * (c * t + d));
    }

    void main(){
      vec2 uv = vUv;
      // aspect-correct
      vec2 p = (uv - 0.5) * vec2(uRes.x / uRes.y, 1.0);

      float t = uTime * 0.12;

      // Domain warp (fluid feel)
      vec2 q = vec2(
        fbm(p * 1.8 + vec2(0.0, t)),
        fbm(p * 1.8 + vec2(5.2, t * 1.1))
      );
      vec2 r = vec2(
        fbm(p * 2.3 + 1.6 * q + vec2(1.7 + t * 0.9, 9.2)),
        fbm(p * 2.3 + 1.6 * q + vec2(8.3 - t * 0.7, 2.8))
      );
      float f = fbm(p * 2.5 + 2.4 * r + t);

      // remap to nice range
      float v = smoothstep(0.0, 1.1, f + 0.15);

      // Color cycling through deep blue → cyan → purple → pink → orange
      vec3 col = palette(v + t * 0.5);

      // Liquid highlight: bright ridge where gradient is small
      float ridge = 1.0 - abs(r.x - r.y);
      ridge = pow(max(ridge, 0.0), 6.0);
      col += vec3(1.0, 0.85, 0.7) * ridge * 0.35;

      // Rim darkening (vignette)
      float vig = smoothstep(1.2, 0.3, length(p));
      col *= mix(0.55, 1.0, vig);

      // Subtle bloom-ish lift in highlights
      col += pow(v, 4.0) * vec3(0.45, 0.3, 0.6) * 0.6;

      // Mouse influence (subtle warm pulse)
      float md = length(p - (uMouse - 0.5) * vec2(uRes.x / uRes.y, 1.0));
      col += vec3(1.0, 0.5, 0.3) * smoothstep(0.6, 0.0, md) * 0.15;

      // Gamma-ish tonemap
      col = col / (1.0 + col);
      col = pow(col, vec3(0.9));

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  const uniforms = {
    uTime:  { value: 0 },
    uRes:   { value: new THREE.Vector2(1, 1) },
    uMouse: { value: new THREE.Vector2(0.5, 0.5) },
  };

  const geo = new THREE.PlaneGeometry(2, 2);
  const mat = new THREE.ShaderMaterial({
    vertexShader: vert,
    fragmentShader: frag,
    uniforms,
  });
  const quad = new THREE.Mesh(geo, mat);
  scene.add(quad);

  function resize() {
    const rect = canvas.getBoundingClientRect();
    renderer.setSize(rect.width, rect.height, false);
    uniforms.uRes.value.set(rect.width, rect.height);
  }
  resize();
  window.addEventListener('resize', resize);

  stage.addEventListener('mousemove', (e) => {
    const rect = stage.getBoundingClientRect();
    uniforms.uMouse.value.set(
      (e.clientX - rect.left) / rect.width,
      1 - (e.clientY - rect.top) / rect.height
    );
  });

  const clock = new THREE.Clock();
  let rafId = 0;
  function tick() {
    uniforms.uTime.value = clock.getElapsedTime();
    renderer.render(scene, camera);
    rafId = requestAnimationFrame(tick);
  }

  function replay() {
    cancelAnimationFrame(rafId);
    clock.start();
    tick();
  }

  document.getElementById('replayBtn').onclick = replay;
  tick();
})();
</script>
</body>
</html>
