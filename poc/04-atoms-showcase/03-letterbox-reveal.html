<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letterbox Reveal · DUNE</title>
<style>
:root {
  --bg: #050608;
  --ink: #e8e4d8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 50%, #0e0e12, #030406 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: var(--ink);
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.7));
  background: #000;
}

/* ============ Scene (sky + mountains + sun) ============ */
.scene {
  position: absolute;
  inset: 0;
  transform-origin: 50% 70%;
  animation: sceneZoom 8s ease-out forwards;
  opacity: 0;
}
@keyframes sceneZoom {
  0%   { opacity: 0; transform: scale(1.0); }
  8%   { opacity: 1; }
  100% { opacity: 1; transform: scale(1.08); }
}
.scene svg { width: 100%; height: 100%; display: block; }

/* Ambient dust motes */
.motes {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}
.motes span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #f0d8a0;
  border-radius: 50%;
  opacity: 0;
  box-shadow: 0 0 4px #f0d8a0;
  animation: mote 7s linear infinite;
}
.motes span:nth-child(1) { left: 12%; animation-delay: 0.5s; }
.motes span:nth-child(2) { left: 28%; animation-delay: 2.1s; }
.motes span:nth-child(3) { left: 42%; animation-delay: 1.4s; }
.motes span:nth-child(4) { left: 58%; animation-delay: 3.2s; }
.motes span:nth-child(5) { left: 72%; animation-delay: 0.9s; }
.motes span:nth-child(6) { left: 86%; animation-delay: 2.8s; }
@keyframes mote {
  0%   { top: 95%; opacity: 0; }
  15%  { opacity: 0.8; }
  85%  { opacity: 0.8; }
  100% { top: 25%; opacity: 0; }
}

/* ============ Letterbox bars ============ */
.bar {
  position: absolute;
  left: 0;
  right: 0;
  height: 50.1%;
  background: #000;
  z-index: 10;
}
.bar.top {
  top: 0;
  animation: barOpenTop 1.6s cubic-bezier(0.7, 0, 0.25, 1) forwards;
  border-bottom: 1px solid rgba(60, 50, 30, 0.4);
}
.bar.bot {
  bottom: 0;
  animation: barOpenBot 1.6s cubic-bezier(0.7, 0, 0.25, 1) forwards;
  border-top: 1px solid rgba(60, 50, 30, 0.4);
}
@keyframes barOpenTop {
  0%   { transform: translateY(50%); }
  100% { transform: translateY(0); }
}
@keyframes barOpenBot {
  0%   { transform: translateY(-50%); }
  100% { transform: translateY(0); }
}

/* ============ Title ============ */
.title-wrap {
  position: absolute;
  left: 0; right: 0;
  top: 38%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  animation: titleIn 3s ease-out forwards 2s;
}
@keyframes titleIn {
  0%   { opacity: 0; transform: translateY(16px); letter-spacing: 0.35em; }
  40%  { opacity: 1; }
  100% { opacity: 1; transform: translateY(0); letter-spacing: 0.25em; }
}

.title {
  font-family: "Times New Roman", "Georgia", serif;
  font-weight: 300;
  font-size: 58px;
  letter-spacing: 0.25em;
  color: #f0e4c0;
  text-shadow:
    0 0 12px rgba(240, 220, 160, 0.25),
    0 2px 20px rgba(0, 0, 0, 0.8);
  line-height: 1;
}
.title .colon { opacity: 0.6; margin: 0 0.15em; }
.subtitle-row {
  margin-top: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  opacity: 0;
  animation: subIn 1s ease-out forwards 3.2s;
}
@keyframes subIn { to { opacity: 1; } }
.rule {
  width: 64px;
  height: 1px;
  background: linear-gradient(to right, transparent, #a08858, transparent);
}
.subtitle {
  font-family: "Courier New", "SF Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.4em;
  color: #c8b488;
  position: relative;
}
.subtitle::after {
  content: "";
  position: absolute;
  right: -10px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #c8b488;
  animation: caret 0.8s steps(2) infinite;
}
.subtitle.done::after { display: none; }
@keyframes caret { 50% { opacity: 0; } }

/* Year line */
.year-line {
  position: absolute;
  left: 0; right: 0;
  top: 58%;
  text-align: center;
  font-family: "Courier New", monospace;
  font-size: 10px;
  color: #8a7858;
  letter-spacing: 0.3em;
  opacity: 0;
  animation: yearIn 1.2s ease-out forwards 4.2s;
  z-index: 5;
}
@keyframes yearIn { to { opacity: 1; } }

/* Final fade to black */
.fadeout {
  position: absolute;
  inset: 0;
  background: #000;
  opacity: 0;
  z-index: 15;
  pointer-events: none;
  animation: fadeOut 1.8s ease-in forwards 6.5s;
}
@keyframes fadeOut {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

/* Anamorphic subtle lens flare */
.anamorph {
  position: absolute;
  left: 62%;
  top: 42%;
  width: 300px;
  height: 2px;
  background: linear-gradient(to right,
    transparent, rgba(160, 200, 255, 0.4), rgba(200, 220, 255, 0.7), rgba(160, 200, 255, 0.4), transparent);
  filter: blur(1px);
  opacity: 0;
  z-index: 4;
  pointer-events: none;
  animation: anamorphIn 3s ease-out forwards 1.8s;
}
@keyframes anamorphIn {
  0%   { opacity: 0; transform: scaleX(0.3); }
  50%  { opacity: 0.8; transform: scaleX(1); }
  100% { opacity: 0.4; transform: scaleX(1); }
}

/* Replay + info */
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: #1a1a1c;
  color: #f0e4c0;
  border: 1px solid #3a3a40;
  border-radius: 10px;
  cursor: pointer;
  font-family: "Courier New", monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  z-index: 100;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
.replay:hover { background: #22222a; }
.info {
  position: fixed;
  left: 24px;
  bottom: 22px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-family: -apple-system, sans-serif;
}
.info .atom-name { font-size: 13px; font-weight: 700; color: #e4e5ea; letter-spacing: 0.04em; }
.info .tech { font-size: 10px; color: #7a7d86; letter-spacing: 0.08em; }
</style>
</head>
<body>

<button class="replay" id="replayBtn">↻ REPLAY</button>

<div class="stage" id="stage">

  <div class="scene">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="dsky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1a0f14"/>
          <stop offset="0.3" stop-color="#3a1f18"/>
          <stop offset="0.55" stop-color="#8a4a22"/>
          <stop offset="0.75" stop-color="#d07838"/>
          <stop offset="1" stop-color="#f0c478"/>
        </linearGradient>
        <radialGradient id="dsun" cx="0.62" cy="0.78" r="0.22">
          <stop offset="0" stop-color="#ffe4a0"/>
          <stop offset="0.25" stop-color="#ffba58" stop-opacity="0.9"/>
          <stop offset="1" stop-color="#ffba58" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#5a2e18"/>
          <stop offset="1" stop-color="#1a0804"/>
        </linearGradient>
        <filter id="dblur">
          <feGaussianBlur stdDeviation="0.8"/>
        </filter>
      </defs>

      <!-- Sky -->
      <rect width="1600" height="900" fill="url(#dsky)"/>
      <!-- Sun halo -->
      <circle cx="992" cy="702" r="300" fill="url(#dsun)"/>
      <!-- Sun disc -->
      <circle cx="992" cy="702" r="58" fill="#fff0c0" opacity="0.95"/>
      <circle cx="992" cy="702" r="38" fill="#ffffff"/>

      <!-- Stars (faint, upper left) -->
      <g fill="#f0e8c0" opacity="0.5">
        <circle cx="120" cy="80" r="1"/>
        <circle cx="260" cy="50" r="0.8"/>
        <circle cx="380" cy="110" r="1.2"/>
        <circle cx="500" cy="70" r="0.8"/>
        <circle cx="160" cy="180" r="0.9"/>
        <circle cx="320" cy="200" r="1.1"/>
        <circle cx="60"  cy="140" r="0.8"/>
        <circle cx="440" cy="180" r="0.9"/>
      </g>

      <!-- Far mountain range -->
      <path d="M 0 620 L 80 560 L 160 600 L 240 540 L 340 590 L 420 545 L 520 595 L 620 550 L 720 600 L 820 560 L 920 610 L 1040 555 L 1160 605 L 1280 565 L 1400 615 L 1520 580 L 1600 610 L 1600 900 L 0 900 Z"
            fill="#5a2418" opacity="0.75" filter="url(#dblur)"/>

      <!-- Mid mountain range -->
      <path d="M 0 680 L 120 600 L 220 650 L 340 580 L 460 640 L 580 585 L 700 645 L 820 600 L 940 650 L 1080 580 L 1200 640 L 1320 610 L 1440 660 L 1560 615 L 1600 640 L 1600 900 L 0 900 Z"
            fill="#3a1410"/>

      <!-- Dune foreground -->
      <path d="M 0 760 L 200 720 L 400 770 L 600 735 L 820 775 L 1040 740 L 1260 780 L 1480 745 L 1600 770 L 1600 900 L 0 900 Z"
            fill="#1a0804"/>

      <!-- Foreground silhouette: lone figure -->
      <g transform="translate(260, 720)" fill="#000">
        <!-- robed figure -->
        <path d="M -6 0 L -14 42 L -10 46 L -4 46 L -2 18 L 2 18 L 4 46 L 10 46 L 14 42 L 6 0 Z"/>
        <ellipse cx="0" cy="-6" rx="6" ry="7"/>
        <!-- hood -->
        <path d="M -8 -10 Q -8 -18 0 -18 Q 8 -18 8 -10 L 6 -2 L -6 -2 Z"/>
        <!-- staff -->
        <line x1="14" y1="-12" x2="18" y2="46" stroke="#000" stroke-width="1.5"/>
      </g>

      <!-- Second tiny figure further back -->
      <g transform="translate(330, 745) scale(0.6)" fill="#000" opacity="0.8">
        <path d="M -6 0 L -14 42 L -10 46 L -4 46 L -2 18 L 2 18 L 4 46 L 10 46 L 14 42 L 6 0 Z"/>
        <ellipse cx="0" cy="-6" rx="6" ry="7"/>
        <path d="M -8 -10 Q -8 -18 0 -18 Q 8 -18 8 -10 L 6 -2 L -6 -2 Z"/>
      </g>

      <!-- Horizon glow line -->
      <line x1="0" y1="735" x2="1600" y2="735" stroke="#f0c478" stroke-width="0.5" opacity="0.3"/>
    </svg>
  </div>

  <!-- Anamorphic lens flare -->
  <div class="anamorph"></div>

  <!-- Dust motes -->
  <div class="motes">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Title -->
  <div class="title-wrap">
    <div class="title">DUNE<span class="colon">:</span>PART TWO</div>
    <div class="subtitle-row">
      <span class="rule"></span>
      <span class="subtitle" id="subtitle"></span>
      <span class="rule"></span>
    </div>
  </div>

  <div class="year-line">MMXXIV · A HANS ZIMMER FILM</div>

  <!-- Letterbox bars -->
  <div class="bar top"></div>
  <div class="bar bot"></div>

  <!-- Fade out -->
  <div class="fadeout"></div>
</div>

<div class="info">
  <span class="atom-name">Letterbox Reveal · Cinematic</span>
  <span class="tech">clip animation · typewriter · SVG scenography</span>
</div>

<script>
const stage = document.getElementById('stage');
const btn = document.getElementById('replayBtn');
const SUB_TEXT = "A HANS ZIMMER FILM";

function typewriter(el, text, delay, charDur) {
  el.textContent = '';
  el.classList.remove('done');
  setTimeout(() => {
    let i = 0;
    const step = () => {
      if (i >= text.length) {
        el.classList.add('done');
        return;
      }
      el.textContent += text[i++];
      setTimeout(step, charDur);
    };
    step();
  }, delay);
}

function run() {
  // Reset all animations
  stage.querySelectorAll('.scene, .bar, .title-wrap, .year-line, .fadeout, .subtitle-row, .anamorph, .motes span').forEach(el => {
    const anim = getComputedStyle(el).animation;
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });
  typewriter(document.getElementById('subtitle'), SUB_TEXT, 3400, 70);

  // Auto replay after 9.5s
  clearTimeout(window._loop);
  window._loop = setTimeout(run, 9500);
}

btn.onclick = run;
window.addEventListener('load', () => setTimeout(run, 300));
</script>
</body>
</html>
