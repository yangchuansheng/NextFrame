<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typewriter Code · Rust in Terminal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 20%, #14141a, #050608);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  background: #15161b;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.7));
  border: 1px solid #26262a;
}

/* ===== Terminal chrome ===== */
.titlebar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 36px;
  background: linear-gradient(180deg, #2a2a30 0%, #1e1e24 100%);
  border-bottom: 1px solid #0a0a0d;
  display: flex;
  align-items: center;
  padding: 0 14px;
  z-index: 2;
}
.lights { display: flex; gap: 8px; }
.light {
  width: 12px; height: 12px;
  border-radius: 50%;
  box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
}
.light.r { background: #ff5f57; }
.light.y { background: #febc2e; }
.light.g { background: #28c840; }
.title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-family: -apple-system, sans-serif;
  font-size: 13px;
  color: #8a8d95;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.title::before {
  content: "zhuanz";
  color: #b4b7bf;
}
.title::after {
  content: " — rustc main.rs — 120×30";
}

/* ===== Code area ===== */
.code-area {
  position: absolute;
  top: 36px;
  left: 0; right: 0;
  bottom: 0;
  padding: 22px 28px 22px 64px;
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  font-size: 15px;
  line-height: 1.55;
  color: #d8d9dd;
  overflow: hidden;
}

.line-numbers {
  position: absolute;
  top: 22px;
  left: 0;
  width: 48px;
  padding-right: 12px;
  text-align: right;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: #3a3d45;
  line-height: 1.55;
  user-select: none;
}

.code {
  white-space: pre;
  position: relative;
}

/* token colors */
.kw  { color: #c792ea; font-weight: 600; }   /* purple - keyword */
.fn  { color: #82aaff; }                      /* blue - function */
.ty  { color: #7fdbca; }                      /* teal - type */
.str { color: #f78c6c; }                      /* orange - string */
.num { color: #ffcb6b; }                      /* yellow - number */
.cm  { color: #5a5d65; font-style: italic; }  /* gray - comment */
.pn  { color: #89ddff; }                      /* cyan - punct */
.mac { color: #ffcb6b; }                      /* yellow - macro */

.cursor {
  display: inline-block;
  width: 9px;
  height: 17px;
  background: #7fdbca;
  vertical-align: text-bottom;
  margin-left: 1px;
  animation: blink 1s steps(2, start) infinite;
  box-shadow: 0 0 8px rgba(127, 219, 202, 0.6);
}
@keyframes blink {
  to { visibility: hidden; }
}

/* ===== Output panel (slides up from bottom) ===== */
.output {
  position: absolute;
  left: 0; right: 0;
  bottom: 0;
  background: #0d0e12;
  border-top: 1px solid #26262a;
  padding: 14px 28px 18px 64px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 14px;
  line-height: 1.6;
  color: #9ca0a8;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  max-height: 46%;
  overflow: hidden;
}
.output.show { transform: translateY(0); }
.output .prompt { color: #5a5d65; }
.output .run { color: #7fdbca; }
.output .ok { color: #4ade80; font-weight: 600; }
.output .val { color: #ffcb6b; }

/* ===== Info + replay ===== */
.info {
  position: fixed;
  left: 24px;
  bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 99;
  font-family: "SF Mono", Menlo, monospace;
}
.atom-name {
  color: #e4e5ea;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.tech {
  color: #5a5d65;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 9px 16px;
  background: #1e1e24;
  color: #c792ea;
  border: 1px solid #3a3244;
  border-radius: 8px;
  cursor: pointer;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  z-index: 100;
  transition: all 0.2s;
}
.replay:hover { background: #2a2632; border-color: #c792ea; }
</style>
</head>
<body>

<button class="replay" id="replayBtn">&#x21bb; REPLAY</button>

<div class="info">
  <span class="atom-name">TYPEWRITER CODE</span>
  <span class="tech">HTML · CSS · JS · token-stream</span>
</div>

<div class="stage">
  <div class="titlebar">
    <div class="lights">
      <div class="light r"></div>
      <div class="light y"></div>
      <div class="light g"></div>
    </div>
    <div class="title"></div>
  </div>

  <div class="line-numbers" id="lineNums"></div>

  <div class="code-area">
    <div class="code" id="code"></div>
  </div>

  <div class="output" id="output">
    <div><span class="prompt">$</span> <span class="run">cargo run --release</span></div>
    <div style="color:#5a5d65;">   Compiling fib v0.1.0</div>
    <div style="color:#5a5d65;">    Finished `release` profile [optimized] in 0.42s</div>
    <div style="color:#5a5d65;">     Running `target/release/fib`</div>
    <div>fib(<span class="val">10</span>) = <span class="val">55</span></div>
    <div>fib(<span class="val">20</span>) = <span class="val">6765</span></div>
    <div>fib(<span class="val">30</span>) = <span class="val">832040</span></div>
    <div><span class="ok">[OK]</span> process exited with code 0</div>
  </div>
</div>

<script>
// Tokenized source: each token has class + text. Whitespace preserved as plain.
// Code: Rust fibonacci, 20 lines.
const SRC = [
  [['cm','// fibonacci.rs']],
  [['cm','// memoized recursion']],
  [],
  [['kw','use'],['', ' '],['','std'],['pn','::'],['','collections'],['pn','::'],['ty','HashMap'],['pn',';']],
  [],
  [['kw','fn'],['', ' '],['fn','fib'],['pn','('],['','n'],['pn',':'],['', ' '],['ty','u64'],['pn',','],['', ' '],['','memo'],['pn',':'],['', ' '],['kw','&mut'],['', ' '],['ty','HashMap'],['pn','<'],['ty','u64'],['pn',','],['', ' '],['ty','u64'],['pn','>'],['pn',')'],['', ' '],['pn','->'],['', ' '],['ty','u64'],['', ' '],['pn','{']],
  [['', '    '],['kw','if'],['', ' '],['','n'],['', ' '],['pn','<'],['', ' '],['num','2'],['', ' '],['pn','{'],['', ' '],['kw','return'],['', ' '],['','n'],['pn',';'],['', ' '],['pn','}']],
  [['', '    '],['kw','if'],['', ' '],['kw','let'],['', ' '],['ty','Some'],['pn','('],['','v'],['pn',')'],['', ' '],['pn','='],['', ' '],['','memo'],['pn','.'],['fn','get'],['pn','('],['pn','&'],['','n'],['pn',')'],['', ' '],['pn','{']],
  [['', '        '],['kw','return'],['', ' '],['pn','*'],['','v'],['pn',';']],
  [['', '    '],['pn','}']],
  [['', '    '],['kw','let'],['', ' '],['','r'],['', ' '],['pn','='],['', ' '],['fn','fib'],['pn','('],['','n'],['', ' '],['pn','-'],['', ' '],['num','1'],['pn',','],['', ' '],['','memo'],['pn',')'],['', ' '],['pn','+'],['', ' '],['fn','fib'],['pn','('],['','n'],['', ' '],['pn','-'],['', ' '],['num','2'],['pn',','],['', ' '],['','memo'],['pn',')'],['pn',';']],
  [['', '    '],['','memo'],['pn','.'],['fn','insert'],['pn','('],['','n'],['pn',','],['', ' '],['','r'],['pn',')'],['pn',';']],
  [['', '    '],['','r']],
  [['pn','}']],
  [],
  [['kw','fn'],['', ' '],['fn','main'],['pn','()'],['', ' '],['pn','{']],
  [['', '    '],['kw','let'],['', ' '],['kw','mut'],['', ' '],['','m'],['', ' '],['pn','='],['', ' '],['ty','HashMap'],['pn','::'],['fn','new'],['pn','()'],['pn',';']],
  [['', '    '],['kw','for'],['', ' '],['','n'],['', ' '],['kw','in'],['', ' '],['pn','['],['num','10'],['pn',','],['', ' '],['num','20'],['pn',','],['', ' '],['num','30'],['pn',']'],['', ' '],['pn','{']],
  [['', '        '],['mac','println!'],['pn','('],['str','"fib({}) = {}"'],['pn',','],['', ' '],['','n'],['pn',','],['', ' '],['fn','fib'],['pn','('],['','n'],['pn',','],['', ' '],['pn','&mut'],['', ' '],['','m'],['pn',')'],['pn',')'],['pn',';']],
  [['', '    '],['pn','}']],
  [['pn','}']],
];

const codeEl = document.getElementById('code');
const lineNumsEl = document.getElementById('lineNums');
const outputEl = document.getElementById('output');

// build line numbers
function buildLineNums() {
  lineNumsEl.innerHTML = '';
  for (let i = 1; i <= SRC.length; i++) {
    const d = document.createElement('div');
    d.textContent = i;
    lineNumsEl.appendChild(d);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// typing rhythm: slightly random, with occasional "thinking" pauses
function charDelay(ch, idx) {
  const base = 18 + Math.random() * 22;
  if (ch === ' ') return base * 0.5;
  if (ch === '(' || ch === '{' || ch === ';') return base * 1.3;
  // occasional thinking pause
  if (Math.random() < 0.01) return base + 180 + Math.random() * 120;
  return base;
}

let cancelled = false;

async function runTimeline() {
  cancelled = false;
  codeEl.innerHTML = '';
  outputEl.classList.remove('show');
  buildLineNums();

  // Pre-create all line divs (so cursor always at end)
  const lineEls = [];
  for (let i = 0; i < SRC.length; i++) {
    const div = document.createElement('div');
    div.className = 'ln';
    codeEl.appendChild(div);
    lineEls.push(div);
  }
  // cursor at end
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  codeEl.appendChild(cursor);

  await sleep(350);

  for (let li = 0; li < SRC.length; li++) {
    if (cancelled) return;
    const line = SRC[li];
    const lineEl = lineEls[li];

    // empty line — still has height
    if (line.length === 0) {
      lineEl.innerHTML = '&nbsp;';
      // move cursor visually: re-append so it's after this line
      codeEl.appendChild(cursor);
      await sleep(40);
      continue;
    }

    for (const token of line) {
      if (cancelled) return;
      const [cls, text] = token;
      const span = document.createElement('span');
      if (cls) span.className = cls;
      lineEl.appendChild(span);

      for (let ci = 0; ci < text.length; ci++) {
        span.textContent += text[ci];
        codeEl.appendChild(cursor);
        await sleep(charDelay(text[ci], ci));
        if (cancelled) return;
      }
    }
    // brief pause at line end
    await sleep(60 + Math.random() * 90);
  }

  // done typing — show cursor one more blink then reveal output
  await sleep(420);
  if (cancelled) return;
  outputEl.classList.add('show');

  // hold, then reset
  await sleep(2800);
  if (cancelled) return;

  // fade out code before replay
  codeEl.style.transition = 'opacity 0.3s';
  codeEl.style.opacity = '0.15';
  outputEl.style.transition = 'transform 0.3s';
  outputEl.classList.remove('show');
  await sleep(500);
  codeEl.style.transition = '';
  codeEl.style.opacity = '';
  outputEl.style.transition = '';

  runTimeline();
}

document.getElementById('replayBtn').onclick = () => {
  cancelled = true;
  setTimeout(runTimeline, 100);
};

window.addEventListener('load', () => setTimeout(runTimeline, 300));
</script>
</body>
</html>
