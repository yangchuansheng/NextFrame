<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atom 14 · Snow Night</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #0a0a0d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6));
  background:
    radial-gradient(ellipse 80% 60% at 50% 110%, #2a1f4a 0%, transparent 60%),
    linear-gradient(180deg, #0b0e24 0%, #141738 35%, #1e1b44 70%, #2a1f4a 100%);
}

/* stars */
.stars { position: absolute; inset: 0; pointer-events: none; }
.stars::before, .stars::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 12%, #fff, transparent),
    radial-gradient(1px 1px at 25% 8%, #cfd8ff, transparent),
    radial-gradient(1.5px 1.5px at 40% 15%, #fff, transparent),
    radial-gradient(1px 1px at 55% 6%, #fff, transparent),
    radial-gradient(1.2px 1.2px at 68% 18%, #ffe9c2, transparent),
    radial-gradient(1px 1px at 80% 10%, #fff, transparent),
    radial-gradient(1px 1px at 92% 22%, #cfd8ff, transparent),
    radial-gradient(1px 1px at 15% 30%, #fff, transparent),
    radial-gradient(1px 1px at 48% 34%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 72% 28%, #fff, transparent),
    radial-gradient(1px 1px at 88% 36%, #ffe9c2, transparent);
  opacity: 0.9;
}
.stars::after { animation: twinkle 4s ease-in-out infinite alternate; opacity: 0.55; }
@keyframes twinkle {
  0%   { opacity: 0.3; }
  100% { opacity: 0.9; }
}

/* moon */
.moon {
  position: absolute;
  right: 12%;
  top: 14%;
  width: 70px; height: 70px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff8e0, #e8d8a0 55%, #b8a060 100%);
  box-shadow:
    0 0 40px rgba(255, 240, 180, 0.35),
    0 0 90px rgba(255, 240, 180, 0.2);
}
.moon::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  top: 22px; left: 40px;
  border-radius: 50%;
  background: rgba(120, 100, 60, 0.35);
}
.moon::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  top: 44px; left: 18px;
  border-radius: 50%;
  background: rgba(120, 100, 60, 0.35);
}

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ground + cabin */
.scene-svg {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  pointer-events: none;
}

.window-glow {
  animation: flicker 3.2s ease-in-out infinite alternate;
}
@keyframes flicker {
  0%   { opacity: 0.85; }
  50%  { opacity: 1; }
  100% { opacity: 0.78; }
}

.replay {
  position: absolute;
  right: 16px;
  top: 16px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.08);
  color: #e4e5ea;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  z-index: 10;
  backdrop-filter: blur(8px);
}
.replay:hover { background: rgba(255,255,255,0.14); }

.info {
  position: absolute;
  left: 16px;
  bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  z-index: 10;
  font-size: 11px;
  letter-spacing: 0.12em;
}
.info .atom-name { color: #f0f2ff; font-weight: 700; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
.info .tech { color: #8a8faa; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
</style>
</head>
<body>

<div class="stage">
  <div class="stars"></div>
  <div class="moon"></div>
  <canvas id="canvas"></canvas>

  <svg class="scene-svg" viewBox="0 0 960 270" preserveAspectRatio="xMidYMax meet">
    <!-- far hills -->
    <path d="M0,180 Q120,150 220,165 T460,155 T720,170 T960,160 L960,270 L0,270 Z"
          fill="#1a1538" opacity="0.85"/>
    <!-- near hills -->
    <path d="M0,220 Q140,190 280,205 T540,200 T820,212 T960,208 L960,270 L0,270 Z"
          fill="#100c24"/>

    <!-- trees -->
    <g fill="#070515" opacity="0.95">
      <path d="M120,220 L108,235 L116,235 L104,252 L116,252 L100,270 L140,270 L124,252 L136,252 L124,235 L132,235 Z"/>
      <path d="M170,212 L160,226 L167,226 L156,240 L168,240 L154,260 L186,260 L172,240 L184,240 L173,226 L180,226 Z"/>
      <path d="M820,218 L810,232 L817,232 L806,246 L818,246 L804,266 L836,266 L822,246 L834,246 L823,232 L830,232 Z"/>
      <path d="M870,210 L858,225 L866,225 L854,242 L868,242 L850,262 L890,262 L872,242 L884,242 L874,225 L882,225 Z"/>
    </g>

    <!-- cabin -->
    <g transform="translate(400, 175)">
      <!-- body -->
      <rect x="0" y="40" width="160" height="70" fill="#13101f" stroke="#2a2348" stroke-width="1"/>
      <!-- roof -->
      <path d="M-12,42 L80,-4 L172,42 Z" fill="#0b0918" stroke="#2a2348" stroke-width="1"/>
      <!-- snow on roof -->
      <path d="M-6,40 L80,-2 L166,40 L150,44 Q80,10 10,44 Z" fill="#e6ebff" opacity="0.92"/>
      <!-- chimney -->
      <rect x="110" y="2" width="14" height="22" fill="#13101f" stroke="#2a2348" stroke-width="1"/>
      <rect x="108" y="0" width="18" height="4" fill="#e6ebff"/>
      <!-- smoke -->
      <circle cx="117" cy="-8" r="4" fill="#e6ebff" opacity="0.25">
        <animate attributeName="cy" values="-8;-28;-48" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.2;0" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3;6;9" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="119" cy="-6" r="3" fill="#e6ebff" opacity="0.2">
        <animate attributeName="cy" values="-4;-24;-46" dur="4s" begin="1.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.15;0" dur="4s" begin="1.3s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3;5;8" dur="4s" begin="1.3s" repeatCount="indefinite"/>
      </circle>

      <!-- door -->
      <rect x="18" y="68" width="26" height="42" fill="#2a1f10" stroke="#4a3820" stroke-width="1"/>
      <circle cx="39" cy="90" r="1.4" fill="#ffd56b"/>
      <!-- windows with warm glow -->
      <g class="window-glow">
        <rect x="66" y="58" width="34" height="28" fill="#ffc96b"/>
        <rect x="66" y="58" width="34" height="28" fill="url(#glowGrad)"/>
        <line x1="83" y1="58" x2="83" y2="86" stroke="#8a5a20" stroke-width="1.5"/>
        <line x1="66" y1="72" x2="100" y2="72" stroke="#8a5a20" stroke-width="1.5"/>

        <rect x="118" y="58" width="30" height="28" fill="#ffb24a"/>
        <line x1="133" y1="58" x2="133" y2="86" stroke="#8a5a20" stroke-width="1.5"/>
        <line x1="118" y1="72" x2="148" y2="72" stroke="#8a5a20" stroke-width="1.5"/>
      </g>
      <!-- window glow halo -->
      <ellipse cx="83" cy="72" rx="38" ry="16" fill="#ffb24a" opacity="0.18"/>
      <ellipse cx="133" cy="72" rx="32" ry="14" fill="#ffb24a" opacity="0.14"/>
    </g>

    <defs>
      <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fff6c8" stop-opacity="0.6"/>
        <stop offset="1" stop-color="#ffb24a" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- snow ground -->
    <path d="M0,248 Q220,238 440,245 T820,248 T960,244 L960,270 L0,270 Z" fill="#e6ebff"/>
    <path d="M0,252 Q200,244 440,252 T960,250 L960,270 L0,270 Z" fill="#f4f6ff" opacity="0.8"/>
  </svg>

  <button class="replay" id="replayBtn">REPLAY</button>
  <div class="info">
    <span class="atom-name">14 · Snow Night</span>
    <span class="tech">Canvas 2D · 3-layer parallax</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stage = canvas.parentElement;
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const r = stage.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  seed();
}
window.addEventListener('resize', resize);

// 6-pointed snowflake drawn once per layer
function drawFlake(ctx, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i;
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * size, Math.sin(a) * size);
    // little branches
    const bx = Math.cos(a) * size * 0.55;
    const by = Math.sin(a) * size * 0.55;
    const a1 = a + 0.5;
    const a2 = a - 0.5;
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + Math.cos(a1) * size * 0.25, by + Math.sin(a1) * size * 0.25);
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + Math.cos(a2) * size * 0.25, by + Math.sin(a2) * size * 0.25);
  }
  ctx.stroke();
}

// Pre-render flake sprites for perf
const sprites = [];
function makeSprite(size, alpha, blur) {
  const pad = size * 2 + 10;
  const off = document.createElement('canvas');
  off.width = pad; off.height = pad;
  const c = off.getContext('2d');
  c.translate(pad/2, pad/2);
  c.strokeStyle = `rgba(230, 238, 255, ${alpha})`;
  c.lineWidth = Math.max(0.8, size * 0.14);
  c.lineCap = 'round';
  if (blur > 0) c.filter = `blur(${blur}px)`;
  drawFlake(c, size);
  // core
  c.filter = 'none';
  c.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
  c.beginPath(); c.arc(0, 0, Math.max(0.6, size * 0.15), 0, Math.PI * 2); c.fill();
  return off;
}

let flakes = [];
function seed() {
  // build sprite pool per layer
  sprites.length = 0;
  sprites.push(makeSprite(4, 0.45, 1.2));  // layer 0 far
  sprites.push(makeSprite(7, 0.7, 0.5));   // layer 1 mid
  sprites.push(makeSprite(12, 0.95, 0));   // layer 2 near

  flakes = [];
  const counts = [120, 70, 35];
  for (let layer = 0; layer < 3; layer++) {
    for (let i = 0; i < counts[layer]; i++) {
      flakes.push(spawn(layer, true));
    }
  }
}

function spawn(layer, firstFill) {
  const speedBase = [0.35, 0.8, 1.6][layer];
  return {
    layer,
    x: Math.random() * W,
    y: firstFill ? Math.random() * H : -20,
    baseX: Math.random() * W,
    drift: 20 + Math.random() * 40,
    phase: Math.random() * Math.PI * 2,
    freq: 0.005 + Math.random() * 0.012,
    vy: speedBase * (0.8 + Math.random() * 0.6),
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 0.01
  };
}

let lastT = performance.now();
function tick(t) {
  const dt = Math.min(3, (t - lastT) / 16.67);
  lastT = t;
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < flakes.length; i++) {
    const f = flakes[i];
    f.phase += f.freq * 16 * dt;
    f.y += f.vy * dt;
    f.x = f.baseX + Math.sin(f.phase) * f.drift;
    f.baseX += Math.cos(f.phase * 0.3) * 0.08 * dt; // slow lateral wander
    f.rot += f.vrot * dt;

    if (f.y > H + 20) {
      Object.assign(f, spawn(f.layer, false));
      f.baseX = Math.random() * W;
      f.y = -20;
    }

    const sprite = sprites[f.layer];
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.drawImage(sprite, -sprite.width/2, -sprite.height/2);
    ctx.restore();
  }

  requestAnimationFrame(tick);
}

resize();
requestAnimationFrame(tick);

document.getElementById('replayBtn').onclick = () => { seed(); };
</script>

</body>
</html>
