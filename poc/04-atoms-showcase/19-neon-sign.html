<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Sign · Text Shadow Glow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 50% 20%, #14141a, #050608);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.8));
  border: 1px solid #1a1a22;

  /* Brick wall base */
  background:
    /* top reflected neon glow */
    radial-gradient(ellipse at 50% 48%, rgba(255, 60, 180, 0.18), transparent 55%),
    radial-gradient(ellipse at 50% 80%, rgba(80, 220, 255, 0.10), transparent 60%),
    /* brick pattern */
    linear-gradient(90deg, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 2px, transparent 2px, transparent 82px),
    linear-gradient(0deg, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 2px, transparent 2px, transparent 34px),
    /* brick color variance */
    radial-gradient(ellipse at 20% 30%, #2a1a1e, #140a0d),
    linear-gradient(180deg, #1e1318 0%, #120a0c 100%);
  background-size: auto, auto, 82px 34px, 82px 34px, auto, auto;
}

/* Noise overlay to roughen the bricks */
.stage::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,255,255,0.025) 1px, transparent 1.5px),
    radial-gradient(circle at 30% 60%, rgba(255,255,255,0.02) 1px, transparent 1.5px),
    radial-gradient(circle at 70% 15%, rgba(255,255,255,0.02) 1px, transparent 1.5px),
    radial-gradient(circle at 85% 75%, rgba(255,255,255,0.025) 1px, transparent 1.5px),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.015) 1px, transparent 1.5px);
  background-size: 180px 180px, 220px 220px, 160px 200px, 240px 240px, 300px 300px;
  opacity: 0.8;
}

/* Row of bricks offset every other row (via pseudo second layer) */
.stage::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 2px, transparent 2px, transparent 82px);
  background-size: 82px 68px;
  background-position: 41px 34px;
  mix-blend-mode: multiply;
}

/* ===== Neon sign container ===== */
.neon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -54%);
  text-align: center;
  z-index: 5;
  animation: jitter 0.14s infinite steps(2);
}
@keyframes jitter {
  0%   { transform: translate(-50%, -54%) translate(0, 0); }
  50%  { transform: translate(-50%, -54%) translate(0.4px, -0.3px); }
  100% { transform: translate(-50%, -54%) translate(-0.3px, 0.4px); }
}

.word {
  font-family: "Brush Script MT", "Lucida Handwriting", "Snell Roundhand", cursive;
  font-style: italic;
  font-size: 180px;
  font-weight: 900;
  color: #fff7fb;
  letter-spacing: 0.02em;
  line-height: 1;
  display: inline-block;
}

/* Each letter individually for flicker */
.letter {
  display: inline-block;
  color: #fff0f6;
  /* Multi-layer neon: inner hot white, then pink glow stacked */
  text-shadow:
    0 0 1px #fff,
    0 0 3px #fff,
    0 0 6px #ff7ac6,
    0 0 14px #ff3aa0,
    0 0 28px #ff1a88,
    0 0 48px #ff0080,
    0 0 72px rgba(255, 20, 140, 0.8),
    0 0 110px rgba(255, 10, 120, 0.5);
  transition: text-shadow 0.04s, color 0.04s, opacity 0.04s;
}

.letter.dead {
  color: #3a1a28;
  text-shadow:
    0 0 1px #1a0a14,
    0 0 2px #2a1020,
    inset 0 0 2px #000;
  opacity: 0.55;
}

.letter.flicker-half {
  color: #ffb8dc;
  text-shadow:
    0 0 1px #fff,
    0 0 2px #fff,
    0 0 4px #ff7ac6,
    0 0 8px #ff3aa0,
    0 0 14px #ff1a88,
    0 0 22px rgba(255, 20, 140, 0.5);
}

/* Sub-line "EST. 2024" in teal */
.subline {
  margin-top: 8px;
  font-family: "Helvetica Neue", sans-serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 0.5em;
  padding-left: 0.5em; /* compensate last letter-spacing */
  color: #d9fbff;
  text-shadow:
    0 0 1px #fff,
    0 0 3px #aef7ff,
    0 0 8px #5ee8ff,
    0 0 16px #1cc9ff,
    0 0 28px #00a8ff,
    0 0 48px rgba(0, 168, 255, 0.6);
}

/* Ground reflection (faint pink puddle) */
.puddle {
  position: absolute;
  left: 0; right: 0;
  bottom: 0;
  height: 20%;
  background: radial-gradient(ellipse at center top, rgba(255, 30, 140, 0.12), transparent 70%);
  pointer-events: none;
  z-index: 3;
}

/* Buzzing power indicator in corner */
.power {
  position: absolute;
  top: 18px;
  right: 22px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 10px;
  color: #ff3aa0;
  letter-spacing: 0.2em;
  z-index: 6;
  text-shadow: 0 0 6px #ff1a88, 0 0 14px rgba(255, 10, 120, 0.6);
  animation: pulse 2.4s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.4; }
}

/* ===== Info + replay ===== */
.info {
  position: fixed;
  left: 24px;
  bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 99;
  font-family: "SF Mono", Menlo, monospace;
}
.atom-name {
  color: #ff7ac6;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-shadow: 0 0 8px rgba(255, 60, 180, 0.6);
}
.tech {
  color: #5a5d65;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 9px 16px;
  background: rgba(255, 30, 140, 0.12);
  color: #ff7ac6;
  border: 1px solid rgba(255, 60, 180, 0.4);
  border-radius: 8px;
  cursor: pointer;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  z-index: 100;
  text-shadow: 0 0 6px rgba(255, 60, 180, 0.5);
}
.replay:hover { background: rgba(255, 30, 140, 0.22); }
</style>
</head>
<body>

<button class="replay" id="replayBtn">&#x21bb; REPLAY</button>

<div class="info">
  <span class="atom-name">NEON SIGN</span>
  <span class="tech">text-shadow stack · flicker keyframes</span>
</div>

<div class="stage">
  <div class="power">&#x25cf; POWERED</div>
  <div class="puddle"></div>

  <div class="neon">
    <div class="word" id="word"></div>
    <div class="subline">EST. 2024</div>
  </div>
</div>

<script>
const WORD = "CAFÉ";
const wordEl = document.getElementById('word');

// Build letters
const letters = [];
for (const ch of WORD) {
  const span = document.createElement('span');
  span.className = 'letter';
  span.textContent = ch;
  wordEl.appendChild(span);
  letters.push(span);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function rand(min, max) { return min + Math.random() * (max - min); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

let cancelled = false;

// Flicker one letter: multi-stage
async function flickerLetter(idx) {
  const el = letters[idx];
  // pattern: dead, on, dead, half, on  (quick sputter)
  const stages = [
    ['dead', 60],
    ['on', 40],
    ['dead', 80],
    ['flicker-half', 50],
    ['dead', 30],
    ['on', 25],
    ['flicker-half', 45],
    ['on', 0],
  ];
  for (const [state, dur] of stages) {
    if (cancelled) return;
    el.classList.remove('dead', 'flicker-half');
    if (state !== 'on') el.classList.add(state);
    await sleep(dur);
  }
  el.classList.remove('dead', 'flicker-half');
}

// Initial "startup" where letters power on one by one erratically
async function startup() {
  for (const el of letters) el.classList.add('dead');
  await sleep(400);

  // Erratic power-on
  const order = [2, 0, 3, 1]; // not in reading order
  for (const i of order) {
    if (cancelled) return;
    // sputter
    for (let k = 0; k < 3; k++) {
      letters[i].classList.remove('dead');
      await sleep(rand(20, 50));
      letters[i].classList.add('dead');
      await sleep(rand(20, 80));
    }
    letters[i].classList.remove('dead');
    await sleep(rand(100, 220));
  }
}

async function runTimeline() {
  cancelled = false;
  for (const el of letters) el.classList.remove('dead', 'flicker-half');

  await startup();

  // Random flickers over time
  const endAt = performance.now() + 7000;
  while (performance.now() < endAt) {
    if (cancelled) return;
    await sleep(rand(400, 1200));
    if (cancelled) return;
    // pick random letter to flicker
    const idx = Math.floor(Math.random() * letters.length);
    // 25% chance: two letters flicker at once
    if (Math.random() < 0.25) {
      const idx2 = (idx + 1 + Math.floor(Math.random() * (letters.length - 1))) % letters.length;
      flickerLetter(idx);
      flickerLetter(idx2);
    } else {
      await flickerLetter(idx);
    }
  }

  // hold lit
  await sleep(1000);
  if (cancelled) return;

  // power-off sputter
  for (let k = 0; k < 3; k++) {
    for (const el of letters) el.classList.add('dead');
    await sleep(80);
    for (const el of letters) el.classList.remove('dead');
    await sleep(50);
  }
  for (const el of letters) el.classList.add('dead');
  await sleep(700);

  if (cancelled) return;
  runTimeline();
}

document.getElementById('replayBtn').onclick = () => {
  cancelled = true;
  setTimeout(runTimeline, 100);
};

window.addEventListener('load', () => setTimeout(runTimeline, 300));
</script>
</body>
</html>
