<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VHS Tracking · Magnetic Tape</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 40% 20%, #100d1a, #040308);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.7));
  background: linear-gradient(135deg, #1a1438 0%, #2a1a55 40%, #3d1f6e 70%, #1a1438 100%);
  border: 1px solid #2a2240;
}

/* Purple/magenta color cast overlay (VHS tint) */
.tint {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center,
    rgba(255, 80, 180, 0.18) 0%,
    rgba(100, 40, 200, 0.25) 50%,
    rgba(20, 10, 60, 0.5) 100%);
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 2;
}

/* Main content that will jitter */
.jitter {
  position: absolute;
  inset: 0;
  z-index: 1;
  animation: hJitter 4s infinite;
}
@keyframes hJitter {
  0%, 91%, 100% { transform: translateX(0); }
  92% { transform: translateX(-6px); }
  93% { transform: translateX(5px); }
  94% { transform: translateX(-3px); }
  95% { transform: translateX(2px); }
  96% { transform: translateX(0); }
}

/* Background gradient color bars - classic SMPTE style but softened */
.bars {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #ff4da6 0%, #ff4da6 18%,
    #ffcc33 18%, #ffcc33 36%,
    #33ccff 36%, #33ccff 54%,
    #9966ff 54%, #9966ff 72%,
    #ff6699 72%, #ff6699 100%
  );
  opacity: 0.5;
  filter: blur(30px) saturate(1.2);
}

/* Scanlines - dense */
.scan {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0.04) 0px,
    rgba(255, 255, 255, 0.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 8;
}

/* Thick tracking bands that move */
.track {
  position: absolute;
  left: 0; right: 0;
  height: 42px;
  pointer-events: none;
  z-index: 6;
  mix-blend-mode: screen;
}
.track::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255, 100, 200, 0.6) 0px,
    rgba(100, 255, 255, 0.5) 2px,
    rgba(200, 100, 255, 0.5) 4px,
    transparent 5px,
    transparent 7px
  );
  filter: blur(0.5px);
}
.track.t1 {
  animation: trackMove 7s infinite linear;
  height: 48px;
}
.track.t2 {
  animation: trackMove2 11s infinite linear;
  height: 20px;
}
@keyframes trackMove {
  0%   { top: -10%; }
  100% { top: 110%; }
}
@keyframes trackMove2 {
  0%   { top: 115%; }
  100% { top: -15%; }
}

/* Displacement strip - narrow bright line that shifts horizontally */
.shift-line {
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.8);
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 7;
  animation: shiftLine 3.3s infinite;
}
@keyframes shiftLine {
  0%, 100% { top: 20%; transform: translateX(0); opacity: 0; }
  48% { opacity: 0; }
  50% { top: 30%; transform: translateX(-20px); opacity: 0.9; }
  52% { top: 30%; transform: translateX(15px); opacity: 0.7; }
  54% { opacity: 0; }
}

/* Center label */
.center {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  font-family: "Impact", "Helvetica Neue", sans-serif;
  font-weight: 900;
  font-size: clamp(80px, 14vw, 170px);
  letter-spacing: 0.02em;
  color: #fff;
  text-shadow:
    3px 0 0 rgba(255, 0, 140, 0.8),
    -3px 0 0 rgba(0, 220, 255, 0.8),
    0 0 30px rgba(255, 255, 255, 0.4);
  mix-blend-mode: screen;
}
.center .play { display: inline-block; animation: pulseText 1.6s infinite; }
@keyframes pulseText {
  0%, 100% { opacity: 0.95; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.02); }
}

/* Top-left timestamp */
.ts {
  position: absolute;
  top: 22px; left: 26px;
  font-family: "Courier New", monospace;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  z-index: 10;
  letter-spacing: 0.06em;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6), 0 0 8px rgba(255,255,255,0.4);
}
.ts .rec {
  display: inline-block;
  width: 14px; height: 14px;
  background: #ff2040;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
  box-shadow: 0 0 10px #ff2040;
  animation: recBlink 1s infinite;
}
@keyframes recBlink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0.15; }
}

/* Bottom-right SP/EP */
.sp {
  position: absolute;
  bottom: 22px; right: 26px;
  font-family: "Courier New", monospace;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  z-index: 10;
  letter-spacing: 0.1em;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
}
.sp .ep { color: rgba(255,255,255,0.4); margin-left: 10px; }

/* Bottom-left TAPE label */
.tape {
  position: absolute;
  bottom: 22px; left: 26px;
  font-family: "Courier New", monospace;
  font-size: 14px;
  color: #fff;
  z-index: 10;
  letter-spacing: 0.1em;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
  opacity: 0.8;
}

/* Noise overlay (static) - using layered gradients to fake grain */
.noise {
  position: absolute;
  inset: 0;
  z-index: 9;
  pointer-events: none;
  opacity: 0.08;
  background:
    radial-gradient(circle at 20% 30%, #fff 0.5px, transparent 1px),
    radial-gradient(circle at 70% 60%, #fff 0.5px, transparent 1px),
    radial-gradient(circle at 40% 80%, #fff 0.5px, transparent 1px),
    radial-gradient(circle at 90% 20%, #fff 0.5px, transparent 1px);
  background-size: 3px 3px, 5px 5px, 7px 7px, 4px 4px;
  animation: noiseJump 0.1s infinite;
}
@keyframes noiseJump {
  0%   { background-position: 0 0, 0 0, 0 0, 0 0; }
  100% { background-position: 3px 5px, 2px 3px, 7px 2px, 4px 6px; }
}

/* Vignette */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 11;
}

/* REPLAY btn */
.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: #2a1a55;
  color: #fff;
  border: 1px solid #ff4da6;
  border-radius: 8px;
  cursor: pointer;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  z-index: 100;
  box-shadow: 0 0 16px rgba(255, 77, 166, 0.35);
}
.replay:hover { background: #3d2270; }

/* Info corner */
.info {
  position: fixed;
  left: 24px;
  bottom: 24px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 11px;
  color: #7a7d86;
}
.info .atom-name { color: #e4e5ea; font-weight: 700; letter-spacing: 0.1em; }
.info .tech { color: #5a5d65; }
</style>
</head>
<body>

<button class="replay" id="replayBtn">↻ REPLAY</button>

<div class="info">
  <span class="atom-name">06 · VHS TRACKING</span>
  <span class="tech">CSS keyframes · blend modes</span>
</div>

<div class="stage">
  <div class="jitter">
    <div class="bars"></div>
    <div class="tint"></div>

    <div class="center">
      <span class="play">REC ●</span>
    </div>

    <div class="ts"><span class="rec"></span><span id="clock">03:24:11 PM</span></div>
    <div class="sp">SP<span class="ep">EP</span></div>
    <div class="tape">TDK E-180 · HI-FI</div>

    <div class="track t1"></div>
    <div class="track t2"></div>
    <div class="shift-line"></div>

    <div class="noise"></div>
    <div class="scan"></div>
    <div class="vignette"></div>
  </div>
</div>

<script>
const clock = document.getElementById('clock');
let t = 0;
let timer;

function tick() {
  const base = new Date();
  base.setHours(15);
  base.setMinutes(24);
  base.setSeconds(11 + t);
  t++;
  const h = base.getHours() % 12 || 12;
  const m = String(base.getMinutes()).padStart(2, '0');
  const s = String(base.getSeconds()).padStart(2, '0');
  const ap = base.getHours() >= 12 ? 'PM' : 'AM';
  clock.textContent = `${String(h).padStart(2,'0')}:${m}:${s} ${ap}`;
}

function reset() {
  clearInterval(timer);
  t = 0;
  tick();
  timer = setInterval(tick, 1000);
  // restart all animations
  document.querySelectorAll('.jitter, .track, .shift-line, .play, .rec, .noise').forEach(el => {
    const anims = el.getAnimations ? el.getAnimations() : [];
    anims.forEach(a => { a.cancel(); a.play(); });
  });
}

document.getElementById('replayBtn').onclick = reset;
window.addEventListener('load', reset);
</script>
</body>
</html>
