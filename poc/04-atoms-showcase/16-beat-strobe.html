<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atom 16 · Beat Strobe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #050507;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
  color: #e4e5ea;
}

.stage {
  width: min(960px, 96vw);
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6));
  background: #0a0612;
}

.bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 50%, rgba(150, 60, 255, 0.35), transparent 65%),
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(60, 230, 255, 0.25), transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 20%, rgba(255, 60, 200, 0.25), transparent 60%),
    linear-gradient(180deg, #12061e 0%, #0a0612 70%, #060308 100%);
  transition: filter 0.05s;
}
.bg.kick { filter: brightness(1.8) saturate(1.3); }

.scanlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    180deg,
    rgba(255,255,255,0.02) 0px,
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  mix-blend-mode: overlay;
  opacity: 0.6;
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
}

.main {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

/* HUD top-left */
.hud-tl {
  position: absolute;
  left: 22px;
  top: 20px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bpm-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  color: #fff;
}
.bpm-num {
  font-size: 46px;
  font-weight: 900;
  letter-spacing: 0.02em;
  background: linear-gradient(180deg, #fff 0%, #ff4ae0 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 24px rgba(255, 74, 224, 0.6);
  font-variant-numeric: tabular-nums;
}
.bpm-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.28em;
  color: #c5a4ff;
}

.meter {
  display: flex;
  gap: 5px;
  margin-top: 2px;
}
.meter .cell {
  width: 22px; height: 6px;
  border-radius: 2px;
  background: rgba(255,255,255,0.12);
  transition: background 0.08s, box-shadow 0.08s;
}
.meter .cell.on {
  background: #ff4ae0;
  box-shadow: 0 0 10px #ff4ae0;
}
.meter .cell.downbeat.on {
  background: #4ae0ff;
  box-shadow: 0 0 14px #4ae0ff;
}

.time-sig {
  font-size: 11px;
  color: #c5a4ff;
  letter-spacing: 0.2em;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* bottom center track info */
.track {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 5;
  pointer-events: none;
}
.track-name {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.38em;
  color: #fff;
  text-shadow: 0 0 16px rgba(255, 74, 224, 0.6);
}
.track-sub {
  margin-top: 4px;
  font-size: 10px;
  letter-spacing: 0.28em;
  color: #9a7bc5;
  font-weight: 600;
}

/* top-right eq label */
.hud-tr {
  position: absolute;
  right: 22px;
  top: 20px;
  z-index: 5;
  text-align: right;
}
.eq {
  font-size: 10px;
  letter-spacing: 0.28em;
  color: #c5a4ff;
  font-weight: 700;
}
.eq-val {
  font-size: 22px;
  font-weight: 900;
  color: #4ae0ff;
  text-shadow: 0 0 12px rgba(74, 224, 255, 0.7);
  font-variant-numeric: tabular-nums;
  margin-top: 2px;
}

.replay {
  position: absolute;
  right: 22px;
  bottom: 22px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.06);
  color: #e4e5ea;
  border: 1px solid rgba(255, 74, 224, 0.35);
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  z-index: 10;
  backdrop-filter: blur(8px);
}
.replay:hover { background: rgba(255, 74, 224, 0.18); }

.info {
  position: absolute;
  left: 22px;
  bottom: 22px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  z-index: 5;
  font-size: 11px;
  letter-spacing: 0.12em;
}
.info .atom-name { color: #fff; font-weight: 700; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
.info .tech { color: #9a7bc5; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>

<div class="stage">
  <div class="bg" id="bg"></div>
  <canvas id="canvas"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="hud-tl">
    <div class="bpm-row">
      <span class="bpm-num">120</span>
      <span class="bpm-label">BPM</span>
    </div>
    <div class="meter" id="meter">
      <div class="cell downbeat"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>
    <div class="time-sig">4 / 4 · STEREO</div>
  </div>

  <div class="hud-tr">
    <div class="eq">LEVEL</div>
    <div class="eq-val" id="eqVal">-06</div>
  </div>

  <div class="track">
    <div class="track-name">TRACK 01 · REPLAY</div>
    <div class="track-sub">NEON CIRCUIT · 03:42</div>
  </div>

  <div class="info">
    <span class="atom-name">16 · Beat Strobe</span>
    <span class="tech">Canvas 2D · 120 BPM locked</span>
  </div>

  <button class="replay" id="replayBtn">RESTART</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stage = canvas.parentElement;
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const r = stage.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---- BEAT CLOCK (LOCKED 120 BPM = 500ms) ----
const BPM = 120;
const BEAT_MS = 60000 / BPM;  // 500
const BAR_BEATS = 4;

let startTime = performance.now();
let lastBeatIdx = -1;

const meterCells = document.querySelectorAll('.meter .cell');
const bgEl = document.getElementById('bg');
const eqVal = document.getElementById('eqVal');

// bars config
const BAR_COUNT = 28;
const bars = [];
for (let i = 0; i < BAR_COUNT; i++) {
  bars.push({
    angle: (i / BAR_COUNT) * Math.PI * 2,
    h: 0,          // current height
    target: 0,     // jump-to on beat
    vh: 0,         // velocity for decay
  });
}

// color per bar – neon cycle
function barColor(i, pulse) {
  const hues = [290, 310, 200, 180, 320]; // magenta/purple/cyan
  const hue = hues[i % hues.length];
  const l = 55 + pulse * 20;
  return `hsl(${hue}, 100%, ${l}%)`;
}

// center circle pulse state
let centerPulse = 0;
let centerHue = 0;
const centerHues = [290, 320, 200, 180]; // rotate per beat

function onBeat(beatIdx) {
  const beatInBar = beatIdx % BAR_BEATS;
  const isDownbeat = beatInBar === 0;

  // meter flash
  meterCells.forEach((c, i) => {
    c.classList.toggle('on', i === beatInBar);
  });

  // bg flash
  bgEl.classList.remove('kick');
  void bgEl.offsetWidth;
  bgEl.classList.add('kick');
  setTimeout(() => bgEl.classList.remove('kick'), isDownbeat ? 160 : 90);

  // bars kick: downbeat pushes hard, off-beats medium
  for (let i = 0; i < bars.length; i++) {
    const b = bars[i];
    const base = isDownbeat ? 1.0 : 0.55;
    const variance = 0.4 + Math.random() * 0.6;
    b.target = base * variance;
    b.h = b.target;
    b.vh = -0.045; // decay speed
  }

  // center pulse
  centerPulse = isDownbeat ? 1.0 : 0.65;
  centerHue = centerHues[beatInBar];

  // eq value flicker
  const levels = ['-03', '-04', '-02', '-05', '-01', '-06'];
  eqVal.textContent = levels[(Math.random() * levels.length) | 0];
}

function drawBars(cx, cy, radius) {
  const inner = radius;
  const maxLen = radius * 1.15;
  for (let i = 0; i < bars.length; i++) {
    const b = bars[i];
    const len = inner + b.h * maxLen;
    const x1 = cx + Math.cos(b.angle) * inner;
    const y1 = cy + Math.sin(b.angle) * inner;
    const x2 = cx + Math.cos(b.angle) * len;
    const y2 = cy + Math.sin(b.angle) * len;

    ctx.strokeStyle = barColor(i, b.h);
    ctx.shadowColor = barColor(i, 1);
    ctx.shadowBlur = 14 * b.h + 4;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

function drawCenter(cx, cy, radius) {
  const scale = 1 + centerPulse * 0.18;
  const r = radius * scale;

  // outer ring
  ctx.strokeStyle = `hsla(${centerHue}, 100%, 60%, 0.8)`;
  ctx.lineWidth = 3 + centerPulse * 4;
  ctx.shadowColor = `hsl(${centerHue}, 100%, 60%)`;
  ctx.shadowBlur = 25 + centerPulse * 30;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();

  // inner filled disc
  ctx.shadowBlur = 40 + centerPulse * 40;
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.85);
  grd.addColorStop(0, `hsla(${centerHue}, 100%, ${75 + centerPulse * 20}%, 1)`);
  grd.addColorStop(0.6, `hsla(${centerHue}, 100%, 55%, 0.7)`);
  grd.addColorStop(1, `hsla(${centerHue}, 100%, 40%, 0)`);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.85, 0, Math.PI * 2);
  ctx.fill();

  // core
  ctx.shadowBlur = 0;
  ctx.fillStyle = `hsla(${centerHue}, 100%, ${85 + centerPulse * 15}%, ${0.9})`;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // decoration rings
  ctx.strokeStyle = `hsla(${centerHue}, 100%, 80%, ${0.15 + centerPulse * 0.2})`;
  ctx.lineWidth = 1;
  ctx.shadowBlur = 0;
  for (let k = 1; k <= 3; k++) {
    ctx.beginPath();
    ctx.arc(cx, cy, r * (1 + k * 0.18), 0, Math.PI * 2);
    ctx.stroke();
  }
}

let lastT = performance.now();
function tick(t) {
  const dt = Math.min(3, (t - lastT) / 16.67);
  lastT = t;

  // beat clock
  const elapsed = t - startTime;
  const beatIdx = Math.floor(elapsed / BEAT_MS);
  if (beatIdx !== lastBeatIdx) {
    lastBeatIdx = beatIdx;
    onBeat(beatIdx);
  }

  // decay
  for (const b of bars) {
    b.h = Math.max(0, b.h + b.vh * dt);
  }
  centerPulse = Math.max(0, centerPulse - 0.04 * dt);

  ctx.clearRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;
  const radius = Math.min(W, H) * 0.18;

  drawBars(cx, cy, radius);
  drawCenter(cx, cy, radius);

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

document.getElementById('replayBtn').onclick = () => {
  startTime = performance.now();
  lastBeatIdx = -1;
};
</script>

</body>
</html>
