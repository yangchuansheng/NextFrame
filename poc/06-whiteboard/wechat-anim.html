<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Q 版聊天 · 动画</title>
<style>
:root {
  --bg: #0a0a0d;
  --window: #1e1e1f;
  --chat-bg: #161618;
  --header: #18181a;
  --border: #26262a;
  --text: #e4e5ea;
  --text-dim: #7a7d86;
  --me-bubble: #2e5c3a;
  --me-text: #ffffff;
  --friend-bubble: #2a2a2e;
  --friend-text: #d8d9dd;
  --green: #07c160;
  --green-glow: rgba(7, 193, 96, 0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 30% 0%, #1a1a1e, #050608);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
}

.stage {
  width: min(720px, 96vw);
  aspect-ratio: 3 / 4;
  max-height: 96vh;
  position: relative;
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6));
}

.replay {
  position: fixed;
  right: 24px;
  top: 24px;
  padding: 10px 18px;
  background: #07c160;
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.06em;
  z-index: 100;
  box-shadow: 0 6px 20px rgba(7, 193, 96, 0.35);
}
.replay:hover { transform: translateY(-1px); }
</style>
</head>
<body>

<button class="replay" id="replayBtn">↻ REPLAY</button>

<div class="stage">
<svg id="svg" viewBox="0 0 720 960" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="windowClip">
      <rect x="0" y="0" width="720" height="960" rx="18" ry="18"/>
    </clipPath>
    <clipPath id="chatClip">
      <rect x="0" y="88" width="720" height="712"/>
    </clipPath>

    <!-- Avatar gradients -->
    <radialGradient id="friendFill" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffd6b0"/>
      <stop offset="1" stop-color="#d48a5e"/>
    </radialGradient>
    <radialGradient id="meFill" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#9ee7b8"/>
      <stop offset="1" stop-color="#3a8e5a"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#windowClip)">
    <!-- ============ 窗口底 ============ -->
    <rect x="0" y="0" width="720" height="960" fill="var(--window, #1e1e1f)"/>
    <rect x="0" y="0" width="720" height="960" fill="#1e1e1f"/>

    <!-- ============ 头部 ============ -->
    <rect x="0" y="0" width="720" height="88" fill="#18181a"/>
    <line x1="0" y1="88" x2="720" y2="88" stroke="#26262a" stroke-width="1"/>

    <!-- 红绿灯 -->
    <g transform="translate(28, 30)">
      <circle cx="0"  cy="0" r="8" fill="#ff5f57"/>
      <circle cx="22" cy="0" r="8" fill="#febc2e"/>
      <circle cx="44" cy="0" r="8" fill="#28c840"/>
    </g>

    <!-- 对方头像（小） + 名字 -->
    <g transform="translate(320, 44)">
      <!-- Q 版头像 -->
      <g transform="scale(0.9)">
        <circle cx="-80" cy="0" r="22" fill="url(#friendFill)"/>
        <!-- 腮红 -->
        <circle cx="-90" cy="5" r="3.5" fill="#ff8fa0" opacity="0.6"/>
        <circle cx="-70" cy="5" r="3.5" fill="#ff8fa0" opacity="0.6"/>
        <!-- 眼睛 -->
        <circle cx="-88" cy="-3" r="2.5" fill="#2a1a0a"/>
        <circle cx="-72" cy="-3" r="2.5" fill="#2a1a0a"/>
        <!-- 微笑 -->
        <path d="M -87 6 Q -80 12 -73 6" fill="none" stroke="#2a1a0a" stroke-width="1.8" stroke-linecap="round"/>
        <!-- 呆毛 -->
        <path d="M -80 -22 L -78 -28 L -76 -22" fill="none" stroke="#d48a5e" stroke-width="2" stroke-linecap="round"/>
      </g>
      <text x="-42" y="-2" font-size="16" font-weight="700" fill="#e4e5ea">小明</text>
      <text x="-42" y="16" font-size="11" fill="#7a7d86">在线</text>
    </g>

    <!-- 更多按钮 -->
    <g transform="translate(680, 44)">
      <circle cx="-8" cy="0" r="2.5" fill="#7a7d86"/>
      <circle cx="0"  cy="0" r="2.5" fill="#7a7d86"/>
      <circle cx="8"  cy="0" r="2.5" fill="#7a7d86"/>
    </g>

    <!-- ============ 聊天区 (clipped) ============ -->
    <g clip-path="url(#chatClip)">
      <rect x="0" y="88" width="720" height="712" fill="#161618"/>

      <!-- 点阵背景 -->
      <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
        <circle cx="14" cy="14" r="0.8" fill="#26262a"/>
      </pattern>
      <rect x="0" y="88" width="720" height="712" fill="url(#dots)"/>

      <!-- 时间戳 -->
      <text x="360" y="130" font-size="12" fill="#5a5d65" text-anchor="middle">今天 17:46</text>

      <!-- ========== 滚动容器：所有消息都放这里 ========== -->
      <g id="scroller" transform="translate(0, 0)">

        <!-- 消息 1：对方（左） -->
        <g id="msg1" class="bubble-in" transform="translate(40, 160)">
          <!-- Q 头像 -->
          <g transform="translate(0, 0)">
            <circle cx="22" cy="22" r="22" fill="url(#friendFill)"/>
            <circle cx="12" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="32" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="14" cy="19" r="2.8" fill="#2a1a0a"/>
            <circle cx="30" cy="19" r="2.8" fill="#2a1a0a"/>
            <path d="M 15 28 Q 22 34 29 28" fill="none" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round"/>
            <path d="M 22 0 L 24 -6 L 26 0" fill="none" stroke="#d48a5e" stroke-width="2" stroke-linecap="round"/>
          </g>
          <!-- 气泡 -->
          <g transform="translate(58, 12)">
            <!-- 尾巴 -->
            <path d="M 0 12 L 10 10 L 10 24 Z" fill="#2a2a2e"/>
            <rect x="10" y="0" width="170" height="44" rx="12" fill="#2a2a2e"/>
            <text x="28" y="28" font-size="16" fill="#e4e5ea">在吗？</text>
          </g>
        </g>

        <!-- 消息 2：我（右） -->
        <g id="msg2" class="bubble-in" transform="translate(440, 240)">
          <!-- 气泡 -->
          <g transform="translate(0, 12)">
            <rect x="0" y="0" width="180" height="44" rx="12" fill="#2e5c3a"/>
            <path d="M 180 12 L 190 10 L 180 24 Z" fill="#2e5c3a"/>
            <text x="90" y="28" font-size="16" fill="#ffffff" text-anchor="middle">在呢，怎么了</text>
          </g>
          <!-- 我的头像 -->
          <g transform="translate(198, 0)">
            <circle cx="22" cy="22" r="22" fill="url(#meFill)"/>
            <circle cx="12" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="32" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="14" cy="19" r="2.8" fill="#0c2a17"/>
            <circle cx="30" cy="19" r="2.8" fill="#0c2a17"/>
            <path d="M 15 28 Q 22 34 29 28" fill="none" stroke="#0c2a17" stroke-width="2" stroke-linecap="round"/>
            <path d="M 22 0 L 24 -6 L 26 0" fill="none" stroke="#3a8e5a" stroke-width="2" stroke-linecap="round"/>
          </g>
        </g>

        <!-- 消息 3：对方（长消息） -->
        <g id="msg3" class="bubble-in" transform="translate(40, 320)">
          <g transform="translate(0, 0)">
            <circle cx="22" cy="22" r="22" fill="url(#friendFill)"/>
            <circle cx="12" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="32" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="14" cy="19" r="2.8" fill="#2a1a0a"/>
            <circle cx="30" cy="19" r="2.8" fill="#2a1a0a"/>
            <path d="M 15 28 Q 22 34 29 28" fill="none" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round"/>
            <path d="M 22 0 L 24 -6 L 26 0" fill="none" stroke="#d48a5e" stroke-width="2" stroke-linecap="round"/>
          </g>
          <g transform="translate(58, 12)">
            <path d="M 0 12 L 10 10 L 10 24 Z" fill="#2a2a2e"/>
            <rect x="10" y="0" width="280" height="44" rx="12" fill="#2a2a2e"/>
            <text x="28" y="28" font-size="16" fill="#e4e5ea">帮我看下这段代码为啥崩了</text>
          </g>
        </g>

        <!-- 消息 4：我发的代码块 -->
        <g id="msg4" class="bubble-in" transform="translate(260, 400)">
          <g transform="translate(0, 12)">
            <rect x="0" y="0" width="360" height="106" rx="12" fill="#2e5c3a"/>
            <path d="M 360 12 L 370 10 L 360 24 Z" fill="#2e5c3a"/>
            <!-- 代码模拟 -->
            <g font-family="'SF Mono', Menlo, monospace" font-size="13">
              <text x="18" y="26" fill="#9ee7b8">fn</text>
              <text x="42" y="26" fill="#fff">main</text>
              <text x="82" y="26" fill="#e4e5ea">() {</text>
              <text x="32" y="46" fill="#ffd6b0">let</text>
              <text x="64" y="46" fill="#fff">x</text>
              <text x="82" y="46" fill="#e4e5ea">: Vec&lt;i32&gt; = vec![];</text>
              <text x="32" y="66" fill="#ffd6b0">println!</text>
              <text x="98" y="66" fill="#e4e5ea">("{}", x[0]);</text>
              <text x="18" y="86" fill="#e4e5ea">}</text>
              <text x="240" y="86" fill="#ff9a3c" font-size="11">← panic!</text>
            </g>
          </g>
          <g transform="translate(378, 0)">
            <circle cx="22" cy="22" r="22" fill="url(#meFill)"/>
            <circle cx="12" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="32" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="14" cy="19" r="2.8" fill="#0c2a17"/>
            <circle cx="30" cy="19" r="2.8" fill="#0c2a17"/>
            <path d="M 15 28 Q 22 34 29 28" fill="none" stroke="#0c2a17" stroke-width="2" stroke-linecap="round"/>
            <path d="M 22 0 L 24 -6 L 26 0" fill="none" stroke="#3a8e5a" stroke-width="2" stroke-linecap="round"/>
          </g>
        </g>

        <!-- 消息 5：对方 -->
        <g id="msg5" class="bubble-in" transform="translate(40, 542)">
          <g transform="translate(0, 0)">
            <circle cx="22" cy="22" r="22" fill="url(#friendFill)"/>
            <circle cx="12" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="32" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="14" cy="19" r="2.8" fill="#2a1a0a"/>
            <circle cx="30" cy="19" r="2.8" fill="#2a1a0a"/>
            <path d="M 15 28 Q 22 34 29 28" fill="none" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round"/>
            <path d="M 22 0 L 24 -6 L 26 0" fill="none" stroke="#d48a5e" stroke-width="2" stroke-linecap="round"/>
          </g>
          <g transform="translate(58, 12)">
            <path d="M 0 12 L 10 10 L 10 24 Z" fill="#2a2a2e"/>
            <rect x="10" y="0" width="420" height="70" rx="12" fill="#2a2a2e"/>
            <text x="28" y="28" font-size="16" fill="#e4e5ea">空 Vec 取 [0] 会崩</text>
            <text x="28" y="52" font-size="16" fill="#e4e5ea">用 .get(0) 返回 Option 安全</text>
          </g>
        </g>

        <!-- 消息 6：我 -->
        <g id="msg6" class="bubble-in" transform="translate(490, 648)">
          <g transform="translate(0, 12)">
            <rect x="0" y="0" width="130" height="44" rx="12" fill="#2e5c3a"/>
            <path d="M 130 12 L 140 10 L 130 24 Z" fill="#2e5c3a"/>
            <text x="65" y="28" font-size="16" fill="#ffffff" text-anchor="middle">谢了 👍</text>
          </g>
          <g transform="translate(148, 0)">
            <circle cx="22" cy="22" r="22" fill="url(#meFill)"/>
            <circle cx="12" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="32" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="14" cy="19" r="2.8" fill="#0c2a17"/>
            <circle cx="30" cy="19" r="2.8" fill="#0c2a17"/>
            <path d="M 15 28 Q 22 34 29 28" fill="none" stroke="#0c2a17" stroke-width="2" stroke-linecap="round"/>
            <path d="M 22 0 L 24 -6 L 26 0" fill="none" stroke="#3a8e5a" stroke-width="2" stroke-linecap="round"/>
          </g>
        </g>

        <!-- 对方正在输入 typing indicator -->
        <g id="typing" transform="translate(40, 648)">
          <g transform="translate(0, 0)">
            <circle cx="22" cy="22" r="22" fill="url(#friendFill)"/>
            <circle cx="12" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="32" cy="27" r="3.5" fill="#ff8fa0" opacity="0.6"/>
            <circle cx="14" cy="19" r="2.8" fill="#2a1a0a"/>
            <circle cx="30" cy="19" r="2.8" fill="#2a1a0a"/>
            <path d="M 15 28 Q 22 34 29 28" fill="none" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round"/>
          </g>
          <g transform="translate(58, 12)">
            <path d="M 0 12 L 10 10 L 10 24 Z" fill="#2a2a2e"/>
            <rect x="10" y="0" width="72" height="24" rx="12" fill="#2a2a2e"/>
            <circle class="td td1" cx="26" cy="12" r="3" fill="#8a8d95"/>
            <circle class="td td2" cx="38" cy="12" r="3" fill="#8a8d95"/>
            <circle class="td td3" cx="50" cy="12" r="3" fill="#8a8d95"/>
          </g>
        </g>

      </g> <!-- /scroller -->
    </g> <!-- /chatClip -->

    <!-- ============ 输入区 ============ -->
    <rect x="0" y="800" width="720" height="160" fill="#18181a"/>
    <line x1="0" y1="800" x2="720" y2="800" stroke="#26262a" stroke-width="1"/>

    <!-- 工具栏 -->
    <g transform="translate(28, 822)">
      <!-- emoji -->
      <g>
        <circle cx="12" cy="12" r="11" fill="none" stroke="#7a7d86" stroke-width="1.8"/>
        <circle cx="8" cy="10" r="1.3" fill="#7a7d86"/>
        <circle cx="16" cy="10" r="1.3" fill="#7a7d86"/>
        <path d="M 7 14 Q 12 18 17 14" fill="none" stroke="#7a7d86" stroke-width="1.8" stroke-linecap="round"/>
      </g>
      <!-- 图片 -->
      <g transform="translate(38, 0)">
        <rect x="0" y="0" width="24" height="24" rx="4" fill="none" stroke="#7a7d86" stroke-width="1.8"/>
        <circle cx="8" cy="8" r="2.2" fill="#7a7d86"/>
        <path d="M 2 20 L 9 13 L 14 17 L 22 7" fill="none" stroke="#7a7d86" stroke-width="1.8" stroke-linejoin="round"/>
      </g>
      <!-- 文件 -->
      <g transform="translate(76, 0)">
        <path d="M 2 2 L 16 2 L 22 8 L 22 22 L 2 22 Z"
              fill="none" stroke="#7a7d86" stroke-width="1.8" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- 输入框 -->
    <rect x="28" y="864" width="560" height="74" rx="10" fill="#0f0f11" stroke="#26262a" stroke-width="1"/>
    <text id="inputText" x="48" y="905" font-size="17" fill="#e4e5ea"></text>
    <rect id="cursor" x="48" y="886" width="2" height="26" fill="#07c160">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- 发送按钮 -->
    <g id="sendBtn" transform="translate(608, 864)">
      <rect x="0" y="0" width="84" height="74" rx="12" fill="#07c160"/>
      <text x="42" y="46" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">发送</text>
    </g>

  </g>

  <rect x="0.5" y="0.5" width="719" height="959" rx="18" ry="18"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
</svg>
</div>

<style>
/* ============ SVG 动画 ============ */
.bubble-in {
  opacity: 0;
  transform: scale(0.3) translateY(30px);
  transform-origin: center;
  transform-box: fill-box;
  transition:
    opacity 0.35s,
    transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.bubble-in.shown {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* Typing dots */
#typing {
  opacity: 0;
  transform: scale(0.3);
  transform-origin: center;
  transform-box: fill-box;
  transition: opacity 0.3s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#typing.shown {
  opacity: 1;
  transform: scale(1);
}
.td {
  animation: tdBounce 1.1s infinite;
}
.td2 { animation-delay: 0.15s; }
.td3 { animation-delay: 0.30s; }
@keyframes tdBounce {
  0%, 60%, 100% { transform: translateY(0); fill: #8a8d95; }
  30% { transform: translateY(-4px); fill: #e4e5ea; }
}

/* scroller smooth scroll via transform */
#scroller {
  transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* send button press animation */
#sendBtn {
  transition: transform 0.15s, filter 0.2s;
  transform-origin: center;
  transform-box: fill-box;
}
#sendBtn.pressed {
  transform: scale(0.92);
  filter: brightness(1.3);
}
</style>

<script>
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);

const INPUT_MSGS = [
  { text: '在呢，怎么了', show: 'msg2', dur: 1200, scroll: 0 },
  { text: '', show: 'msg4', dur: 0, scroll: -120 },      // 代码块直接发（不用输入动画）
  { text: '谢了 👍', show: 'msg6', dur: 600, scroll: -240 },
];

const FRIEND_MSGS = [
  { show: 'msg1', scroll: 0 },
  { show: 'msg3', scroll: -60 },
  { show: 'msg5', scroll: -180 },
];

function typeText(text, dur) {
  return new Promise(resolve => {
    const el = $('inputText');
    const cursor = $('cursor');
    el.textContent = '';
    const chars = [...text];
    let i = 0;
    const step = () => {
      if (i >= chars.length) { resolve(); return; }
      el.textContent += chars[i++];
      // move cursor
      const bbox = el.getBBox();
      cursor.setAttribute('x', 48 + bbox.width + 2);
      setTimeout(step, dur / chars.length);
    };
    step();
  });
}

function clearInput() {
  $('inputText').textContent = '';
  $('cursor').setAttribute('x', 48);
}

function pressSend() {
  return new Promise(resolve => {
    $('sendBtn').classList.add('pressed');
    setTimeout(() => {
      $('sendBtn').classList.remove('pressed');
      resolve();
    }, 250);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function show(id) { $(id).classList.add('shown'); }
function hide(id) { $(id).classList.remove('shown'); }

function setScroll(y) {
  $('scroller').setAttribute('transform', `translate(0, ${y})`);
}

async function runTimeline() {
  resetAll();
  await sleep(500);

  // 对方先发: "在吗？"
  await sleep(200);
  show('msg1');
  await sleep(1200);

  // 我打字: "在呢，怎么了"
  await typeText('在呢，怎么了', 900);
  await sleep(400);
  await pressSend();
  clearInput();
  show('msg2');
  await sleep(900);

  // 对方: "帮我看下这段代码..."
  show('typing');
  await sleep(1100);
  hide('typing');
  show('msg3');
  await sleep(1400);

  // 我发代码块（直接发，没打字动画）
  await pressSend();
  show('msg4');
  setScroll(-90);
  await sleep(1600);

  // 对方: "空 Vec..."
  show('typing');
  $('typing').setAttribute('transform', 'translate(40, 764)'); // 贴下一行
  await sleep(1300);
  hide('typing');
  show('msg5');
  await sleep(1500);

  // 我打: 谢了 👍
  await typeText('谢了 👍', 500);
  await sleep(300);
  await pressSend();
  clearInput();
  show('msg6');
  setScroll(-200);
  await sleep(2000);
}

function resetAll() {
  clearInput();
  ['msg1','msg2','msg3','msg4','msg5','msg6'].forEach(hide);
  hide('typing');
  $('typing').setAttribute('transform', 'translate(40, 648)');
  setScroll(0);
}

$('replayBtn').onclick = runTimeline;
window.addEventListener('load', () => setTimeout(runTimeline, 400));
</script>
</body>
</html>
