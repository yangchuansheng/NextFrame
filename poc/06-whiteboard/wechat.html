<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>WeChat Mac · SVG 手搓</title>
<style>
:root {
  --bg: #0f1012;
  --window: #1e1e1f;
  --sidebar: #161618;
  --list: #1a1a1c;
  --chat: #1e1e1f;
  --border: #2a2a2c;
  --text: #d8d9dd;
  --text-dim: #6a6d75;
  --text-dim2: #4a4d55;
  --green: #07c160;
  --green-soft: #2b5a3b;
  --accent: #4b8d5a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at 30% 0%, #1a1a1e, #08080a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  user-select: none;
  overflow: hidden;
}
.frame {
  filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6));
}
</style>
</head>
<body>

<svg class="frame" viewBox="0 0 1200 760" width="min(1200px, 96vw)" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 圆角遮罩 -->
    <clipPath id="windowClip">
      <rect x="0" y="0" width="1200" height="760" rx="14" ry="14"/>
    </clipPath>

    <!-- 避免不同区域的头像用同一灰色，我用一组渐变 -->
    <linearGradient id="ava1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a7a4a"/>
      <stop offset="1" stop-color="#1f4a2b"/>
    </linearGradient>
    <linearGradient id="ava2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a5d8a"/>
      <stop offset="1" stop-color="#2a375a"/>
    </linearGradient>
    <linearGradient id="ava3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a5a4a"/>
      <stop offset="1" stop-color="#5a2f24"/>
    </linearGradient>
    <linearGradient id="ava4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a4a8a"/>
      <stop offset="1" stop-color="#3a254a"/>
    </linearGradient>
    <linearGradient id="ava5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a7a8a"/>
      <stop offset="1" stop-color="#1f3a4a"/>
    </linearGradient>
    <linearGradient id="ava6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a7a4a"/>
      <stop offset="1" stop-color="#4a4a24"/>
    </linearGradient>

    <!-- 聊天截图缩略图的渐变 -->
    <linearGradient id="thumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#18181c"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#windowClip)">
    <!-- ============ 窗口底色 ============ -->
    <rect x="0" y="0" width="1200" height="760" fill="#1e1e1f"/>

    <!-- ============ 顶部 titlebar ============ -->
    <rect x="0" y="0" width="1200" height="44" fill="#161618"/>
    <line x1="0" y1="44" x2="1200" y2="44" stroke="#26262a" stroke-width="1"/>

    <!-- 红绿灯 -->
    <g transform="translate(24, 22)">
      <circle cx="0"  cy="0" r="7" fill="#ff5f57"/>
      <circle cx="20" cy="0" r="7" fill="#febc2e"/>
      <circle cx="40" cy="0" r="7" fill="#28c840"/>
    </g>

    <!-- titlebar 标题 "文件传输助手" -->
    <text x="426" y="29" font-size="14" font-weight="600" fill="#d8d9dd" text-anchor="start">文件传输助手</text>

    <!-- ============ 左侧图标栏 ============ -->
    <rect x="0" y="44" width="72" height="716" fill="#161618"/>
    <line x1="72" y1="44" x2="72" y2="760" stroke="#26262a" stroke-width="1"/>

    <!-- 头像（大） -->
    <g transform="translate(36, 100)">
      <circle cx="0" cy="0" r="20" fill="url(#ava1)"/>
      <text x="0" y="5" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Z</text>
    </g>

    <!-- 消息图标（选中态 · 带红点） -->
    <g transform="translate(36, 170)">
      <rect x="-18" y="-16" width="36" height="36" rx="8" fill="#2a2a2e"/>
      <!-- 聊天气泡 -->
      <path d="M -11 -6 Q -11 -10 -7 -10 L 8 -10 Q 12 -10 12 -6 L 12 3 Q 12 7 8 7 L -3 7 L -8 12 L -7 7 L -7 7 Q -11 7 -11 3 Z"
            fill="none" stroke="#07c160" stroke-width="2" stroke-linejoin="round"/>
      <!-- 红点 -->
      <circle cx="13" cy="-13" r="5" fill="#ff3b30"/>
      <text x="13" y="-10" font-size="8" font-weight="800" fill="#fff" text-anchor="middle">3</text>
    </g>

    <!-- 通讯录图标 -->
    <g transform="translate(36, 224)">
      <circle cx="0" cy="-4" r="6" fill="none" stroke="#6a6d75" stroke-width="2"/>
      <path d="M -10 10 Q -10 2 0 2 Q 10 2 10 10" fill="none" stroke="#6a6d75" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- 收藏图标 -->
    <g transform="translate(36, 278)">
      <path d="M 0 -11 L 3 -3 L 11 -3 L 5 2 L 7 10 L 0 5 L -7 10 L -5 2 L -11 -3 L -3 -3 Z"
            fill="none" stroke="#6a6d75" stroke-width="2" stroke-linejoin="round"/>
    </g>

    <!-- 文件图标 -->
    <g transform="translate(36, 332)">
      <path d="M -11 -8 L -2 -8 L 2 -4 L 11 -4 L 11 9 L -11 9 Z"
            fill="none" stroke="#6a6d75" stroke-width="2" stroke-linejoin="round"/>
    </g>

    <!-- 更多 -->
    <g transform="translate(36, 386)">
      <circle cx="-6" cy="0" r="1.5" fill="#6a6d75"/>
      <circle cx="0"  cy="0" r="1.5" fill="#6a6d75"/>
      <circle cx="6"  cy="0" r="1.5" fill="#6a6d75"/>
    </g>

    <!-- 底部设置 -->
    <g transform="translate(36, 720)">
      <circle cx="0" cy="0" r="9" fill="none" stroke="#6a6d75" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="none" stroke="#6a6d75" stroke-width="2"/>
    </g>

    <!-- ============ 中间会话列表 ============ -->
    <rect x="72" y="44" width="304" height="716" fill="#1a1a1c"/>
    <line x1="376" y1="44" x2="376" y2="760" stroke="#26262a" stroke-width="1"/>

    <!-- 搜索框 -->
    <g transform="translate(88, 72)">
      <rect x="0" y="0" width="272" height="34" rx="8" fill="#0f0f11"/>
      <g transform="translate(14, 17)">
        <circle cx="0" cy="0" r="5" fill="none" stroke="#5a5d65" stroke-width="1.5"/>
        <line x1="4" y1="4" x2="8" y2="8" stroke="#5a5d65" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <text x="32" y="22" font-size="13" fill="#5a5d65">搜索</text>
      <rect x="226" y="6" width="38" height="22" rx="5" fill="#2a2a2e"/>
      <text x="245" y="21" font-size="11" fill="#8a8d95" text-anchor="middle">搜索</text>
    </g>

    <!-- ===== 会话项 ===== -->
    <!-- 每项高 68，x=88 起 -->

    <!-- #1 文件传输助手（选中） -->
    <g transform="translate(72, 128)">
      <rect x="0" y="0" width="304" height="68" fill="#0e3a21"/>
      <rect x="0" y="0" width="3" height="68" fill="#07c160"/>
      <circle cx="38" cy="34" r="18" fill="url(#ava1)"/>
      <path d="M 30 28 L 38 36 L 48 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="28" font-size="14" font-weight="700" fill="#ffffff">文件传输助手</text>
      <text x="64" y="48" font-size="11" fill="#a8c8b5">[图片]</text>
      <text x="286" y="27" font-size="10" fill="#a8c8b5" text-anchor="end">16:28</text>
    </g>

    <!-- #2 AI 工程师群 -->
    <g transform="translate(72, 196)">
      <circle cx="38" cy="34" r="18" fill="url(#ava2)"/>
      <text x="38" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">群</text>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">AI工程师交流S群</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">张三: 调 fine-tune 的时候...</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">16:25</text>
      <circle cx="288" cy="45" r="8" fill="#ff3b30"/>
      <text x="288" y="49" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">12</text>
    </g>

    <!-- #3 王李轩 -->
    <g transform="translate(72, 264)">
      <circle cx="38" cy="34" r="18" fill="url(#ava3)"/>
      <text x="38" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">王</text>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">王李轩-M03-鹏...</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">行程记录，行程记录</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">13:52</text>
    </g>

    <!-- #4 Chaos -->
    <g transform="translate(72, 332)">
      <circle cx="38" cy="34" r="18" fill="url(#ava4)"/>
      <text x="38" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">C</text>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">Chaos</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">[图片]</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">昨天</text>
    </g>

    <!-- #5 ClaudeCode 群 -->
    <g transform="translate(72, 400)">
      <circle cx="38" cy="34" r="18" fill="url(#ava5)"/>
      <text x="38" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">C</text>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">ClaudeCode源码研...</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">Ryamen: 他这个其实...</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">昨天</text>
      <circle cx="288" cy="45" r="8" fill="#ff3b30"/>
      <text x="288" y="49" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    </g>

    <!-- #6 公众号 -->
    <g transform="translate(72, 468)">
      <circle cx="38" cy="34" r="18" fill="url(#ava6)"/>
      <text x="38" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">公</text>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">公众号</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">LLMQuant: 你真的理解模型…</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">昨天</text>
    </g>

    <!-- #7 用户大模型交流群 -->
    <g transform="translate(72, 536)">
      <circle cx="38" cy="34" r="18" fill="url(#ava2)"/>
      <text x="38" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">用</text>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">用户大模型交流群</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">李四: 最近 RAG 有什么...</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">星期三</text>
    </g>

    <!-- #8 EvoLink VIP 群 -->
    <g transform="translate(72, 604)">
      <circle cx="38" cy="34" r="18" fill="url(#ava3)"/>
      <text x="38" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">E</text>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">EvoLink VIP 群</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">[链接] 最新动态...</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">星期三</text>
    </g>

    <!-- #9 微信支付 -->
    <g transform="translate(72, 672)">
      <circle cx="38" cy="34" r="18" fill="#07c160"/>
      <path d="M 30 33 L 34 28 L 38 35 L 46 26" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="28" font-size="14" font-weight="600" fill="#d8d9dd">微信支付</text>
      <text x="64" y="48" font-size="11" fill="#6a6d75">[支付] 扫码支付到账通知</text>
      <text x="286" y="27" font-size="10" fill="#6a6d75" text-anchor="end">11/21</text>
    </g>

    <!-- ============ 右侧聊天区 ============ -->
    <rect x="376" y="44" width="824" height="716" fill="#1e1e1f"/>

    <!-- 聊天头部 -->
    <rect x="376" y="44" width="824" height="60" fill="#1e1e1f"/>
    <line x1="376" y1="104" x2="1200" y2="104" stroke="#26262a" stroke-width="1"/>
    <text x="396" y="80" font-size="15" font-weight="700" fill="#d8d9dd">文件传输助手</text>
    <g transform="translate(1168, 74)">
      <circle cx="-6" cy="0" r="2" fill="#6a6d75"/>
      <circle cx="0"  cy="0" r="2" fill="#6a6d75"/>
      <circle cx="6"  cy="0" r="2" fill="#6a6d75"/>
    </g>

    <!-- 时间分隔 "17:46" -->
    <text x="788" y="144" font-size="11" font-weight="600" fill="#5a5d65" text-anchor="middle">17:46</text>

    <!-- 消息 1：右侧图片消息 -->
    <g transform="translate(940, 172)">
      <!-- 气泡 -->
      <rect x="0" y="0" width="180" height="128" rx="10" fill="url(#thumb)" stroke="#2a2a2e" stroke-width="1"/>
      <!-- 模拟图片内容：几条白线+一张小卡 -->
      <rect x="12" y="12" width="156" height="60" rx="4" fill="#0a0a0c"/>
      <rect x="20" y="22" width="88" height="4" fill="#3a3a3e"/>
      <rect x="20" y="32" width="120" height="4" fill="#3a3a3e"/>
      <rect x="20" y="42" width="60" height="4" fill="#3a3a3e"/>
      <circle cx="148" cy="34" r="8" fill="#07c160" opacity="0.4"/>
      <!-- 下方卡片群 -->
      <rect x="12" y="82" width="44" height="34" rx="3" fill="#0a0a0c"/>
      <rect x="64" y="82" width="44" height="34" rx="3" fill="#0a0a0c"/>
      <rect x="116" y="82" width="44" height="34" rx="3" fill="#0a0a0c"/>
      <!-- 右侧头像 -->
      <circle cx="204" cy="18" r="16" fill="url(#ava1)"/>
      <text x="204" y="22" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Z</text>
    </g>

    <!-- 消息 2：右侧图片消息 -->
    <g transform="translate(940, 316)">
      <rect x="0" y="0" width="180" height="128" rx="10" fill="url(#thumb)" stroke="#2a2a2e" stroke-width="1"/>
      <rect x="12" y="12" width="156" height="60" rx="4" fill="#0a0a0c"/>
      <rect x="20" y="22" width="72" height="4" fill="#3a3a3e"/>
      <rect x="20" y="32" width="100" height="4" fill="#3a3a3e"/>
      <rect x="20" y="42" width="40" height="4" fill="#3a3a3e"/>
      <rect x="20" y="52" width="80" height="4" fill="#3a3a3e"/>
      <rect x="12" y="82" width="156" height="34" rx="3" fill="#0a0a0c"/>
      <rect x="20" y="92" width="60" height="4" fill="#3a3a3e"/>
      <rect x="20" y="100" width="90" height="4" fill="#3a3a3e"/>
      <circle cx="204" cy="18" r="16" fill="url(#ava1)"/>
      <text x="204" y="22" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Z</text>
    </g>

    <!-- 消息 3：小文字气泡 -->
    <g transform="translate(1022, 464)">
      <rect x="0" y="0" width="98" height="36" rx="10" fill="#2e5c3a"/>
      <text x="49" y="22" font-size="13" fill="#e8f8ec" text-anchor="middle">收到✓</text>
      <circle cx="144" cy="18" r="16" fill="url(#ava1)"/>
      <text x="144" y="22" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Z</text>
    </g>

    <!-- 输入区 -->
    <line x1="376" y1="618" x2="1200" y2="618" stroke="#26262a" stroke-width="1"/>
    <rect x="376" y="618" width="824" height="142" fill="#18181a"/>

    <!-- 输入工具条 -->
    <g transform="translate(396, 642)">
      <!-- emoji -->
      <circle cx="10" cy="10" r="9" fill="none" stroke="#6a6d75" stroke-width="1.5"/>
      <circle cx="7" cy="8" r="1" fill="#6a6d75"/>
      <circle cx="13" cy="8" r="1" fill="#6a6d75"/>
      <path d="M 6 12 Q 10 15 14 12" fill="none" stroke="#6a6d75" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 图片 -->
      <g transform="translate(36, 0)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6a6d75" stroke-width="1.5"/>
        <circle cx="7" cy="7" r="2" fill="#6a6d75"/>
        <path d="M 2 16 L 7 11 L 12 14 L 18 6" fill="none" stroke="#6a6d75" stroke-width="1.5" stroke-linejoin="round"/>
      </g>
      <!-- 剪刀/截屏 -->
      <g transform="translate(72, 0)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6a6d75" stroke-width="1.5"/>
        <line x1="5" y1="10" x2="15" y2="10" stroke="#6a6d75" stroke-width="1.5"/>
        <line x1="10" y1="5" x2="10" y2="15" stroke="#6a6d75" stroke-width="1.5"/>
      </g>
      <!-- 文件 -->
      <g transform="translate(108, 0)">
        <path d="M 1 1 L 12 1 L 18 7 L 18 19 L 1 19 Z"
              fill="none" stroke="#6a6d75" stroke-width="1.5" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- 光标占位 -->
    <rect x="396" y="686" width="2" height="22" fill="#5a5d65">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- 右下角按钮 -->
    <g transform="translate(1120, 728)">
      <rect x="0" y="0" width="60" height="22" rx="4" fill="#2a2a2e"/>
      <text x="30" y="15" font-size="11" fill="#a8a9ad" text-anchor="middle">发送(S)</text>
    </g>
  </g>

  <!-- 窗口外框高光（subtle） -->
  <rect x="0.5" y="0.5" width="1199" height="759" rx="14" ry="14"
        fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>

</body>
</html>
